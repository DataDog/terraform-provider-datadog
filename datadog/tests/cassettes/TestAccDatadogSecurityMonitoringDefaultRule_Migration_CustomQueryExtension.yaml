.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfile_owners_missing(file) if {\n\tnot dd_output.has_key(file, \"user\")\n}\n\ncompliant_config(file) if {\n\tfile.user == \"root\"\n\tfile.group == \"root\"\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubelet.config)\n} else = \"skip\" if {\n\tfile_owners_missing(k8s_node.components.kubelet.config)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components.kubelet, \"config\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nIf the kubelet refers to a configuration file with the `--config` argument, you should set its file ownership to maintain integrity. The file should be owned by `root:root`.\n\n## Remediation\n\nRun the following command to fix the kubelet configuration file''s permissions:\n\n```bash\nchown root:root /etc/kubernetes/kubelet/kubelet-config.json\n```\n**Note**: The path above is the default location.","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.1.4","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.1.4","scope:google_kuberne