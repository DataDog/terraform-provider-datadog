ay lead to a substantial increase in log size, especially if there are a significant number of administrative actions performed on a server. However, the benefits of improved security monitoring outweigh the potential impact on log size.\n\n## Remediation\n\n### From the console\n\n1. Navigate to the **Monitor** blade.\n2. Select **Alerts** \u003e **Create** \u003e **Alert rule**.\n3. Under **Filter by subscription**, choose a subscription.\n4. Under **Filter by resource type**, select **Public IP addresses**.\n5. Under **Filter by location**, select **All**.\n6. From the results, select the subscription, then click **Done**.\n7. Click the **Condition** tab.\n8. Under Signal name, click Delete **Create/Update Public Ip Address (Microsoft.Network/publicIPAddresses)**.\n9. Click the **Actions** tab.\n10. To use an existing action group, click **Select action groups**. To create a new action group, click **Create action group**. Fill out the appropriate details for the selection.\n11. Click the **Details** tab.\n12. Select a **Resource group**, then provide an **Alert rule name** and an optional **Alert rule description**.\n13. Click **Review + create**.\n14. Click **Create**.\n","tags":["control:CC6.8","scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:7.1.2.9","control:A.12.4.1","requirement:Logging","control:12.2.a","control:5.2.9","level:1","framework:nist-800-171","framework:iso-27001","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:soc-2","requirement:Logical-and-Physical-Access-Control","control:CC2.1","control:CC7.2","control:CC7.1"],"hasExtendedTitle":true,"type