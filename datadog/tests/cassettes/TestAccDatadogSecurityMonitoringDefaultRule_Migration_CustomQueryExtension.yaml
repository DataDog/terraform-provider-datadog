    mode: ''0755''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_sourcedir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_sourcedir_has_servers.rc != 0\n  tags:\n  - CCE-86811-7\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Add remote time servers to sourcedir .sources file\n  ansible.builtin.lineinfile:\n    path: ''{{ chrony_sourcedir_paths.stdout_lines[0] }}/ntp-servers.sources''\n    line: server {{ item }}\n    state: present\n    create: true\n    mode: ''0644''\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_sourcedir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_sourcedir_has_servers.rc != 0\n  tags:\n  - CCE-86811-7\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Create confdir directory if needed\n  ansible.builtin.file:\n    path: ''{{ chrony_confdir_paths.stdout_lines[0] }}''\n    state: directory\n    mode: ''0755''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  - chrony_confdir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_confdir_has_servers.rc != 0\n  tags:\n  - CCE-86811-7\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Add remote time servers to confdir .conf file\n  ansible.builtin.lineinfile:\n    path: ''{{ chrony_confdir_paths.stdout_lines[0] }}/ntp-servers.conf''\n    line: server {{ item }}\n    state: present\n    create: true\n    mode: ''0644''\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  - chrony_confdir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_confdir_has_servers.rc != 0\n  tags:\n  - CCE-86811-7\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Add remote time servers to main chrony configuration\n  ansible.builtin.lineinfile:\n    path: /etc/chrony.conf\n    line: server {{ item }}\n    state: present\n    create: true\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  - (chrony_confdir_paths.stdout_lines | default([]) | length == 0 or chrony_confdir_has_servers.rc\n    != 0)\n  tags:\n  - CCE-86811-7\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n```\n","requirement":"Network-Time-Protocol","version":"1.0.0"},{"control":"2.3.2","framework":"cis-almalinux9","is_default":true,"message":"## Description\n\n`Chrony` is a daemon which implements the Network Time Protocol (NTP). It is designed\nto synchronize system clocks across a variety of systems and use a source that is highly\naccurate. More information on `chrony` can be found at\n\u003chttps://chrony-project.org/\u003e.\n`Chrony` can be configured to be a client and/or a server.\nAdd or edit server or pool lines to `/etc/chrony.conf` as appropriate:\n\n```\nserver \u003cremote-server\u003e\n```\n\nAlternatively, server or pool directives can be specified in files included via\n`sourcedir` or `confdir` directives in `/etc/chrony.conf`.\nWhen using `sourcedir`, create `.sources` files in the specified directory:\n\n```\n# In /etc/chrony.conf:\nsourcedir /etc/chrony/sources.d\n\n# In /etc/chrony/sources.d/ntp.sources:\nserver 0.pool.ntp.org\n```\n\nWhen using `confdir`, create `.conf` files in the specified directory:\n\n```\n# In /etc/chrony.conf:\nconfdir /etc/chrony/conf.d\n\n# In /etc/chrony/conf.d/ntp-servers.conf:\npool 1.pool.ntp.org\n```\n\nMultiple servers may be configured.\n\n## Rationale\n\nIf `chrony` is in use on the system proper configuration is vital to ensuring time\nsynchronization is working properly.\n\n## Remediation\n\n### Shell script\n\nThe following script can be run on the host to remediate the issue.\n\n```\n#!/bin/bash\n\n# Remediation is applicable only in certain platforms\nif rpm --quiet -q kernel \u0026\u0026 { rpm --quiet -q chrony; }; then\n\nvar_multiple_time_servers=''0.almalinux.pool.ntp.org,1.almalinux.pool.ntp.org,2.almalinux.pool.ntp.org,3.almalinux.pool.ntp.org''\n\n\nconfig_file=\"/etc/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" \u003e\u003e \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\n  if [[ -s \"$config_file\" ]] \u0026\u0026 [[ -n \"$(tail -c 1 -- \"$config_file\" || true)\" ]]; then\n      LC_ALL=C sed -i --follow-symlinks ''$a''\\\\ \"$config_file\"\n  fi\nfi\n\nelse\n    \u003e\u00262 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.almalinux.pool.ntp.org,1.almalinux.pool.ntp.org,2.almalinux.pool.ntp.org,3.almalinux.pool.ntp.org\n  tags:\n    - always\n\n- name: Check if chrony main config has active server/pool entries\n  ansible.builtin.command:\n    cmd: grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' /etc/chrony.conf\n  register: chrony_conf_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Extract sourcedir paths from chrony configuration\n  ansible.builtin.shell:\n    cmd: grep ''^[[:space:]]*sourcedir[[:space:]]\\+'' /etc/chrony.conf | awk ''{print\n      $2}''\n  register: chrony_sourcedir_paths\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Check for server/pool entries in sourcedir .sources files\n  ansible.builtin.shell:\n    cmd: |\n      for dir in {{ chrony_sourcedir_paths.stdout_lines | join('' '') }}; do\n        if [ -d \"$dir\" ]; then\n          grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$dir\"/*.sources 2\u003e/dev/null \u0026\u0026 exit 0\n        fi\n      done\n      exit 1\n  register: chrony_sourcedir_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_sourcedir_paths.stdout_lines | length \u003e 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Extract confdir paths from chrony configuration\n  ansible.builtin.shell:\n    cmd: grep ''^[[:space:]]*confdir[[:space:]]\\+'' /etc/chrony.conf | awk ''{print $2}''\n  register: chrony_confdir_paths\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | defau