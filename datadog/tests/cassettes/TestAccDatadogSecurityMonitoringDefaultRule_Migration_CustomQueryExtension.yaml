{"control":"12.2.a","framework":"dora","is_default":true,"message":"","requirement":"Logging","version":"c-2024-1532"},{"control":"3.14.1","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"3.14.2","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"AU-6","framework":"nist-800-53","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"CC7.1","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC2.1","framework":"soc-2","is_default":true,"message":"","requirement":"Communication-and-Information","version":"2"},{"control":"7.1.2.3","framework":"cis-azure","is_default":true,"message":"","requirement":"Management-and-Governance-Services","version":"4.0.0"},{"control":"5.2.3","framework":"cis-azure","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"2.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nvalid_log_alert = {activity_log_alert.subscription_id |\n\tsome activity_log_alert in input.resources.azure_activity_log_alert\n\tsome alert_condition in activity_log_alert.condition.all_of\n\tlower(alert_condition.field) == \"operationname\"\n\tlower