works":[{"control":"A.8.20","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"5.4.4","framework":"cis-aks","is_default":true,"message":"","requirement":"Cluster-Networking","version":"1.4.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(aks_cluster) = \"pass\" if {\n\taks_cluster.network_profile.network_policy\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_aks_cluster"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nNetwork policies restrict pod-to-pod traffic and should be implemented in AKS clusters.\n\n## Remediation\n\n1. To configure network policies, see the Azure documentation on [Kubernetes network policies](https://learn.microsoft.com/en-us/azure/aks/use-network-policies).\n","tags":["control:5.4.4","scored:true","security:compliance","requirement:Cluster-Networking","cloud_provider:azure","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","framework:iso-27001","requirement:Technological-Controls","control:A.8.20"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["control:5.4.4","scored:true","security:compliance","requirement:Cluster-Networking","cloud_provider:azure","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","framework:iso-27001","requirement:Technological-Controls","control:A.8.20"],"version":14,"id":"def-000-zpk","updatedAt":1756325283952,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata