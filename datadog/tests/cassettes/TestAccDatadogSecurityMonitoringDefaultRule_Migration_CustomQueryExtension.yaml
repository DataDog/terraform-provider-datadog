 type**, select **Policy Assignment**.\n5. Under **Filter by location**, select **All**.\n6. From the results, select the subscription, then click **Done**.\n7. Select the **Condition** tab.\n8. Under Signal name, click Delete **Delete policy assignment (Microsoft.Authorization/policyAssignments)**.\n9. Select the **Actions** tab.\n10. To use an existing action group, click **Select action groups**. To create a new action group, click **Create action group**. Fill out the appropriate details for the selection.\n11. Select the **Details** tab.\n12. Select a **Resource group**, provide an **Alert rule name** and an optional **Alert\nrule description**.\n13. Click **Review + create**.\n14. Click **Create**.\n","tags":["scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:7.1.2.2","control:A.8.15","control:A.12.4.1","control:13.1.d","requirement:Compliance","requirement:Logging","control:12.2.a","level:1","control:5.2.2","framework:nist-800-171","requirement:Network-Security-Management","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Access-Control","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Communications-Security","control:11.2.a","requirement:Data-and-System-Security","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:nist-800-53","control:A.13.1.1","control:A.18.1.3","framework:soc-2","control:AU-6","control:A.9.1.2","framework:fedramp-high","control:CC2.1","control:CC7.2","control:CC7.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:7.1.2.2","control:A.