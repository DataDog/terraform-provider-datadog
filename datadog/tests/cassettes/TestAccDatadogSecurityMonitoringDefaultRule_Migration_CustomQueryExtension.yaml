This control evaluates whether execution logging is enabled for all stages of an Amazon API Gateway REST API. The control passes only if the logging level has been configured for each API method within the API stage. The logging level must be set to either `ERROR` or `INFO`.\n\nFor API Gateway REST API stages, it''s important to have appropriate logging enabled. Logging for these stages provides comprehensive records of the requests processed by API Gateway REST APIs. This includes details such as backend responses from API integrations, Lambda authorizer responses, and the request ID associated with AWS integration endpoints.\n\n## Remediation\n\nTo learn how to configure execution logging for API Gateway REST APIs, refer to the [Set up CloudWatch API logging using the API Gateway console][1] section of the API Gateway Developer Guide documentation.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html#set-up-access-logging-using-console","tags":["scored:true","scope:api_gateway","security:compliance","cloud_provider:aws","framework:aws-fsbp","source:api_gateway","control:apigateway.5","requirement:Protect"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","cloud_provider:aws","framework:aws-fsbp","source:api_gateway","control:apigateway.5","requirement:Protect"],"version":6,"id":"def-000-vq1","updatedAt":1756342485389,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway REST API stages should be configured to use SSL certificates for backend authentication","createdAt":1725574383634,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"