n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ninvalid_vpc_config(cluster) if {\n\tcluster.api_server_access_profile.enable_private_cluster == false\n\tsome cidr in cluster.api_server_access_profile.authorized_ip_ranges\n\tcidr == \"0.0.0.0/0\"\n} else if {\n\tcluster.api_server_access_profile.enable_private_cluster == false\n\tnot cluster.api_server_access_profile.authorized_ip_ranges\n}\n\neval(aks_cluster) = \"fail\" if {\n\tinvalid_vpc_config(aks_cluster)\n} else = \"pass\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_aks_cluster"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nWhen public access is enabled in an AKS cluster, it should be limited to a specific set of CIDRs. For security, public access should be limited to only the bare minimum set of IPs.\n\n## Remediation\n\n1. To limit public access, see the Azure AKS documentation on [Modifying cluster endpoint access](https://learn.microsoft.com/en-us/azure/aks/api-server-authorized-ip-ranges).","tags":["scored:true","security:compliance","requirement:Azure","cloud_provider:azure","source:azure.kubernetes","framework:dcsb-m-1","framework_requirement:dcsb-m-1/Azure","control:2.4","requirement:Cluster-Networking","control:5.4.1","control:2.9","scope:azure.kubernetes","framework:cis-aks","framework:essential-cloud-security-controls","framework_requirement_control:dcsb-m-1/Azure/2.4"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","requirement:Azure","requirement:Cluster-Networking","cloud_provider:azure","control:5.4.1","control:2.9","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","framework:essential-cloud-security-controls"],"version":23,"id":"def-000-zrw","updatedAt":1756325465316,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AKS Kubelet configuration file ownership should be assigned to root","createdAt":1708038660553,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-yd0","queries":[{"query":"resource_type:azure_aks_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"azure_aks_worker_node","complianceFrameworks":[{"control":"3.1.2","framework":"cis-aks","is_default":true,"message":"","requirement":"Worker-Node-Configuration-Files","version":"1.4.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfile_owners_missing(file) if {\n\tnot dd_output.has_key(file, \"user\")\n}\n\ncompliant_config(file) if {\n\tfile.user == \"root\"\n\tfile.group == \"root\"\n}\n\neval(k8s_node) = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubelet.kubeconfig)\n} else = \"skip\" if {\n\tfile_owners_missing(k8s_node.components.kubelet.kubeconfig)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_aks_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nEnsure that the file ownership of the kubelet''s kubeconfig file is set to `root:root`. You should set its file ownership to maintain integrity.\n\n## Remediation\n\nRun the following command to fix the kubelet configuration file''s ownership:\n\n```bash\nchown root:root /var/lib/kubelet/kubeconfig\n```\n\n**Note**: The path above is the default location in AKS.","tags":["scored:true","security:compliance","cloud_provider:azure","control:3.1.2","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","requirement:Worker-Node-Configuration-Files"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","cloud_provider:azure","control:3.1.2","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","requirement:Worker-Node-Configuration-Files"],"version":5,"id":"def-000-yd0","updatedAt":1756325283952,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AKS cluster should use a network policy between nodes","createdAt":1708038662598,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-zpk","queries":[{"query":"resource_type:azure_aks_cluster","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"azure_aks_cluster","complianceFrameworks":[{"control":"A.8.20","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"5.4.4","framework":"cis-aks","is_default":true,"message":"","requirement":"Cluster-Networking","version":"1.4.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(aks_cluster) = \"pass\" if {\n\taks_cluster.network_profile.network_policy\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_aks_cluster"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nNetwork policies restrict pod-to-pod traffic and should be implemented in AKS clusters.\n\n## Remediation\n\n1. To configure network policies, see the Azure documentation on [Kubernetes network policies](https://learn.microsoft.com/en-us/azure/aks/use-network-policies).\n","tags":["control:5.4.4","scored:true","security:compliance","requirement:Cluster-Networking","cloud_provider:azure","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","framework:iso-27001","requirement:Technological-Controls","control:A.8.20"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["control:5.4.4","scored:true","security:compliance","requirement:Cluster-Networking","cloud_provider:azure","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","framework:iso-27001","requirement:Technological-Controls","control:A.8.20"],"version":14,"id":"def-000-zpk","updatedAt":1756325283952,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway REST API cache data should be encrypted at rest","createdAt":1727970815665,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-vq1","queries":[{"query":"resource_type:aws_apigateway_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigateway_stage","complianceFrameworks":[{"control":"apigateway.5","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Protect","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nnoncompliant_cache_config(setting) if {\n\tsetting.CachingEnabled\n\tnot setting.CacheDataEncrypted\n}\n\neval(apigateway_stage) = \"skip\" if {\n\tnot apigateway_stage.cache_cluster_enabled\n} else = \"pass\" if {\n\tmethod_settings := json.unmarshal(apigateway_stage.method_settings)\n\n\t# For each method assess the caching settings\n\tnoncompliant_cache_configs := {method_settings | some method in method_settings; noncompliant_cache_config(method)}\n\n\t# If any are noncompliant caching settings fail the entire stage\n\tcount(noncompliant_cache_configs) == 0\n}\n\nelse = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigateway_stage"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis control evaluates whether execution logging is enabled for all stages of an Amazon API Gateway REST API. The control passes only if the logging level has been configured for each API method within the API stage. The logging level must be set to either `ERROR` or `INFO`.\n\nFor API Gateway REST API stages, it''s important to have appropriate logging enabled. Logging for these stages provides comprehensive records of the requests processed by API Gateway REST APIs. This includes details such as backend responses from API integrations, Lambda authorizer responses, and the request ID associated with AWS integration endpoints.\n\n## Remediation\n\nTo learn how to configure execution logging for API Gateway REST APIs, refer to the [Set up CloudWatch API logging using the API Gateway console][1] section of the API Gateway Developer Guide documentation.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html#set-up-access-logging-using-console","tags":["scored:true","scope:api_gateway","security:compliance","cloud_provider:aws","framework:aws-fsbp","source:api_gateway","control:apigateway.5","requirement:Protect"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","cloud_provider:aws","framework:aws-fsbp","source:api_gateway","control:apigateway.5","requirement:Protect"],"version":6,"id":"def-000-vq1","updatedAt":1756342485389,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway REST API stages should be configured to use SSL certificates for backend authentication","createdAt":1725574383634,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-ngl","queries":[{"query":"resource_type:aws_apigateway_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigateway_stage","complianceFrameworks":[{"control":"A.8.5","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"A.8.24","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"apigateway.2","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Protect","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(apigateway_stage) = \"pass\" if {\n\tapigateway_stage.client_certificate_id\n\tcount(apigateway_stage.client_certificate_id) \u003e 0\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigateway_stage"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis control verifies whether SSL certificates are configured for Amazon API Gateway REST API stages. These certificates are used by backend systems to confirm that incoming requests originate from API Gateway.\n\nTo enable backend systems to authenticate that requests come from API Gateway, REST API stages in API Gateway should be configured with SSL certificates.\n\n## Remediation\n\nTo learn how to configure SSL certificates for API Gateway REST APIs, refer to the [Generate and configure an SSL certificate for backend authentication][1] section of the API Gateway Developer Guide documentation.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/getting-started-client-side-ssl-authentication.html\n","tags":["scored:true","scope:api_gateway","security:compliance","control:A.8.24","cloud_provider:aws","control:A.8.5","framework:aws-fsbp","framework:iso-27001","source:api_gateway","control:apigateway.2","requirement:Technological-Controls","requirement:Protect"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","control:A.8.24","cloud_provider:aws","control:A.8.5","framework:aws-fsbp","framework:iso-27001","source:api_gateway","control:apigateway.2","requirement:Technological-Controls","requirement:Protect"],"version":12,"id":"def-000-ngl","updatedAt":1756342485394,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway access logging should be enabled for V2 API stages","createdAt":1727970857156,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-zud","queries":[{"query":"resource_type:aws_apigatewayv2_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigatewayv2_stage","complianceFrameworks":[{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"apigateway.9","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Identify","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(apigatewayv2_stage) = \"pass\" if {\n\tcount(apigatewayv2_stage.access_log_settings) \u003e 0\n}\n\nelse = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigatewayv2_stage"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis control evaluates whether access logging is enabled for a specific stage of an Amazon API Gateway V2 API.\n\nFor API Gateway API stages, it''s important to have appropriate logging enabled. Logging for these stages provides comprehensive records of the requests processed by API Gateway APIs. This includes details such as backend responses from API integrations, Lambda authorizer responses, and the request ID associated with AWS integration endpoints.\n\n## Remediation\n\nTo learn how to configure access logging for API Gateway APIs, refer to the [Set up CloudWatch API logging using the API Gateway console][1] section of the API Gateway Developer Guide documentation.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html#set-up-access-logging-using-console","tags":["scored:true","scope:api_gateway","security:compliance","control:A.8.15","control:apigateway.9","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","framework:iso-27001","source:api_gateway","requirement:Technological-Controls"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","control:A.8.15","control:apigateway.9","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","framework:iso-27001","source:api_gateway","requirement:Technological-Controls"],"version":8,"id":"def-000-zud","updatedAt":1756342394687,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway execution logging should be enabled for REST APIs","createdAt":1726501989307,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-0fh","queries":[{"query":"resource_type:aws_apigateway_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigateway_stage","complianceFrameworks":[{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"apigateway.1","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Identify","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nLOG_LEVEL_CONSTANTS := {\n\t\"error\",\n\t\"info\",\n}\n\nnoncompliant_logging_config(setting) if {\n\tresult := lower(setting) in LOG_LEVEL_CONSTANTS\n\tnot result\n}\n\neval(apigateway_stage) = \"pass\" if {\n\tmethod_settings := json.unmarshal(apigateway_stage.method_settings)\n\n\t# Empty objects indicate that logging is not configured\n\tcount(method_settings) \u003e 0\n\n\t# For each method assess the configured logging level\n\tnoncompliant_logging_configs := {method_settings | some method in method_settings; noncompliant_logging_config(method.LoggingLevel)}\n\n\t# If any are noncompliant logging configurations exist fail the stage\n\tcount(noncompliant_logging_configs) == 0\n}\n\nelse = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigateway_stage"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis control evaluates whether execution logging is enabled for all stages of an Amazon API Gateway REST API. The control will pass only if the logging level has been configured for each API method within the API stage. The logging level must be set to either `ERROR` or `INFO`.\n\nFor API Gateway REST API stages, it''s important to have appropriate logging enabled. Logging for these stages provides comprehensive records of the requests processed by API Gateway REST APIs. This includes details such as backend responses from API integrations, Lambda authorizer responses, and the requestId associated with AWS integration endpoints.\n\n## Remediation\n\nTo learn how to configure execution logging for API Gateway REST APIs, refer to the [Set up CloudWatch API logging using the API Gateway console][1] section of the API Gateway Developer Guide documentation.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html#set-up-access-logging-using-console","tags":["scored:true","scope:api_gateway","security:compliance","control:A.8.15","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","framework:iso-27001","source:api_gateway","requirement:Technological-Controls","control:apigateway.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","control:A.8.15","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","framework:iso-27001","source:api_gateway","requirement:Technological-Controls","control:apigateway.1"],"version":11,"id":"def-000-0fh","updatedAt":1756342485422,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway execution logging should be enabled for WebSocket APIs","createdAt":1726501988267,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-uad","queries":[{"query":"resource_type:aws_apigatewayv2_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigatewayv2_stage","complianceFrameworks":[{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"apigateway.1","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Identify","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nLOG_LEVEL_CONSTANTS := {\n\t\"error\",\n\t\"info\",\n}\n\nnoncompliant_logging_config(setting) if {\n\tresult := lower(setting) in LOG_LEVEL_CONSTANTS\n\tnot result\n}\n\nhttp_apis := {api.api_id |\n\tsome api in input.resources.aws_apigatewayv2_api\n\tlower(api.protocol_type) == \"http\"\n}\n\neval(apigatewayv2_stage) = \"skip\" if {\n\t# HTTP APIs do not support execution logging so should be excluded\n\tapi_id := split(apigatewayv2_stage.stage_arn, \"/\")[2]\n\tapi_id in http_apis\n} else = \"pass\" if {\n\troute_settings := json.unmarshal(apigatewayv2_stage.route_settings)\n\n\t# For each route assess the configured logging level\n\tnoncompliant_logging_configs := {route_settings | some route in route_settings; noncompliant_logging_config(route.LoggingLevel)}\n\n\tcount(noncompliant_logging_configs) == 0\n\n\t# Ensure that default route settings are present\n\tcount(apigatewayv2_stage.default_route_settings.logging_level) \u003e 0\n\n\tnot noncompliant_logging_config(apigatewayv2_stage.default_route_settings.logging_level)\n}\n\nelse = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigatewayv2_stage","aws_apigatewayv2_api"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis control evaluates whether execution logging is enabled for all stages of an Amazon API Gateway WebSocket API. The control will pass only if the following conditions are true.\n\n- The logging level must be set to either `ERROR` or `INFO` in `default_route_settings`.\n- If per-route logging has been configured in `route_settings`, the logging level for every route must also be set to either `ERROR` or `INFO`.\n\nFor API Gateway WebSocket API stages, it''s important to have appropriate logging enabled. Logging for these stages provides comprehensive records of the requests processed by API Gateway WebSocket APIs. This includes details such as backend responses from API integrations, Lambda authorizer responses, and the requestId associated with AWS integration endpoints.\n\n## Remediation\n\nTo learn how to configure execution logging for API Gateway WebSocket APIs, refer to the [Set up CloudWatch API logging using the API Gateway console][1] section of the API Gateway Developer Guide documentation.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html#set-up-access-logging-using-console","tags":["scored:true","scope:api_gateway","security:compliance","control:A.8.15","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","framework:iso-27001","source:api_gateway","requirement:Technological-Controls","control:apigateway.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","control:A.8.15","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","framework:iso-27001","source:api_gateway","requirement:Technological-Controls","control:apigateway.1"],"version":11,"id":"def-000-uad","updatedAt":1756342394704,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway routes should specify an authorization type","createdAt":1725574383634,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-vna","queries":[{"query":"resource_type:aws_apigatewayv2_route","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigatewayv2_route","complianceFrameworks":[{"control":"A.8.5","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"apigateway.8","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Protect","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(apigatewayv2_route) = \"pass\" if {\n\tnot lower(apigatewayv2_route.authorization_type) == \"none\"\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigatewayv2_route"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis control verifies whether Amazon API Gateway routes are configured with an authorization mechanism. The control fails if an API Gateway route lacks any form of authorization. \n\nAPI Gateway offers several methods for managing and restricting access to your APIs. By setting an authorization type, you can ensure that only authorized users or systems can access your API.\n\n## Remediation\n\nTo learn how to configure authorization for HTTP APIs, review the [Controlling and managing access to an HTTP API in API Gateway][1] section in the API Gateway Developer Guide. To configure authorization for WebSocket APIs, review the [Controlling and managing access to a WebSocket API in API Gateway][2] section in the API Gateway Developer Guide.\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/http-api-access-control.html\n[2]: https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-websocket-api-control-access.html\n","tags":["scored:true","scope:api_gateway","security:compliance","control:apigateway.8","cloud_provider:aws","control:A.8.5","framework:aws-fsbp","framework:iso-27001","source:api_gateway","requirement:Technological-Controls","requirement:Protect"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","control:apigateway.8","cloud_provider:aws","control:A.8.5","framework:aws-fsbp","framework:iso-27001","source:api_gateway","requirement:Technological-Controls","requirement:Protect"],"version":7,"id":"def-000-vna","updatedAt":1756342576083,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateway stage REST API should have AWS X-Ray tracing enabled","createdAt":1715708735976,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-e0t","queries":[{"query":"resource_type:aws_apigateway_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigateway_stage","complianceFrameworks":[{"control":"apigateway.3","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Detect","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(apigateway_stage) = \"pass\" if {\n\tapigateway_stage.tracing_enabled\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigateway_stage"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis check verifies if active tracing is enabled for AWS X-Ray on your Amazon API Gateway REST API stages. Active tracing allows for quicker identification of performance issues in your infrastructure, which could potentially impact API availability. It also provides real-time metrics on user requests flowing through your API Gateway operations and connected services.\n\n## Remediation\n\nFor detailed instructions on how to enable X-Ray active tracing for API Gateway REST API operations, see [Amazon API Gateway active tracing support for AWS X-Ray in the AWS X-Ray Developer Guide][1].\n\n[1]: https://docs.aws.amazon.com/xray/latest/devguide/xray-services-apigateway.html\n","tags":["scored:true","scope:api_gateway","security:compliance","requirement:Detect","cloud_provider:aws","framework:aws-fsbp","control:apigateway.3","source:api_gateway"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","requirement:Detect","cloud_provider:aws","framework:aws-fsbp","control:apigateway.3","source:api_gateway"],"version":9,"id":"def-000-e0t","updatedAt":1756342576075,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API Gateways should be associated with a WAF Web ACL","createdAt":1715708734268,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-6ge","queries":[{"query":"resource_type:aws_apigateway_stage","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_apigateway_stage","complianceFrameworks":[{"control":"apigateway.4","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Protect","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(apigateway_stage) = \"pass\" if {\n\tapigateway_stage.web_acl_arn\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_apigateway_stage"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis check verifies if an AWS WAF web ACL is linked to an API Gateway stage. Failure occurs if a web ACL is not attached to a REST API Gateway stage.\n\nAWS WAF serves as a web application firewall designed to safeguard web applications and APIs against attacks. It allows you to set up an ACL with rules that allow, block, or monitor web requests based on specified security rules and conditions. Ensure that your API Gateway stage is connected to an AWS WAF web ACL for added protection against malicious attacks.\n\n## Remediation\n\nTo learn how to link an AWS WAF Regional web ACL with an existing API Gateway API stage using the API Gateway console, refer to the [Using AWS WAF to protect your APIs section in the API Gateway Developer Guide][1].\n\n[1]: https://docs.aws.amazon.com/apigateway/latest/developerguide/apigateway-control-access-aws-waf.html\n","tags":["scored:true","scope:api_gateway","security:compliance","cloud_provider:aws","control:apigateway.4","framework:aws-fsbp","source:api_gateway","requirement:Protect"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","scope:api_gateway","security:compliance","cloud_provider:aws","control:apigateway.4","framework:aws-fsbp","source:api_gateway","requirement:Protect"],"version":12,"id":"def-000-6ge","updatedAt":1756342394693,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API activity from new or suspicious locations detected in Nozomi Networks","createdAt":1751482980483,"isDefault":false,"isPartner":true,"isEnabled":false,"isBeta":false,"isDeleted":false,"isDeprecated":false,"queries":[{"query":"service:cds.nozomi_networks.audit_items @cds.nozomi_networks.api.key_name:*","groupByFields":["@cds.nozomi_networks.api.key_name"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@network.client.geoip","metrics":["@network.client.geoip"],"aggregation":"geo_data","name":"","dataSource":"logs"}],"options":{"evaluationWindow":900,"detectionMethod":"impossible_travel","maxSignalDuration":86400,"keepAlive":3600,"impossibleTravelOptions":{"baselineUserLocations":true,"detectIpTransition":false}},"cases":[{"name":"","status":"medium","notifications":[]}],"message":"### Goal:\nDetect instances where API activity is observed from a new or suspicious location in Nozomi Networks.\n\n### Strategy:\nMonitor audit logs from Nozomi Networks to detect and generate alerts when API activity originates from an unfamiliar or potentially malicious location.\n\n### Triage And Response:\n\n#### User Details:\n- **API Key Name:**  `{{@cds.nozomi_networks.api.key_name}}`\n- **Key Owner:**   `{{@cds.nozomi_networks.username}}`\n- **IP Address  :**  `{{@network.client.geoip.ipAddress}}`\n- **Geolocation  :**   `{{@network.client.geoip.city.name}} , {{@network.client.geoip.country.name}}`\n- **Event  :**   `{{@cds.nozomi_networks.audit_item.name}}`\n\n#### Response Steps:\n1. Review the alert details, including the API key used, source IP, and geolocation.\n2. Verify whether the API request is legitimate by cross-referencing known activity patterns.\n3. Investigate any history of failed authentication attempts, unusual request patterns, or anomalous API behavior.\n4. Identify any indicators of compromise, such as multiple requests from different locations in a short time frame.\n5. If unauthorized access is suspected, revoke the API key and require reauthentication.\n6. Escalate to the security team if the activity poses a significant risk, ensuring coordination with relevant teams.\n7. Document the incident, including alert details, investigation findings, and actions taken to remediate or mitigate the risk.","tags":["service:cds.nozomi_networks.audit_items","source:crest_data_systems_nozomi_networks"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["service:cds.nozomi_networks.audit_items","source:crest_data_systems_nozomi_networks"],"version":1,"id":"ext-00n-01c","updatedAt":1751483031331,"blocking":false,"partnerIntegrationId":"crest-data-systems-nozomi-networks","metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"API scan detected on service","createdAt":1707298035993,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-1e8","queries":[{"query":"@http.status_code:(400 OR 405 OR 406 OR 409 OR 412 OR 415 OR 421) @api.security.metadata:public @http.path_group:(*/api/* OR */v0/* OR */v1/* OR */v2/* OR */v3/* OR */v4/* OR */v5/* OR */v6/* OR */v7/* OR */v8/* OR */v9/* OR */v0.* OR */v1.* OR */v2.* OR */v3.* OR */v4.* OR */v5.* OR */v6.* OR */v7.* OR */v8.* OR */v9.*)","groupByFields":["env","service"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"http_errors","dataSource":"spans"}],"options":{"evaluationWindow":300,"detectionMethod":"anomaly_detection","maxSignalDuration":86400,"keepAlive":3600,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":3,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"low","notifications":["team@example.com"],"actions":[{"type":"block_ip","options":{"duration":3600}},{"type":"block_user","options":{}}]}],"message":"[{{#is_exact_match \"severity\" 0}}Info{{/is_exact_match}}{{#is_exact_match \"severity\" 1}}Low{{/is_exact_match}}{{#is_exact_match \"severity\" 2}}Medium{{/is_exact_match}}{{#is_exact_match \"severity\" 3}}High{{/is_exact_match}}{{#is_exact_match \"severity\" 4}}Critical{{/is_exact_match}}] Errors caused by API scanning detected on {{service}} in env {{env}}\n\n- An elevated rate of HTTP Status 4xx were detected in a 5 minute window.\n","tags":["type:business-logic","category:scanner","tactic:TA0043-reconnaissance","capec:1000/118/169","source:application-threats","technique:T1595-active-scanning"],"hasExtendedTitle":true,"type":"application_security","filters":[],"defaultTags":["type:business-logic","category:scanner","tactic:TA0043-reconnaissance","capec:1000/118/169","source:application-threats","technique:T1595-active-scanning"],"version":9,"id":"def-000-1e8","updatedAt":1776283093556,"blocking":true,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"API server audit log files should be retained for at least 10 log file rotations","createdAt":1710348731216,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00k-8n8","queries":[{"query":"resource_type:kubernetes_master_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"kubernetes_master_node","complianceFrameworks":[{"control":"1.2.20","framework":"cis-kubernetes","is_default":true,"message":"","requirement":"API-Server","version":"1.9.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ncompliant_config(config) if {\n\tconfig[\"audit-log-maxbackup\"] \u003e= 10\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubeApiserver)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubeApiserver\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["kubernetes_master_node"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nTen or more log files should be retained on the API server. Kubernetes automatically rotates the log files. Retaining old log files ensures that you would have sufficient log data available for carrying out any investigation or correlation.\n\n## Remediation\n\n1. Edit the API server pod specification file `/etc/kubernetes/manifests/kube-apiserver.yaml` on the master node and set the `--audit-log-maxbackup` parameter to at least `10`\n","tags":["scope:kubernetes","scored:true","security:compliance","control:1.2.20","cloud_provider:kubernetes","source:kubernetes","framework:cis-kubernetes","requirement:API-Server"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:kubernetes","scored:true","security:compliance","control:1.2.20","cloud_provider:kubernetes","source:kubernetes","framework:cis-kubernetes","requirement:API-Server"],"version":6,"id":"def-00k-8n8","updatedAt":1756328695860,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API server audit logs should be enabled","createdAt":1710348730875,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00k-t4e","queries":[{"query":"resource_type:kubernetes_master_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"kubernetes_master_node","complianceFrameworks":[{"control":"1.2.18","framework":"cis-kubernetes","is_default":true,"message":"","requirement":"API-Server","version":"1.9.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ncompliant_config(config) if {\n\tconfig[\"audit-log-path\"] != \"\"\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubeApiserver)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubeApiserver\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["kubernetes_master_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nAuditing should be enabled on the Kubernetes API Server. Auditing the Kubernetes API Server provides a security-relevant chronological set of records documenting the sequence of activities that have affected the system by individual users, administrators, or other components of the system.\n\n## Remediation\n\nEdit the API server pod specification file `/etc/kubernetes/manifests/kube-apiserver.yaml` on the master node and set the parameter to a desired location. For example, `--audit-log-path=/var/log/apiserver/audit.log`.\n","tags":["scope:kubernetes","scored:true","security:compliance","cloud_provider:kubernetes","source:kubernetes","control:1.2.18","framework:cis-kubernetes","requirement:API-Server"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:kubernetes","scored:true","security:compliance","cloud_provider:kubernetes","source:kubernetes","control:1.2.18","framework:cis-kubernetes","requirement:API-Server"],"version":4,"id":"def-00k-t4e","updatedAt":1756329575127,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API server audit logs should be retained for at least 30 days","createdAt":1710348718232,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00k-5ep","queries":[{"query":"resource_type:kubernetes_master_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"kubernetes_master_node","complianceFrameworks":[{"control":"1.2.19","framework":"cis-kubernetes","is_default":true,"message":"","requirement":"API-Server","version":"1.9.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ncompliant_config(config) if {\n\tconfig[\"audit-log-maxage\"] \u003e 0\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubeApiserver)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubeApiserver\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["kubernetes_master_node"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThe audit log''s max age should be at least 30 days. Retaining logs for at least 30 days ensures that you can go back in time and investigate or correlate any events.\n\n## Remediation\n\nEdit the API server pod specification file `/etc/kubernetes/manifests/kube-apiserver.yaml` on the master node and set the `--audit-log-maxage` parameter to `30` or as an appropriate number of days: `--audit-log-maxage=30`\n","tags":["scope:kubernetes","scored:true","security:compliance","cloud_provider:kubernetes","source:kubernetes","control:1.2.19","framework:cis-kubernetes","requirement:API-Server"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:kubernetes","scored:true","security:compliance","cloud_provider:kubernetes","source:kubernetes","control:1.2.19","framework:cis-kubernetes","requirement:API-Server"],"version":4,"id":"def-00k-5ep","updatedAt":1756329761797,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API server should have the anonymous-auth argument set to false","createdAt":1711131135467,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00k-a92","queries":[{"query":"resource_type:kubernetes_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"kubernetes_worker_node","complianceFrameworks":[{"control":"4.2.1","framework":"cis-kubernetes","is_default":true,"message":"","requirement":"Kubelet","version":"1.9.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(k8s_node) = \"pass\" if {\n\tk8s_node.components.kubelet[\"anonymous-auth\"] == false\n} else = \"pass\" if {\n\tk8s_node.components.kubelet.config.content.authentication.anonymous.enabled == false\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["kubernetes_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nAnonymous requests to the kubelet server should be disabled. When enabled, requests that are not rejected by other configured authentication methods are treated as anonymous requests. These requests are then served by the kubelet server.\n\n## Remediation\n\n1. If using a kubelet config file, edit the file to set `authentication: anonymous:enabled` to `authentication: anonymous:false`. \n\n2. If using executable arguments, edit the kubelet service file `/etc/systemd/system/kubelet.service.d/10-kubeadm.conf` on each worker node and set the below parameter in the `KUBELET_SYSTEM_PODS_ARGS` variable:\n\n```\n--anonymous-auth=false\n```\n3. Restart the kubelet service.\n","tags":["scope:kubernetes","scored:true","security:compliance","cloud_provider:kubernetes","source:kubernetes","control:4.2.1","framework:cis-kubernetes","requirement:Kubelet"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:kubernetes","scored:true","security:compliance","cloud_provider:kubernetes","source:kubernetes","control:4.2.1","framework:cis-kubernetes","requirement:Kubelet"],"version":4,"id":"def-00k-a92","updatedAt":1756327997863,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"API server should verify the kubelet''s certificate before establishing connection","createdAt":1710364651711,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00k-85e","queries":[{"query":"resource_type:kubernetes_master_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"kubernetes_master_node","complianceFrameworks":[{"control":"4.5","framework":"essential-cloud-security-controls","is_default":true,"message":"","requirement":"Kubernetes","version":"2"},{"control":"1.2.5","framework":"cis-kubernetes","is_default":true,"message":"","requirement":"API-Server","version":"1.9.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ncompliant_config(config) if {\n\tconfig[\"kubelet-certificate-authority\"]\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubeApiserver)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubeApiserver\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["kubernetes_master_node"]}}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nA kubelet''s certificate should be verified before establishing a connection. The connections from the API server to the kubelet are used for fetching logs from pods, attaching the kubelet (through kubectl) to running pods, and using the kubelet''s port-forwarding functionality.\n\n## Remediation\n\n1. Follow the Kubernetes documentation and set up the [TLS](https://kubernetes.io/docs/reference/access-authn-authz/kubelet-tls-bootstrapping/) connection between the apiserver and kubelets. \n2. Edit the API server pod specification file `/etc/kubernetes/manifests/kube-apiserver.yaml` on the master node and set the `--kubelet-certificate-authority` parameter to the path of the cert file for the certificate authority. \n\n```\n--kubelet-certificate-authority=\u003cca-string\u003e\n```","tags":["scope:kubernetes","scored:true","security:compliance","control:1.2.5","requirement:Kubernetes","cloud_provider:kubernetes","source:kubernetes","control:4.5","framework:essential-cloud-security-controls","framework:cis-kubernetes","requirement:API-Server"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:kubernetes","scored:true","security:compliance","control:1.2.5","requirement:Kubernetes","cloud_provider:kubernetes","source:kubernetes","control:4.5","framework:essential-cloud-security-controls","framework:cis-kubernetes","requirement:API-Server"],"version":8,"id":"def-00k-85e","updatedAt":1756329713268,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS AMI Made Public","createdAt":1674195804021,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"93d-bf1-e17","queries":[{"query":"source:cloudtrail @evt.name:ModifyImageAttribute @requestParameters.launchPermission.add.items.group:\"all\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Goal\nDetect when an AMI is made public.\n\n## Strategy\nThis rule lets you monitor these CloudTrail API calls to detect if an AMI is made public.\n\n* [ModifyImageAttribute][1]\n\nThis rule inspects the `@requestParameters.launchPermission.add.items.group` array to determine if the string `all` is contained. This is the indicator which means the image is made public.\n\n## Triage and response\n1. Determine if the AMI (`@requestParameters.imageId`) should be made public using CloudTrail logs.\n2. Investigate the following ARN (`{{@userIdentity.arn}}`) that made the AMI public.\n3. Contact the user to see if they intended to make the image public.\n4. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n    * Revert AMI permissions to the original state.\n    * Begin your company''s IR process and investigate.\n\n## Changelog\n11 November 2022 - Add steps to Triage and response section.\n\n[1]: https://docs.aws.amazon.com/cli/latest/reference/ec2/modify-image-attribute.html#examples","tags":["security:compliance","scope:ec2","iaas:aws","tactic:TA0009-collection","source:cloudtrail","technique:T1530-data-from-cloud-storage","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","scope:ec2","iaas:aws","tactic:TA0009-collection","source:cloudtrail","technique:T1530-data-from-cloud-storage","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":22,"id":"eh4-lwa-d9z","updatedAt":1740655005316,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS CloudTrail configuration modified","createdAt":1585870283907,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"cf4-844-4a0","queries":[{"query":"source:cloudtrail @evt.name:StopLogging","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cloudtrail_trail_stopped","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:DeleteTrail","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cloudtrail_trail_deleted","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:UpdateTrail","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cloudtrail_trail_updated","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":7200},"cases":[{"name":"trail deleted","status":"medium","notifications":[],"condition":"cloudtrail_trail_deleted \u003e 0"},{"name":"trail stopped","status":"low","notifications":[],"condition":"cloudtrail_trail_stopped \u003e 0"},{"name":"trail updated","status":"info","notifications":[],"condition":"cloudtrail_trail_updated \u003e 0"}],"message":"## Goal\nDetect when an attacker is trying to evade defenses by modifying CloudTrail.\n\n## Strategy\nThis rule detects if a user is modifying CloudTrail by monitoring the following CloudTrail API calls:\n- [StopLogging][1]\n- [DeleteTrail][2]\n- [UpdateTrail][3]\n\n## Triage and response\n1. Review the `@responseElements` in the `{{@evt.name}}` event to determine the scope of the changes.\n2. Determine if the user ARN (`{{@userIdentity.arn}}`) intended to make a CloudTrail modification.\n3. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/API_StopLogging.html\n[2]: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/API_DeleteTrail.html\n[3]: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/API_UpdateTrail.html","tags":["iaas:aws","scope:cloudtrail","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:cloudtrail","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":18,"id":"4hv-083-miw","updatedAt":1740655425448,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS CloudTrail trail should have global service events enabled","createdAt":1599574004589,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"6c6-101-b03","queries":[{"query":"resource_type:aws_cloudtrail_trail","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_cloudtrail_trail","complianceFrameworks":[{"control":"10.2","framework":"dora","is_default":true,"message":"","requirement":"Vulnerability-and-patch-management","version":"c-2024-1532"},{"control":"12.2.a","framework":"dora","is_default":true,"message":"","requirement":"Logging","version":"c-2024-1532"},{"control":"164.312-e-2-i","framework":"hipaa","is_default":true,"message":"","requirement":"Transmission-Security","version":"1"},{"control":"164.308-a-3-ii-a","framework":"hipaa","is_default":true,"message":"","requirement":"Workforce-Security","version":"1"},{"control":"164.312-b","framework":"hipaa","is_default":true,"message":"","requirement":"Audit-Controls","version":"1"},{"control":"164.308-a-1-ii-D","framework":"hipaa","is_default":true,"message":"","requirement":"Security-Management-Process","version":"1"},{"control":"164.308-a-6-ii","framework":"hipaa","is_default":true,"message":"","requirement":"Security-Incident-Procedures","version":"1"},{"control":"AU-2","framework":"nist-800-53","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"CM-5","framework":"nist-800-53","is_default":true,"message":"","requirement":"Configuration-Management","version":"5"},{"control":"CM-6","framework":"nist-800-53","is_default":true,"message":"","requirement":"Configuration-Management","version":"5"},{"control":"PR.PS-04","framework":"nist-csf","is_default":true,"message":"","requirement":"Platform-Security","version":"2.0"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"30.1","framework":"gdpr","is_default":true,"message":"","requirement":"Records-of-Processing-Activities","version":"1"},{"control":"4.4","framework":"iso-27001","is_default":true,"message":"","requirement":"Context-of-the-Organization","version":"2"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.2","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-2","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"CM-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"Configuration-Management","version":"5"},{"control":"CM-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Configuration-Management","version":"5"},{"control":"CC7.1","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC2.1","framework":"soc-2","is_default":true,"message":"","requirement":"Communication-and-Information","version":"2"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(cloudtrail_trail) = \"skip\" if {\n\tlower(cloudtrail_trail.home_region) != \"us-east-1\"\n} else = \"pass\" if {\n\tcloudtrail_trail.include_global_service_events == true\n\tcloudtrail_trail.is_multi_region_trail == true\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_cloudtrail_trail"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nEnsure that an AWS CloudTrail trail has global service events enabled.\n\n## Rationale\n\nEasily troubleshoot security issues for global services that aren''t region-specific.\n\n## Remediation\n\n### From the console\n\nBy default, trail logs created in the CloudTrail console log global service events. For more information, see the [About global service events][2] docs.\n\n### From the command line\n\n1. Run `aws cloudtrail describe-trails`\n2. Run `update-trail` on any returned trail name above to [include-global-service-events][1].\n\n    ```\n    aws cloudtrail update-trail \\\n        --name \u003cINSERT-TRAIL-NAME\u003e \\\n        --include-global-service-events\n    ```\n**NOTE:** The trail must be located in `us-east-1` region to include global service events. Enabling global service events automatically updates the trail to be multi-regional.\n\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-create-and-update-a-trail-by-using-the-aws-cli-update-trail.html\n[2]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-concepts.html#cloudtrail-concepts-global-service-events","tags":["scored:true","requirement:Transmission-Security","control:PR.PT-1","control:A.12.4.1","requirement:Protective-Technology","control:A.12.4.2","requirement:Logging","control:12.2.a","requirement:Audit-Controls","requirement:Context-of-the-Organization","requirement:Security-Management-Process","framework:hipaa","requirement:Operations-Security","requirement:Technological-Controls","requirement:Workforce-Security","security:compliance","requirement:Configuration-Management","framework:dora","control:164.308-a-3-ii-a","control:CM-5","requirement:System-Operations","requirement:Records-of-Processing-Activities","framework:nist-800-53","control:CM-6","control:PR.IP-1","source:cloudtrail","control:10.2","control:PR.PS-04","control:CC7.1","requirement:Platform-Security","control:164.308-a-6-ii","control:A.8.15","control:30.1","framework:gdpr","requirement:Security-Incident-Procedures","requirement:Vulnerability-and-patch-management","framework:nist-csf","control:164.308-a-1-ii-D","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Communication-and-Information","cloud_provider:aws","control:4.4","control:AU-2","framework:soc-2","scope:cloudtrail","control:164.312-b","framework:fedramp-high","control:CC2.1","control:164.312-e-2-i"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","requirement:Transmission-Security","control:PR.PT-1","control:A.12.4.1","requirement:Protective-Technology","control:A.12.4.2","requirement:Logging","control:12.2.a","requirement:Audit-Controls","requirement:Context-of-the-Organization","requirement:Security-Management-Process","framework:hipaa","requirement:Operations-Security","requirement:Technological-Controls","requirement:Workforce-Security","security:compliance","requirement:Configuration-Management","framework:dora","control:164.308-a-3-ii-a","control:CM-5","requirement:System-Operations","requirement:Records-of-Processing-Activities","framework:nist-800-53","control:CM-6","control:PR.IP-1","source:cloudtrail","control:10.2","control:PR.PS-04","control:CC7.1","requirement:Platform-Security","control:164.308-a-6-ii","control:A.8.15","control:30.1","framework:gdpr","requirement:Security-Incident-Procedures","requirement:Vulnerability-and-patch-management","framework:nist-csf","control:164.308-a-1-ii-D","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Communication-and-Information","cloud_provider:aws","control:4.4","control:AU-2","framework:soc-2","scope:cloudtrail","control:164.312-b","framework:fedramp-high","control:CC2.1","control:164.312-e-2-i"],"version":44,"id":"7ak-zke-f64","updatedAt":1756346791000,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS CloudWatch log group deleted","createdAt":1687168269339,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"bif-xha-5if","queries":[{"query":"source:cloudtrail @evt.name:DeleteLogGroup -@level:Error -@http.useragent:(cloudformation.amazonaws.com OR *www.terraform.io*) -@userIdentity.invokedBy:cloudformation.amazonaws.com","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Goal\nDetect when a CloudWatch Log Group is deleted. \n\n## Strategy\nDetect a successful `@evt.name:DeleteLogGroup` event.\n\n## Triage and response\n1. Ensure that the `{{@requestParameters.logGroupName}}` log group is not used for auditing or security purposes.\n2. If it is then:\n    * Ensure that the user: `{{@userIdentity.session_name}}` should be making this API call to your `{{env}}` environment.\n    * Consider adding to the allowlist the log group name: `{{@requestParameters.logGroupName}}` through a [suppression list][1].\n3. If not, begin your company''s IR process and investigate.\n\n## Changelog\n11 October 2022 - updated severity.\n\n[1]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise","tags":["iaas:aws","scope:amazon-cloudwatch","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:amazon-cloudwatch","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":19,"id":"j9h-inc-lg8","updatedAt":1740656051727,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS CloudWatch rule disabled or deleted","createdAt":1687168277877,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"dkk-6z8-rmg","queries":[{"query":"source:cloudtrail @eventSource:events.amazonaws.com @evt.name:(DisableRule OR DeleteRule) -@userIdentity.invokedBy:(backup.amazonaws.com OR schemas.amazonaws.com OR cloudformation.amazonaws.com)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cloudwatch_disable_or_delete_rule","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"cloudwatch_disable_or_delete_rule \u003e 0"}],"message":"## Goal\nDetect when a CloudWatch rule has been disabled or deleted.\n\n## Strategy\nThis rule lets you monitor CloudTrail and detect if a [`DisableRule`][1] or [`DeleteRule`][2] API call has occurred. An attacker may delete rules in an attempt to evade defenses.\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` should have made the `{{@evt.name}}` API call.\n2. If the API call was **not** made legitimately by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Enable or create a rule using the `aws-cli` commands [`enable-rule`][4] or [`put-rule`][3], or reference the [AWS documentation][5] to revert the rules back to the last known good state.\n3. If the API call was made legitimately by the user:\n  * Determine if the user was authorized to make that change.\n  * If **Yes**, consider including the EventBus name in a [suppression list][6]: `{{@requestParameters.eventBusName}}`.\n  * If **No**, enable or create a rule using the `aws-cli` commands [`enable-rule`][4] or [`put-rule`][3], respectively, or reference the [AWS documentation][5] to revert the rules back to the last known good state.\n    * Begin your company''s IR process and investigate.\n\n## Changelog\n* 4 October 2022 - Updated severity\n\n[1]: https://docs.aws.amazon.com/eventbridge/latest/APIReference/API_DeleteRule.html\n[2]: https://docs.aws.amazon.com/eventbridge/latest/APIReference/API_DisableRule.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/events/put-rule.html\n[4]: https://docs.aws.amazon.com/cli/latest/reference/events/enable-rule.html\n[5]: https://docs.aws.amazon.com/eventbridge/latest/userguide/eb-rules.html\n[6]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise","tags":["iaas:aws","scope:amazon-cloudwatch","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:amazon-cloudwatch","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":12,"id":"dti-qfr-zle","updatedAt":1740656039024,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Cloudtrail possible secret enumeration in multiple regions and secret retrieval","createdAt":1750763085113,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-9fr","queries":[{"query":"source:cloudtrail @evt.name:ListSecrets","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":["@awsRegion"],"aggregation":"cardinality","name":"aws_list_secrets_in_multiple_regions","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:GetSecretValue","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_get_secret_value","dataSource":"logs"}],"options":{"evaluationWindow":600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_list_secrets_in_multiple_regions \u003e 3 \u0026\u0026 aws_get_secret_value \u003e 0"}],"message":"## Goal\nDetects when a user enumerates AWS Secrets Manager secrets across multiple regions and then retrieves secret values.\n\n## Strategy\nThis rule monitors AWS CloudTrail events for `ListSecrets` API calls spanning multiple regions and subsequent `GetSecretValue` API calls by the same user identity. This behavior pattern is concerning because legitimate users typically work within specific regions and don''t require broad secret enumeration across multiple geographic locations before accessing secrets. Attackers often perform discovery to map available secrets across an organization''s AWS infrastructure before extracting valuable credentials.\n\n## Triage \u0026 Response\n- Determine if `{{@userIdentity.arn}}` should be performing secret enumeration activities across multiple AWS regions.\n- Review the specific regions where `ListSecrets` operations occurred to determine if cross-region access aligns with the user''s normal responsibilities.\n- Identify which secrets were retrieved through `GetSecretValue` and assess their sensitivity and business criticality.\n- Check for any other suspicious activities from the same user identity, such as unusual resource access or privilege escalation attempts.\n- Verify if the user identity has been recently compromised by reviewing authentication logs and access patterns leading up to the secret enumeration.\n- Determine if the retrieved secrets have been used for unauthorized access to other AWS services or external systems. ","tags":["scope:iam","technique:T1555-credentials-from-password-stores","iaas:aws","tactic:TA0006-credential-access","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","technique:T1555-credentials-from-password-stores","iaas:aws","tactic:TA0006-credential-access","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":2,"id":"def-000-9fr","updatedAt":1750763085113,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Cognito identity pool has guest access configured for a role with administrative privileges","createdAt":1709596845985,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-65w","queries":[{"query":"resource_type:aws_cognito_identity_pool","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_cognito_identity_pool","complianceFrameworks":[],"defaultSecurityInbox":true}},"cases":[{"name":"","status":"critical","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nAmazon Cognito identity pools can be configured to offer [guest access](https://docs.aws.amazon.com/location/latest/developerguide/authenticating-using-cognito.html). Guest access allows unauthenticated users the ability to assume a role in your AWS account to perform various actions. Because any IAM role can be configured for unauthenticated access, guest access introduces the risk that unauthenticated users have more privileges than are intended.\n\n## Rationale\nThe Cognito identity pool which triggered this detection is configured to support guest access for an IAM role that has administrative privileges. This would allow any external attacker the ability to assume the role and have complete access to the entire AWS account.\n\n## Remediation\nDatadog recommends reducing the permissions attached to the guest role to the minimum required for it to fulfill its function. Alternatively, guest access can be disabled on the pool to prevent an external adversary from being able to assume the role.","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":8,"id":"def-000-65w","updatedAt":1746449803804,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS Config configuration changes should be monitored","createdAt":1731018775682,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-mq4","queries":[{"query":"resource_type:aws_iam_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_account","complianceFrameworks":[{"control":"12.2.a","framework":"dora","is_default":true,"message":"","requirement":"Logging","version":"c-2024-1532"},{"control":"3.12.3","framework":"nist-800-171","is_default":true,"message":"","requirement":"Security-Assessment","version":"2"},{"control":"3.14.6","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"AU-6","framework":"nist-800-53","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"nist-800-53","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"nist-800-53","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"DE.CM-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-06","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.AE-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"DE.AE-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"ID.RA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-05","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"PR.PS-04","framework":"nist-csf","is_default":true,"message":"","requirement":"Platform-Security","version":"2.0"},{"control":"PR.AA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Identity-Management-Authentication-and-Access-Control","version":"2.0"},{"control":"RS.AN-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Incident-Analysis","version":"2.0"},{"control":"GV.SC-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Cybersecurity-Supply-Chain-Risk-Management","version":"2.0"},{"control":"DE.CM-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-6","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.AE-2","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"DE.AE-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"ID.RA-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"4.9","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"5.0.0"},{"control":"4.9","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"4.0.0"},{"control":"4.9","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"3.0.0"},{"control":"4.9","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"1.5.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nCONFIG := lower(\"$.eventSource=config.amazonaws.com\")\n\nSTOP_CONFIGURATION := lower(\"$.eventName=StopConfigurationRecorder\")\n\nDELETE_DELIVERY := lower(\"$.eventName=DeleteDeliveryChannel\")\n\nPUT_DELIVERY := lower(\"$.eventName=PutDeliveryChannel\")\n\nPUT_CONFIGURATION := lower(\"$.eventName=PutConfigurationRecorder\")\n\naccount_to_trail := {cloudtrail_trail.account_id |\n\tsome cloudtrail_trail in input.resources.aws_cloudtrail_trail\n\tcloudtrail_trail.is_multi_region_trail\n\tcloudtrail_trail.trail_status.is_logging\n\tvalidate_event_selectors(cloudtrail_trail)\n\ttrail_log_group := regex.replace(cloudtrail_trail.cloud_watch_logs_log_group_arn, \"^.+:log-group:(.+):.+$\", \"$1\")\n\ttrail_log_group in trail_to_metric_filter\n}\n\nvalidate_event_selectors(cloudtrail_trail) if {\n\tsome trail in cloudtrail_trail.event_selectors\n\ttrail.include_management_events\n\tlower(trail.read_write_type) == \"all\"\n} else if {\n\tnot cloudtrail_trail.event_selectors\n}\n\ntrail_to_metric_filter := {metric_filter.log_group_name |\n\tsome metric_filter in input.resources.aws_metric_filter\n\tvalid_metric_filter(metric_filter)\n\tsome transformation in metric_filter.metric_transformations\n\ttransformation.metric_name in metric_filter_to_alarm\n}\n\nvalid_metric_filter(metric_filter) if {\n\tfilter_parsed := lower(regex.replace(metric_filter.filter_pattern, \"\\\\s|\\\"\", \"\"))\n\tcontains(filter_parsed, \"||\")\n\tcontains(filter_parsed, \"\u0026\u0026\")\n\tcontains(filter_parsed, CONFIG)\n\tcontains(filter_parsed, STOP_CONFIGURATION)\n\tcontains(filter_parsed, DELETE_DELIVERY)\n\tcontains(filter_parsed, PUT_DELIVERY)\n\tcontains(filter_parsed, PUT_CONFIGURATION)\n}\n\nmetric_filter_to_alarm := {cloudwatch_alarm.metric_name |\n\tsome cloudwatch_alarm in input.resources.aws_cloudwatch_metric_alarm\n\tsome action in cloudwatch_alarm.alarm_actions\n\taction in alarm_to_sns_topic\n}\n\nalarm_to_sns_topic := {sns_topic.topic_arn |\n\tsome sns_topic in input.resources.aws_sns_topic\n\tsns_topic.subscriptions_confirmed \u003e 0\n}\n\neval(iam_account) = \"pass\" if {\n\taccount_to_trail[iam_account.account_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_iam_account","aws_cloudtrail_trail","aws_cloudwatch_metric_alarm","aws_metric_filter","aws_sns_topic"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nReal-time monitoring of API calls can be achieved by directing CloudTrail logs to CloudWatch logs and establishing corresponding metric filters and alarms. It is recommended to set up a metric filter and alarm for detecting changes to AWS Config to ensure sustained visibility of configuration items within the AWS account.\n\n## Remediation\n\nFor instructions on setting up CloudWatch metric filters and alarms for AWS Config changes, refer to the [AWS CloudWatch Alarms for CloudTrail User Guide][1].\n\n```plaintext\naws logs put-metric-filter --log-group-name \u003ccloudtrail_log_group_name\u003e \\\n--filter-name \u003caws_config_changes_metric\u003e --metric-transformations \\\nmetricName=\u003caws_config_changes_metric\u003e,metricNamespace=''CISBenchmark'',metricValue=1 \\\n--filter-pattern ''{($.eventSource = config.amazonaws.com) \u0026\u0026 (($.eventName=StopConfigurationRecorder)||($.eventName=DeleteDeliveryChannel)||($.eventName=PutDeliveryChannel)||($.eventName=PutConfigurationRecorder))}''\n```\n\nYou can choose your own `metricName` and `metricNamespace` strings. Use the same `metricNamespace` for all Foundations Benchmark metrics to group them together.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudwatch-alarms-for-cloudtrail.html","tags":["scored:true","control:3.12.3","requirement:Monitoring","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","framework:nist-800-171","level:2","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","scope:aws_logging_log_metric","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:RS.AN-03","requirement:Supply-Chain-Risk-Management","control:DE.CM-1","control:SI-5","control:4.9","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Security-Assessment","requirement:Incident-Analysis","cloud_provider:aws","requirement:Systems-and-Information-Integrity","control:RS.AN-1","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:3.14.6","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:aws_logging_log_metric"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:3.12.3","requirement:Monitoring","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","framework:nist-800-171","level:2","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","scope:aws_logging_log_metric","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:RS.AN-03","requirement:Supply-Chain-Risk-Management","control:DE.CM-1","control:SI-5","control:4.9","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Security-Assessment","requirement:Incident-Analysis","cloud_provider:aws","requirement:Systems-and-Information-Integrity","control:RS.AN-1","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:3.14.6","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:aws_logging_log_metric"],"version":32,"id":"lmv-ykb-lxc","updatedAt":1756340982641,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS Config modified","createdAt":1674195801260,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"d17-702-f4a","queries":[{"query":"source:cloudtrail @evt.name:(StopConfigurationRecorder OR DeleteDeliveryChannel)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_config_deleted_or_stopped","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:(PutDeliveryChannel OR PutConfigurationRecorder)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_config_modified","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"Deleted/Stopped","status":"low","notifications":[],"condition":"aws_config_deleted_or_stopped \u003e 0"},{"name":"Modified","status":"info","notifications":[],"condition":"aws_config_modified \u003e 0"}],"message":"## Goal\nDetect when an attacker is trying to evade defenses by disabling or modifying AWS Config.\n\n## Strategy\nThis rule lets you monitor these AWS Config API calls per [CIS-AWS-4.9: Ensure a log metric filter and alarm exist for AWS Config configuration changes][5]:\n\n* [StopConfigurationRecorder][1] \n* [DeleteDeliveryChannel][2] \n* [PutDeliveryChannel][3]\n* [PutConfigurationRecorder][4]\n\n## Triage and response\n1. Determine which if {{@userIdentity.arn}} should have done a {{@evt.name}} to AWS Config.\n2. If the user did not make the API call:\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.\n\n[1]: https://docs.aws.amazon.com/config/latest/APIReference/API_StopConfigurationRecorder.html\n[2]: https://docs.aws.amazon.com/config/latest/APIReference/API_DeleteDeliveryChannel.html\n[3]: https://docs.aws.amazon.com/config/latest/APIReference/API_PutDeliveryChannel.html\n[4]: https://docs.aws.amazon.com/config/latest/APIReference/API_PutConfigurationRecorder.html\n[5]: https://docs.aws.amazon.com/config/latest/developerguide/operational-best-practices-for-cis_aws_benchmark_level_2.html\n\n## Changelog\n* 1 April 2022 - Updated rule and signal message.\n* 10 October 2022 - Updated severities.","tags":["security:compliance","iaas:aws","control:4.9","requirement:Monitoring","framework:cis-aws","scope:amazon-config","source:cloudtrail","technique:T1562-impair-defenses","mitre_platform:iaas","tactic:TA0005-defense-evasion","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","iaas:aws","control:4.9","requirement:Monitoring","framework:cis-aws","scope:amazon-config","source:cloudtrail","technique:T1562-impair-defenses","mitre_platform:iaas","tactic:TA0005-defense-evasion","mitre_platform:cloud"],"version":19,"id":"p1b-9np-rw1","updatedAt":1740655388242,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Config should be enabled and recording in all active regions","createdAt":1732569529980,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-66b","queries":[{"query":"resource_type:aws_ec2_region","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_region","complianceFrameworks":[{"control":"A.8.9","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"3.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Logging","version":"5.0.0"},{"control":"3.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Logging","version":"4.0.0"},{"control":"3.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Logging","version":"3.0.0"},{"control":"config.1","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Identify","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\n# Precompute tuples where config is recording and region tag matches for efficiency\nvalid_config_pair := {[account_id, region_name] |\n\tsome config in input.resources.aws_config_recorder_status\n\tconfig.recording\n\n\tsome tag in config.tags\n\tstartswith(tag, \"region:\")\n\tparts := split(tag, \":\")\n\n\tregion_name := parts[1]\n\taccount_id := config.account_id\n}\n\nregion_active(ec2_region) if {\n\tvalid_config_pair[[ec2_region.account_id, ec2_region.region_name]]\n}\n\neval(ec2_region) := \"pass\" if {\n\tregion_active(ec2_region)\n} else := \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_ec2_region","aws_config_recorder_status"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nThis check ensures that AWS Config is enabled in all regions. AWS Config continuously monitors and records your AWS resource configurations and allows you to automate the evaluation of recorded configurations against desired configurations. By enabling AWS Config in all regions, you ensure comprehensive resource compliance and change management across your AWS environment.\n\n## Remediation\n\nFor guidance on enabling AWS Config, refer to the [AWS Config Developer Guide on Setting Up AWS Config with the Console][1]. You can enable AWS Config in multiple regions through the AWS Management Console, AWS CLI, or AWS SDKs.\n\nIt is recommended to enable AWS Config in all regions to ensure complete visibility and compliance monitoring across your entire AWS infrastructure.\n\n[1]: https://docs.aws.amazon.com/config/latest/developerguide/gs-console.html\n","tags":["scored:true","security:compliance","control:A.8.9","scope:iam_account","control:config.1","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","source:iam_account","control:3.3","requirement:Logging","framework:cis-aws","framework:iso-27001","requirement:Technological-Controls"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","control:A.8.9","scope:iam_account","control:config.1","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","source:iam_account","control:3.3","requirement:Logging","framework:cis-aws","framework:iso-27001","requirement:Technological-Controls"],"version":11,"id":"def-000-66b","updatedAt":1756340155765,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS ConsoleLogin with MFA triggered Impossible Travel scenario","createdAt":1641595270220,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"oky-4op-88y","queries":[{"query":"source:cloudtrail @evt.name:ConsoleLogin -@level:Error (@userIdentity.sessionContext.attributes.mfaAuthenticated:true OR @additionalEventData.MFAUsed:Yes) -@threat_intel.results.category:corp_vpn","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@network.client.geoip","metrics":["@network.client.geoip"],"aggregation":"geo_data","name":"impossible_travel_mfa","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"impossible_travel","maxSignalDuration":86400,"keepAlive":21600,"impossibleTravelOptions":{"baselineUserLocations":true,"detectIpTransition":false}},"cases":[{"name":"impossible travel event for ConsoleLogin with MFA","status":"low","notifications":[]}],"message":"## Goal\nDetect an Impossible Travel event when a `@userIdentity.type:` `{{@userIdentity.type}}` performs a `consoleLogin` with a multi-factor authentication (MFA) device.\n\n## Strategy\nThe Impossible Travel detection type''s algorithm compares the GeoIP data of the last log and the current log to determine if the user with `@userIdentity.session_name:` `{{@userIdentity.session_name}}` traveled more than 500km at over 1,000km/h and the user used MFA.\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should be connecting from  `{{@impossible_travel.triggering_locations.first_location.city}}, {{@impossible_travel.triggering_locations.first_location.country}}` and `{{@impossible_travel.triggering_locations.second_location.city}}, {{@impossible_travel.triggering_locations.second_location.country}}` in a short period of time.\n2. If the user should not be connecting from `{{@impossible_travel.triggering_locations.first_location.city}}, {{@impossible_travel.triggering_locations.first_location.country}}` and `{{@impossible_travel.triggering_locations.second_location.city}}, {{@impossible_travel.triggering_locations.second_location.country}}`, then consider isolating the account and reset credentials.\n3. Use the Cloud SIEM - User Investigation dashboard to audit any user actions that may have occurred after the illegitimate login. \n\n## Changelog\n* 10 March 2022 - Updated rule.\n* 15 December 2022 - Updated rule to cover edge case.\n* 30 September 2024 - Updated query to replace attribute `@threat_intel.results.subcategory:anonymizer`.","tags":["iaas:aws","scope:cloudtrail","technique:T1078-valid-accounts","source:cloudtrail","mitre_platform:iaas","tactic:TA0001-initial-access","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:cloudtrail","technique:T1078-valid-accounts","source:cloudtrail","mitre_platform:iaas","tactic:TA0001-initial-access","security:attack","mitre_platform:cloud"],"version":178,"id":"vbv-f3o-8zo","updatedAt":1740655087684,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS ConsoleLogin without MFA triggered Impossible Travel scenario","createdAt":1641595268461,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"spm-un2-i9l","queries":[{"query":"@evt.name:ConsoleLogin -@level:Error (@userIdentity.sessionContext.attributes.mfaAuthenticated:false OR @additionalEventData.MFAUsed:No) -@threat_intel.results.category:corp_vpn","groupByFields":["@userIdentity.session_name"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@network.client.geoip","metrics":["@network.client.geoip"],"aggregation":"geo_data","name":"impossible_travel_no_mfa","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"impossible_travel","maxSignalDuration":86400,"keepAlive":21600,"impossibleTravelOptions":{"baselineUserLocations":true,"detectIpTransition":false}},"cases":[{"name":"","status":"medium","notifications":[]}],"message":"## Goal\nDetect an Impossible Travel event when a `@userIdentity.type:` `{{@userIdentity.type}}` performs a `consoleLogin` without a multi-factor authentication (MFA) device.\n\n## Strategy\nThe Impossible Travel detection type''s algorithm compares the GeoIP data of the last log and the current log to determine if the user with `@userIdentity.session_name:` `{{@userIdentity.session_name}}` traveled more than 500km at over 1,000km/h and the account does not have MFA enabled.\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should be connecting from  `{{@impossible_travel.triggering_locations.first_location.city}}, {{@impossible_travel.triggering_locations.first_location.country}}` and `{{@impossible_travel.triggering_locations.second_location.city}}, {{@impossible_travel.triggering_locations.second_location.country}}` in a short period of time.\n2. If the user should not be connecting from `{{@impossible_travel.triggering_locations.first_location.city}}, {{@impossible_travel.triggering_locations.first_location.country}}` and `{{@impossible_travel.triggering_locations.second_location.city}}, {{@impossible_travel.triggering_locations.second_location.country}}`, then consider isolating the account and reset credentials.\n3. Use the Cloud SIEM - User Investigation dashboard to audit any user actions that may have occurred after the illegitimate login. \n\n## Changelog\n* 30 September 2024 - Updated query to replace attribute `@threat_intel.results.subcategory:anonymizer`.","tags":["iaas:aws","scope:cloudtrail","technique:T1078-valid-accounts","source:cloudtrail","mitre_platform:iaas","tactic:TA0001-initial-access","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:cloudtrail","technique:T1078-valid-accounts","source:cloudtrail","mitre_platform:iaas","tactic:TA0001-initial-access","security:attack","mitre_platform:cloud"],"version":175,"id":"a1n-son-6bk","updatedAt":1740655591899,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS CreateIndex by long term access key","createdAt":1754680373510,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":true,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-h6a","queries":[{"query":"source:cloudtrail @evt.name:CreateIndex @eventSource:resource-explorer-2.amazonaws.com @userIdentity.accessKeyId:AKIA* -@threat_intel.results.category:corp_vpn","groupByFields":["@userIdentity.accessKeyId","@awsRegion"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"createindex_long_term_access_keys","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:CreateIndex @eventSource:resource-explorer-2.amazonaws.com @userIdentity.accessKeyId:AKIA* -@threat_intel.results.category:corp_vpn @threat_intel.results.intention:(suspicious OR malicious)","groupByFields":["@userIdentity.accessKeyId","@awsRegion"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"createindex_long_term_access_keys_threat_intel","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"suspicious IP used","status":"high","notifications":[],"condition":"createindex_long_term_access_keys_threat_intel \u003e 0"},{"name":"long term access key used","status":"medium","notifications":[],"condition":"createindex_long_term_access_keys \u003e 0"}],"message":"## Goal\n\nDetects usage of long-term AWS access keys to execute `CreateIndex` operations in AWS Resource Explorer. Identifies potential unauthorized discovery activity using compromised or misused long-term credentials.\n\n## Strategy\n\nThis rule monitors AWS CloudTrail logs for `CreateIndex` events generated by the `resource-explorer-2.amazonaws.com` service, with a specific focus on long-term access keys. AWS Resource Explorer allows users to search and discover AWS resources across regions and accounts, making it valuable for both legitimate administration and malicious reconnaissance. Long-term access keys pose a higher security risk than temporary credentials because they do not expire automatically and are more likely to be compromised or misused by unauthorized actors.\n\n## Triage \u0026 Response\n\n- Examine if the access key `{{@userIdentity.accessKeyId}}` in region `{{@awsRegion}}` has legitimate authorization to create resource indexes.\n- Review the user identity associated with the access key and verify if index creation aligns with their normal responsibilities.\n- Check for additional Resource Explorer API calls from the same access key to understand the scope of discovery activity.\n- Investigate the source IP address and geographic location of the API calls to identify potential unauthorized access.\n- Determine if the access key shows signs of compromise by reviewing recent authentication patterns and usage locations.\n- Validate if the timing of the `CreateIndex` operation aligns with known maintenance windows or legitimate administrative tasks.\n","tags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":2,"id":"def-000-h6a","updatedAt":1754680373510,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS CreateIndex followed by ListResources via long term access key","createdAt":1754680199702,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":true,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-nlb","queries":[{"groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"event_count","name":"createindex_long_term_access_key","defaultRuleId":"def-000-h6a","correlatedByFields":["@userIdentity.accessKeyId","@awsRegion"]},{"groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"event_count","name":"listresources_long_term_access_key","defaultRuleId":"def-000-8qc","correlatedByFields":["@userIdentity.accessKeyId","@awsRegion"]}],"options":{"evaluationWindow":86400,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":86400,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"CreateIndex followed by ListResources","status":"high","notifications":[],"condition":"createindex_long_term_access_key \u003e 0 THEN listresources_long_term_access_key \u003e 0"}],"message":"## Goal\n\nDetects coordinated AWS Resource Explorer reconnaissance activity where `CreateIndex` operations are followed by `ListResources` operations using long-term access keys. Identifies systematic resource discovery patterns indicative of attack preparation or unauthorized environment mapping.\n\n## Strategy\n\nThis rule correlates two signals based on `@userIdentity.accessKeyId` and `@awsRegion` within a 24-hour window. It monitors for the sequence where a principal first creates a resource index using long-term access keys and subsequently performs resource listing operations using the same long-term credentials. This behavior pattern represents a systematic approach to AWS environment reconnaissance, where an attacker first establishes the capability to search resources by creating an index, then immediately leverages that index to enumerate available resources. The combination of both activities using long-term access keys suggests deliberate and potentially unauthorized infrastructure discovery efforts that exceed typical administrative workflows.\n\n## Triage \u0026 Response\n\n- Examine the access key `{{@userIdentity.accessKeyId}}` and principal identity involved in both the `CreateIndex` and `ListResources` operations in region `{{@awsRegion}}`.\n- Review the time sequence between index creation and resource listing to determine if the pattern indicates automated or manual reconnaissance.\n- Investigate the scope and specificity of the `ListResources` queries to understand what resources the actor was targeting.\n- Check for additional Resource Explorer API calls or other discovery-related AWS API activity from the same principal.\n- Validate if the principal has legitimate business justification for both creating indexes and performing comprehensive resource enumeration.\n- Analyze the source IP addresses and geographic locations for both activities to identify potential unauthorized access patterns.\n- Determine if the access key has been recently compromised or shows other indicators of misuse beyond this specific activity sequence.\n","tags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"signal_correlation","filters":[],"defaultTags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":5,"id":"def-000-nlb","updatedAt":1757096094648,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Detective Graph deleted","createdAt":1669107131123,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"9fq-2av-prp","queries":[{"query":"source:cloudtrail @eventSource:detective.amazonaws.com @evt.name:DeleteGraph","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Goal\nDetect when a user deletes an Amazon Detective behavior graph.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if a user has deleted an Amazon Detective behavior graph:\n\n* [DeleteGraph][1]\n\n## Triage and response\n1. Determine if the behavior graph should have been deleted.\n2. Determine which user ({{@userIdentity.arn}}) in your organization deleted the behavior graph.\n3. If the user did not make the API call:\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.\n\n## Changelog\n* 1 April 2022 - Updated rule and signal message.\n* 18 November 2022 - Updated severity.\n\n[1]: https://docs.aws.amazon.com/detective/latest/APIReference/API_DeleteGraph.html\n\n","tags":["iaas:aws","technique:T1562-impair-defenses","source:cloudtrail","scope:aws-detective","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","technique:T1562-impair-defenses","source:cloudtrail","scope:aws-detective","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"oje-vzw-qjp","updatedAt":1740654933504,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Disable Cloudtrail with event selectors","createdAt":1685520688900,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"tar-dhx-0hv","queries":[{"query":"source:cloudtrail @eventSource:cloudtrail.amazonaws.com @evt.name:PutEventSelectors @requestParameters.eventSelectors.includeManagementEvents:false","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"disable_cloudtrail_with_event_selectors","dataSource":"logs"},{"query":"source:cloudtrail @eventSource:cloudtrail.amazonaws.com @evt.name:PutEventSelectors @requestParameters.eventSelectors.includeManagementEvents:false @responseElements.eventSelectors.dataResources.type:(\"AWS::S3::Object\" AND \"AWS::Lambda::Function\") @responseElements.eventSelectors.readWriteType:ReadOnly","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"public_poc","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"Public POC","status":"medium","notifications":[],"condition":"public_poc \u003e 0"},{"name":"IncludeManagementEvents set to False","status":"low","notifications":[],"condition":"disable_cloudtrail_with_event_selectors \u003e 0"}],"message":"## Goal\nDetect when CloudTrail has been disabled by creating an event selector on the Trail.\n\n## Strategy\nThis rule lets you monitor CloudTrail and detect if an attacker used the [`PutEventSelectors`][1] API call to filter out management events, effectively disabling CloudTrail for the specified Trail.\n\nSee the [public Proof of Concept][2] (PoC) for this attack.\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` should have made the `{{@evt.name}}` API call.\n2. If the API call was **not** made legitimately by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the event selector using the `aws-cli` command [`put-event-selectors`][3] or use the [AWS console][4] to revert the event selector back to the last known good state.\n3. If the API call was made legitimately by the user:\n  * Determine if the user was authorized to make that change.\n  * If **Yes**, work with the user to ensure that CloudTrail logs for the affected account `{{@userIdentity.accountId}}` are being sent to the Datadog platform.\n  * If **No**, remove the event selector using the `aws-cli` command [`put-event-selectors`][3] or reference the [AWS console documentation][4] to revert the event selector back to the last known good state.\n\n## Changelog\n* 17 October 2022 - Updated tags.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/API_PutEventSelectors.html\n[2]: https://github.com/RhinoSecurityLabs/Cloud-Security-Research/tree/master/AWS/cloudtrail_guardduty_bypass\n[3]: https://docs.aws.amazon.com/cli/latest/reference/cloudtrail/put-event-selectors.html\n[4]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-update-a-trail-console.html","tags":["iaas:aws","scope:cloudtrail","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:cloudtrail","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":10,"id":"jam-62o-d0n","updatedAt":1740655051919,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EBS Snapshot Made Public","createdAt":1674195802191,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"f7b-f88-363","queries":[{"query":"source:cloudtrail @evt.name:ModifySnapshotAttribute @requestParameters.createVolumePermission.add.items.group:\"all\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Goal\nDetect when an EBS snapshot is made public.\n\n## Strategy\nThis rule lets you monitor these CloudTrail API calls to detect when an EBS snapshot is made public:\n\n* [ModifySnapshotAttribute][1]\n\nThis rule inspects the `@requestParameters.createVolumePermission.add.items.group` array to determine if the string `all` is contained. This is the indicator which means the EBS snapshot is made public.\n\n## Triage and response\n1. Determine if the EBS snapshot should be made public.\n2. Determine which user, `{{@@userIdentity.arn}}`, in your organization made the EBS snapshot public.\n3. Contact the user to see if they intended to make the EBS snapshot public.\n4. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n    * Revert AMI permissions to the original state.\n    * Begin your company''s IR process and investigate.\n\n## Changelog\n11 November 2022 - Added additional triage and response steps.\n\n[1]: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/ec2/modify-snapshot-attribute.html#examples\n","tags":["security:compliance","scope:ec2","iaas:aws","tactic:TA0009-collection","source:cloudtrail","technique:T1530-data-from-cloud-storage","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","scope:ec2","iaas:aws","tactic:TA0009-collection","source:cloudtrail","technique:T1530-data-from-cloud-storage","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":20,"id":"kx1-upq-ea2","updatedAt":1740656128033,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EBS Snapshot possible exfiltration","createdAt":1674195802114,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"nfk-un1-yds","queries":[{"query":"source:cloudtrail @evt.name:CreateSnapshot -@userIdentity.invokedBy:(dlm.amazonaws.com OR events.amazonaws.com OR backup.amazonaws.com)  (-@userIdentity.assumed_role:(*orca* OR *wiz*) -@responseElements.description:\"Orca automatically generated snapshot\" -@requestParameters.description:auto-generatedbyWiz -@responseElements.description:\"auto-generated by Wiz\")","groupByFields":["@responseElements.snapshotId"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"snapshot_created","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:ModifySnapshotAttribute @requestParameters.attributeType:CREATE_VOLUME_PERMISSION -@userIdentity.invokedBy:(dlm.amazonaws.com OR events.amazonaws.com OR backup.amazonaws.com) (@requestParameters.createVolumePermission.add.items.userId:* OR @requestParameters.createVolumePermission.add.items.group:*) -@requestParameters.createVolumePermission.add.items.userId:(\"135916806842\" OR \"463932680998\" OR \"727815099310\" OR \"553950354547\" OR \"784971140435\" OR \"222606875197\")","groupByFields":["@requestParameters.snapshotId"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"snapshot_shared","dataSource":"logs"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":7200},"cases":[{"name":"EBS Snapshot created then shared","status":"medium","notifications":[],"condition":"snapshot_created \u003e 0 \u0026\u0026 snapshot_shared \u003e 0"},{"name":"EBS Snapshot shared","status":"info","notifications":[],"condition":"snapshot_shared \u003e 0"}],"message":"## Goal\nDetect the possible exfiltration of an EBS snapshot.\n\n## Strategy\nThis rule allows you to monitor CloudTrail and detect the following API calls within a 15 minute time window:\n\n* [`CreateSnapshot`][1]\n* [`ModifySnapshotAttribute`][2]\n\nAn attacker can create a EBS snapshot from the EBS volume and modify the permissions of the snapshot to allow it to be shared [publicly][3] or with another AWS account. Using an attacker-controlled account, a new EBS volume can be created from the snapshot and attached to an EC2 instance for analysis.\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` should have made the API calls.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove any snapshot attributes generated by the user with the `aws-cli` command [`modify-snapshot-attribute`][4].\n  * Begin your organization''s incident response process and investigate.\n3. If the API calls were made by the user:\n  * Determine if the user should be performing these API calls.\n  * If **No**, see if other API calls were made by the user and determine if they warrant further investigation.\n\n## Changelog\n10 October 2022 - Updated query and severity.\n\n[1]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_CreateSnapshot.html\n[2]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ModifySnapshotAttribute.html\n[3]: https://docs.datadoghq.com/security/default_rules/cloudtrail-aws-ebs-snapshot-made-public/\n[4]: https://docs.aws.amazon.com/cli/latest/reference/ec2/modify-snapshot-attribute.html","tags":["scope:ec2","technique:T1537-transfer-data-to-cloud-account","iaas:aws","source:cloudtrail","mitre_platform:iaas","tactic:TA0010-exfiltration","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:ec2","technique:T1537-transfer-data-to-cloud-account","iaas:aws","source:cloudtrail","mitre_platform:iaas","tactic:TA0010-exfiltration","security:attack","mitre_platform:cloud"],"version":13,"id":"dka-ecn-adr","updatedAt":1740655225971,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EBS default encryption disabled","createdAt":1684222202289,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"ee2-dc1-3c1","queries":[{"query":"source:(cloudtrail OR amazon-security-lake) @eventSource:ec2.amazonaws.com @evt.name:DisableEbsEncryptionByDefault","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Goal\nDetect when an EBS encryption is disabled by default. \n\n## Strategy\nMonitor CloudTrail and detect when EBS encryption is disabled by default via the following API call:\n\n* [DisableEbsEncryptionByDefault][1]\n\n## Triage and response\n1. Determine which user in your organization owns the API key that made this API call.\n2. Contact the user and let them know that it is best practice to enable EBS encryption by default.\n3. Re-enable EBS encryption by default.\n\nFor more information about Amazon EBS Encryption, check out the [Amazon EBS Encryption][2] documentation.\n\n## Changelog\n* 18 March 2022 - Rule query and severity updated.\n* 16 November 2022 - Rule query updated.\n\n[1]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DisableEbsEncryptionByDefault.html\n[2]: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/EBSEncryption.html\n","tags":["security:compliance","scope:ec2","iaas:aws","framework:cis-aws","control:2.2.1","source:cloudtrail","technique:T1562-impair-defenses","mitre_platform:iaas","tactic:TA0005-defense-evasion","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","scope:ec2","iaas:aws","framework:cis-aws","control:2.2.1","source:cloudtrail","technique:T1562-impair-defenses","mitre_platform:iaas","tactic:TA0005-defense-evasion","mitre_platform:cloud"],"version":13,"id":"4s7-uuu-lo8","updatedAt":1740655007299,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EC2 instance can assume a role with administrative privileges","createdAt":1696004078586,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-kfe","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when an EC2 instance has an IAM role that can use `sts:AssumeRole` to assume a role with administrative privileges in the same account inside your AWS Organization. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum required for it to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"huy-7lr-ifd","updatedAt":1724360407036,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance can assume a role with administrative privileges cross-account","createdAt":1724360425934,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-3j4","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given EC2 instance can use `sts:AssumeRole` to assume a role with administrative privileges in a different account inside your AWS Organization. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges in a different account of your AWS Organization, giving them access to the privileges of that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum required for it to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":2,"id":"def-000-3j4","updatedAt":1731431156573,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance can assume multiple roles with administrative privileges cross-account","createdAt":1731706210079,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-346","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"critical","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another, more privileged identity. This rule identifies when a given EC2 instance can use `sts:AssumeRole` to assume multiple IAM roles with administrative privileges in different accounts in your AWS environment. By assuming these more privileged roles, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume multiple IAM roles with administrative privileges in different accounts in your AWS environment, giving them access to the privileges of that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum required for the role to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resources specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"version":1,"id":"def-000-346","updatedAt":1731706210079,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance can create a login profile for an IAM user with administrative privileges","createdAt":1696004129853,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-upc","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when an EC2 instance has an IAM role that can use `iam:CreateLoginProfile` to create a new login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who does not have a login profile set. The identity which triggered this detection can create a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum necessary for it to fulfill its function. To remediate the issue, either remove the `iam:CreateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":4,"id":"urt-erc-7se","updatedAt":1700518807645,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance can create access keys for an IAM user with administrative privileges","createdAt":1696004074674,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-apy","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when an EC2 instance has an IAM role that can use `iam:CreateAccessKey` to create new access keys for an IAM user with administrative privileges. By creating a new access key pair for another user, an adversary could use those credentials to operate as that user and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can create an access key pair for an IAM user with administrative privileges, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum required for it to fulfill its function. To remediate the issue, either remove the `iam:CreateAccessKey` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":4,"id":"sfj-ve9-pvb","updatedAt":1700518829846,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance can update a login profile for an IAM user with administrative privileges","createdAt":1696004117395,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-heb","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when an EC2 instance has an IAM role that can use `iam:UpdateLoginProfile` to modify an existing login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who has a login profile set. The identity which triggered this detection can modify a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum necessary for it to fulfill its function. To remediate the issue, either remove the `iam:UpdateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":4,"id":"nqn-ypf-t2e","updatedAt":1700518823388,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance can update the trust policy for a role with administrative privileges","createdAt":1696004150047,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-gry","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when an EC2 instance has an IAM role that can use `iam:UpdateAssumeRolePolicy` to modify an existing trust policy for an IAM role with administrative privileges. By modifying the role trust policy, an adversary could assume that role and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can update the trust policy for a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum required for it to fulfill its function. To remediate the issue, either remove the `iam:UpdateAssumeRolePolicy` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":4,"id":"wyi-rvp-ohc","updatedAt":1700518808116,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 instance has administrative privileges","createdAt":1692805273126,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-ldp","queries":[{"query":"resource_type:aws_ec2_instance","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_ec2_instance","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nThis rule ensures that none of your EC2 instances have IAM roles with highly-privileged policies or administrative policies attached to them.\n\n## Rationale\nAn IAM role with highly privileged or administrative permissions can access all AWS services and resources in the account. A role with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. Roles with these levels of access may also be targeted by an adversary to compromise the entire AWS account.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an EC2 instance to the minimum required for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":7,"id":"4nr-tkm-h6t","updatedAt":1700594943331,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS EC2 key pair creation attempt with known suspicious naming convention","createdAt":1751932354793,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-192","queries":[{"query":"source:cloudtrail @requestParameters.keyName:(key*) @evt.name:CreateKeyPair @userIdentity.accessKeyId:AKIA*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_create_key_pair","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_create_key_pair \u003e 0"}],"message":"## Goal\n\nDetect when a key pair is created using a long-term access key that has a suspicious naming convention.\n\n## Strategy\n\nThis rule lets you monitor CloudTrail logs for `CreateKeyPair` events created from a long-term access key and shows the identity that initiated the event.\n\nDatadog''s security research team has observed key pair naming conventions that include a common noun followed by a string of alphanumeric characters. The attack pattern can indicate that the long term access key used has been compromised, `{{@userIdentity.accessKeyId}}`.\n\n## Triage and response\n\n1. Determine if the user, `{{@userIdentity.arn}}`, should be generating a new key pair.\n2. Investigate the the user behavior and access information:\n   - Review the user agent, IP address, and other identifying information for evidence of an abnormal access.\n   - Look at additional events, such as `{{@@userIdentity.arn}}` and `{{@userIdentity.accessKeyId}}` attaching a key pair to an EC2 instance during the surrounding timeframe. The related events can be searched in EC2 logs: `@eventSource:ec2.amazonaws.com` and `@evt.name:ImportKeypair`.\n3. If the behavior is abnormal for the user and your environment:\n   - Rotate the credentials.\n   - Investigate if the same credentials took other unauthorized actions.\n   - Begin your company''s IR process and investigate.\n","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":5,"id":"def-000-192","updatedAt":1751932354793,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EC2 new event for EKS Node Group","createdAt":1662730427012,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"49s-nqd-u7j","queries":[{"query":"source:cloudtrail","groupByFields":["eks_nodegroup-name"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@evt.name","metrics":["@evt.name"],"aggregation":"new_value","name":"","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"new_value","maxSignalDuration":86400,"keepAlive":3600,"newValueOptions":{"forgetAfter":21,"learningDuration":7,"learningThreshold":0,"learningMethod":"duration","instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"info","notifications":[]}],"message":"## Goal\nDetect when an AWS EKS node group makes a new API call.\n\n## Strategy\nThis rule sets a baseline for host activity across an AWS EKS node group, and enables detection of potentially anomalous activity when a node group makes a new API call.\n\nA new API call from a node group can indicate an attacker gaining a foothold within the system and trying API calls not normally associated with this node group.\n\n## Triage and response\n1. Investigate API activity for the AWS EKS node group to determine if the specific API call is malicious.\n2. Review any other security signals for the AWS EKS node group.\n3. If the activity is deemed malicious:\n    * If possible, isolate the compromised hosts.\n    * Determine what other API calls were made by the EKS node group.\n    * Begin your organization''s incident response process and investigate.","tags":["scope:ec2","iaas:aws","technique:T1078-valid-accounts","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud","tactic:TA0001-initial-access"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:ec2","iaas:aws","technique:T1078-valid-accounts","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud","tactic:TA0001-initial-access"],"version":189,"id":"nkn-aw3-xb2","updatedAt":1740656321405,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EC2 new event for application","createdAt":1668678633425,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"unr-9hi-6ng","queries":[{"query":"source:cloudtrail host:i-*","groupByFields":["application"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@evt.name","metrics":["@evt.name"],"aggregation":"new_value","name":"","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"new_value","maxSignalDuration":86400,"keepAlive":3600,"newValueOptions":{"forgetAfter":7,"learningDuration":7,"learningThreshold":0,"learningMethod":"duration","instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"low","notifications":[]}],"message":"## Goal\nDetects when an application on a host has a new, unrecognized API call.\n\n## Strategy\nUsing the `New Value` detection method, find when an `application` has a new `@evt.name` on a `host`.\n\n## Triage and response\n1. Determine if the `host: {{host}}` running the `application: {{application}}` should have done the following event(s)`{{@evt.name}}`:\n   * If yes, you can `Archive` the signal.\n   * If no, investigate further by clicking on the **Suggested Actions** tab for the signal\n2. If necessary, initiate your company''s incident response process.\n\n## Changelog\n* 14 November 2022 - Updated severity.\n\n","tags":["scope:ec2","iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:ec2","iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":173,"id":"qcg-jbs-kcd","updatedAt":1740655891375,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EC2 security group events observed with a suspicious naming convention","createdAt":1751932244433,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-e7x","queries":[{"query":"source:cloudtrail @requestParameters.groupName:example* @userIdentity.accessKeyId:AKIA* @evt.name:(AuthorizeSecurityGroupIngress OR CreateSecurityGroup)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cloudtrail_aws_ec2_authorizesecuritygroup","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"cloudtrail_aws_ec2_authorizesecuritygroup \u003e 0"}],"message":"## Goal\n\nDetect when an AWS security group has been modified by a long-term access key that has a suspicious group naming convention.\n\n## Strategy\n\nMonitor CloudTrail and detect when an AWS security group has been created or modified with one of the following API calls:\n\n- [AuthorizeSecurityGroupIngress][1]\n- [CreateSecurityGroup][2]\n\nDatadog''s security research team has observed security group naming conventions that include a common noun followed by a string of alphanumeric characters. The attack pattern can indicate that the long term access key used has been compromised, `{{@userIdentity.accessKeyId}}`.\n\n## Triage and response\n\n1. Determine who was the user who made this API call.\n2. Contact the user and confirm this was an API call that they made.\n3. If the API call was not made by the user:\n   - Rotate the user credentials and investigate what other API calls were made.\n   - Determine what other API calls made by that user were not actually initiated directly by that user.\n\n[1]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_AuthorizeSecurityGroupIngress.html\n[2]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_CreateSecurityGroup.html\n","tags":["scope:ec2","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:ec2","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":6,"id":"def-000-e7x","updatedAt":1751932244433,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}}],"meta":{"page":{"current_page":0,"total_count":2981,"total_filtered_count":100}}}'
