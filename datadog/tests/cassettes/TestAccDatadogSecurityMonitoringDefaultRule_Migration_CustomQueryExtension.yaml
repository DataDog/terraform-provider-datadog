soft Services through exceptions, you can regain access to services like Monitor, Networking, Hubs, and Event Grid. Additionally, this exception allows for backing up and restoring virtual machines using unmanaged disks in storage accounts with network rules applied. To ensure smooth operation of these services, it is recommended to enable the exception for Trusted Microsoft Services.\n\n## Remediation\n\n### From the console\n\n1. Go to **Storage Accounts**\n2. For each storage account, click on the **settings** menu called **Firewalls and Virtual Networks**.\n3. Ensure that **Allow access from selected networks** is `enabled`.\n4. Enable **Allow trusted Microsoft services to access this storage account**.\n5. Click **Save** to apply your changes.\n","tags":["scored:true","control:CC6.7","control:CC6.6","cloud_provider:azure","control:13.1.d","requirement:Compliance","requirement:Storage-Accounts","control:AU-10","level:2","requirement:Network-Security-Management","control:3.9","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Access-Control","scope:azure.storage","framework_requirement_control:dcsb-m-1/Azure/2.26","security:compliance","requirement:Azure","control:AC-4","framework:dora","control:2.26","framework:cis-azure","framework:dcsb-m-1","requirement:Communications-Security","framework_requirement:dcsb-m-1/Azure","control:11.2.a","requirement:Data-and-System-Security","framework:nist-800-53","source:azure.storage","control:A.13.1.3","control:A.13.1.1","control:A.18.1.3","framework:soc-2","control:A.9.1.2","framework:fedramp-high","requirement:Logical-and-Physical-Access-Control","control:CC6.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:CC6.7","control:CC6.6","cloud_provider:azure","control:13.1.d","requirement:Compliance","requirement:Storage-Accounts","control:AU-10","level:2","requirement:Network-Security-Management","control:3.9","framework:iso-27001","requirement:Audit