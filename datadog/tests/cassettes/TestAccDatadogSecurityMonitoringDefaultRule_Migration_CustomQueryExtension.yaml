e cluster.\n\n## Remediation\n\nChoose a remediation method from below. For both steps, a restart of the Kubelet service is required.\n\n### Kubelet config file\n\n1. Add the json below to this file: `/etc/kubernetes/kubelet/kubelet-config.json`\n\n```json\n\"readOnlyPort\": 0\n```\n\n### Executable arguments\n\n1. Edit the Kubelet service file on each worker node and ensure the below parameters are part of the `KUBELET_ARGS` variable string.\n\n```bash\n--read-only-port=0\n```","tags":["scored:true","source:google_kubernetes_worker_node","cloud_provider:gcp","framework:ponse1744140387","framework_requirement_control:ponse1744134512/ponse1744134512/ponse1744134512","framework:handle-91378","control:ponse1744232698","scope:google_kubernetes_worker_node","framework_requirement:handle-91378/security-requirement","control:compliance-control","framework_requirement_control:new/requirement1/control1","framework_requirement:ponse1744140387/ponse1744140387","framework_requirement_control:handle-91378/compliance-requirement/compliance-control","requirement:security-requirement","framework_requirement_control:handle-91378/security-requirement/security-control","framework:cis-gke","level:1","framework:handle-1076","framework_requirement_control:ponse1744232698/ponse1744232698/ponse1744232698","framework_requirement_control:handle-1076/security-requirement/security-control","framework_requirement:handle-71695/security-requirement","framework_requirement_control:handle-71695/compliance-requirement/compliance-control","framework_requirement:ponse1744232698/ponse1744232698","framework_requirement:new/requirement1","requirement:ponse1744232698","control:control1","framework_requirement_control:ponse1744140387/ponse1744140387/ponse1744140387","framework:new","security:compliance","requirement:ponse1744134512","control:security-control","framework_requirement:ponse1744134512/ponse1744134512","framework_requirement:handle-91378/compliance-requirement","framework:ponse1744134512","requ