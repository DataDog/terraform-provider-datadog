ist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-6","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.AE-2","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"DE.AE-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"ID.RA-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"30.1","framework":"gdpr","is_default":true,"message":"","requirement":"Records-of-Processing-Activities","version":"1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"2.4","framework":"cis-gcp","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"3.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfilter_service_const := upper(\"protoPayload.serviceName=\\\"cloudresourcemanager.googleapis.com\\\"\")\n\nfilter_ProjectOwnership_const := upper(\"ProjectOwnership\")\n\nfilter_Ownerinvitee_const := upper(\"projectOwnerInvitee\")\n\nfilter_remove_const := upper(\"protoPayload.serviceData.policyDelta.bindingDeltas.action=\\\"REMOVE\\\"\")\n\nfilter_remove_roles_const := upper(\"protoPayload.serviceData.policyDelta.bindingDeltas.role=\\\"roles/owner\\\"\")\n\nfilter_add_const := upper(\"protoPayload.serviceData.policyDelta.bindingDeltas.action=\\\"ADD\\\"\")\n\nfilter_add_role_const := upper(\"protoPayload.serviceData.policyDelta.bindingDeltas.role=\\\"roles/owner\\\"\")\n\nvalid_log_metric := {logging_log_metric.project_id |\n\tsome logging_log_metric in input.resources.gcp_logging_log_metric\n\tsome monitoring_alert_policy in input.resources.gcp_monitoring_alert_policy\n\tmetric_and_alert_align(logging_log_metric, monitoring_alert_policy)\n\tvalid_log_metric_filter(logging_log_metric)\n\tvalid_alert_policy_conditions(monitoring_alert_policy)\n}\n\nmetric_and_alert_align(logging_log_metric, monitoring_alert_policy) if {\n\tlogging_log_metric.project_id == monitoring_alert_policy.project_id\n\tfilter := monitoring_alert_policy.conditions[_].condition_threshold.filter\n\talert_policy_name := regex.replace(filter, \"^.*metric\\\\.type\\\\s*=\\\\s*\\\"logging\\\\.googleapis\\\\.com\\\\/user\\\\/(.*?)\\\".*$\", \"$1\")\n\tlogging_log_metric.name == alert_policy_name\n}\n\nvalid_log_metric_filter(logging_log_metric) if {\n\tfilter_parsed := upper(regex.replace(logging_log_metric.filter, \"\\\\s\", \"\"))\n\tcontains(filter_parsed, \"OR\")\n\tcontains(filter_parsed, \"AND\")\n\tcontains(filter_parsed, filter_service_const)\n\tcontains(filter_parsed, filter_ProjectOwnership_const)\n\tcontains(filter_parsed, filter_Ownerinvitee_const)\n\tcontains(filter_parsed, filter_remove_const)\n\tcontains(filter_parsed, filter_remove_roles_const)\n\tcontains(filter_parsed, filter_add_const)\n\tcontains(filter_parsed, filter_add_role_const)\n}\n\nvalid_alert_policy_conditions(monitoring_alert_policy) if {\n\tmonitoring_alert_policy.enabled == true\n\tmonitoring_alert_policy.notification_channels[_]\n}\n\neval(project) = \"pass\" if {\n\tvalid_log_metric[project.project_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules.  ---- only works for rego.\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_project","gcp_monitoring_alert_policy","gcp_logging_log_metric"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nTo prevent unnecessary project ownership assignments to users/service-accounts and further misuses of projects and resources, all `role/owner` assignments should be monitored. Members (users/service-accounts) with a role assignment that maps to the `role/owner` role are project owners. The project owner role includes the following privileges for the projects to which the role belongs:\n```\n- All viewer permissions on all GCP services within the project.\n- Permissions for actions that modify the state of all GCP services within\nthe project.\n- Manage roles and permissions for a project and all resources within the\nproject.\n- Project billing setup.\n```\nGranting the owner role to a member (user/service-account) will enable that user to modify the Identity and Access Management (IAM) policy. Because the IAM policy contains sensitive access control data, the owner role should be restricted to users that require access to manage the policy. Having a minimal set of users allowed to manage the IAM policy will simplify any auditing that may be necessary.\n\n## Rationale\nTo avoid misuse of project resources, the project ownership assignment/change actions mentioned above should be monitored and alerts sent to stakeholders when the following actions occur:\n```\n- A project ownership invite is sent.\n- A use accepts or rejects a project ownership invite.\n- `role\\Owner` is added to a user/service-account.\n- A user/Service account is removed from `role\\Owner`.\n```\n\n\n### Impact\nIf you enable logging, your project may be charged for additional logs usage.\n\n## Remediation\n\n### From the console\n#### Create the prescribed log metric\n1. On the [Log-based Metrics page][1], click **CREATE METRIC**.\n2. Click the arrow to the right of the search-filter box and select **Convert to Advanced Filter**.\n3. Replace any existing text with the following:\n   ```\n   (protoPayload.serviceName=\"cloudresourcemanager.googleapis.com\")\n   AND (ProjectOwnership OR projectOwnerInvitee)\n   OR (protoPayload.serviceData.policyDelta.bindingDeltas.action=\"REMOVE\"\n   AND protoPayload.serviceData.policyDelta.bindingDeltas.role=\"roles/owner\")\n   OR (protoPayload.serviceData.policyDelta.bindingDeltas.action=\"ADD\"\n   AND protoPayload.serviceData.policyDelta.bindingDeltas.role=\"roles/owner\")\n   ```\n4. Click **Submit Filter** to update the logs displayed on the page.\n5. In the **Metric Editor**, fill out the name field. Set `Units` to `1`\n(default) and the `Type` to `Counter`. This ensures that the log metric counts the\nnumber of log entries matching the advanced logs query.\n6. Click **Create Metric**.  \n\n#### Create a prescribed alert policy\n1. Locate the newly created metric under the section **User-defined Metrics**.\n2. Click the vertical ellipsis and select **Create alert from Metric**.\n3. Fill out the alert policy configuration and click **Save**. Choose the alerting threshold\nand configuration that makes sense for the user''s organization, for example, a\nthreshold of `zero(0)` for the most recent value will ensure that a notification is\ntriggered for every owner change in the project:\n   ```\n   Set `Aggregator` to `Count`\n   Set `Configuration`:\n   - Condition: above\n   - Threshold: 0\n   - For: most recent value\n   ```\n4. Configure the desired notifications channels in the **Notifications** section. \n5. Name the policy and click **Save**.\n\n### From the command line\n#### Create a prescribed log metric\nTo create a [prescribed log metric][2], run the following command: \n`gcloud beta logging metrics create`\n\n\n#### Create a prescribed alert policy\nTo create a [prescribed alert policy][3], run the following command: \n`gcloud alpha monitoring policies create`\n\n## References\n1. [https://cloud.google.com/logging/docs/logs-based-metrics/][4]\n2. [https://cloud.google.com/monitoring/custom-metrics/][5]\n3. [https://cloud.google.com/monitoring/alerts/][6]\n4. [https://cloud.google.com/logging/docs/reference/tools/gcloud-logging][7]\n\n## Additional Information\n1. Project ownership assignments for a user cannot be done using the gcloud utility as assigning project ownership requires sending an invitation to the user, which the user must then accept.\n2. Invites are not sent for `SetIAMPolicy` to `role/owner` as this action is directly performed on service accounts.\n\n[1]: https://console.cloud.google.com/logs/metrics\n[2]: https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create\n[3]: https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create\n[4]: https://cloud.google.com/logging/docs/logs-based-metrics/\n[5]: https://cloud.google.com/monitoring/custom-metrics/\n[6]: https://cloud.google.com/monitoring/alerts/\n[7]: https://cloud.google.com/logging/docs/reference/tools/gcloud-logging\n","tags":["scored:true","cloud_provider:gcp","control:3.4.1","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","framework:cis-gcp","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","requirement:Audit-Controls","control:PR.AA-01","framework:hipaa","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Configuration-Management","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:Logging-and-Monitoring","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","requirement:Records-of-Processing-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:A.8.15","control:RS.AN-03","control:30.1","requirement:Supply-Chain-Risk-Management","framework:gdpr","control:DE.CM-1","control:SI-5","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Incident-Analysis","scope:google_logging_log_metric","control:RS.AN-1","control:2.4","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:164.312-b","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:google_logging_log_metric"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","cloud_provider:gcp","control:3.4.1","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","framework:cis-gcp","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","requirement:Audit-Controls","control:PR.AA-01","framework:hipaa","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Configuration-Management","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:Logging-and-Monitoring","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","requirement:Records-of-Processing-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:A.8.15","control:RS.AN-03","control:30.1","requirement:Supply-Chain-Risk-Management","framework:gdpr","control:DE.CM-1","control:SI-5","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Incident-Analysis","scope:google_logging_log_metric","control:RS.AN-1","control:2.4","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:164.312-b","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:google_logging_log_metric"],"version":17,"id":"def-000-36k","updatedAt":1756331655736,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A new Kubernetes admission controller was created","createdAt":1721120933299,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"wpm-g1s-8yx","queries":[{"query":"(source:kubernetes.audit OR (source:azure.containerservice @evt.category:(kube-audit OR kube-audit-admin))) @http.method:create @objectRef.resource:(mutatingwebhookconfigurations OR validatingwebhookconfigurations) -@usr.id:(eks\\:cluster-bootstrap OR system\\:serviceaccount\\:kyverno\\:kyverno OR system\\:serviceaccount\\:kube-system\\:*)","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"admission_controller_created","dataSource":"logs"},{"query":"source:gcp.k8s.cluster service:k8s.io @data.protoPayload.request.kind:(ValidatingWebhookConfiguration OR MutatingWebhookConfiguration) @http.method:create -@usr.id:\"system:vpa-admission-controller\"","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"gke_admission_controller_created","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"medium","notifications":[],"condition":"admission_controller_created \u003e 0 || gke_admission_controller_created \u003e 0"}],"message":"## Goal\nIdentify when a new Kubernetes [admission controller][1] is created in the cluster.\n\nAdmission controllers can intercept all incoming requests to the API server. An attacker can use them to establish persistence or to access sensitive data (such as secrets) sent to the API server.\n\n## Strategy\nThis rule identifies when a `MutatingWebhookConfiguration` or `ValidatingWebhookConfiguration` is created.\n\n## Triage and response\n1. Determine if the admission controller being created is expected.\n2. Determine if the user: `{{@usr.id}}` should be creating the admission controller.\n3. Use the Cloud SIEM `User Investigation` dashboard to review user actions that occurred after the potentially malicious action.\n\n## Changelog\n* 20 September 2022 - Updated tags.\n* 7 May 2024 - Updated detection query to include logs from Azure Kubernetes Service.\n* 15 July 2024 - Updated detection query to include logs from Google Kubernetes Engine.\n\n[1]: https://kubernetes.io/docs/reference/access-authn-authz/admission-controllers/\n\n","tags":["source:kubernetes","technique:T1578-modify-cloud-compute-infrastructure","mitre_platform:containers","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["source:kubernetes","technique:T1578-modify-cloud-compute-infrastructure","mitre_platform:containers","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"jpb-ixq-qbz","updatedAt":1740680626209,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A new Microsoft 365 application was installed","createdAt":1662730434468,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"kc5-vk1-ysw","queries":[{"query":"source:microsoft-365 @evt.name:\"Add application.\" @evt.outcome:Success","groupByFields":["@ObjectId","@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@ObjectId","metrics":["@ObjectId"],"aggregation":"new_value","name":"","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"new_value","maxSignalDuration":0,"keepAlive":0,"newValueOptions":{"forgetAfter":28,"learningDuration":7,"learningThreshold":0,"learningMethod":"duration","instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"low","notifications":[]}],"message":"## Goal\nDetect when a new Microsoft 365 app is installed as a means of establishing persistence.\n\n## Strategy\nMonitor Microsoft 365 audit logs to look for events with an `@evt.name` value of `Add application.` and event `@evt.outcome` of `Success`.\n\n## Triage and response\n1. Determine if the user `{{@usr.email}}` intended to install `{{@ObjectId}}`.\n2. If `{{@usr.email}}` is not responsible for installing `{{@ObjectId}}`, investigate `{{@usr.email}}` for anomalous activity. If necessary, initiate your company''s incident response (IR) process.","tags":["source:microsoft-365","technique:T1136-create-account","mitre_platform:saas","mitre_platform:office-suite","scope:microsoft-365","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["source:microsoft-365","technique:T1136-create-account","mitre_platform:saas","mitre_platform:office-suite","scope:microsoft-365","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":169,"id":"o4m-xqz-5gv","updatedAt":1740681807840,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A new Microsoft Teams app or bot was observed","createdAt":1700535959574,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"qdk-m4v-gw0","queries":[{"query":"source:microsoft-365 service:MicrosoftTeams @evt.name:AppInstalled @AddOnType:(1 OR 4)","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@AddOnName","metrics":["@AddOnName"],"aggregation":"new_value","name":"","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"new_value","maxSignalDuration":86400,"keepAlive":3600,"newValueOptions":{"forgetAfter":28,"learningDuration":7,"learningThreshold":0,"learningMethod":"duration","instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30},"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"low","notifications":[]}],"message":"## Goal\nDetect when a new Microsoft 365 teams app or bot is installed as a means of establishing persistence.\n\n## Strategy\nMonitor Microsoft 365 audit logs to look for events with an `@evt.name` value of `AppInstalled`, where the `AddOnType` has a value of `1` OR `4` and a new `@AddOnName` is observed.\n\nAccording to [Microsoft][1], the following values indicate the types of add-ons that exist:\n- `1` - Indicates a bot.\n- `2` - Indicates a connector.\n- `3` - Indicates a tab.\n\nHowever, some add-ons use the value `4` for existing teams apps that could be potentially unapproved bots or applications that could be malicious.\n\n## Triage and response\n1. Determine if the user `{{@usr.email}}` intended to install `{{@AddOnName}}`.\n2. If `{{@usr.email}}` is not responsible for installing `{{@AddOnName}}`, investigate `{{@usr.email}}` for anomalous activity. If necessary, initiate your company''s incident response (IR) process.\n\n[1]: https://learn.microsoft.com/en-us/purview/audit-log-detailed-properties\n\n## Changelog\nUpdated rule name and query to include bots.","tags":["source:microsoft-365","scope:microsoft-teams","mitre_platform:saas","mitre_platform:office-suite","technique:T1137-office-application-startup","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["source:microsoft-365","scope:microsoft-teams","mitre_platform:saas","mitre_platform:office-suite","technique:T1137-office-application-startup","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":168,"id":"sja-6t5-2xv","updatedAt":1740681920166,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A potentially malicious file was sent in a Microsoft Teams message","createdAt":1698090920111,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-8ui","queries":[{"query":"source:microsoft-365 @AppAccessContext.ClientAppName:\"Microsoft Teams Services\" @evt.name:FileUploaded @SourceFileName:(*.exe OR *.msi OR *.bin OR *.dll OR *.bat OR *.ps1 OR *.vbs OR *.js OR *.scr OR *.zip OR *.rar *.7z *.cab OR *.tar OR *.gz OR *.bz2)","groupByFields":["@usr.email"],"hasOptionalGroupByFields":false,"distinctFields":["@SourceFileName"],"aggregation":"cardinality","name":"teams_message_with_malicious_link","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"teams_message_with_malicious_link \u003e 0"}],"message":"## Goal\nDetect when a potentially malicious file is sent in Microsoft Teams. Threat actors sometimes send malicious files to unsuspecting users as a means of initial access.\n\n## Strategy\nMonitor Microsoft 365 Sharepoint audit logs to look for the operation [`FileUploaded`][1]. When a file is shared in Teams, it utilizes the underlying Microsoft Office APIs to upload the file using SharePoint. The Teams file uploads are audited within the Microsoft Office’s activity log as SharePoint file operations. To differentiate Teams file uploads from those of other services, we use the `AppAccessContext.ClientAppName` attribute with the value of `Microsoft Teams Chat Files`. This detection identifies when a file with any of the following extensions is uploaded: \n- exe       \n- msi \n- bin \n- dll \n- bat \n- ps1 \n- vbs\n- js \n- scr \n- zip \n- rar\n- 7z \n- cab \n- tar \n- gz \n- bz2\n\n## Triage and response\n1. Investigate the potentially malicious file: `{{@SourceFileName}}` that was sent by viewing the Sharepoint link: `{{@ObjectId}}` containing the file.\n2. Determine if the user `{{@usr.email}}` intended to send the observed file.\n3. If `{{@usr.email}}` didn''t intend to send the observed file or happens to be a guest or external user:\n    * Investigate other activities performed by the user `{{@usr.email}}` using the Cloud SIEM - User Investigation dashboard.\n    * Begin your organization''s incident response process and investigate.\n\n[1]: https://learn.microsoft.com/en-us/purview/audit-log-activities","tags":["technique:T1566-phishing","source:microsoft-365","scope:microsoft-teams","technique:T1199-trusted-relationship","mitre_platform:saas","mitre_platform:office-suite","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1566-phishing","source:microsoft-365","scope:microsoft-teams","technique:T1199-trusted-relationship","mitre_platform:saas","mitre_platform:office-suite","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"version":6,"id":"cny-m8i-h2h","updatedAt":1740681879523,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A remote time server for Chrony is configured","createdAt":1690302555176,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-ixs","queries":[{"query":"source:compliance-agent @agent_rule_id:\"xccdf_org.ssgproject.content_rule_chronyd_specify_remote_server\"","groupByFields":["@resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":""}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":7200,"complianceRuleOptions":{"resourceType":"host","complianceFrameworks":[{"control":"2.2.1.3","framework":"cis-ubuntu2004","is_default":true,"message":"## Description\n\n`Chrony` is a daemon which implements the Network Time Protocol (NTP). It is designed\nto synchronize system clocks across a variety of systems and use a source that is highly\naccurate. More information on `chrony` can be found at\n\u003chttps://chrony-project.org/\u003e.\n`Chrony` can be configured to be a client and/or a server.\nAdd or edit server or pool lines to `/etc/chrony/chrony.conf` as appropriate:\n\n```\nserver \u003cremote-server\u003e\n```\n\nMultiple servers may be configured.\n\n## Rationale\n\nIf `chrony` is in use on the system proper configuration is vital to ensuring time\nsynchronization is working properly.\n\n## Remediation\n\n### Shell script\n\nThe following script can be run on the host to remediate the issue.\n\n```\n#!/bin/bash\n\n# Remediation is applicable only in certain platforms\nif dpkg-query --show --showformat=''${db:Status-Status}'' ''linux-base'' 2\u003e/dev/null | grep -q ''^installed$'' \u0026\u0026 { dpkg-query --show --showformat=''${db:Status-Status}'' ''chrony'' 2\u003e/dev/null | grep -q ''^installed$''; }; then\n\nvar_multiple_time_servers=''0.pool.ntp.org,1.pool.ntp.org,2.pool.ntp.org,3.pool.ntp.org''\n\n\nconfig_file=\"/etc/chrony/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" \u003e\u003e \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\n  if [[ -s \"$config_file\" ]] \u0026\u0026 [[ -n \"$(tail -c 1 -- \"$config_file\" || true)\" ]]; then\n      LC_ALL=C sed -i --follow-symlinks ''$a''\\\\ \"$config_file\"\n  fi\nfi\n\nelse\n    \u003e\u00262 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.pool.ntp.org,1.pool.ntp.org,2.pool.ntp.org,3.pool.ntp.org\n  tags:\n    - always\n\n- name: Detect if chrony is already configured with pools or servers\n  find:\n    path: /etc\n    patterns: chrony.conf\n    contains: ^[\\s]*(?:server|pool)[\\s]+[\\w]+\n  register: chrony_servers\n  when:\n  - ''\"linux-base\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Configure remote time servers\n  lineinfile:\n    path: /etc/chrony/chrony.conf\n    line: server {{ item }}\n    state: present\n    create: true\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"linux-base\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_servers.matched == 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n```\n","requirement":"Network-Time-Protocol","version":"1.0.0"},{"control":"2.1.2","framework":"cis-rhel7","is_default":true,"message":"## Description\n\n`Chrony` is a daemon which implements the Network Time Protocol (NTP). It is designed\nto synchronize system clocks across a variety of systems and use a source that is highly\naccurate. More information on `chrony` can be found at\n\u003chttps://chrony-project.org/\u003e.\n`Chrony` can be configured to be a client and/or a server.\nAdd or edit server or pool lines to `/etc/chrony.conf` as appropriate:\n\n```\nserver \u003cremote-server\u003e\n```\n\nMultiple servers may be configured.\n\n## Rationale\n\nIf `chrony` is in use on the system proper configuration is vital to ensuring time\nsynchronization is working properly.\n\n## Remediation\n\n### Shell script\n\nThe following script can be run on the host to remediate the issue.\n\n```\n#!/bin/bash\n\n# Remediation is applicable only in certain platforms\nif [ ! -f /.dockerenv ] \u0026\u0026 [ ! -f /run/.containerenv ] \u0026\u0026 { rpm --quiet -q chrony; }; then\n\nvar_multiple_time_servers=''0.rhel.pool.ntp.org,1.rhel.pool.ntp.org,2.rhel.pool.ntp.org,3.rhel.pool.ntp.org''\n\n\nconfig_file=\"/etc/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" \u003e\u003e \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\nfi\n\nelse\n    \u003e\u00262 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - CCE-83418-4\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.rhel.pool.ntp.org,1.rhel.pool.ntp.org,2.rhel.pool.ntp.org,3.rhel.pool.ntp.org\n  tags:\n    - always\n\n- name: Detect if chrony is already configured with pools or servers\n  find:\n    path: /etc\n    patterns: chrony.conf\n    contains: ^[\\s]*(?:server|pool)[\\s]+[\\w]+\n  register: chrony_servers\n  when:\n  - ansible_virtualization_type not in [\"docker\", \"lxc\", \"openvz\", \"podman\", \"container\"]\n  - ''\"chrony\" in ansible_facts.packages''\n  tags:\n  - CCE-83418-4\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Configure remote time servers\n  lineinfile:\n    path: /etc/chrony.conf\n    line: server {{ item }}\n    state: present\n    create: true\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ansible_virtualization_type not in [\"docker\", \"lxc\", \"openvz\", \"podman\", \"container\"]\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_servers.matched == 0\n  tags:\n  - CCE-83418-4\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n```\n","requirement":"Network-Time-Protocol","version":"3.1.1"},{"control":"2.3.2","framework":"cis-rhel8","is_default":true,"message":"## Description\n\n`Chrony` is a daemon which implements the Network Time Protocol (NTP). It is designed\nto synchronize system clocks across a variety of systems and use a source that is highly\naccurate. More information on `chrony` can be found at\n\u003chttps://chrony-project.org/\u003e.\n`Chrony` can be configured to be a client and/or a server.\nAdd or edit server or pool lines to `/etc/chrony.conf` as appropriate:\n\n```\nserver \u003cremote-server\u003e\n```\n\nAlternatively, server or pool directives can be specified in files included via\n`sourcedir` or `confdir` directives in `/etc/chrony.conf`.\nWhen using `sourcedir`, create `.sources` files in the specified directory:\n\n```\n# In /etc/chrony.conf:\nsourcedir /etc/chrony/sources.d\n\n# In /etc/chrony/sources.d/ntp.sources:\nserver 0.pool.ntp.org\n```\n\nWhen using `confdir`, create `.conf` files in the specified directory:\n\n```\n# In /etc/chrony.conf:\nconfdir /etc/chrony/conf.d\n\n# In /etc/chrony/conf.d/ntp-servers.conf:\npool 1.pool.ntp.org\n```\n\nMultiple servers may be configured.\n\n## Rationale\n\nIf `chrony` is in use on the system proper configuration is vital to ensuring time\nsynchronization is working properly.\n\n## Remediation\n\n### Shell script\n\nThe following script can be run on the host to remediate the issue.\n\n```\n#!/bin/bash\n\n# Remediation is applicable only in certain platforms\nif rpm --quiet -q kernel-core \u0026\u0026 { rpm --quiet -q chrony; }; then\n\nvar_multiple_time_servers=''0.rhel.pool.ntp.org,1.rhel.pool.ntp.org,2.rhel.pool.ntp.org,3.rhel.pool.ntp.org''\n\n\nconfig_file=\"/etc/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" \u003e\u003e \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\n  if [[ -s \"$config_file\" ]] \u0026\u0026 [[ -n \"$(tail -c 1 -- \"$config_file\" || true)\" ]]; then\n      LC_ALL=C sed -i --follow-symlinks ''$a''\\\\ \"$config_file\"\n  fi\nfi\n\nelse\n    \u003e\u00262 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - CCE-82873-1\n  - DISA-STIG-RHEL-08-030740\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.rhel.pool.ntp.org,1.rhel.pool.ntp.org,2.rhel.pool.ntp.org,3.rhel.pool.ntp.org\n  tags:\n    - always\n\n- name: Check if chrony main config has active server/pool entries\n  ansible.builtin.command:\n    cmd: grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' /etc/chrony.conf\n  register: chrony_conf_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in an