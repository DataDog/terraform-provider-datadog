(alert_condition.equals) == \"microsoft.network/networksecuritygroups/write\"\n\tnot alert_condition.contains_any\n\n\tlower(activity_log_alert.location) == \"global\"\n\n\tsome scope in activity_log_alert.scopes\n\tlower(split(scope, \"/\")[2]) == lower(activity_log_alert.subscription_id)\n\n\tactivity_log_alert.enabled\n}\n\neval(subscription) = \"pass\" if {\n\tvalid_log_alert[subscription.subscription_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_subscription","azure_activity_log_alert"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nTo improve the detection of suspicious activity and gain insights into network access changes, it is recommended to create an Activity Log Alert specifically for the \"Create or Update Network Security Group\" event. By monitoring these events, it becomes easier to detect and respond to any unauthorized modifications made to network security groups, leading to a quicker response time and enhanced security measures.\n\n## Remediation\n\n### From the console\n\n1. Navigate to the **Monitor** blade.\n2. Select **Alerts** \u003e **Create** \u003e **Alert rule**.\n3. Under **Filter by subscription**, choose a subscription.\n4. Under **Filter by resource type**, select **Network security groups**.\n5. Under **Filter by location**, select **All**.\n6. From the results, select the subscription, then click **Done**.\n7. Select the **Condition** tab.\n8. Under Signal name, click Delete **Create or Update Network Security Group (Microsoft.Network/networkSecurityGroups)**.\n9. Select the **Actions** tab.\n10. To use an existing action group, click **Select action groups**. To create a new action group, click **Create action group**. Fill out the appropriate details for the selection.\n11. Click the **Details** tab.\n12. Select a **Resource group**, then provide an **Alert rule name** and an optional **Alert rule description**.\n13. Click **Review + create**.\n14. Click **Create**.\n","tags":["scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:7.1.2.3","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:5.2.3","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:nist-800-53","framework:soc-2","control:AU-6","framework:fedramp-high","control:CC2.1","control:CC7.2","control:CC7.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:7.1.2.3","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:5.2.3","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:nist-800-53","framework:soc-2","control:AU-6","framework:fedramp-high","control:CC2.1","control:CC7.2","control:CC7.1"],"version":21,"id":"def-000-9q9","updatedAt":1757012415429,"blocking":false