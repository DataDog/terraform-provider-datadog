rue,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"30.1","framework":"gdpr","is_default":true,"message":"","requirement":"Records-of-Processing-Activities","version":"1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"2.5","framework":"cis-gcp","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"3.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfilter_methodname_constant := upper(\"protoPayload.methodName=\\\"SetIamPolicy\\\"\")\n\nfilter_servicedata_constant := upper(\"protoPayload.serviceData.policyDelta.auditConfigDeltas:*\")\n\nvalid_log_metric := {logging_log_metric.project_id |\n\tsome logging_log_metric in input.resources.gcp_logging_log_metric\n\tsome monitoring_alert_policy in input.resources.gcp_monitoring_alert_policy\n\tmetric_and_alert_align(logging_log_metric, monitoring_alert_policy)\n\tvalid_log_metric_filter(logging_log_metric)\n\tvalid_alert_policy_conditions(monitoring_alert_policy)\n}\n\nmetric_and_alert_align(logging_log_metric, monitoring_alert_policy) if {\n\tlogging_log_metric.project_id == monitoring_alert_policy.project_id\n\tfilter := monitoring_alert_policy.conditions[_].condition_threshold.filter\n\talert_policy_name := regex.replace(filter, \"^.*metric\\\\.type\\\\s*=\\\\s*\\\"logging\\\\.googleapis\\\\.com\\\\/user\\\\/(.*?)\\\".*$\", \"$1\")\n\tlogging_log_metric.name == alert_policy_name\n}\n\nvalid_log_metric_filter(logging_log_metric) if {\n\tfilter_parsed := upper(regex.replace(logging_log_metric.filter, \"\\\\s\", \"\"))\n\tcontains(filter_parsed, \"AND\")\n\tcontains(filter_parsed, filter_methodname_constant)\n\tcontains(filter_parsed, filter_servicedata_constant)\n}\n\nvalid_alert_policy_conditions(monitoring_alert_policy) if {\n\tmonitoring_alert_policy.enabled == true\n\tmonitoring_alert_policy.notification_channels[_]\n}\n\neval(project) = \"pass\" if {\n\tvalid_log_metric[project.project_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_project","gcp_monitoring_alert_policy","gcp_logging_log_metric"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nGoogle Cloud Platform (GCP) services write audit log entries to the Admin Activity and Data\nAccess logs to help answer the question of \"Who did what, where, and when?\" within GCP\nprojects.\nCloud audit logging records information such as the identity of the API caller, the time of\nthe API call, the source IP address of the API caller, the request parameters, and the\nresponse elements returned by GCP services. Cloud audit logging provides a history of GCP\nAPI calls for an account, including API calls made through the console, SDKs, command-line\ntools, and other GCP services.\n\n## Rationale\nCloud audit logging to Admin Activity and Data Access logs enables security\nanalysis, resource change tracking, and compliance auditing.\nConfiguring the metric filter and alerts for audit configuration changes ensures that the\nrecommended state of audit configuration is maintained so that all activities in the project\ncan be audited at any point in time.\n\n\n### Impact\nEnabling logging may result in your project being charged for the additional logs usage.\n\n## Remediation\n\n### From the console\n#### Create the prescribed log metric\n1. Go to Logging/Logs-based Metrics by visiting [https://console.cloud.google.com/logs/metrics][1] and click **CREATE METRIC**.\n2. Click the down arrow symbol on the Filter Bar at the rightmost corner and\nselect **Convert to Advanced Filter**.\n3. Clear any text and add:\n   ```\n   protoPayload.methodName=\"SetIamPolicy\" AND\n   protoPayload.serviceData.policyDelta.auditConfigDeltas:*\n   ```\n4. Click **Submit Filter**. Display logs appear based on the filter text entered by the\nuser.\n5. In the **Metric Editor** menu on the right, fill out the name field. Set **Units** to 1\n(default) and **Type** to **Counter**. This will ensure that the log metric counts the\nnumber of log entries matching the user''s advanced logs query.\n6. Click **Create Metric**.\n\n\n#### Create a prescribed alert policy\n\n1. Go to [https://console.cloud.google.com/logs/metrics][1].  Under the **User-defined Metrics** section, identify the newly created metric.\n2. Click the kebab icon in the rightmost column for the new metric and select **Create alert from Metric**.\n3. Fill out the alert policy configuration and click **Save**. Choose the alerting threshold and configuration that makes sense for the organization. For example, a threshold of zero(0) for the most recent value will ensure that a notification is triggered for every owner change in the project:\n```\n   Set `Aggregator` to `Count`\n   Set `Configuration`:\n   - Condition: above\n   - Threshold: 0\n   - For: most recent value\n```\n4. Configure the desired notifications channels in the section **Notifications**.\n5. Name the policy and click **Save**.\n\n### From the command line\n\n#### Create a prescribed log metric\n\nUse the command: `gcloud beta logging metrics create`\nReference for command usage:\n[https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create][3]\n\n#### Create a prescribed alert policy\nUse the command: `gcloud alpha monitoring policies create`\nReference for command usage:\n[https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create][4]\n\n## References\n1. [https://cloud.google.com/logging/docs/logs-based-metrics/][5]\n2. [https://cloud.google.com/monitoring/custom-metrics/][6]\n3. [https://cloud.google.com/monitoring/alerts/][7]\n4. [https://cloud.google.com/logging/docs/reference/tools/gcloud-logging][8]\n5. [https://cloud.google.com/logging/docs/audit/configure-data-access#getiampolicy-setiampolicy][9]\n\n[1]: https://console.cloud.google.com/logs/metrics\n[2]: https://console.cloud.google.com/logs/metrics\n[3]: https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create\n[4]: https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create\n[5]: https://cloud.google.com/logging/docs/logs-based-metrics/\n[6]: https://cloud.google.com/monitoring/custom-metrics/\n[7]: https://cloud.google.com/monitoring/alerts/\n[8]: https://cloud.google.com/logging/docs/reference/tools/gcloud-logging\n[9]: https://cloud.google.com/logging/docs/audit/configure-data-access#getiampolicy-setiampolicy\n","tags":["scored:true","cloud_provider:gcp","control:3.4.1","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","framework:cis-gcp","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","requirement:Audit-Controls","control:PR.AA-01","framework:hipaa","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Configuration-Management","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:Logging-and-Monitoring","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","requirement:Records-of-Processing-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","control:3.4.2","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:A.8.15","control:RS.AN-03","control:3.3.1