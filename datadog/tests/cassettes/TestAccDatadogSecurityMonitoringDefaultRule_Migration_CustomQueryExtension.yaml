n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ninvalid_vpc_config(cluster) if {\n\tcluster.api_server_access_profile.enable_private_cluster == false\n\tsome cidr in cluster.api_server_access_profile.authorized_ip_ranges\n\tcidr == \"0.0.0.0/0\"\n} else if {\n\tcluster.api_server_access_profile.enable_private_cluster == false\n\tnot cluster.api_server_access_profile.authorized_ip_ranges\n}\n\neval(aks_cluster) = \"fail\" if {\n\tinvalid_vpc_config(aks_cluster)\n} else = \"pass\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_aks_cluster"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\nWhen public access is enabled in an AKS cluster, it should be limited to a specific set of CIDRs. For security, public access should be limited to only the bare minimum set of IPs.\n\n## Remediation\n\n1. To limit public access, see the Azure AKS documentation on [Modifying cluster endpoint access](https://learn.microsoft.com/en-us/azure/aks/api-server-authorized-ip-ranges).","tags":["scored:true","security:compliance","requirement:Azure","cloud_provider:azure","source:azure.kubernetes","framework:dcsb-m-1","framework_requirement:dcsb-m-1/Azure","control:2.4","requirement:Cluster-Networking","control:5.4.1","control:2.9","scope:azure.kubernetes","framework:cis-aks","framework:essential-cloud-security-controls","framework_requirement_control:dcsb-m-1/Azure/2.4"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","requirement:Azure","requirement:Cluster-Networking","cloud_provider:azure","control:5.4.1","control:2.9","scope:azure.kubernetes","source:azure.kubernetes","framework:cis-aks","framework:essential-cloud-security-controls"],"ver