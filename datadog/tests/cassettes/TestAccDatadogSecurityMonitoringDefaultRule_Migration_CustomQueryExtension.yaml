me: Create confdir directory if needed\n  ansible.builtin.file:\n    path: ''{{ chrony_confdir_paths.stdout_lines[0] }}''\n    state: directory\n    mode: ''0755''\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  - chrony_confdir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_confdir_has_servers.rc != 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Add remote time servers to confdir .conf file\n  ansible.builtin.lineinfile:\n    path: ''{{ chrony_confdir_paths.stdout_lines[0] }}/ntp-servers.conf''\n    line: server {{ item }}\n    state: present\n    create: true\n    mode: ''0644''\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  - chrony_confdir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_confdir_has_servers.rc != 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Add remote time servers to main chrony configuration\n  ansible.builtin.lineinfile:\n    path: /etc/chrony.conf\n    line: server {{ item }}\n    state: present\n    create: true\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"kernel\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  - (chrony_confdir_paths.stdout_lines | default([]) | length == 0 or chrony_confdir_has_servers.rc\n    != 0)\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n```\n","requirement":"Network-Time-Protocol","version":"1.0.0"}]}},"cases":[{"name":"Failed","status":"medium","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\n\n`Chrony` is a daemon which implements the Network Time Protocol (NTP). It is designed\nto synchronize system clocks across a variety of systems and use a source that is highly\naccurate. More information on `chrony` can be found at\n\u003chttps://chrony-project.org/\u003e.\n`Chrony` can be configured to be a client and/or a server.\nAdd or edit server or pool lines to `/etc/chrony/chrony.conf` as appropriate:\n\n```\nserver \u003cremote-server\u003e\n```\n\nMultiple servers may be configured.\n\n## Rationale\n\nIf `chrony` is in use on the system proper configuration is vital to ensuring time\nsynchronization is working properly.\n\n## Remediation\n\n### Shell script\n\nThe following script can be run on the host to remediate the issue.\n\n```\n#!/bin/bash\n\n# Remediation is applicable only in certain platforms\nif dpkg-query --show --showformat=''${db:Status-Status}'' ''linux-base'' 2\u003e/dev/null | grep -q ''^installed$'' \u0026\u0026 { dpkg-query --show --showformat=''${db:Status-Status}'' ''chrony'' 2\u003e/dev/null | grep -q ''^installed$''; }; then\n\nvar_multiple_time_servers=''0.pool.ntp.org,1.pool.ntp.org,2.pool.ntp.org,3.pool.ntp.org''\n\n\nconfig_file=\"/etc/chrony/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" \u003e\u003e \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\n  if [[ -s \"$config_file\" ]] \u0026\u0026 [[ -n \"$(tail -c 1 -- \"$config_file\" || true)\" ]]; then\n      LC_ALL=C sed -i --follow-symlinks ''$a''\\\\ \"$config_file\"\n  fi\nfi\n\nelse\n    \u003e\u00262 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.pool.ntp.org,1.pool.ntp.org,2.pool.ntp.org,3.pool.ntp.org\n  tags:\n    - always\n\n- name: Detect if chrony is already configured with pools or servers\n  find:\n    path: /etc\n    patterns: chrony.conf\n    contains: ^[\\s]*(?:server|pool)[\\s]+[\\w]+\n  register: chrony_servers\n  when:\n  - ''\"linux-base\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Configure remote time servers\n  lineinfile:\n    path: /etc/chrony/chrony.conf\n    line: server {{ item }}\n    state: present\n    create: true\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"linux-base\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_servers.matched == 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n```\n","tags":["scored:true","framework:cis-rhel9","security:compliance","framework:cis-amzn2","framework:cis-rhel10","requirement:Network-Time-Protocol","control:2.2.1.3","control:2.3.2","control:2.1.2","framework:cis-almalinux9","source:host-benchmarks","framework:cis-al2023","source:compliance-agent","framework:cis-rhel8","framework:cis-rhel7","framework:cis-ubuntu2004"],"hasExtendedTitle":true,"type":"infrastructure_configuration","filters":[],"defaultTags":["scored:true","framework:cis-rhel9","security:compliance","framework:cis-amzn2","framework:cis-rhel10","requirement:Network-Time-Protocol","control:2.2.1.3","control:2.3.2","control:2.1.2","framework:cis-almalinux9","source:host-benchmarks","framework:cis-al2023","source:compliance-agent","framework:cis-rhel8","framework:cis-rhel7","framework:cis-ubuntu2004"],"version":34,"id":"1k0-cqy-vvj","updatedAt":1777594169290,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A user received an anomalous number of AccessDenied errors","createdAt":1688542798887,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"9el-i95-dnl","queries"