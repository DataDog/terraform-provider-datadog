ote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Extract confdir paths from chrony configuration\n  ansible.builtin.shell:\n    cmd: grep ''^[[:space:]]*confdir[[:space:]]\\+'' /etc/chrony.conf | awk ''{print $2}''\n  register: chrony_confdir_paths\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  tags:\n  - CCE-82873-1\n  - DISA-STIG-RHEL-08-030740\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Check for server/pool entries in confdir .conf files\n  ansible.builtin.shell:\n    cmd: |\n      for dir in {{ chrony_confdir_paths.stdout_lines | join('' '') }}; do\n        if [ -d \"$dir\" ]; then\n          grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$dir\"/*.conf 2\u003e/dev/null \u0026\u0026 exit 0\n        fi\n      done\n      exit 1\n  register: chrony_confdir_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_confdir_paths.stdout_lines | default([]) | length \u003e 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  tags:\n  - CCE-82873-1\n  - DISA-STIG-RHEL-08-030740\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Create sourcedir directory if needed\n  ansible.builtin.file:\n    path: ''{{ chrony_sourcedir_paths.stdout_lines[0] }}''\n    state: directory\n    mode: ''0755''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_sourcedir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_sourcedir_has_servers.rc != 0\n  tags:\n  - CCE-82873-1\n  - DISA-STIG-RHEL-08-030740\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Add remote time servers to sourcedir .sources file\n  ansible.builtin.lineinfile:\n    path: ''{{ chrony_sourcedir_paths.stdout_lines[0] }}/ntp-servers.sources''\n    line: server {{ item }}\n    state: present\n    create: true\n    mode: ''0644''\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_sourcedir_paths.stdout_lines | default([]) | length \u003e 0\n  - chrony_sourcedir_has_servers.rc != 0\n  tags:\n  - CCE-82873-1\n  - DISA-STIG-RHEL-08-030740\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Create confdir directory if needed\n  ansible.builtin.file:\n    path: ''{{ chrony_confdir_paths.stdout_lines[0] }}''\n    state: directory\n    mode: ''0755''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony