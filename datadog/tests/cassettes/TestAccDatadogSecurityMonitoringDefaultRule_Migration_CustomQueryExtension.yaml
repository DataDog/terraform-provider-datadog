etc/chrony/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" \u003e\u003e \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\n  if [[ -s \"$config_file\" ]] \u0026\u0026 [[ -n \"$(tail -c 1 -- \"$config_file\" || true)\" ]]; then\n      LC_ALL=C sed -i --follow-symlinks ''$a''\\\\ \"$config_file\"\n  fi\nfi\n\nelse\n    \u003e\u00262 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.pool.ntp.org,1.pool.ntp.org,2.pool.ntp.org,3.pool.ntp.org\n  tags:\n    - always\n\n- name: Detect if chrony is already configured with pools or servers\n  find:\n    path: /etc\n    patterns: chrony.conf\n    contains: ^[\\s]*(?:server|pool)[\\s]+[\\w]+\n  register: chrony_servers\n  when:\n  - ''\"linux-base\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Configure remote time servers\n  lineinfile:\n    path: /etc/chrony/chrony.conf\n    line: server {{ item }}\n    state: present\n    create: true\n  loop: ''{{ var_multiple_time_servers.split(\",\") }}''\n  when:\n  - ''\"linux-base\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_servers.matched == 0\n  tags:\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n```\n","tags":["scored:true","framework:cis-rhel9","security:compliance","framework:cis-amzn2","framework:cis-rhel10","requirement:Network-Time-Protocol","control:2.2.1.3","control:2.3.2","control:2.1.2","framework:cis-almalinux9","source:host-benchmarks","framework:cis-al2023","source:compliance-agent","framework:cis-rhel8","framework:cis-rhel7","framework:cis-ubuntu2004"],"hasExtendedTitle":true,"type":"infrastructure_configuration","filters":[],"defaultTags":["scored:true","framework:cis-rhel9","security:compliance","framework:cis-amzn2","framework:cis-rhel10","requirement:Network-Time-Protocol","control:2.2.1.3","control:2.3.2","control:2.1.2","framework:cis-almalinux9","source:host-benchmarks","framework:cis-al2023","source:compliance-agent","framework:cis-rhel8","framework:cis-rhel7","framework:cis-ubuntu2004"],"version":34,"id":"1k0-cqy-vvj","updatedAt":1777594169290,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A user received an anomalous number of AccessDenied errors","createdAt":1688542798887,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"9el-i95-dnl","queries":[{"query":"source:cloudtrail @error.kind:AccessDenied -@userIdentity.arn:*DatadogIntegrationRole*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":["@evt.name"],"aggregation":"cardinality","name":"unique_events_denied","dataSource":"logs","customQueryExtension":"env:test-acceptance"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":1800,"keepAlive":1800,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30},"decreaseCriticalityBasedOnEnv":false},"cases":[{"name":"","status":"medium","notifications":[],"condition":"unique_events_denied \u003e 0.995"}],"message":"## Goal\n\nDetect when a user is assessing privileges in AWS through API bruteforcing technique.\n\n## Strategy\n\nThis rule lets you monitor CloudTrail to detect when the error message of `AccessDenied` is returned on an anomalous number of unique API calls.\n\n## Triage and response\n\n1. Determine if `{{@userIdentity.arn}}` should be attempting to use the identified API calls: `{{@evt.name}}`.\n   - Use the Cloud SIEM - User Investigation dashboard to assess user activity.\n2. Contact the user to see if they intended to make these API calls.\n3. If the user did not make the API calls:\n   - Rotate the credentials.\n   - Investigate to see what API calls might have been made that were successful throughout the rest of the environment.\n\n## Changelog\n\n- 17 March 2025 - Updated rule query to exclude `DatadogIntegrationRole`.\n","tags":["scope:amazon","iaas:aws","source:cloudtrail","technique:T1069-permission-groups-discovery","mitre_platform:iaas","tactic:TA0007-discovery","mitre_platform:cloud","security:attack"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:amazon","iaas:aws","source:cloudtrail","technique:T1069-permission-groups-discovery","tactic:TA0007-discovery","mitre_pla