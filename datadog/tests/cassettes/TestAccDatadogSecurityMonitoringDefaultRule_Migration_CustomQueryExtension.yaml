Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"2.9","framework":"cis-gcp","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"3.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfilter_resource_type := upper(\"resource.type=\\\"gce_network\\\"\")\n\nfilter_method_name_1 := upper(\"protoPayload.methodName:\\\"compute.networks.insert\\\"\")\n\nfilter_method_name_2 := upper(\"protoPayload.methodName:\\\"compute.networks.patch\\\"\")\n\nfilter_method_name_3 := upper(\"protoPayload.methodName:\\\"compute.networks.delete\\\"\")\n\nfilter_method_name_4 := upper(\"protoPayload.methodName:\\\"compute.networks.removePeering\\\"\")\n\nfilter_method_name_5 := upper(\"protoPayload.methodName:\\\"compute.networks.addPeering\\\"\")\n\nvalid_log_metric := {logging_log_metric.project_id |\n\tsome logging_log_metric in input.resources.gcp_logging_log_metric\n\tsome monitoring_alert_policy in input.resources.gcp_monitoring_alert_policy\n\tmetric_and_alert_align(logging_log_metric, monitoring_alert_policy)\n\tvalid_log_metric_filter(logging_log_metric)\n\tvalid_alert_policy_conditions(monitoring_alert_policy)\n}\n\nmetric_and_alert_align(logging_log_metric, monitoring_alert_policy) if {\n\tlogging_log_metric.project_id == monitoring_alert_policy.project_id\n\tfilter := monitoring_alert_policy.conditions[_].condition_threshold.filter\n\talert_policy_name := regex.replace(filter, \"^.*metric\\\\.type\\\\s*=\\\\s*\\\"logging\\\\.googleapis\\\\.com\\\\/user\\\\/(.*?)\\\".*$\", \"$1\")\n\tlogging_log_metric.name == alert_policy_name\n}\n\nvalid_log_metric_filter(logging_log_metric) if {\n\tfilter_parsed := upper(regex.replace(logging_log_metric.filter, \"\\\\s\", \"\"))\n\tcontains(filter_parsed, \"AND\")\n\tcontains(filter_parsed, \"OR\")\n\tcontains(filter_parsed, filter_resource_type)\n\tcontains(filter_parsed, filter_method_name_1)\n\tcontains(filter_parsed, filter_method_name_2)\n\tcontains(filter_parsed, filter_method_name_3)\n\tcontains(filter_parsed, filter_method_name_4)\n\tcontains(filter_parsed, filter_method_name_5)\n}\n\nvalid_alert_policy_conditions(monitoring_alert_policy) if {\n\tmonitoring_alert_policy.enabled == true\n\tmonitoring_alert_policy.notification_channels[_]\n}\n\neval(project) = \"pass\" if {\n\tvalid_log_metric[project.project_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_project","gcp_monitoring_alert_policy","gcp_logging_log_metric"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a \u003e 0"}],"message":"## Description\nIt is recommended that a metric filter and alarm be set up for Virtual Private Cloud (VPC) network changes.\n\n## Rationale\nIt is possible to have more than one VPC within a project. \nIn addition, it is also possible to create a peer connection between two VPCs to enable network traffic routing between VPCs.\n\nMonitoring changes to a VPC helps to ensure that VPC traffic flow is not getting impacted.\n\n### Impact\nEnabling logging may result in your project being charged for the additional logs usage.\n\n## Remediation\n\n### From the console\n\n#### Create the prescribed log metric\n1. Go to Logging/Logs-based Metrics by visiting [https://console.cloud.google.com/logs/metrics][1] and click **CREATE METRIC**.\n2. Click the down arrow symbol on the **Filter Bar** at the rightmost corner and select **Convert to Advanced Filter**.\n3. Clear any text and add: \n```\n   resource.type=\"gce_network\"\n   AND (protoPayload.methodName:\"compute.networks.insert\"\n   OR protoPayload.methodName:\"compute.networks.patch\"\n   OR protoPayload.methodName:\"compute.networks.delete\"\n   OR protoPayload.methodName:\"compute.networks.removePeering\"\n   OR protoPayload.methodName:\"compute.networks.addPeering\")\n   ```\n4. Click **Submit Filter**. Display logs appear based on the filter text entered by the\nuser.\n5. In the **Metric Editor** menu on the right, fill out the name field. Set **Units** to **1**\n(default) and Type to Counter. This ensures that the log metric counts the number\nof log entries matching the advanced logs query.\n6. Click **Create Metric**.\n\n#### Create the prescribed alert policy\n1. Go to [https://console.cloud.google.com/logs/metrics][1].  Under the **User-defined Metrics** section, identify the newly created metric.\n2. Click the kebab icon in the rightmost column for the new metric and select **Create alert from Metric**.\n3. Fill out the alert policy configuration and click **Save**. Choose the alerting threshold and configuration that makes sense for the user''s organization. For example, a threshold of zero(0) for the most recent value ensures that a notification is triggered for every owner change in the project:\n\n```\n   Set `Aggregator` to `Count`\n   Set `Configuration`:\n   - Condition: above\n   - Threshold: 0\n   - For: most recent value\n   ```\n4. Configure the desired notifications channels in the section **Notifications**.\n5. Name the policy and click **Save**.\n\n### From the command line\n\n1. Create the prescribed log metric using the following command: \n   ```\n   gcloud logging metrics create\n   ```\n   [Reference for command usage][6]\n2. Create the prescribed alert policy using the following command:\n   ```\n   gcloud alpha monitoring policies create\n   ```\n   [Reference for command usage][7]\n\n\n\n## References\n1. [https://console.cloud.google.com/logs/metrics][1] \n2. [https://cloud.google.com/monitoring/custom-metrics/][2]\n3. [https://cloud.google.com/monitoring/alerts/][3]\n4. [https://cloud.google.com/logging/docs/reference/tools/gcloud-logging][4]\n5. [https://cloud.google.com/vpc/docs/overview][5]\n6. [https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create][6]\n7. [https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create][7]\n\n\n[1]: https://cloud.google.com/logging/docs/logs-based-metrics/\n[2]: https://cloud.google.com/monitoring/custom-metrics/\n[3]: https://cloud.google.com/monitoring/alerts/\n[4]: https://cloud.google.com/logging/docs/reference/tools/gcloud-logging\n[5]: https://cloud.google.com/vpc/docs/overview\n[6]: https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create\n[7]: https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create\n","tags":["scored:true","cloud_provider:gcp","control:3.4.1","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","framework:cis-gcp","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","requirement:Audit-Controls","control:PR.AA-01","framework:hipaa","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Configuration-Management","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:Logging-and-Monitoring","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","requirement:Records-of-Processing-Activities","control:DE.CM-3","framework:nist-800-53","con