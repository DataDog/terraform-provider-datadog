rement":"Logical-and-Physical-Access-Control","version":"2"},{"control":"3.9","framework":"cis-azure","is_default":true,"message":"","requirement":"Storage-Accounts","version":"2.0.0"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.26","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(storage_account) = \"pass\" if {\n\tcontains(storage_account.network_acls.bypass, \"AzureServices\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_storage_account"]}}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nEnabling firewall rules for a storage account restricts incoming data requests, including those from other Azure services, such as using the portal or writing logs. However, by enabling Trusted Microsoft Services through exceptions, you can regain access to services like Monitor, Networking, Hubs, and Event Grid. Additionally, this exception allows for backing up and restoring virtual machines using unmanaged disks in storage accounts with network rules applied. To ensure smooth operation of these services, it is recommended to enable the exception for Trusted Microsoft Services.\n\n## Remediation\n\n### From the console\n\n1. Go to **Storage Accounts**\n2. For each storage account, click on the **settings** menu called **Firewalls and Virtual Networks**.\n3. Ensure that **Allow access from selected networks** is `enabled`.\n4. Enable **Allow trusted Microsoft services to access this storage account**.\n5. Click **Save** to apply your changes.\n","tags":["scored:true","control:CC6.7","control:CC6.6","cloud_provider:azure","control:13.1.d","requirement:Compliance","requirement:Storage-Accounts","control:AU-10","level:2","requirement:Network-Security-Management","control:3.9","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Access-Control","scope:azure.storage","framework_requirement_control:dcsb-m-1/Azure/2.26","security:compliance","requirement:Azure","control:AC-4","framework:dora","control:2.26","framework:cis-azure","framework:dcsb-m-1","requirement:Communications-Security","framework_requirement:dcsb-m-1/Azure","control:11.2.a","requirement:Data-and-System-Security","framework:nist-800-53","source:azure.storage","control:A.13.1.3","control:A.13.1.1","control:A.18.1.3","framework:soc-2","control:A.9.1.2","framework:fedramp-high","requirement:Logical-and-Physical-Access-Control","control:CC6.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:CC6.7","control:CC6.6","cloud_provider:azure","control:13.1.d","requirement:Compliance","requirement:Storage-Accounts","control:AU-10","level:2","requirement:Network-Security-Management","control:3.9","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Access-Control","scope:azure.storage","security:compliance","control:AC-4","framework:dora","framework:cis-azure","requirement:Communications-Security","control:11.2.a","requirement:Data-and-System-Security","framework:nist-800-53","source:azure.storage","control:A.13.1.3","control:A.13.1.1","control:A.18.1.3","framework:soc-2","control:A.9.1.2","framework:fedramp-high","requirement:Logical-and-Physical-Access-Control","control:CC6.1"],"version":29,"id":"mpx-tee-gng","updatedAt":1756326153805,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"''Unattached disks'' should be encrypted with Customer Managed Key (CMK)","createdAt":1695661832140,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-o8q","queries":[{"query":"resource_type:azure_managed_disk","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"azure_managed_disk","complianceFrameworks":[{"control":"3.3.3","framework":"pci-dss","is_default":true,"message":"","requirement":"Protect-Stored-Account-Data","version":"4.0"},{"control":"3.13.8","framework":"nist-800-171","is_default":true,"message":"","requirement":"System-and-Communications-Protection","version":"2"},{"control":"SC-8","framework":"nist-800-53","is_default":true,"message":"","requirement":"System-and-Communications-Protection","version":"5"},{"control":"A.18.1.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Compliance","version":"2"},{"control":"A.8.24","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"SC-8","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Communications-Protection","version":"5"},{"control":"CC6.1","framework":"soc-2","is_default":true,"message":"","requirement":"Logical-and-Physical-Access-Control","version":"2"},{"control":"7.4","framework":"cis-azure","is_default":true,"message":"","requirement":"Virtual-Machines","version":"2.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(managed_disk) = \"skip\" if {\n\tlower(managed_disk.disk_state) != \"unattached\"\n} else = \"pass\" if {\n\tlower(managed_disk.encryption.type) == \"encryptionatrestwithcustomerkey\"\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_managed_disk"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nTo enhance security and meet regulatory requirements, it is essential to ensure that unattached disks in a subscription are encrypted using a Customer Managed Key (CMK). By default, managed disks are encrypted with a Platform Managed Key (PMK), but utilizing CMK can provide an additional level of security.\n\nEncrypting unattached managed disks ensures that the entire content can only be accessed with the corresponding key, safeguarding the volume from unauthorized reads. It is crucial to consider the risk of compromised user accounts with administrative access to the VM service, as they can potentially mount or attach these data disks. By encrypting the disks with CMK, the risk of sensitive information disclosure and tampering is mitigated, providing a higher level of security.\n\n## Remediation\n\nIf data stored in the disk is no longer useful, refer to Azure documentation to delete unattached data disks at:\n\n[https://docs.microsoft.com/en-us/rest/api/compute/disks/delete][1]\n\n[https://docs.microsoft.com/en-us/cli/azure/disk?view=azure-cli-latest#az-disk-delete][2]\n\nIf data stored in the disk is important, To encrypt the disk refer azure documentation at:\n\n[https://docs.microsoft.com/en-us/azure/virtual-machines/disks-enable-customer-managed-keys-portal][3]\n\n[https://docs.microsoft.com/en-us/rest/api/compute/disks/update#encryptionsettings][4]\n\n[1]: https://docs.microsoft.com/en-us/rest/api/compute/disks/delete\n[2]: https://docs.microsoft.com/en-us/cli/azure/disk?view=azure-cli-latest#az-disk-delete\n[3]: https://docs.microsoft.com/en-us/azure/virtual-machines/disks-enable-customer-managed-keys-portal\n[4]: https://docs.microsoft.com/en-us/rest/api/compute/disks/update#encryptionsettings","tags":["scored:true","requirement:Virtual-Machines","cloud_provider:azure","requirement:Compliance","scope:azure.compute","control:SC-8","framework:nist-800-171","level:2","control:7.4","framework:iso-27001","requirement:Technological-Controls","requirement:System-and-Communications-Protection","security:compliance","control:A.8.24","framework:cis-azure","framework:pci-dss","framework:nist-800-53","control:A.18.1.3","framework:soc-2","requirement:Protect-Stored-Account-Data","control:3.3.3","framework:fedramp-high","requirement:Logical-and-Physical-Access-Control","source:azure.compute","control:3.13.8","control:CC6.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","requirement:Virtual-Machines","cloud_provider:azure","requirement:Compliance","scope:azure.compute","control:SC-8","framework:nist-800-171","level:2","control:7.4","framework:iso-27001","requirement:Technological-Controls","requirement:System-and-Communications-Protection","security:compliance","control:A.8.24","framework:cis-azure","framework:pci-dss","framework:nist-800-53","control:A.18.1.3","framework:soc-2","requirement:Protect-Stored-Account-Data","control:3.3.3","framework:fedramp-high","requirement:Logical-and-Physical-Access-Control","source:azure.compute","control:3.13.8","control:CC6.1"],"version":14,"id":"def-000-o8q","updatedAt":1756325789107,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"''root'' account access should be monitored","createdAt":1684346201368,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-l0x","queries":[{"query":"resource_type:aws_iam_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_account","complianceFrameworks":[{"control":"12.2.a","framework":"dora","is_default":true,"message":"","requirement":"Logging","version":"c-2024-1532"},{"control":"3.12.3","framework":"nist-800-171","is_default":true,"message":"","requirement":"Security-Assessment","version":"2"},{"control":"3.14.6","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"AU-6","framework":"nist-800-53","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"nist-800-53","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"nist-800-53","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"DE.CM-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-06","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.AE-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"DE.AE-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"ID.RA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-05","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"PR.PS-04","framework":"nist-csf","is_default":true,"message":"","requirement":"Platform-Security","version":"2.0"},{"control":"PR.AA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Identity-Management-Authentication-and-Access-Control","version":"2.0"},{"control":"RS.AN-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Incident-Analysis","version":"2.0"},{"control":"GV.SC-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Cybersecurity-Supply-Chain-Risk-Management","version":"2.0"},{"control":"DE.CM-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-6","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.AE-2","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"DE.AE-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"ID.RA-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"4.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"5.0.0"},{"control":"4.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"4.0.0"},{"control":"4.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"3.0.0"},{"control":"4.3","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"1.5.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nUSR_IDENTITY := lower(\"$.userIdentity.type=Root\")\n\nIDENTITY_INVOKE := lower(\"$.userIdentity.invokedByNOTEXISTS\")\n\nAWS_SERVICE := lower(\"$.eventType!=AwsServiceEvent\")\n\naccount_to_trail := {cloudtrail_trail.account_id |\n\tsome cloudtrail_trail in input.resources.aws_cloudtrail_trail\n\tcloudtrail_trail.is_multi_region_trail\n\tcloudtrail_trail.trail_status.is_logging\n\tvalidate_event_selectors(cloudtrail_trail)\n\ttrail_log_group := regex.replace(cloudtrail_trail.cloud_watch_logs_log_group_arn, \"^.+:log-group:(.+):.+$\", \"$1\")\n\ttrail_log_group in trail_to_metric_filter\n}\n\nvalidate_event_selectors(cloudtrail_trail) if {\n\tsome trail in cloudtrail_trail.event_selectors\n\ttrail.include_management_events\n\tlower(trail.read_write_type) == \"all\"\n} else if {\n\tnot cloudtrail_trail.event_selectors\n}\n\ntrail_to_metric_filter := {metric_filter.log_group_name |\n\tsome metric_filter in input.resources.aws_metric_filter\n\tvalid_metric_filter(metric_filter)\n\tsome transformation in metric_filter.metric_transformations\n\ttransformation.metric_name in metric_filter_to_alarm\n}\n\nvalid_metric_filter(metric_filter) if {\n\tfilter_parsed := lower(regex.replace(metric_filter.filter_pattern, \"\\\\s|\\\"\", \"\"))\n\tcontains(filter_parsed, \"&&\")\n\tcontains(filter_parsed, USR_IDENTITY)\n\tcontains(filter_parsed, IDENTITY_INVOKE)\n\tcontains(filter_parsed, AWS_SERVICE)\n}\n\nmetric_filter_to_alarm := {cloudwatch_alarm.metric_name |\n\tsome cloudwatch_alarm in input.resources.aws_cloudwatch_metric_alarm\n\tsome action in cloudwatch_alarm.alarm_actions\n\taction in alarm_to_sns_topic\n}\n\nalarm_to_sns_topic := {sns_topic.topic_arn |\n\tsome sns_topic in input.resources.aws_sns_topic\n\tsns_topic.subscriptions_confirmed > 0\n}\n\neval(iam_account) = \"pass\" if {\n\taccount_to_trail[iam_account.account_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_iam_account","aws_cloudtrail_trail","aws_cloudwatch_metric_alarm","aws_metric_filter","aws_sns_topic"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nReal-time monitoring of API calls can be achieved by directing CloudTrail logs to CloudWatch logs and establishing corresponding metric filters and alarms. It is recommended to set up a metric filter and alarm for root login attempts to provide visibility into the use of the fully privileged root account and to reduce its usage.\n\n## Remediation\n\nFor instructions on setting up CloudWatch metric filters and alarms for root login attempts, refer to the [AWS CloudWatch Alarms for CloudTrail User Guide][1].\n\n```plaintext\naws logs put-metric-filter --log-group-name <cloudtrail_log_group_name> \\\n--filter-name <root_usage_metric> --metric-transformations \\\nmetricName=<root_usage_metric>,metricNamespace=''CISBenchmark'',metricValue=1 \\\n--filter-pattern ''{ $.userIdentity.type = \"Root\" && $.userIdentity.invokedBy NOT EXISTS && \\\n$.eventType != \"AwsServiceEvent\" }''\n```\n\nYou can choose your own `metricName` and `metricNamespace` strings. Use the same `metricNamespace` for all Foundations Benchmark metrics to group them together.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudwatch-alarms-for-cloudtrail.html","tags":["scored:true","control:3.12.3","requirement:Monitoring","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","scope:aws_logging_log_metric","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:RS.AN-03","requirement:Supply-Chain-Risk-Management","control:DE.CM-1","control:SI-5","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Security-Assessment","requirement:Incident-Analysis","cloud_provider:aws","requirement:Systems-and-Information-Integrity","control:4.3","control:RS.AN-1","control:A.8.3","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:3.14.6","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:aws_logging_log_metric"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:3.12.3","requirement:Monitoring","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","scope:aws_logging_log_metric","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:RS.AN-03","requirement:Supply-Chain-Risk-Management","control:DE.CM-1","control:SI-5","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Security-Assessment","requirement:Incident-Analysis","cloud_provider:aws","requirement:Systems-and-Information-Integrity","control:4.3","control:RS.AN-1","control:A.8.3","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:3.14.6","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:aws_logging_log_metric"],"version":32,"id":"qte-h2v-llb","updatedAt":1756340614645,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"/usr/bin/containerd should be audited if applicable","createdAt":1693413215942,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"3r2-3jv-hy5","queries":[{"query":"source:compliance-agent @agent_rule_id:\"cis-docker-1.2.0-1.2.11\"","groupByFields":["@resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":""}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":7200,"complianceRuleOptions":{"resourceType":"docker_daemon","complianceFrameworks":[{"control":"1.2.11","framework":"cis-docker","is_default":true,"message":"","requirement":"Linux-Hosts-Specific-Configuration","version":"1.2.0"}]}},"cases":[{"name":"Failed","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nAudit `/usr/bin/containerd`, if applicable.\n\n## Rationale\n\nAs well as auditing the Linux file system and system calls, you should also audit all Docker-related files and directories. The Docker daemon runs with root privileges and its behavior depends on some key files and directories, including `/usr/bin/containerd`, so it should be audited.\n\n## Audit\n\nVerify that there is an audit rule corresponding to the `/usr/bin/containerd` file. To display the rule for the `/usr/bin/containerd` file, run:\n\n```bash\nauditctl -l | grep /usr/bin/containerd\n```\n\n## Remediation\n\nYou should add a rule for the `/usr/bin/containerd` file. For example, add the following line to a new file in `/etc/audit/rules.d/`. For instance, create a file named `docker.rules`:\n\n```bash\necho \"-w /usr/bin/containerd -k docker\" > /etc/audit/rules.d/docker.rules\n```\n\nThen, reload the audit rules:\n\n```bash\naugenrules --load\n```\n\nNext, restart the audit daemon using the following command:\n\n```bash\nservice auditd restart\n```\n\n## Impact\n\nAuditing can generate large log files. You should ensure that these are rotated and archived periodically. A separate partition should also be created for audit logs to avoid filling up any other critical partition.\n\n## Default value\n\nBy default, Docker-related files and directories are not audited. The file `/usr/bin/containerd` may not be present on the system and in that case, this recommendation is not applicable.\n\n## References\n\n1. [https://access.redhat.com/documentation/en-US/Red_Hat_Enterprise_Linux/6/html/Security_Guide/chap-system_auditing.html][1]\n2. [https://github.com/docker/docker/pull/20662][2]\n3. [https://containerd.tools/][3]\n\n## CIS controls\n\nVersion 6.14.6 Enforce Detailed Audit Logging For Sensitive Information - Enforce detailed audit logging for access to nonpublic data and special authentication for sensitive data. \n\nVersion 7.14.9 Enforce Detail Logging for Access or Changes to Sensitive Data - Enforce detailed audit logging for access to sensitive data or changes to sensitive data (utilizing tools such as File Integrity Monitoring or Security Information and Event Monitoring).                \n\n[1]: https://access.redhat.com/documentation/en-US/Red_Hat_Enterprise_Linux/6/html/Security_Guide/chap-system_auditing.html \n[2]: https://github.com/docker/docker/pull/20662 \n[3]: https://containerd.tools/\n","tags":["scored:true","security:compliance","control:1.2.11","framework:cis-docker","requirement:Linux-Hosts-Specific-Configuration","source:compliance-agent"],"hasExtendedTitle":true,"type":"infrastructure_configuration","filters":[],"defaultTags":["scored:true","security:compliance","control:1.2.11","framework:cis-docker","requirement:Linux-Hosts-Specific-Configuration","source:compliance-agent"],"version":13,"id":"tor-6yx-oyz","updatedAt":1722962796524,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"/var/lib/docker should be audited","createdAt":1693413446878,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"wbd-dbk-yf8","queries":[{"query":"source:compliance-agent @agent_rule_id:\"cis-docker-1.2.0-1.2.4\"","groupByFields":["@resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":""}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":7200,"complianceRuleOptions":{"resourceType":"docker_daemon","complianceFrameworks":[{"control":"1.2.4","framework":"cis-docker","is_default":true,"message":"","requirement":"Linux-Hosts-Specific-Configuration","version":"1.2.0"}]}},"cases":[{"name":"Failed","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nAudit `/var/lib/docker`.\n\n## Rationale\n\nAs well as auditing the Linux file system and system calls, you should also audit all Docker-related files and directories. The Docker daemon runs with root privileges and its behavior depends on some key files and directories. For example, audit `/var/lib/docker`, which holds all the information about containers.\n\n## Audit\n\nVerify that there is an audit rule applied to the `/var/lib/docker` directory. To see the rule for the `/var/lib/docker` directory, run: \n\n```bash\nauditctl -l | grep /var/lib/docker\n```\n\n## Remediation\n\nYou should add a rule for the `/var/lib/docker` directory. For example, add the following line to a new file in `/etc/audit/rules.d/`. For instance, create a file named `docker.rules`:\n\n```bash\necho \"-w /var/lib/docker -k docker\" > /etc/audit/rules.d/docker.rules\n```\n\nThen, reload the audit rules:\n\n```bash\naugenrules --load\n```\n\nNext, restart the audit daemon using the following command:\n\n```bash\nservice auditd restart\n```\n\n## Impact\n\nAuditing can generate large log files. You should ensure that these are rotated and archived periodically. A separate partition should also be created for audit logs to avoid filling up any other critical partition.\n\n## Default value\n\nBy default, Docker-related files and directories are not audited.\n\n## References\n\n1. [https://access.redhat.com/documentation/en-US/Red_Hat_Enterprise_Linux/6/html/Security_Guide/chap-system_auditing.html][1]\n\n## CIS controls\n\nVersion 6.14.6 Enforce Detailed Audit Logging For Sensitive Information - Enforce detailed audit logging for access to nonpublic data and special authentication for sensitive data. \n\nVersion 7.14.9 Enforce Detail Logging for Access or Changes to Sensitive Data - Enforce detailed audit logging for access to sensitive data or changes to sensitive data (utilizing tools such as File Integrity Monitoring or Security Information and Event Monitoring).                \n\n[1]: https://access.redhat.com/documentation/en-US/Red_Hat_Enterprise_Linux/6/html/Security_Guide/chap-system_auditing.html\n","tags":["scored:true","security:compliance","control:1.2.4","framework:cis-docker","requirement:Linux-Hosts-Specific-Configuration","source:compliance-agent"],"hasExtendedTitle":true,"type":"infrastructure_configuration","filters":[],"defaultTags":["scored:true","security:compliance","control:1.2.4","framework:cis-docker","requirement:Linux-Hosts-Specific-Configuration","source:compliance-agent"],"version":18,"id":"tfa-927-tto","updatedAt":1722963203914,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"1Password activity observed from Tor client IP","createdAt":1689698517157,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-syp","queries":[{"query":"source:1password @threat_intel.results.category:tor","groupByFields":["@usr.email"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"tor_client_activity","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"critical","notifications":[],"condition":"tor_client_activity > 0"}],"message":"## Goal\nDetect when 1Password activity is observed from a Tor exit node. \n\n## Strategy\nThis rule monitors 1Password logs to determine when an activity originated from a Tor client. Datadog enriches all ingested logs with [expert-curated threat intelligence][1] in real-time. An attacker may use a Tor client to anonymize their true origin.  \n\n## Triage and response\n1. Determine if `{{@usr.email}}` from IP address `{{@network.client.ip}}` should have made the `{{@evt.name}}` API call.\n2. If the results of the triage indicate that an attacker has taken the action, begin your company''s incident response process and an investigation.\n\n## Changelog\n* 17 August 2023 - Updated query to replace attribute `@threat_intel.results.subcategory:tor` with `@threat_intel.results.category:tor`.\n\n[1]: https://docs.datadoghq.com/security/cloud_siem/ingest_and_enrich/threat_intelligence/","tags":["mitre_platform:saas","technique:T1078-valid-accounts","source:1password","scope:onepassword","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["mitre_platform:saas","technique:T1078-valid-accounts","source:1password","scope:onepassword","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"version":8,"id":"tit-ngu-vqq","updatedAt":1760006244967,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"1Password service account token activity observed","createdAt":1689698516841,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-xcb","queries":[{"query":"source:1password @evt.type:1password-audit-events @object_type:satoken @evt.name:create","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"token_creation","dataSource":"logs"},{"query":"source:1password @evt.type:1password-audit-events @object_type:satoken @evt.name:trename","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"token_update","dataSource":"logs"},{"query":"source:1password @evt.type:1password-audit-events @object_type:satoken @evt.name:tverify","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"token_registration","dataSource":"logs"},{"query":"source:1password @evt.type:1password-audit-events @object_type:satoken @evt.name:trevoke","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"token_revoke","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"token created","status":"high","notifications":[],"condition":"token_creation > 0"},{"name":"token updated","status":"medium","notifications":[],"condition":"token_update > 0"},{"name":"token registered","status":"low","notifications":[],"condition":"token_registration > 0"},{"name":"token revoked","status":"info","notifications":[],"condition":"token_revoke > 0"}],"message":"## Goal\nDetect when a 1Password service account token activity is observed.\n\n## Strategy\nThis rule monitors 1Password audit logs to determine when any of the following [actions][1] is observed for a 1Password service account token:\n- **create**: A service account token was registered.\t\n- **trename**: A service account token name was updated.\t\n- **tverify**: A service account token signature was registered.\n- **trevoke**: A service account token was revoked.\t\n\n[1Password Service Accounts](https://developer.1password.com/docs/service-accounts/) help automate secrets management in your applications and infrastructure without the need to deploy additional services.\n\nToken activity from these service accounts could indicate an attacker using a non-user identity to compromise a 1Password tenant.\n\n\n## Triage & response\n- Investigate the user `{{@usr.email}}` performing the service account token activity `{{@evt.name}}`.\n- In the event of an accidental credentials exposure follow the 1Password Service Account security [recommendation][2].\n    - You must create a new service account with the same permissions, and delete the 1Password service account with the exposed credentials.\n\n[1]: https://developer.1password.com/docs/events-api/audit-events#service-account-tokens\n[2]: https://developer.1password.com/docs/service-accounts/security/","tags":["technique:T1098-account-manipulation","mitre_platform:saas","source:1password","scope:onepassword","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1098-account-manipulation","mitre_platform:saas","source:1password","scope:onepassword","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":7,"id":"hlz-oso-idv","updatedAt":1740654121637,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"1Password vault export attempt by user","createdAt":1689698516970,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-oui","queries":[{"query":"source:1password @evt.type:1password-audit-events @evt.name:export @object_type:vault","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"vault_exfiltration","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"high","notifications":[],"condition":"vault_exfiltration > 0"}],"message":"## Goal\nDetect possible exfiltration attempts from 1Password through a vault export.\n\n## Strategy\nThis rule monitors 1Password audit logs to determine when the [export](https://developer.1password.com/docs/events-api/item-usage-actions/#export) item usage action occurs on a vault. This could indicate exfiltration attempts from 1Password by downloading or exporting items within a vault.\n\n## Triage & response\n1. Investigate the `{{@usr.email}}` attempting to download or export vault `{{@vault_uuid}}`.\n2. If this action was unintended by the user:\n    - Rotate the user''s 1Password master password\n    - Identify all the items within the vault that were exported and rotate the necessary authentication credentials","tags":["technique:T1567-exfiltration-over-web-service","mitre_platform:saas","source:1password","scope:onepassword","tactic:TA0010-exfiltration","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1567-exfiltration-over-web-service","mitre_platform:saas","source:1password","scope:onepassword","tactic:TA0010-exfiltration","security:attack","mitre_platform:cloud"],"version":4,"id":"8x5-jcm-4ql","updatedAt":1740654120391,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A GKE Cluster''s Kubelet configuration file should disable anonymous requests","createdAt":1734110966938,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-3tk","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"3.2.1","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(k8s_node) = \"pass\" if {\n\tk8s_node.components.kubelet.config.content.authentication.anonymous.enabled == false\n} else = \"pass\" if {\n\tk8s_node.components.kubelet[\"anonymous-auth\"] == false\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nDisable anonymous requests to the Kubelet server. You should rely on authentication to authorize access and disallow anonymous requests to prevent unwanted actions in your cluster.\n\n## Remediation\n\nChoose a remediation method from below. For both steps, a restart of the Kubelet service is required.\n\n### Kubelet config file\n\n1. Add the json below to this file: `/etc/kubernetes/kubelet/kubelet-config.json`\n\n```json\n\"authentication\": { \"anonymous\": { \"enabled\": false } }\n```\n\n### Executable arguments\n\n1. Edit the kubelet service file on each worker node and ensure the below parameters are part of the `KUBELET_ARGS` variable string.\n\n```bash\n--anonymous-auth=false\n```","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.1","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.1","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"version":5,"id":"def-000-3tk","updatedAt":1756330440334,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE Cluster''s Kubelet should be allowed to manage iptables","createdAt":1734110829281,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-sxw","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"3.2.6","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(k8s_node) = \"pass\" if {\n\tk8s_node.components.kubelet.config.content.makeIPTablesUtilChains\n} else = \"pass\" if {\n\tk8s_node.components.kubelet[\"make-iptables-util-chains\"]\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nIt is recommended that kubelets be allowed to manage changes to `iptables`. This ensures that the `iptables` configuration remains in sync with your pods networking configuration. Manually configuring `iptables` with dynamic pod network configuration changes might hamper the communication between pods/containers and to the outside world. \n\n## Remediation\n\nChoose a remediation method from below. For both steps, a restart of the Kubelet service is required afterwards.\n\n### Kubelet config file\n\n1. Add the json below to this file: `/etc/kubernetes/kubelet/kubelet-config.json`\n\n```json\n\"makeIPTablesUtilChains\": true\n```\n\n### Executable arguments\n\n1. Edit the kubelet service file on each worker node and ensure the below parameters are part of the `KUBELET_ARGS` variable string.\n\n```bash\n--make-iptables-util-chains:true\n```","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.6","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.6","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"version":6,"id":"def-000-sxw","updatedAt":1756330589580,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE Cluster''s Kubelet should have the eventRecordQPS entry set","createdAt":1734111114855,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-rwh","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"3.2.7","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(k8s_node) = \"pass\" if {\n\tk8s_node.components.kubelet[\"event-qps\"]\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nSecurity relevant information should be captured. The `eventRecordQPS` setting in the Kubelet configuration controls the rate at which events are recorded, limiting the maximum number of events created per second. Setting this value too low may result in important events not being logged. Conversely, setting it to 0 (unlimited) could lead to a denial of service on the Kubelet.\n\n## Remediation\n\nChoose one of the following remediation methods. For both methods, a restart of the Kubelet service is required.\n\n### Kubelet config file\n\n1. Add the following JSON to the `<path-to-file>/10-kubeadm.conf` file.\n\n```json\n\"eventRecordQPS\": <integer>\n```\n\n**Note**: The default value is 50. The recommended value is 0 for unlimited.\n\n### Executable arguments\n\n**Note**: The executable argument has been `deprecated` for this feature.","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","scope:google_kubernetes_worker_node","control:3.2.7","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","scope:google_kubernetes_worker_node","control:3.2.7","requirement:Worker-Nodes"],"version":7,"id":"def-000-rwh","updatedAt":1756330589618,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE Cluster''s Kubelet should only allow explicitly authorized requests","createdAt":1734110813996,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-tq0","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"3.2.2","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(k8s_node) = \"pass\" if {\n\tlower(k8s_node.components.kubelet.config.content.authorization.mode) != \"alwayaAllow\"\n} else = \"pass\" if {\n\tlower(k8s_node.components.kubelet[\"authorization-mode\"]) != \"alwaysallow\"\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nKubelets can be configured to allow all authenticated requests (even anonymous ones) without needing explicit authorization checks from the apiserver. You should restrict this behavior and only allow explicitly authorized requests.\n\n## Remediation\n\nChoose a remediation method from below. For both steps, a restart of the Kubelet service is required.\n\n### Kubelet config file\n\n1. Add the json below to this file: `/etc/kubernetes/kubelet/kubelet-config.json`\n\n```json\n\"authentication\": { \"webhook\": { \"enabled\": true } }\n\"authorization\": { \"mode\": \"Webhook\" }\n```\n\n### Executable arguments\n\n1. Edit the kubelet service file on each worker node and ensure the below parameters are part of the `KUBELET_ARGS` variable string.\n\n```bash\n--authentication-token-webhook\n--authorization-mode=Webhook\n```","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.2","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.2","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"version":9,"id":"def-000-tq0","updatedAt":1756329999937,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE Cluster''s Kubelet should rotate client certificates automatically","createdAt":1729097993259,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00