Activities","version":"2"},{"control":"4.15","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"5.0.0"},{"control":"4.15","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"4.0.0"},{"control":"4.15","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"3.0.0"},{"control":"4.15","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"1.5.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nEVENT_SOURCE := lower(\"$.eventSource=organizations.amazonaws.com\")\n\nACCEPT_HANDSHAKE := lower(\"$.eventName=AcceptHandshake\")\n\nATTACH_POLICY := lower(\"$.eventName=AttachPolicy\")\n\nCREATE_ACCOUNT := lower(\"$.eventName=CreateAccount\")\n\nCREATE_ORG_UNIT := lower(\"$.eventName=CreateOrganizationalUnit\")\n\nCREATE_POLICY := lower(\"$.eventName=CreatePolicy\")\n\nDECLINE_HANDSHAKE := lower(\"$.eventName=DeclineHandshake\")\n\nDELETE_ORG := lower(\"$.eventName=DeleteOrganization\")\n\nDELETE_ORG_UNIT := lower(\"$.eventName=DeleteOrganizationalUnit\")\n\nDELETE_POLICY := lower(\"$.eventName=DeletePolicy\")\n\nDETACH_POLICY := lower(\"$.eventName=DetachPolicy\")\n\nDISABLE_POLICY_TYPE := lower(\"$.eventName=DisablePolicyType\")\n\nENABLE_POLICY_TYPE := lower(\"$.eventName=EnablePolicyType\")\n\nINVITE_ACCOUNT_TO_ORG := lower(\"$.eventName=InviteAccountToOrganization\")\n\nLEAVE_ORG := lower(\"$.eventName=LeaveOrganization\")\n\nMOVE_ACCOUNT := lower(\"$.eventName=MoveAccount\")\n\nREMOVE_ACCOUNT := lower(\"$.eventName=RemoveAccountFromOrganization\")\n\nUPDATE_POLICY := lower(\"$.eventName=UpdatePolicy\")\n\nUPDATE_ORG_UNIT := lower(\"$.eventName=UpdateOrganizationalUnit\")\n\naccount_to_trail := {cloudtrail_trail.account_id |\n\tsome cloudtrail_trail in input.resources.aws_cloudtrail_trail\n\tcloudtrail_trail.is_multi_region_trail\n\tcloudtrail_trail.trail_status.is_logging\n\tvalidate_event_selectors(cloudtrail_trail)\n\ttrail_log_group := regex.replace(cloudtrail_trail.cloud_watch_logs_log_group_arn, \"^.+:log-group:(.+):.+$\", \"$1\")\n\ttrail_log_group in trail_to_metric_filter\n}\n\nvalidate_event_selectors(cloudtrail_trail) if {\n\tsome trail in cloudtrail_trail.event_selectors\n\ttrail.include_management_events\n\tlower(trail.read_write_type) == \"all\"\n} else if {\n\tnot cloudtrail_trail.event_selectors\n}\n\ntrail_to_metric_filter := {metric_filter.log_group_name |\n\tsome metric_filter in input.resources.aws_metric_filter\n\tvalid_metric_filter(metric_filter)\n\tsome transformation in metric_filter.metric_transformations\n\ttransformation.metric_name in metric_filter_to_alarm\n}\n\nvalid_metric_filter(metric_filter) if {\n\tfilter_parsed := lower(regex.replace(metric_filter.filter_pattern, \"\\\\s|\\\"\", \"\"))\n\tcontains(filter_parsed, \"||\")\n\tcontains(filter_parsed, EVENT_SOURCE)\n\tcontains(filter_parsed, ACCEPT_HANDSHAKE)\n\tcontains(filter_parsed, ATTACH_POLICY)\n\tcontains(filter_parsed, CREATE_ACCOUNT)\n\tcontains(filter_parsed, CREATE_ORG_UNIT)\n\tcontains(filter_parsed, CREATE_POLICY)\n\tcontains(filter_parsed, DECLINE_HANDSHAKE)\n\tcontains(filter_parsed, DELETE_ORG)\n\tcontains(filter_parsed, DELETE_ORG_UNIT)\n\tcontains(filter_parsed, DELETE_POLICY)\n\tcontains(filter_parsed, DETACH_POLICY)\n\tcontains(filter_parsed, DISABLE_POLICY_TYPE)\n\tcontains(filter_parsed, ENABLE_POLICY_TYPE)\n\tcontains(filter_parsed, INVITE_ACCOUNT_TO_ORG)\n\tcontains(filter_parsed, LEAVE_ORG)\n\tcontains(filter_parsed, MOVE_ACCOUNT)\n\tcontains(filter_parsed, REMOVE_ACCOUNT)\n\tcontains(filter_parsed, UPDATE_POLICY)\n\tcontains(filter_parsed, UPDATE_ORG_UNIT)\n}\n\nmetric_filter_to_alarm := {cloudwatch_alarm.metric_name |\n\tsome cloudwatch_alarm in input.resources.aws_cloudwatch_metric_alarm\n\tsome action in cloudwatch_alarm.alarm_actions\n\taction in alarm_to_sns_topic\n}\n\nalarm_to_sns_topic := {sns_topic.topic_arn |\n\tsome sns_topic in input.resources.aws_sns_topic\n\tsns_topic.subscriptions_confirmed > 0\n}\n\neval(iam_account) = \"pass\" if {\n\taccount_to_trail[iam_account.account_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_iam_account","aws_cloudtrail_trail","aws_cloudwatch_metric_alarm","aws_metric_filter","aws_sns_topic"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nReal-time monitoring of API calls can be achieved by directing CloudTrail logs to CloudWatch logs and establishing corresponding metric filters and alarms. It is recommended to set up a metric filter and alarm for AWS organization changes made in the master AWS Account. This helps prevent any unwanted modifications that may lead to unauthorized access or other security breaches, ensuring that unexpected changes can be investigated and rolled back.\n\n## Remediation\n\nFor instructions on setting up CloudWatch metric filters and alarms for AWS organization changes, refer to the [AWS CloudWatch Alarms for CloudTrail User Guide][1].\n\n```plaintext\naws logs put-metric-filter --log-group-name <cloudtrail_log_group_name> \\\n--filter-name <organizations_changes> --metric-transformations \\\nmetricName=<organizations_changes>,metricNamespace=''CISBenchmark'',metricValue=1 \\\n--filter-pattern ''{ ($.eventSource = organizations.amazonaws.com) && (($.eventName = \"AcceptHandshake\") || \\\n($.eventName = \"AttachPolicy\") || ($.eventName = \"CreateAccount\") || ($.eventName = \"CreateOrganizationalUnit\") || \\\n($.eventName = \"CreatePolicy\") || ($.eventName = \"DeclineHandshake\") || ($.eventName = \"DeleteOrganization\") || \\\n($.eventName = \"DeleteOrganizationalUnit\") || ($.eventName = \"DeletePolicy\") || ($.eventName = \"DetachPolicy\") || \\\n($.eventName = \"DisablePolicyType\") || ($.eventName = \"EnablePolicyType\") || ($.eventName = \"InviteAccountToOrganization\") || \\\n($.eventName = \"LeaveOrganization\") || ($.eventName = \"MoveAccount\") || ($.eventName = \"RemoveAccountFromOrganization\") || \\\n($.eventName = \"UpdatePolicy\") || ($.eventName = \"UpdateOrganizationalUnit\")) }''\n```\n\nYou can choose your own `metricName` and `metricNamespace` strings. Use the same `metricNamespace` for all Foundations Benchmark metrics to group them together.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudwatch-alarms-for-cloudtrail.html","tags":["scored:true","control:3.12.3","requirement:Monitoring","control:4.15","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","scope:aws_logging_log_metric","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:RS.AN-03","requirement:Supply-Chain-Risk-Management","control:DE.CM-1","control:SI-5","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Security-Assessment","requirement:Incident-Analysis","cloud_provider:aws","requirement:Systems-and-Information-Integrity","control:RS.AN-1","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:3.14.6","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:aws_logging_log_metric"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:3.12.3","requirement:Monitoring","control:4.15","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE.CM-6","control:DE.CM-7","scope:aws_logging_log_metric","control:ID.RA-05","control:DE.CM-03","control:ID.RA-03","control:PR.PS-04","control:CC7.2","control:DE.CM-01","control:ID.RA-01","control:CC5.2","requirement:Platform-Security","requirement:Analysis","requirement:Continuous-Monitoring","control:RS.AN-03","requirement:Supply-Chain-Risk-Management","control:DE.CM-1","control:SI-5","framework:nist-csf","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Information-Protection","requirement:Security-Assessment","requirement:Incident-Analysis","cloud_provider:aws","requirement:Systems-and-Information-Integrity","control:RS.AN-1","requirement:Risk-Assessment","framework:soc-2","control:AU-6","control:3.14.6","framework:fedramp-high","requirement:Identity-Management-Authentication-and-Access-Control","source:aws_logging_log_metric"],"version":30,"id":"kqq-wqb-ix7","updatedAt":1756341259750,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS Organizations member accounts should not have root user credentials when centralized access is enabled","createdAt":1750683982891,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-cyc","queries":[{"query":"resource_type:aws_organizations_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_organizations_account","complianceFrameworks":[{"control":"PR.AA-05","framework":"nist-csf","is_default":true,"message":"","requirement":"Identity-Management-Authentication-and-Access-Control","version":"2.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\norgs_with_features_enabled := {lower(organizations_features.organization_id) |\n\tsome organizations_features in input.resources.aws_organizations_features\n\tenabled_features := {lower(feature) | some feature in organizations_features.enabled_features}\n\t\"rootcredentialsmanagement\" in enabled_features\n\t\"rootsessions\" in enabled_features\n}\n\ncredential_count_by_account_id[account.account_id] := credentials_count if {\n\tsome account in input.resources.aws_iam_account\n\tcredentials_count := (account.account_access_keys_present + account.account_password_present) + account.account_signing_certificates_present\n}\n\neval(organizations_account) := \"skip\" if {\n\t# Organization management accounts should not be assessed\n\torganizations_account.id == organizations_account.account_id\n} else := \"skip\" if {\n\t# aws_iam_account data is not available\n\tnot credential_count_by_account_id[organizations_account.id]\n} else := \"skip\" if {\n\t# Required features are not enabled, or aws_organizations_features data is not available\n\torg_id := split(organizations_account.arn, \"/\")[1]\n\tnot orgs_with_features_enabled[lower(org_id)]\n} else := \"fail\" if {\n\t# Account has at least one credential present and required organization features are enabled\n\tcredential_count_by_account_id[organizations_account.id] > 0\n} else := \"pass\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_organizations_account","aws_iam_account","aws_organizations_features"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nTo ensure the security of your AWS environment, you should centrally manage root user credentials and sessions for all accounts within your AWS Organization. The root user has unrestricted access to all services and resources. By centralizing the management of root users, you can prevent unauthorized recovery and large-scale access, strengthening the security posture of your organization. After this feature is enabled, the \"Delete root user credentials\" action should be performed on all member accounts to ensure that centralized access cannot be bypassed. Performing this action deletes all root user access keys, passwords, and signing certificates.\n\n## Remediation\n\nFor guidance on enabling centralized root credentials management and deleting root user credentials, refer to the [Centralize root access for member accounts][1] and [Perform a privileged task on an AWS Organizations member account][2] sections of the AWS Identity and Access Management User Guide.\n\n[1]: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-enable-root-access.html\n[2]: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user-privileged-task.html","tags":["scope:iam","scored:true","security:compliance","source:iam","control:PR.AA-05","framework:nist-csf","cloud_provider:aws","requirement:Identity-Management-Authentication-and-Access-Control"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","source:iam","control:PR.AA-05","framework:nist-csf","cloud_provider:aws","requirement:Identity-Management-Authentication-and-Access-Control"],"version":5,"id":"def-000-cyc","updatedAt":1756348125412,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS Organizations root sessions feature should be enabled","createdAt":1750683968097,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-s0m","queries":[{"query":"resource_type:aws_organizations_organization","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_organizations_organization","complianceFrameworks":[],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\norgs_with_feature_enabled := {lower(organizations_features.organization_id) |\n\tsome organizations_features in input.resources.aws_organizations_features\n\tsome feature in organizations_features.enabled_features\n\tlower(feature) == \"rootsessions\"\n}\n\nis_management_account(org) if {\n\texpected := sprintf(\"aws_account:%s\", [org.master_account_id])\n\tsome tag in org.tags\n\ttag == expected\n}\n\neval(org) := \"skip\" if {\n\tnot is_management_account(org)\n} else := \"pass\" if {\n\tlower(org.id) in orgs_with_feature_enabled\n} else := \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_organizations_organization","aws_organizations_features"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nEnabling the AWS Organizations Root Sessions feature increases security by centralizing control and minimizing the attack surface associated with highly privileged root user credentials. This feature allows you to remove long-term root access keys for member accounts and instead grant temporary, time-bound, and task-scoped permissions for essential administrative actions. By doing so, you eliminate the risks of compromised root credentials and ensure that powerful permissions are only used when absolutely necessary and in a monitored, auditable manner.\n\n## Remediation\n\nFor guidance on enabling centralized root sessions, refer to the [Centralize root access for member accounts][1] section of the AWS Identity and Access Management User Guide\n\n[1]: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-enable-root-access.html\n","tags":["scope:iam","scored:true","security:compliance","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","source:iam","cloud_provider:aws"],"version":2,"id":"def-000-s0m","updatedAt":1773264370234,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS Organizations should use all features for delegated administration","createdAt":1772671474635,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-f9b","queries":[{"query":"resource_type:aws_organizations_organization","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_organizations_organization","complianceFrameworks":[],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(organizations_organization) := \"pass\" if {\n\tlower(organizations_organization.feature_set) == \"all\"\n} else := \"fail\"\n\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_organizations_organization"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nAWS Organizations should be configured with the \"All features\" feature set rather than \"Consolidated Billing\" only. The all features mode is required for delegated administration, service control policies (SCPs), resource control policies (RCPs), and other advanced organization management capabilities. Without all features enabled, security tooling teams cannot operate as delegated administrators.\n\n## Remediation\n\nEnable all features for the organization. Note that this operation is one-way and cannot be reverted to consolidated billing only. For guidance, refer to [Enabling all features in your organization][1].\n\n[1]: https://docs.aws.amazon.com/organizations/latest/userguide/orgs_manage_org_support-all-features.html\n","tags":["scored:true","security:compliance","source:organizations","cloud_provider:aws","scope:organizations"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"version":1,"id":"def-000-f9b","updatedAt":1772671474635,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS Private CA root certificate authority should be disabled","createdAt":1769180252588,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-9j8","queries":[{"query":"resource_type:aws_acmpca_certificateauthority","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_acmpca_certificateauthority","complianceFrameworks":[],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nallowed_values := {\"disabled\", \"deleted\"}\n\nis_root_ca(ca) if {\n\tlower(ca.type) == \"root\"\n}\n\neval(ca) := \"skip\" if {\n\tnot is_root_ca(ca)\n} else := \"pass\" if {\n\tlower(ca.status) in allowed_values\n} else := \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_acmpca_certificateauthority"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nAWS Private CA root certificate authority should be disabled. Root CAs are the trust anchor for your PKI hierarchy and should be kept offline (disabled) when not actively signing subordinate CA certificates to minimize the risk of compromise.\n\n## Remediation\n\nDisable your root certificate authority.\n\n### From the console\n\n1. Open the [AWS Private CA console][1].\n2. Select your root CA.\n3. Choose **Actions** > **Disable**.\n4. Confirm the action.\n\n### From the command line\n\n```bash\naws acm-pca update-certificate-authority \\\n    --certificate-authority-arn <root-ca-arn> \\\n    --status DISABLED\n```\n\n[1]: https://console.aws.amazon.com/acm-pca/\n\n","tags":["scored:true","security:compliance","source:acmpca","cloud_provider:aws","scope:acmpca"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"version":1,"id":"def-000-9j8","updatedAt":1769180252588,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS RDS Cluster deleted","createdAt":1652207419931,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"a11-897-de4","queries":[{"query":"source:cloudtrail -@level:Error @evt.name:DeleteDBCluster","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when a user deleted a database cluster in RDS.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an attacker is deleting a RDS cluster:\n\n* [DeleteDBCluster][1]\n\n## Triage and response\n1. Determine if the API call: {{@evt.name}} should have occurred.\n2. If it shouldn''t have been made:\n   * Contact the user: {{@userIdentity.arn}} and see if they made the API call.\n3. If the API call was not made by the user:\n   * Rotate the user credentials.\n   * Determine what other API calls were made with the old credentials that were not made by the user.\n\n## Changelog\n6 April 2022 - Updated rule and signal message.\n\n[1]: https://docs.aws.amazon.com/cli/latest/reference/rds/delete-db-cluster.html\n","tags":["technique:T1485-data-destruction","iaas:aws","tactic:TA0040-impact","source:cloudtrail","scope:rds","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1485-data-destruction","iaas:aws","tactic:TA0040-impact","source:cloudtrail","scope:rds","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":10,"id":"6ng-pk1-ukh","updatedAt":1740655504049,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Route 53 DNS query logging disabled","createdAt":1673284315065,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"aqn-nem-2ud","queries":[{"query":"source:cloudtrail -@level:Error @evt.name:DeleteResolverQueryLogConfig","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when a user deletes a Route 53 query logging configuration.\n\n## Strategy\nMonitor cloudtrail logs where `@evt.name` is `DeleteResolverQueryLogConfig` which would stop Route53 Query logging for all of the Amazon VPCs that are associated with the configuration.\n\n## Triage and response\n1. Determine if {{@userIdentity.arn}} is expected to perform the {{@evt.name}} API call.\n2. Contact the principal owner and see if this was an API call that was made by the user.\n3. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.\n\n## Changelog\n* 7 April 2022 - Updated rule query and signal message.\n* 5 January 2023 - Updated severity.","tags":["iaas:aws","scope:route53","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:route53","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":16,"id":"0pz-0jr-nfz","updatedAt":1740655468077,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Route 53 VPC disassociated from query logging configuration","createdAt":1672911333446,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"wem-cvg-42m","queries":[{"query":"source:cloudtrail -@level:Error @evt.name:DisassociateResolverQueryLogConfig","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_route53_querylogging_disassociated","dataSource":"logs"},{"query":"source:cloudtrail @error.kind:AccessDenied @evt.name:DisassociateResolverQueryLogConfig","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_route53_querylogging_disassociated_access_denied","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"Successful","status":"low","notifications":[],"condition":"aws_route53_querylogging_disassociated > 0"},{"name":"Access Denied","status":"info","notifications":[],"condition":"aws_route53_querylogging_disassociated_access_denied > 0"}],"message":"## Goal\nDetect when a user disassociates a VPC from the query logging configuration.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if a user has disassociated.\n\n* [DisassociateResolverQueryLogConfig][1]\n\n## Triage and response\n1. Determine if {{@userIdentity.arn}} is expected to perform the {{@evt.name}} API call.\n2. Contact the principal owner and see if this was an API call that was made by the user.\n3. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.\n\n## Changelog\n* 7 April 2022 - Update rule and signal message.\n* 15 December 2022 - Update query to include Access Denied events and reduce severity.\n\n[1]: https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_DisassociateResolverQueryLogConfig.html","tags":["iaas:aws","scope:route53","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:route53","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":12,"id":"nmk-a8n-zig","updatedAt":1740655091200,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Route Table created or modified","createdAt":1674195804092,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"fd3-1aa-d7d","queries":[{"query":"source:cloudtrail @evt.name:(CreateRoute OR CreateRouteTable)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"route_created","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:(ReplaceRoute OR ReplaceRouteTableAssociation OR DisassociateRouteTable)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"route_modified","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:(DeleteRouteTable OR DeleteRoute)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"route_deleted","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":43200,"keepAlive":3600},"cases":[{"name":"VPC route table created","status":"info","notifications":[],"condition":"route_created > 0"},{"name":"VPC route table modified","status":"info","notifications":[],"condition":"route_modified > 0"},{"name":"VPC route table deleted","status":"info","notifications":[],"condition":"route_deleted > 0"}],"message":"## Goal\nDetect when an AWS Route Table has been created or modified.\n\n## Strategy\nThis rule lets you monitor CloudTrail and detect when an AWS Route Table has been created or modified with one of the following API calls:\n* [CreateRoute][1] \n* [CreateRouteTable][2] \n* [ReplaceRoute][3] \n* [ReplaceRouteTableAssociation][4] \n* [DeleteRouteTable][5] \n* [DeleteRoute][6] \n* [DisassociateRouteTable][7]\n\n## Triage and response\n1. Determine if {{@userIdentity.arn}} is expected to perform the {{@evt.name}} API call.\n2. Contact the principal owner and see if this was an API call which was made by the user.\n3. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.\n\n## Changelog\n6 April 2022 - Updated signal message, rule query, and case layout.\n\n[1]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_CreateRoute.html \n[2]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_CreateRouteTable \n [3]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ReplaceRoute.html \n [4]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_ReplaceRouteTableAssociation \n [5]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DeleteRouteTable.html \n [6]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DeleteRoute.html \n [7]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DisassociateRouteTable.html\n","tags":["security:compliance","scope:ec2","iaas:aws","control:4.13","requirement:Monitoring","framework:cis-aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","scope:ec2","iaas:aws","control:4.13","requirement:Monitoring","framework:cis-aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","mitre_platform:cloud"],"version":15,"id":"qgo-jqs-03x","updatedAt":1740655556245,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS S3 Bucket ACL made public","createdAt":1680284909052,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"9e7-876-0ec","queries":[{"query":"source:cloudtrail @evt.name:PutBucketAcl -@level:Error (@requestParameters.AccessControlPolicy.AccessControlList.Grant.Grantee.URI:(\"http://acs.amazonaws.com/groups/global/AuthenticatedUsers\" OR \"http://acs.amazonaws.com/groups/global/AllUsers\") OR @requestParameters.x-amz-acl:(public-read OR public-read-write))","groupByFields":["@requestParameters.bucketName"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when an S3 bucket ACL is successfully modified to grant public access.\n\n## Strategy\nThis rule monitors the [`PutBucketAcl`][1] API call to detect when an S3 bucket is made publicly accessible. The rule inspects the `@requestParameters.AccessControlPolicy.AccessControlList.Grant.Grantee.URI` array and `@requestParameters.x-amz-acl` parameter to identify public access grants. Public access is identified when the URI contains `http://acs.amazonaws.com/groups/global/AuthenticatedUsers` or `http://acs.amazonaws.com/groups/global/AllUsers`, or when the [canned ACL][2] parameter includes `public-read` or `public-read-write`. Making S3 buckets publicly accessible can expose sensitive data to unauthorized users and is often unintentional or the result of misconfiguration.\n\n## Triage and response\n- Determine if `{{@userIdentity.arn}}` is authorized to modify S3 bucket permissions and whether this change was intentional.\n- Review the bucket contents to assess if any sensitive data has been exposed to public access.\n- Verify if the public ACL configuration aligns with legitimate business requirements or if it represents a misconfiguration.\n- Investigate whether the same user credentials made other unauthorized API calls or bucket modifications.\n- Check S3 access logs to identify if any unauthorized parties accessed the bucket while it was publicly accessible.\n\n## Changelog\n7 April 2022 - Updated rule and signal message.\n23 October 2025 - Updated rule with canned ACL logic `@requestParameters.x-amz-acl:(public-read OR public-read-write)`\n\n[1]: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/s3api/put-bucket-acl.html\n[2]: https://docs.aws.amazon.com/AmazonS3/latest/userguide/acl-overview.html#canned-acl\n","tags":["security:compliance","scope:ec2","iaas:aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","scope:ec2","iaas:aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":20,"id":"zdk-9gu-nrg","updatedAt":1761246209056,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS S3 Object encryption with SSE-C","createdAt":1746041064479,"isDefault":true,"isPartner":false,"isEnabled":false,"isBeta":false,"isDeleted":false,"isDeprecated":true,"defaultRuleId":"def-000-vfj","queries":[{"query":"source:cloudtrail @evt.name:CopyObject @requestParameters.x-amz-server-side-encryption-customer-algorithm:* @userIdentity.accessKeyId:AKIA* -@network.client.is_private_network_ip:true -status:error","groupByFields":["@userIdentity.arn","@userIdentity.accessKeyId","@requestParameters.bucketName"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"s3_copyobject_ssec_long_term_key","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:PutObject @requestParameters.x-amz-server-side-encryption-customer-algorithm:* @userIdentity.accessKeyId:AKIA* -@network.client.is_private_network_ip:true -status:error","groupByFields":["@userIdentity.arn","@userIdentity.accessKeyId","@requestParameters.bucketName"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"s3_putobject_ssec_long_term_key","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"CopyObject via long term access key","status":"high","notifications":[],"condition":"s3_copyobject_ssec_long_term_key > 0"},{"name":"PutObject via long term access key","status":"high","notifications":[],"condition":"s3_putobject_ssec_long_term_key > 0"}],"message":"## WARNING: This rule is being deprecated on 6 April 2026.\n\n- See the [Advanced Notice](https://aws.amazon.com/blogs/storage/advanced-notice-amazon-s3-to-disable-the-use-of-sse-c-encryption-by-default-for-all-new-buckets-and-select-existing-buckets-in-april-2026/) article from AWS.\n\n## Goal\n\nDetects attempts to encrypt AWS S3 objects using server-side encryption with customer-provided keys (SSE-C).\n\n## Strategy\n\nThis rule monitors CloudTrail logs for S3 object operations (`CopyObject` and `PutObject`) where customer-provided encryption keys are used. When external encryption is applied to S3 objects, the rule detects this by examining the `@requestParameters.x-amz-server-side-encryption-customer-algorithm` attribute. This activity warrants attention since attackers can leverage SSE-C encryption with their own keys to make objects inaccessible to legitimate owners, essentially enabling ransomware-style attacks.\n\n## Triage & Response\n\n1. Verify if the detected activity aligns with approved change management processes or expected administrative actions.\n2. Examine the actor `{{@userIdentity.arn}}` and `{{@userIdentity.accessKeyId}}` to determine if they are authorized to perform encryption operations on the affected S3 buckets.\n3. Check if the affected S3 bucket `{{@requestParameters.bucketName}}` contains sensitive or critical data that would be valuable for ransomware targets.\n4. Revoke the access key `{{@userIdentity.accessKeyId}}` if determined to be unauthorized or compromised.\n5. Restore affected objects from backups if available and confirmed encrypted without authorization.\n6. Implement S3 bucket policies to restrict the use of SSE-C encryption to approved roles and service accounts only.\n","tags":["iaas:aws","tactic:TA0040-impact","scope:cloudtrail","source:cloudtrail","technique:T1486-data-encrypted-for-impact","security:attack"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","tactic:TA0040-impact","scope:cloudtrail","source:cloudtrail","technique:T1486-data-encrypted-for-impact","security:attack"],"version":4,"id":"def-000-vfj","updatedAt":1775481130492,"blocking":false,"deprecationDate":1775433600000,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS S3 Public Access Block removed","createdAt":1674195802279,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"4cd-f56-dfa","queries":[{"query":"source:cloudtrail -@level:error @evt.name:DeleteAccountPublicAccessBlock","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"public_access_block_removed","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"User removed public access block","status":"high","notifications":[],"condition":"public_access_block_removed > 0"}],"message":"## Goal\nDetect when the S3 Public Access Block configuration has been removed \n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an attacker is deleting the S3 Public Access Block configuration:\n\n* [DeleteAccountPublicAccessBlock][1]\n\n## Triage and response\n1. Determine who the user was who made this API call.\n2. Contact the user and inform them of best practices of enabling Public Access Block on S3 buckets.\n3. Re-enable Public Access Block on the S3 bucket.\n\nMore details on S3 Public Block Public Access can be found [here][2].\n\n[1]: https://docs.aws.amazon.com/cli/latest/reference/s3api/delete-public-access-block.html\n[2]: https://docs.aws.amazon.com/AmazonS3/latest/dev/access-control-block-public-access.html\n\n## Changelog\n* 18 March 2022 - Updated severity and query.\n* 31 October 2022 - Updated severity.","tags":["security:compliance","control:7.2.1","iaas:aws","scope:s3","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","framework:pci","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","control:7.2.1","iaas:aws","scope:s3","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","framework:pci","security:attack","mitre_platform:cloud"],"version":17,"id":"uxr-5wk-8hk","updatedAt":1740656147760,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS SES add verified identity followed by the deletion of the identity","createdAt":1714683545057,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-yax","queries":[{"query":"source:cloudtrail @evt.name:VerifyEmailIdentity @eventSource:ses.amazonaws.com @userIdentity.accessKeyId:AKIA*","groupByFields":["@requestParameters.emailAddress"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_ses_verifyemailidentity","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:DeleteIdentity @eventSource:ses.amazonaws.com @userIdentity.accessKeyId:AKIA*","groupByFields":["@requestParameters.identity"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_ses_deleteidentity","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_ses_verifyemailidentity > 0 THEN aws_ses_deleteidentity > 0"}],"message":"## Goal\nDetect when there is an attempt to add an email address to your Amazon SES account followed by the deletion of that address in a short time period. \n\n## Strategy\nMonitor CloudTrail and detect when there is an attempt to add an email address to your Amazon SES account followed by the deletion of that address in a short time period. Attackers target the AWS SES service generally for the purpose of phishing. To avoid detection, an attacker may add an email address to the SES account for a short period to perform a phishing attack and then remove it shortly after.\n\n## Triage and response\n1. Determine if the API call: `{{@evt.name}}` should have been made by the user: `{{@userIdentity.arn}}` from this IP address: `{{@network.client.ip}}` .\n2. If the action is legitimate, consider including the user in a suppression list. See [Best practices for creating detection rules with Datadog Cloud SIEM][3] for more information.\n3. If the action shouldn''t have happened:\n   * Contact the user: `{{@userIdentity.arn}}` and see if they made the API call.\n   * Use the Cloud SIEM - User Investigation dashboard to see if the user `{{@userIdentity.arn}}` has taken other actions.\n   * Use the Cloud SIEM - IP Investigation dashboard to see if there''s more traffic from the IP `{{@network.client.ip}}`.\n4. If the results of the triage indicate that an attacker has taken the action, initiate your company''s incident response process, as well as an investigation.\n\n[1]: https://docs.aws.amazon.com/ses/latest/APIReference-V2/API_GetAccount.html\n[2]: https://docs.aws.amazon.com/servicequotas/2019-06-24/apireference/API_ListServiceQuotas.html","tags":["technique:T1070-indicator-removal","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1070-indicator-removal","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":5,"id":"def-000-yax","updatedAt":1740655628325,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS SES discovery attempt by long term access key","createdAt":1714683556056,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-x6y","queries":[{"query":"source:cloudtrail @evt.name:(GetAccount OR GetAccountSendingEnabled) @eventSource:ses.amazonaws.com @userIdentity.accessKeyId:AKIA*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_ses_discovery_long_term_access_key","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"high","notifications":[],"condition":"aws_ses_discovery_long_term_access_key > 0"}],"message":"## Goal\nDetect when there is an attempt to determine the status of an organization''s Amazon SES account. \n\n## Strategy\nMonitor CloudTrail and detect when there is an attempt to determine the status of an organizations Amazon SES account. Attackers target the AWS SES service generally for the purpose of phishing. In order to determine the sending quota of an account or if the account is currently in a sandbox environment, the attacker may use the API call [`GetAccount`][1] or [`GetAccountSendingEnabled`][2].\n\n## Triage and response\n1. Determine if the API call: `{{@evt.name}}` should have been made by the user: `{{@userIdentity.arn}}` from this IP address: `{{@network.client.ip}}` .\n2. If the action is legitimate, consider including the user in a suppression list. See [Best practices for creating detection rules with Datadog Cloud SIEM][3] for more information.\n3. If the action shouldn''t have happened:\n   * Contact the user: `{{@userIdentity.arn}}` and see if they made the API call.\n   * Use the Cloud SIEM - User Investigation dashboard to see if the user `{{@userIdentity.arn}}` has taken other actions.\n   * Use the Cloud SIEM - IP Investigation dashboard to see if there''s more traffic from the IP `{{@network.client.ip}}`.\n4. If the results of the triage indicate that an attacker has taken the action, initiate your company''s incident response process, as well as an investigation.\n\n## Changelog\n* 17 December 2024 - updated rule query.\n* 25 April 2025 - updated rule query to include `GetAccountSendingEnabled`.\n\n[1]: https://docs.aws.amazon.com/ses/latest/APIReference-V2/API_GetAccount.html\n[2]: https://docs.aws.amazon.com/ses/latest/APIReference/API_GetAccountSendingEnabled.html\n[3]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise","tags":["source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","technique:T1526-cloud-service-discovery","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","technique:T1526-cloud-service-discovery","mitre_platform:cloud"],"version":7,"id":"def-000-x6y","updatedAt":1745935838712,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS SES email sending enabled in current AWS region","createdAt":1714683528609,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-wwz","queries":[{"query":"source:cloudtrail @evt.name:(UpdateAccountSendingEnabled OR PutAccountSendingAttributes) (@requestParameters.enabled:true OR @requestParameters.sendingEnabled:true) @userIdentity.accessKeyId:AKIA*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_ses_enable_email_sending","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"high","notifications":[],"condition":"aws_ses_enable_email_sending > 0"}],"message":"## Goal\nDetect when email sending is enabled in your Amazon SES account for the current AWS region. \n\n## Strategy\nMonitor CloudTrail and detect when email sending is enabled in your Amazon SES account for the current AWS region. Attackers target the AWS SES service generally for the purpose of phishing. To ensure the capbility to send email to their targets attackers will use the API calls [`UpdateAccountSendingEnabled`][1] or [`PutAccountSendingAttributes`][2] to enable email sending.\n\n## Triage and response\n1. Determine if the API call: `{{@evt.name}}` should have been made by the user: `{{@userIdentity.arn}}` from this IP address: `{{@network.client.ip}}` .\n2. If the action is legitimate, consider including the user in a suppression list. See [Best practices for creating detection rules with Datadog Cloud SIEM][3] for more information.\n3. If the action shouldn''t have happened:\n   * Contact the user: `{{@userIdentity.arn}}` and see if they made the API call.\n   * Use the Cloud SIEM - User Investigation dashboard to see if the user `{{@userIdentity.arn}}` has taken other actions.\n   * Use the Cloud SIEM - IP Investigation dashboard to see if there''s more traffic from the IP `{{@network.client.ip}}`.\n4. If the results of the triage indicate that an attacker has taken the action, initiate your company''s incident response process, as well as an investigation.\n\n[1]: https://docs.aws.amazon.com/ses/latest/APIReference/API_UpdateAccountSendingEnabled.html\n[2]: https://docs.aws.amazon.com/ses/latest/APIReference-V2/API_PutAccountSendingAttributes.html","tags":["iaas:aws","tactic:TA0040-impact","source:cloudtrail","technique:T1496-resource-hijacking","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","tactic:TA0040-impact","source:cloudtrail","technique:T1496-resource-hijacking","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":5,"id":"def-000-wwz","updatedAt":1740656092329,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Security Hub disabled","createdAt":1685520718731,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"m4l-btf-8cs","queries":[{"query":"source:cloudtrail -@network.client.ip:cloudformation.amazonaws.com -@level:Error @evt.name:DisableSecurityHub","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"not_cloudformation_action","dataSource":"logs"},{"query":"source:cloudtrail @network.client.ip:cloudformation.amazonaws.com -@level:Error @evt.name:DisableSecurityHub","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cloudformation_action","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"not a cloudformation action","status":"high","notifications":[],"condition":"not_cloudformation_action > 0"},{"name":"cloudformation action","status":"low","notifications":[],"condition":"cloudformation_action > 0"}],"message":"## Goal\nDetect when a user disables AWS Security Hub.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if a user has disabled AWS Security Hub:\n\n* [DisableSecurityHub][1]\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` is expected to perform the `{{@evt.name}}` API call on the account: `{{@userIdentity.accountId}}`.\n2. Contact the principal owner and see if this was an API call that was made by the user.\n3. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.\n\n## Changelog\n* 7 April 2022 - Updated rule query and signal message.\n* 20 January 2022 - Updated rule severity.\n\n[1]: https://docs.aws.amazon.com/securityhub/1.0/APIReference/API_DisableSecurityHub.html","tags":["iaas:aws","scope:cloudtrail","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:cloudtrail","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":13,"id":"obj-kmn-bsa","updatedAt":1740655051901,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS VPC Flow Log deleted","createdAt":1688095445455,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-pn2","queries":[{"query":"source:cloudtrail @evt.name:DeleteFlowLogs @eventSource:ec2.amazonaws.com","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"vpc_flow_log_deleted","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"vpc_flow_log_deleted > 0"}],"message":"## Goal\nDetect when one or more AWS VPC Flow Log are deleted.\n\n## Strategy\nMonitor CloudTrail and detect when AWS VPC FLow Logs are deleted by calling the [DeleteFlowLogs][1] API.\n\n## Triage and response\n1. Determine if the API call: `{{@evt.name}}` should have occurred.\n2. If the action was legitimate, consider allowing the invoking service: `{{@userIdentity.invokedBy}}`, user: `{{@userIdentity.arn}}`, or other appropriate attribute through a [suppression list][2].\n3. If it shouldn''t have been made:\n   * Contact the user: {{@userIdentity.arn}} and see if they made the API call.\n4. If the API call was not made by the user:\n   * Rotate the user credentials.\n   * Determine what other API calls were made with the old credentials that were not made by the user.\n\n[1]: https://docs.aws.amazon.com/AWSEC2/latest/APIReference/API_DeleteFlowLogs.html\n[2]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise\n\n","tags":["scope:amazon-vpc","iaas:aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:amazon-vpc","iaas:aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":9,"id":"asp-s3y-5xk","updatedAt":1740655409023,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS VPC created or modified","createdAt":1685520760240,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"f6b-3b4-aef","queries":[{"query":"source:cloudtrail -@level:Error @evt.name:(DeleteVpc OR DeleteVpcPeeringConnection)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"vpc_deleted","dataSource":"logs"},{"query":"source:cloudtrail -@level:Error @evt.name:(CreateVpc OR CreateVpcPeeringConnection)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"vpc_created","dataSource":"logs"},{"query":"source:cloudtrail -@level:Error @evt.name:(ModifyVpcAttribute OR AcceptVpcPeeringConnection OR RejectVpcPeeringConnection OR AttachClassicLinkVpc OR DetachClassicLinkVpc OR DisableVpcClassicLink OR EnableVpcClassicLink)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"vpc_modified","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"vpc deleted","status":"info","notifications":[],"condition":"vpc_deleted > 0"},{"name":"vpc created","status":"info","notifications":[],"condition":"vpc_created > 0"},{"name":"vpc modified","status":"info","notifications":[],"condition":"vpc_modified > 0"}],"message":"## Goal\nDetect when an attacker is destroying a VPC.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an attacker is deleting a VPC:\n\n* [DeleteVpc][1]\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` is expected to perform the `{{@evt.name}}` API call on the account: `{{@userIdentity.accountId}}`.\n2. Contact the principal owner and see if this was an API call that was made by the user.\n3. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.\n\n## Changelog\n7 April 2022 - Updated rule query, cases and signal message.\n\n[1]: https://docs.aws.amazon.com/cli/latest/reference/ec2/delete-vpc.html\n","tags":["security:compliance","scope:vpc","iaas:aws","technique:T1485-data-destruction","requirement:Monitoring","tactic:TA0040-impact","framework:cis-aws","control:4.14","source:cloudtrail","mitre_platform:iaas","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","scope:vpc","iaas:aws","technique:T1485-data-destruction","requirement:Monitoring","tactic:TA0040-impact","framework:cis-aws","control:4.14","source:cloudtrail","mitre_platform:iaas","mitre_platform:cloud"],"version":14,"id":"igj-dr4-ico","updatedAt":1740655514636,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Verified Access anomalous failed authentication attempts by IP","createdAt":1682432105946,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-ziw","queries":[{"query":"source:verified-access @evt.name:\"Access Denied\"","groupByFields":["@network.client.ip"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":86400,"keepAlive":7200,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0.995"}],"message":"## Goal\nDetect when access is denied to an IP authenticating using AWS Verified Access. \n\n## Strategy\nThe anomaly detection generates a security signal when an IP''s authentication failure requests deviates from its baseline. \n\nFor more information about the anomaly detection method, see [Detect security threats with anomaly detection rules][1].\n\n## Triage and response\nDetermine if the IP `{{@network.client.ip}}` should have access.\n\n[1]: https://www.datadoghq.com/blog/anomaly-detection-rules-datadog/","tags":["technique:T1199-trusted-relationship","source:aws","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1199-trusted-relationship","source:aws","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"version":6,"id":"cu4-zbs-jlw","updatedAt":1774561235436,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Verified Access anomalous failed authentication attempts by host","createdAt":1682432107363,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-g1e","queries":[{"query":"source:verified-access @evt.name:\"Access Denied\"","groupByFields":["host"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":86400,"keepAlive":7200,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0.995"}],"message":"## Goal\nDetect when access is denied to a host authenticating using AWS Verified Access. \n\n## Strategy\nThe anomaly detection generates a security signal when a host''s authentication failure requests deviates from its baseline. \n\nFor more information about the anomaly detection method, see [Detect security threats with anomaly detection rules][1].\n\n## Triage and response\nDetermine if the host `{{@host}}` should have access.\n\n[1]: https://www.datadoghq.com/blog/anomaly-detection-rules-datadog/","tags":["technique:T1199-trusted-relationship","source:aws","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1199-trusted-relationship","source:aws","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"version":6,"id":"0jv-fdi-xnu","updatedAt":1774561196876,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Verified Access anomalous failed authentication attempts by user","createdAt":1682432105819,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-8oe","queries":[{"query":"source:verified-access @evt.name:\"Access Denied\"","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":86400,"keepAlive":7200,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0.995"}],"message":"## Goal\nDetect when access is denied to a user authenticating using AWS Verified Access. \n\n## Strategy\nThe anomaly detection generates a security signal when a user''s authentication failure requests deviates from its baseline. \n\nFor more information about the anomaly detection method, see [Detect security threats with anomaly detection rules][1].\n\n## Triage and response\nDetermine if the user `{{@usr.id}}` should have access.\n\n[1]: https://www.datadoghq.com/blog/anomaly-detection-rules-datadog/","tags":["technique:T1078-valid-accounts","source:aws","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1078-valid-accounts","source:aws","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"version":6,"id":"1vz-97v-scu","updatedAt":1774561158472,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS WAF traffic blocked by specific rule","createdAt":1657647876302,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"h8p-rcn-miw","queries":[{"query":"service:waf @system.action:BLOCK","groupByFields":["@webaclId"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"waf_traffic_block","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":1800,"keepAlive":1800,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"low","notifications":[],"condition":"waf_traffic_block > 0.995"}],"message":"## Goal\nDetects when a specific AWS Web Application Firewall (WAF) rule blocks an anomalous amount of traffic.\n\n## Strategy\nThe rule monitors AWS WAF logs and detects when the `@system.action` has a value of `BLOCK`.\n\n## Triage and response\n1. Inspect the `@webaclId`: `{{@webaclId}}` logs to confirm if the observed traffic should have been blocked or not.\n2. If the request should have been blocked, then navigate to the IP Investigation dashboard. Inspect other requests from the IP address:{{@network.client.ip}} to find any other potentially malicious behaviors from the IP.","tags":["iaas:aws","scope:waf","source:cloudtrail","mitre_platform:iaas","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:waf","source:cloudtrail","mitre_platform:iaas","mitre_platform:cloud"],"version":9,"id":"scr-lzp-wrd","updatedAt":1774561831039,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS WAF traffic blocked by specific rule on multiple IPs","createdAt":1657647863957,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"2yu-ey6-507","queries":[{"query":"service:waf @system.action:BLOCK","groupByFields":["@webaclId"],"hasOptionalGroupByFields":false,"distinctFields":["@network.client.ip"],"aggregation":"cardinality","name":"waf_traffic_block","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":1800,"keepAlive":1800,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30}},"cases":[{"name":"","status":"low","notifications":[],"condition":"waf_traffic_block > 0.995"}],"message":"## Goal\nDetect when a specific AWS Web Application Firewall (WAF) rule blocks traffic from multiple IPs.\n\n## Strategy\nThe rule monitors AWS WAF logs and detects when the `@system.action` has a value of `BLOCK`.\n\n## Triage and response\n1. Inspect the `@http.request_id`: `{{@http.request_id}}` to confirm if this request should have been blocked or not.\n2. If the request should have been blocked, then navigate to the IP Investigation dashboard. Inspect other requests from the IP address:{{@network.client.ip}} to find any other potentially malicious behaviors from the IP.\n","tags":["iaas:aws","scope:waf","source:cloudtrail","mitre_platform:iaas","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:waf","source:cloudtrail","mitre_platform:iaas","mitre_platform:cloud"],"version":7,"id":"imr-goq-uww","updatedAt":1774561831416,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS WAF web access control list deleted","createdAt":1688542793913,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"rkm-8xh-x8b","queries":[{"query":"source:cloudtrail @eventSource:waf*.amazonaws.com @evt.name:DeleteWebACL -@http.useragent:\\APN\\/*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"waf_webacl_deletion","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"waf_webacl_deletion > 0"}],"message":"## Goal\nDetect when an AWS Web Application Firewall (WAF) Access Control List (ACL) is deleted.\n\n## Strategy\nThe rule monitors AWS WAF logs `@eventSource:waf*.amazonaws.com` and detects when the `@evt.name` is `DeleteWebACL`.  \n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` is expected to perform the `{{@evt.name}}` API call on the account: `{{@userIdentity.accountId}}`.\n2. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.","tags":["iaas:aws","scope:waf","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:waf","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"8js-pr5-qga","updatedAt":1740656241972,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS WAF web access control list modified","createdAt":1688542809375,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"moj-p98-l67","queries":[{"query":"source:cloudtrail @eventSource:waf*.amazonaws.com @evt.name:UpdateWebACL -@http.useragent:(\\APN\\/* OR cloudformation.amazonaws.com)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"waf_webacl_update","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":3600},"cases":[{"name":"","status":"low","notifications":[],"condition":"waf_webacl_update > 0"}],"message":"## Goal\nDetect when an AWS Web Application Firewall (WAF) Access Control List (ACL) is updated.\n\n## Strategy\nThe rule monitors AWS WAF logs `@eventSource:waf*.amazonaws.com` and detects when the `@evt.name` is `UpdateWebACL`.  \n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` is expected to perform the `{{@evt.name}}` API call on the account: `{{@userIdentity.accountId}}`.\n2. If the API call was not made legitimately by the user, rotate the user''s credentials and investigate what other APIs were successfully accessed.","tags":["iaas:aws","scope:waf","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:waf","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"pmp-fqa-lwy","updatedAt":1740656093610,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS access key creation by previously unseen identity","createdAt":1691610294575,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-t49","queries":[{"query":"source:cloudtrail @evt.name:CreateAccessKey @responseElements.accessKey.status:Active","groupByFields":["@userIdentity.accessKeyId"],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@userIdentity.arn","metrics":["@userIdentity.arn"],"aggregation":"new_value","name":"","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"new_value","maxSignalDuration":86400,"keepAlive":3600,"newValueOptions":{"forgetAfter":28,"learningDuration":7,"learningThreshold":0,"learningMethod":"duration","instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30},"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"medium","notifications":[]}],"message":"## Goal\nDetect when an AWS access key is created by an unfamiliar identity.\n\n## Strategy\nThis rule monitors Cloudtrail logs for `CreateAccessKey` API calls made by an AWS identity. An attacker may create an AWS access key to maintain persistence in the account.\n\n**Note:**  This rule uses the `New Value` detection method to determine when a previously unseen AWS identity is observed performing this action.\n\n## Triage & response\n1. Determine if the API call: `{{@evt.name}}` should have been performed by the identity: `{{@userIdentity.arn}}`:\n   * Contact the owner of the identity to confirm if they made the API call. \n2. If the API call was not made by the identity:\n   * Rotate the identity credentials.\n   * Determine what actions were taken by the identity and the new access keys created.\n   * Begin your organization''s incident response process and investigate.\n3. If the API call was made legitimately by the identity:\n   * Work with the owner of the identity to understand if a long term credential is the best way to meet their use case.\n   * As a best practice AWS recommends using temporary security credentials (IAM roles) instead of creating long-term credentials like access keys.","tags":["iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":5,"id":"bqf-dnx-o50","updatedAt":1740656138315,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS accounts should be configured with security contact information","createdAt":1732628418853,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-9cn","queries":[{"query":"resource_type:aws_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_account","complianceFrameworks":[{"control":"ID.AM-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Asset-Management","version":"2.0"},{"control":"account.1","framework":"aws-fsbp","is_default":true,"message":"","requirement":"Identify","version":"1.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(account) = \"pass\" if {\n\tsome contact in account.alternate_contacts\n\tlower(contact.alternate_contact_type) == \"security\"\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_account"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nEnsuring that the security contact information is complete and accurate allows AWS to reach out to the right personnel in the event of security alerts or breaches.\n\n## Remediation\n\nRefer to the [Update the alternate contacts for your AWS account][1] documentation in the AWS Account Management Reference Guide to add an alternate contact as your security contact.\n\n[1]: https://docs.aws.amazon.com/accounts/latest/reference/manage-acct-update-contact-alternate.html","tags":["scored:true","control:ID.AM-01","security:compliance","framework:nist-csf","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","requirement:Asset-Management","scope:aws-iam","source:aws-iam","control:account.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:ID.AM-01","security:compliance","framework:nist-csf","cloud_provider:aws","framework:aws-fsbp","requirement:Identify","requirement:Asset-Management","scope:aws-iam","source:aws-iam","control:account.1"],"version":13,"id":"def-000-9cn","updatedAt":1756338906941,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"AWS accounts should have all primary and alternate contacts configured","createdAt":1774289019853,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-avw","queries":[{"query":"resource_type:aws_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_account","complianceFrameworks":[],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nREQUIRED_CONTACT_TYPES := {\"billing\", \"operations\", \"security\"}\n\nhas_all_alternate_contacts(account) if {\n\tconfigured_types := {lower(contact.alternate_contact_type) |\n\t\tsome contact in account.alternate_contacts\n\t}\n\tcount(REQUIRED_CONTACT_TYPES - configured_types) == 0\n}\n\nhas_primary_contact(account) if {\n\taccount.contact_information.full_name != \"\"\n\taccount.contact_information.phone_number != \"\"\n}\n\neval(account) := \"pass\" if {\n\thas_primary_contact(account)\n\thas_all_alternate_contacts(account)\n} else := \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_account"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nAll AWS accounts should have both primary contact information and all three alternate contact types configured: billing, operations, and security. Complete contact coverage ensures that AWS notifications about billing issues, operational events, and security incidents reach the appropriate teams. Missing contacts may cause critical alerts to go unnoticed.\n\n## Remediation\n\nConfigure primary contact information and all three alternate contact types (billing, operations, security) for the account. For guidance, refer to [Adding, changing, or removing alternate contacts][1]. \n\n[1]: https://docs.aws.amazon.com/accounts/latest/reference/manage-acct-update-contact-alternate.html\n","tags":["scored:true","security:compliance","cloud_provider:aws","scope:aws-iam","source:aws-iam"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"version":1,"id":"def-000-avw","updatedAt":1774289019853,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"}],"meta":{"page":{"current_page":1,"total_count":100,"total_filtered_count":100}}}'
