"/etc/chrony.conf\"\n\nif ! grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$config_file\" ; then\n  if ! grep -q ''#[[:space:]]*server'' \"$config_file\" ; then\n    for server in $(echo \"$var_multiple_time_servers\" | tr '','' ''\\n'') ; do\n      printf ''\\nserver %s'' \"$server\" >> \"$config_file\"\n    done\n  else\n    sed -i ''s/#[ \\t]*server/server/g'' \"$config_file\"\n  fi\n  if [[ -s \"$config_file\" ]] && [[ -n \"$(tail -c 1 -- \"$config_file\" || true)\" ]]; then\n      LC_ALL=C sed -i --follow-symlinks ''$a''\\\\ \"$config_file\"\n  fi\nfi\n\nelse\n    >&2 echo ''Remediation is not applicable, nothing was done''\nfi\n```\n\n### Ansible playbook\n\nThe following playbook can be run with Ansible to remediate the issue.\n\n```\n- name: Gather the package facts\n  package_facts:\n    manager: auto\n  tags:\n  - CCE-84218-7\n  - DISA-STIG-RHEL-09-252020\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n- name: XCCDF Value var_multiple_time_servers # promote to variable\n  set_fact:\n    var_multiple_time_servers: !!str 0.rhel.pool.ntp.org,1.rhel.pool.ntp.org,2.rhel.pool.ntp.org,3.rhel.pool.ntp.org\n  tags:\n    - always\n\n- name: Check if chrony main config has active server/pool entries\n  ansible.builtin.command:\n    cmd: grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' /etc/chrony.conf\n  register: chrony_conf_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  tags:\n  - CCE-84218-7\n  - DISA-STIG-RHEL-09-252020\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Extract sourcedir paths from chrony configuration\n  ansible.builtin.shell:\n    cmd: grep ''^[[:space:]]*sourcedir[[:space:]]\\+'' /etc/chrony.conf | awk ''{print\n      $2}''\n  register: chrony_sourcedir_paths\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  tags:\n  - CCE-84218-7\n  - DISA-STIG-RHEL-09-252020\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Check for server/pool entries in sourcedir .sources files\n  ansible.builtin.shell:\n    cmd: |\n      for dir in {{ chrony_sourcedir_paths.stdout_lines | join('' '') }}; do\n        if [ -d \"$dir\" ]; then\n          grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$dir\"/*.sources 2>/dev/null && exit 0\n        fi\n      done\n      exit 1\n  register: chrony_sourcedir_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_sourcedir_paths.stdout_lines | length > 0\n  tags:\n  - CCE-84218-7\n  - DISA-STIG-RHEL-09-252020\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Extract confdir paths from chrony configuration\n  ansible.builtin.shell:\n    cmd: grep ''^[[:space:]]*confdir[[:space:]]\\+'' /etc/chrony.conf | awk ''{print $2}''\n  register: chrony_confdir_paths\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  tags:\n  - CCE-84218-7\n  - DISA-STIG-RHEL-09-252020\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Check for server/pool entries in confdir .conf files\n  ansible.builtin.shell:\n    cmd: |\n      for dir in {{ chrony_confdir_paths.stdout_lines | join('' '') }}; do\n        if [ -d \"$dir\" ]; then\n          grep -q ''^[[:space:]]*\\(server\\|pool\\)[[:space:]]\\+[[:graph:]]\\+'' \"$dir\"/*.conf 2>/dev/null && exit 0\n        fi\n      done\n      exit 1\n  register: chrony_confdir_has_servers\n  changed_when: false\n  failed_when: false\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_facts.packages''\n  - chrony_conf_has_servers.rc != 0\n  - chrony_confdir_paths.stdout_lines | default([]) | length > 0\n  - (chrony_sourcedir_paths.stdout_lines | default([]) | length == 0 or chrony_sourcedir_has_servers.rc\n    != 0)\n  tags:\n  - CCE-84218-7\n  - DISA-STIG-RHEL-09-252020\n  - NIST-800-53-AU-8(1)(a)\n  - NIST-800-53-CM-6(a)\n  - PCI-DSS-Req-10.4.3\n  - PCI-DSSv4-10.6\n  - PCI-DSSv4-10.6.2\n  - chronyd_specify_remote_server\n  - configure_strategy\n  - low_complexity\n  - low_disruption\n  - medium_severity\n  - no_reboot_needed\n\n- name: Create sourcedir directory if needed\n  ansible.builtin.file:\n    path: ''{{ chrony_sourcedir_paths.stdout_lines[0] }}''\n    state: directory\n    mode: ''0755''\n  when:\n  - ''\"kernel-core\" in ansible_facts.packages''\n  - ''\"chrony\" in ansible_