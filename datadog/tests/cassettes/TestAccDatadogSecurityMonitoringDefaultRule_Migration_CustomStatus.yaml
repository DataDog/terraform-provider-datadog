axSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_kubernetes_engine_cluster","complianceFrameworks":[{"control":"5.5.4","framework":"cis-gke","is_default":true,"message":"","requirement":"Managed-Services","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.every\nimport future.keywords.if\nimport future.keywords.in\n\neval(kubernetes_engine_cluster) = \"pass\" if {\n\tlower(kubernetes_engine_cluster.release_channel.channel) in [\"regular\", \"stable\"]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_kubernetes_engine_cluster"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\nRelease channels should be used to automate version upgrades and reduce potential difficulties associated with version management. To prevent outages, a [maintenance window](https://cloud.google.com/kubernetes-engine/docs/how-to/maintenance-windows-and-exclusions) should be set up as well.\n\n\n\n## Remediation\nFollow the steps from Google Cloud and [Enable Release Channels](https://cloud.google.com/kubernetes-engine/docs/how-to/release-channels).","tags":["scored:true","control:5.5.4","security:compliance","framework:cis-gke","cloud_provider:gcp","level:1","requirement:Managed-Services","source:google_kubernetes_engine_cluster","scope:google_kubernetes_engine_cluster"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:5.5.4","security:compliance","framework:cis-gke","cloud_provider:gcp","level:1","requirement:Managed-Services","source:google_kubernetes_engine_cluster","scope:google_kubernetes_engine_cluster"],"version":2,"id":"def-000-m5z","updatedAt"