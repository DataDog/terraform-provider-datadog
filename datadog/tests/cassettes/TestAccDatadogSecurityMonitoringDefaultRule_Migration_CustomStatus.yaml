gement","version":"5"},{"control":"PR.IP-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"25.2","framework":"gdpr","is_default":true,"message":"","requirement":"Data-Protection","version":"1"},{"control":"32.1a","framework":"gdpr","is_default":true,"message":"","requirement":"Security-of-Processing","version":"1"},{"control":"A.18.1.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Compliance","version":"2"},{"control":"A.9.2.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Access-Control","version":"2"},{"control":"A.8.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"CM-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Configuration-Management","version":"5"},{"control":"CC6.1","framework":"soc-2","is_default":true,"message":"","requirement":"Logical-and-Physical-Access-Control","version":"2"},{"control":"CC6.3","framework":"soc-2","is_default":true,"message":"","requirement":"Logical-and-Physical-Access-Control","version":"2"},{"control":"3.7","framework":"cis-azure","is_default":true,"message":"","requirement":"Storage-Accounts","version":"2.0.0"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"},{"control":"2.8","framework":"dcsb-m-1","is_default":false,"requirement":"Azure","version":"1"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(storage_account) = \"pass\" if {\n\tstorage_account.allow_blob_public_access == false\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_storage_account"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nDisallowing public access for a storage account overrides the public access settings for individual containers in that storage account.\n\n### Default Value\n\nBy default, `Public access level` is set to `Private (no anonymous access)` for blob containers and `AllowBlobPublicAccess` is set to `Null` (allow in effect) for storage accounts.\n\n## Rationale\n\nIt is recommended that you avoid providing anonymous access to blob containers unless necessary. A Shared Access Signature (SAS) token or Azure AD RBAC should be used for providing controlled and timed access to blob containers. If no anonymous access is needed on any container in the storage account, it\u2019s recommended to set `allowBlobPublicAccess` to false at the account level, which prevents any container from accepting anonymous access in the future.\n\n### Impact\n\nAccess must be managed using shared access signatures or with Azure AD RBAC.\n\n## Remediation\n\n### From the console\n\n**Note**: You must [create a SAS token][1] for your blob containers before completing the following remediation steps.\n\n1. Go to **Storage Accounts**.\n2. For each storage account, go to **Configuration** in the side panel.\n3. Set **Allow Blob public access** to **Disabled**.\n\n### From the command line\n\nFirst, follow [Microsoft documentation][1] and create SAS tokens for\nyour blob containers. Then, follow the steps below:\n\n1. Set **Allow Blob Public Access** to `false` on the storage account.\n\n   ```\n   az storage account update --name <storage-account> --resource-group <resource-group> --allow-blob-public-access false\n   ```\n\n## References\n\n1. [https://learn.microsoft.com/en-us/azure/storage/common/storage-sas-overview][1]\n2. [https://docs.microsoft.com/en-us/azure/storage/blobs/anonymous-read-access-prevent][2]\n3. [https://docs.microsoft.com/en-us/security/benchmark/azure/security-controls-v3-governance-strategy#gs-2-define-and-implement-enterprise-segmentationseparation-of-duties-strategy][3]\n4. [https://docs.microsoft.com/en-us/security/benchmark/azure/security-controls-v3-network-security#ns-2-secure-cloud-services-with-network-controls][4]\n5. [https://docs.microsoft.com/en-us/azure/storage/blobs/anonymous-read-access-configure][5]\n6. [https://docs.microsoft.com/en-us/azure/storage/blobs/assign-azure-role-data-access][6]\n\n[1]: https://learn.microsoft.com/en-us/azure/cognitive-services/translator/document-translation/create-sas-tokens?tabs=Containers\n[2]: https://docs.microsoft.com/en-us/azure/storage/blobs/anonymous-read-access-prevent\n[3]: https://docs.microsoft.com/en-us/security/benchmark/azure-security-controls-v3-governance-strategy#gs-2-define-and-implement-enterprise-segmentationseparation-of-duties-strategy\n[4]: https://docs.microsoft.com/en-us/security/benchmark/azure/security-controls-v3-network-security#ns-2-secure-cloud-services-with-network-controls\n[5]: https://docs.microsoft.com/en-us/azure/storage/blobs/anonymous-read-access-configure\n[6]: https://docs.microsoft.com/en-us/azure/storage/blobs/assign-azure-role-data-access\n","tags":["scored:true","level:1","control:2.2.1","requirement:Security-Management-Process","framework:hipaa","requirement:Access-Control","scope:azure.storage","requirement:Technological-Controls","requirement:Workforce-Security","security:compliance","requirement:Configuration-Management","control:164.312-a-1","framework:dora","control:3.7","framework:cis-azure","framework:dcsb-m-1","framework_requirement:dcsb-m-1/Azure","framework:pci-dss","requirement:Data-Protection","framework:nist-800-53","source:azure.storage","control:CM-6","framework_requirement_control:dcsb-m-1/Azure/2.8","control:A.9.2.3","control:PR.IP-1","control:32.1a","requirement:Logical-and-Physical-Access-Control","cloud_provider:azure","framework:gdpr","control:164.308-a-3-i","control:13.1.d","requirement:Compliance","requirement:Storage-Accounts","requirement:Network-Security-Management","framework:nist-csf","framework:iso-27001","control:164.308-a-1-ii-B","requirement:Information-Protection","control:25.2","requirement:Azure","requirement:Apply-Secure-Configurations-to-All-System-Components","control:2.8","control:A.8.3","requirement:Security-of-Processing","control:A.18.1.3","framework:soc-2","framework:fedramp-high","control:CC6.3","control:CC6.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","cloud_provider:azure","framework:gdpr","control:164.308-a-3-i","control:13.1.d","requirement:Compliance","level:1","requirement:Storage-Accounts","requirement:Network-Security-Management","control:2.2.1","framework:nist-csf","requirement:Security-Management-Process","framework:iso-27001","framework:hipaa","requirement:Access-Control","control:164.308-a-1-ii-B","requirement:Information-Protection","scope:azure.storage","requirement:Technological-Controls","control:25.2","requirement:Workforce-Security","security:compliance","requirement:Configuration-Management","control:164.312-a-1","framework:dora","requirement:Apply-Secure-Configurations-to-All-System-Components","control:3.7","framework:cis-azure","control:A.8.3","framework:pci-dss","requirement:Data-Protection","framework:nist-800-53","source:azure.storage","requirement:Security-of-Processing","control:CM-6","control:A.18.1.