n\nfilter_resource_type_constant := upper(\"resource.type=\\\"gce_firewall_rule\\\"\")\n\nfilter_patch_constant := upper(\"protoPayload.methodName:\\\"compute.firewalls.patch\\\"\")\n\nfilter_insert_constant := upper(\"protoPayload.methodName:\\\"compute.firewalls.insert\\\"\")\n\nfilter_delete_constant := upper(\"protoPayload.methodName:\\\"compute.firewalls.delete\\\"\")\n\nvalid_log_metric := {logging_log_metric.project_id |\n\tsome logging_log_metric in input.resources.gcp_logging_log_metric\n\tsome monitoring_alert_policy in input.resources.gcp_monitoring_alert_policy\n\tmetric_and_alert_align(logging_log_metric, monitoring_alert_policy)\n\tvalid_log_metric_filter(logging_log_metric)\n\tvalid_alert_policy_conditions(monitoring_alert_policy)\n}\n\nmetric_and_alert_align(logging_log_metric, monitoring_alert_policy) if {\n\tlogging_log_metric.project_id == monitoring_alert_policy.project_id\n\tfilter := monitoring_alert_policy.conditions[_].condition_threshold.filter\n\talert_policy_name := regex.replace(filter, \"^.*metric\\\\.type\\\\s*=\\\\s*\\\"logging\\\\.googleapis\\\\.com\\\\/user\\\\/(.*?)\\\".*$\", \"$1\")\n\tlogging_log_metric.name == alert_policy_name\n}\n\nvalid_log_metric_filter(logging_log_metric) if {\n\tfilter_parsed := upper(regex.replace(logging_log_metric.filter, \"\\\\s\", \"\"))\n\tcontains(filter_parsed, \"AND\")\n\tcontains(filter_parsed, \"OR\")\n\tcontains(filter_parsed, filter_resource_type_constant)\n\tcontains(filter_parsed, filter_patch_constant)\n\tcontains(filter_parsed, filter_insert_constant)\n\tcontains(filter_parsed, filter_delete_constant)\n}\n\nvalid_alert_policy_conditions(monitoring_alert_policy) if {\n\tmonitoring_alert_policy.enabled == true\n\tmonitoring_alert_policy.notification_channels[_]\n}\n\neval(project) = \"pass\" if {\n\tvalid_log_metric[project.project_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_project","gcp_monitoring_alert_policy","gcp_logging_log_metric"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\nIt is recommended that a metric filter and alarm be established for Virtual Private Cloud\n(VPC) network firewall rule changes.\n\n## Rationale\nMonitoring create or update firewall rule events gives insight to network access\nchanges and may reduce the time it takes to detect suspicious activity.\n\n\n### Impact\nEnabling logging may result in your project being charged for the additional logs usage.\n\n## Remediation\n\n### From the console\n\n#### Create the prescribed log metric\n\n1. Go to Logging/Logs-based Metrics by visiting [https://console.cloud.google.com/logs/metrics][1] and click **CREATE METRIC**.\n2. Click the down arrow symbol on the **Filter Bar** at the rightmost corner and select **Convert to Advanced Filter**.\n3. Clear any text and add: \n\n```\n   resource.type=\"gce_firewall_rule\"\n   AND (protoPayload.methodName:\"compute.firewalls.patch\"\n   OR protoPayload.methodName:\"compute.firewalls.insert\"\n   OR protoPayload.methodName:\"compute.firewalls.delete\")\n   ```\n4. Click **Submit Filter**. Display logs appear based on the filter text entered by the\nuser.\n5. In the **Metric Editor** menu on the right, fill out the name field. Set **Units** to **1**\n(default) and Type to Counter. This ensures that the log metric counts the number\nof log entries matching the advanced logs query.\n6. Click **Create Metric**.\n\n#### Create a prescribed alert policy\n\n1. Go to [https://console.cloud.google.com/logs/metrics][1].  Under the **User-defined Metrics** section, identify the newly created metric.\n2. Click the kebab icon in the rightmost column for the new metric and select **Create alert from Metric**.\n3. Fill out the alert policy configuration and click **Save**. Choose the alerting threshold and configuration that makes sense for the user''s organization. For example, a threshold of zero(0) for the most recent value ensures that a notification is triggered for every owner change in the project:\n\n```\n   Set `Aggregator` to `Count`\n   Set `Configuration`:\n   - Condition: above\n   - Threshold: 0\n   - For: most recent value\n   ```\n4. Configure the desired notifications channels in the section **Notifications**.\n5. Name the policy and click **Save**.\n\n### From the command line\n\n#### Create a prescribed log metric\n\nUse the command: `gcloud logging metrics create`\nReference for command usage:\n[https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create][3]\n\n#### Create a prescribed alert policy\nUse the command: `gcloud alpha monitoring policies create`\nReference for command usage:\n[https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create][4]\n\n## References\n1. [https://cloud.google.com/logging/docs/logs-based-metrics/][5]\n2. [https://cloud.google.com/monitoring/custom-metrics/][6]\n3. [https://cloud.google.com/monitoring/alerts/][7]\n4. [https://cloud.google.com/logging/docs/reference/tools/gcloud-logging][8]\n5. [https://cloud.google.com/vpc/docs/firewalls][9]\n\n[1]: https://console.cloud.google.com/logs/metrics\n[2]: https://console.cloud.google.com/logs/metrics\n[3]: https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create\n[4]: https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create\n[5]: https://cloud.google.com/logging/docs/logs-based-metrics/\n[6]: https://cloud.google.com/monitoring/custom-metrics/\n[7]: https://cloud.google.com/monitoring/alerts/\n[8]: https://cloud.google.com/logging/docs/reference/tools/gcloud-logging\n[9]: https://cloud.google.com/vpc/docs/firewalls\n","tags":["scored:true","cloud_provider:gcp","control:3.14.1","control:3.14.2","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR