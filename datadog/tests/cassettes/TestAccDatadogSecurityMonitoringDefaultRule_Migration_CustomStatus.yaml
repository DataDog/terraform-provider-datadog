** tab.\n12. Select a **Resource group**, then provide an **Alert rule name** and an optional **Alert rule description**.\n13. Click **Review + create**.\n14. Click **Create**.\n","tags":["scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:7.1.2.3","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:5.2.3","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:nist-800-53","framework:soc-2","control:AU-6","framework:fedramp-high","control:CC2.1","control:CC7.2","control:CC7.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:7.1.2.3","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:5.2.3","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:nist-800-53","framework:soc-2","control:AU-6","framework:fedramp-high","control:CC2.1","control:CC7.2","control:CC7.1"],"version":21,"id":"def-000-9q9","updatedAt":1757012415429,"blocking":false,"complianceSignalOptions":{"defaultActivationSta