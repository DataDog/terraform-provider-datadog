  response:
    body: '{"data":[{"name":"''Allow storage account key access'' setting for Azure Storage Accounts should be disabled","createdAt":1754407839246,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-rq5","queries":[{"query":"resource_type:azure_storage_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"azure_storage_account","complianceFrameworks":[{"control":"10.3.1.3","framework":"cis-azure","is_default":true,"message":"","requirement":"Storage-Services","version":"4.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(storage_account) = \"pass\" if {\n\tstorage_account.allow_shared_key_access == false\n} else = \"fail\"\n\n# Output results\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_storage_account"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nDisable shared key access for Azure Storage Accounts.\n\n## Remediation\n\nDisable shared key access in the Storage Account Configuration settings. See [Azure shared key access](https://learn.microsoft.com/en-us/azure/storage/common/storage-account-keys-manage?tabs=azure-portal#disable-shared-key-access) for more information.\n","tags":["scored:true","security:compliance","source:azure.storage","requirement:Storage-Services","cloud_provider:azure","control:10.3.1.3","framework:cis-azure","scope:azure.storage"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defa