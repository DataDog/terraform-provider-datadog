  response:
    body: '{"data":[{"name":"AWS EC2 subnet deleted","createdAt":1674195803520,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"506-0ba-81f","queries":[{"query":"source:cloudtrail @eventSource:ec2.amazonaws.com @evt.name:DeleteSubnet -@level:Error","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when an attacker is destroying an EC2 subnet.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an attacker is deleting an EC2 subnet.\n\n* [DeleteSubnet][1]\n\n## Triage and response\n1. Determine if {{@userIdentity.arn}} should be deleting EC2 subnets.\n2. Contact the user to see if they intended to make this API call.\n3. If the user did not make the API call:\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.\n\n## Changelog\n1 April 2022 - Updated rule and signal message.\n\n[1]: https://docs.aws.amazon.com/cli/latest/reference/ec2/delete-subnet.html\n","tags":["scope:ec2","technique:T1485-data-destruction","iaas:aws","tactic:TA0040-impact","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:ec2","technique:T1485-data-destruction","iaas:aws","tactic:TA0040-impact","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"ygi-fi5-qns","updatedAt":1740655854301,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS ECS CreateCluster API calls in multiple regions","createdAt":1706257098303,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-fy7","queries":[{"query":"source:cloudtrail @evt.name:CreateCluster @eventSource:ecs.amazonaws.com","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":["@awsRegion"],"aggregation":"cardinality","name":"aws_ecs_createcluster","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":300,"keepAlive":300},"cases":[{"name":"","status":"high","notifications":[],"condition":"aws_ecs_createcluster > 7"}],"message":"## Goal\nDetect when there is an attempt to create AWS ECS clusters in multiple regions.\n\n## Strategy\nMonitor CloudTrail and detect when an attempt to create AWS ECS clusters in multiple regions occurs. An attacker may use ECS clusters as a means of creating easily scalable resources to mine cryptocurrency. See the following Datadog Security Labs [blog post][1] for further detail.\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` should have carried out this operation.\n2. If the API calls were not made by the user:\n  * Rotate user credentials.\n  * Remove the newly created cluster `{{@requestParameters.clusterName}}` and any associated tasks or services.\n  * Determine what other API calls were made by the user.\n  * Begin your organization''s incident response process and investigate.\n\n[1]: https://securitylabs.datadoghq.com/articles/tales-from-the-cloud-trenches-ecs-crypto-mining/","tags":["iaas:aws","tactic:TA0040-impact","source:cloudtrail","technique:T1496-resource-hijacking","mitre_platform:containers","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","tactic:TA0040-impact","source:cloudtrail","technique:T1496-resource-hijacking","mitre_platform:containers","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":4,"id":"def-000-fy7","updatedAt":1740655927154,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS ECS cluster deleted","createdAt":1674195804321,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"9d1-0fa-76a","queries":[{"query":"source:cloudtrail @eventSource:ecs.amazonaws.com @evt.name:DeleteCluster","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when an attacker is destroying an ECS Cluster\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an ECS cluster is deleted:\n\n* [DeleteCluster][1]\n\n## Triage and response\n1. Determine if {{@userIdentity.arm}} should be making a {{@evt.name}} API call.\n2. Contact the user to see if they intended to make this API call.\n3. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n\n## Changelog\n1 April 2022 - Updated rule query.\n\n[1]: https://docs.aws.amazon.com/AmazonECS/latest/APIReference/API_DeleteCluster.html\n","tags":["scope:ecs","technique:T1485-data-destruction","iaas:aws","tactic:TA0040-impact","source:cloudtrail","mitre_platform:containers","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:ecs","technique:T1485-data-destruction","iaas:aws","tactic:TA0040-impact","source:cloudtrail","mitre_platform:containers","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"vwu-6id-9lz","updatedAt":1740656321403,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS ELB HTTP requests from security scanner","createdAt":1674195803670,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"088-a06-67c","queries":[{"query":"source:elb @http.status_code:[400 TO 499] @http.useragent:(*burp* OR *burpcollaborator.net* OR *qualys* OR *nexpose* OR *OpenVAS* OR *Nikto* OR *Meterpreter* OR *IceWeasel* OR *DirB* OR *Comodo* OR *Tripwire* OR *Retina* OR *MBSA* OR *ImmuniWeb* OR *Netsparker* OR *Acunetix* OR *Intruder* OR *nmap* OR *CVE* OR *base64* OR *eval* OR *javascript* OR *alert*)","groupByFields":["@network.client.ip"],"hasOptionalGroupByFields":false,"distinctFields":["@http.url_details.path"],"aggregation":"cardinality","name":"multiple_400s_and_unique_paths","dataSource":"logs"},{"query":"source:elb @http.status_code:[200 TO 299] @http.useragent:(*burp* OR *burpcollaborator.net* OR *qualys* OR *nexpose* OR *OpenVAS* OR *Nikto* OR *Meterpreter* OR *IceWeasel* OR *DirB* OR *Comodo* OR *Tripwire* OR *Retina* OR *MBSA* OR *ImmuniWeb* OR *Netsparker* OR *Acunetix* OR *Intruder* OR *nmap* OR *CVE* OR *base64* OR *eval* OR *javascript* OR *alert*)","groupByFields":["@network.client.ip"],"hasOptionalGroupByFields":false,"distinctFields":["@http.url_details.path"],"aggregation":"cardinality","name":"multiple_200s_and_unique_paths","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"scan detected returning several 200s","status":"low","notifications":[],"condition":"multiple_200s_and_unique_paths > 10"},{"name":"scan detected returning several 400s","status":"info","notifications":[],"condition":"multiple_400s_and_unique_paths > 10"}],"message":"## Goal\nDetect when a web application is being scanned. This will identify attacker IP addresses who are not trying to hide their attempt to attack your system. More advanced hackers will use an inconspicuous `@http.useragent`. \n\n## Strategy\nInspect the user agent in the HTTP headers to determine if an IP is scanning your application using an HTTP header from [darkqusar][1]''s [gist][2]. The detection does this using 2 cases:\n* Case 1: The scanner is accessing several unique `@http.url_details.path`s and receiving `@http.status_code`s in the range of `200 TO 299`\n* Case 2: The scanner is accessing several unique `@http.url_details.path`s and receiving `@http.status_code`s in the range of `400 TO 499`\n\n## Triage and response\n1. Determine if this IP: {{@network.client.ip}} is making authenticated requests to the application.\n2. Check if these authentication requests are successful.\n   * If they are successful, change the status of the signal to `UNDER REVIEW` and begin your company''s incident response plan.\n   * If they are not successful, `ARCHIVE` the signal.\n\n**NOTE:** Your organization should tune out user agents that are valid and triggering this signal. To do this, see our [Fine-tune security signals to reduce noise][3] blog.\n\n## Changelog\n4 April 2022 - Updated rule cases and signal message.\n\n[1]: https://gist.github.com/darkquasar\n[2]: https://gist.github.com/darkquasar/84fb2cec6cc1668795bd97c02302d380\n[3]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise\n","tags":["technique:T1190-exploit-public-facing-application","source:elb","scope:elb","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1190-exploit-public-facing-application","source:elb","scope:elb","mitre_platform:iaas","security:attack","tactic:TA0001-initial-access","mitre_platform:cloud"],"version":15,"id":"csd-1pb-wxh","updatedAt":1740655627895,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS EventBridge rule disabled or deleted","createdAt":1674195802382,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"998-f99-7bd","queries":[{"query":"source:cloudtrail @eventSource:events.amazonaws.com @evt.name:(DeleteRule OR DisableRule)","groupByFields":["@userIdentity.arn","@requestParameters.name"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when an attacker is trying to evade defenses by deleting or disabling EventBridge rules.\n\n## Strategy\nThis rule lets you monitor these CloudTrail API calls to detect if an attacker is modifying or disabling EventBridge rules:\n\n* [DeleteRule][1]\n* [DisableRule][2]\n\n## Triage and response\n1. Determine if the arn: {{@userIdentity.arn}} should have made the {{@evt.name}} API call.\n2. Contact the user to see if they intended to make this API call.\n3. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n\n**NOTE:** Your organization should tune out user agents that are valid and triggering this signal. To do this, see our [Fine-tune security signals to reduce noise][3] blog.\n\n## Changelog\n4 April 2022 - Updated rule query, options, and signal markdown.\n\n[1]: https://docs.aws.amazon.com/eventbridge/latest/APIReference/API_DeleteRule.html\n[2]: https://docs.aws.amazon.com/eventbridge/latest/APIReference/API_DisableRule.html\n[3]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise\n","tags":["scope:eventbridge","iaas:aws","technique:T1089-disabling-security-tools","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:eventbridge","iaas:aws","technique:T1089-disabling-security-tools","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":12,"id":"mq6-cjx-h9o","updatedAt":1740656003381,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS FSx Excessive File Denied","createdAt":1652207425113,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"3fe-1fm-dlw","queries":[{"query":"source:aws.fsx @evt.id:4656 @Event.System.Keywords:0x8010000000000000","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":["@ObjectName"],"aggregation":"cardinality","name":"file_deny","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"file_deny > 10"}],"message":"## Goal\nDetect and identify users accessing files they do not have permission to access.\n\n## Strategy\nMonitor AWS FSx logs and detect more than 10 occurrences where `@evt.id` is equal to `4656` and `@Event.System.Keywords` is equal to `0x8010000000000000`. \n\n## Triage & Response\n1. Inspect the log and determine if the user should be accessing the file: `{{@ObjectName}}`.\n2. If access is not legitimate, investigate user `({{@usr.id}})` activity. \n","tags":["iaas:aws","source:amazon-fsx","scope:amazon-fsx","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","technique:T1526-cloud-service-discovery","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","source:amazon-fsx","scope:amazon-fsx","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","technique:T1526-cloud-service-discovery","mitre_platform:cloud"],"version":6,"id":"vsj-4y9-rg1","updatedAt":1740655967810,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS GuardDuty detector deleted","createdAt":1674195801251,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"719-39f-9cd","queries":[{"query":"source:cloudtrail @evt.name:DeleteDetector","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when an attacker is trying to evade defenses by deleting a GuardDuty detector.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an attacker is deleting a GuardDuty Detector:\n\n* [DeleteDetector][1]\n\n## Triage and response\n1. Determine which user in your organization owns the API key that made this API call.\n2. Contact the user to see if they intended to make this API call.\n3. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n\n[1]: https://docs.aws.amazon.com/guardduty/latest/ug/delete-detector.html\n","tags":["iaas:aws","scope:guardduty","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:guardduty","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":13,"id":"pzi-led-yyc","updatedAt":1740655592335,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS GuardDuty finding","createdAt":1694418619968,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"we5-t9i-qng","queries":[{"query":"@detail.service.additionalInfo.sample:true","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"none","name":"","dataSource":"logs"},{"query":"@detail.severity:[1.0 TO 3.9]","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"none","name":"","dataSource":"logs"},{"query":"@detail.severity:[4.0 TO 6.9]","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"none","name":"","dataSource":"logs"},{"query":"@detail.severity:[7.0 TO 8.9]","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"none","name":"","dataSource":"logs"},{"query":"@detail.severity:[9.0 TO 10.0]","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"none","name":"","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"third_party","maxSignalDuration":86400,"keepAlive":1800,"thirdPartyRuleOptions":{"signalTitleTemplate":"AWS GuardDuty finding - {{ @triggering_event.title }}","defaultStatus":"high","rootQueries":[{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:EC2\\/*","groupByFields":["instance-id"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:IAMUser\\/*","groupByFields":["@usr.id"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:Kubernetes\\/*","groupByFields":["@detail.resource.eksClusterDetails.name"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:S3\\/*","groupByFields":["@detail.resource.s3BucketDetails.arn"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:RDS\\/*","groupByFields":["@detail.resource.rdsDbInstanceDetails.dbInstanceArn"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:Lambda\\/*","groupByFields":["@detail.resource.lambdaDetails.functionArn"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:ECS\\/*","groupByFields":["@detail.resource.ecsClusterDetails.arn"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:Container\\/*","groupByFields":["@detail.resource.containerDetails.name"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:Runtime\\/* instance-id:*","groupByFields":["instance-id"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:*\\:Runtime\\/*","groupByFields":["@detail.resource.ecsClusterDetails.arn"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\" @evt.name:AttackSequence*","groupByFields":["@detail.service.detection.sequence.actors.user.name"]},{"query":"source:guardduty @detail-type:\"GuardDuty Finding\"","groupByFields":[]}],"defaultNotifications":[]},"relatedSignalsFields":["@network.client.ip","instance-id","@usr.id"]},"cases":[{"name":"","status":"info","notifications":[]},{"name":"","status":"low","notifications":[]},{"name":"","status":"medium","notifications":[]},{"name":"","status":"high","notifications":[]},{"name":"","status":"critical","notifications":[]}],"message":"## Goal\nDetect when an [AWS GuardDuty finding][1] has been raised.\n\n## Strategy\nAWS GuardDuty is a native threat detection service that monitors:\n\n* CloudTrail management events\n* AWS CloudTrail data events for Amazon S3 \n* DNS logs\n* Kubernetes audit logs\n* Amazon VPC flow logs\n* RDS login activity monitoring \n\nIt also analyzes Amazon EBS volume data for Malware Protection in Amazon GuardDuty. With these data sources, GuardDuty generates security findings for your account.\n\n## Triage and response\n1. Investigate the GuardDuty finding to determine if it is malicious or benign.\n2. If the finding is deemed malicious, follow the [remediation guidance][2] provided by Amazon along with any internal incident response processes.\n3. Otherwise findings can be managed to reduce false positives through:\n    * [Suppression rules][3]\n    * [Trusted IP lists][4]\n\n## Changelog\n* 7 September 2023 - Updated group by value for EC2 query.\n* 28 November 2023 - Added query for Runtime findings.\n* 19 December 2023 - Added query for Runtime findings from ECS clusters.\n* 9 December 2024 - Added query for Attack sequence findings and critical severity.\n\n[1]: https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_findings.html \n[2]: https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_remediate.html\n[3]: https://docs.aws.amazon.com/guardduty/latest/ug/findings_suppression-rule.html\n[4]: https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_upload-lists.html","tags":["iaas:aws","source:guardduty"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","source:guardduty"],"version":15,"id":"31k-zjc-qgr","updatedAt":1733740392015,"blocking":false,"metadata":{"entities":null,"sources":null},"thirdPartyCases":[{"name":"","status":"info","notifications":[],"query":"@detail.service.additionalInfo.sample:true"},{"name":"","status":"low","notifications":[],"query":"@detail.severity:[1.0 TO 3.9]"},{"name":"","status":"medium","notifications":[],"query":"@detail.severity:[4.0 TO 6.9]"},{"name":"","status":"high","notifications":[],"query":"@detail.severity:[7.0 TO 8.9]"},{"name":"","status":"critical","notifications":[],"query":"@detail.severity:[9.0 TO 10.0]"}],"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS GuardDuty publishing destination deleted","createdAt":1674195803025,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"wv9-wm3-v0s","queries":[{"query":"source:cloudtrail @evt.name:DeletePublishingDestination","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when a user deletes a publishing destination for a detector which will prevent the exporting of findings. \n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if a user has deleted a Guard Duty publishing destination.\n\n* [DeletePublishingDestination][1]\n\n## Triage and response\n1. Determine which user in your organization owns the API key that made this API call.\n2. Contact the user to see if they intended to make this API call.\n3. If the user did not make the API call:\n    * Rotate the credentials.\n    * Investigate if the same credentials made other unauthorized API calls.\n\n[1]: https://docs.aws.amazon.com/fr_fr/guardduty/latest/APIReference/API_DeletePublishingDestination.html","tags":["iaas:aws","scope:guardduty","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:guardduty","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":7,"id":"rdm-leo-ndi","updatedAt":1740654860982,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS GuardDuty threat intel set deleted","createdAt":1656400802242,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"dhz-27i-ani","queries":[{"query":"source:cloudtrail @evt.name:DeleteThreatIntelSet","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_guardduty_threatintel_set_deleted","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_guardduty_threatintel_set_deleted > 0"}],"message":"## Goal\nDetect when an attacker is trying to evade defenses by deleting a GuardDuty ThreatIntelSet.\n\n## Strategy\nThis rule lets you monitor this CloudTrail API call to detect if an attacker is deleting a GuardDuty ThreatIntelSet:\n\n* [DeleteThreatIntelSet][1]\n\n## Triage and response\n1. Determine if user: `{{@userIdentity.arn}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Replace ThreatIntelSets deleted by the user with the `aws-cli` command [create-threat-intel-set][2] or use the [AWS Console][3].\n3. If the API call was made by the user:\n  * Determine if the user should be performing this API call and if it was an authorized change.\n  * If No, see if other API calls were made by the user and determine if they warrant further investigation.\n\n[1]: https://docs.aws.amazon.com/guardduty/latest/APIReference/API_DeleteThreatIntelSet.html\n[2]: https://docs.aws.amazon.com/cli/latest/reference/guardduty/create-threat-intel-set.html\n[3]: https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_upload-lists.html","tags":["iaas:aws","scope:guardduty","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","scope:guardduty","technique:T1562-impair-defenses","source:cloudtrail","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":8,"id":"vzr-qw9-k82","updatedAt":1740655967805,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM AdministratorAccess policy was applied to a group","createdAt":1684397072259,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-wnq","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:AttachGroupPolicy @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AdministratorAccess\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_admin_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_admin_policy_attached > 0"}],"message":"## Goal\nDetect when the `AdministratorAccess` policy is attached to an AWS IAM group.\n\n## Strategy\nThis rule allows you to monitor CloudTrail and detect if an attacker has attached the AWS managed policy [`AdministratorAccess`][1] to an AWS IAM group using the [`AttachGroupPolicy`][2] API call.\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the `AdministratorAccess` policy from the `{{@requestParameters.groupName}}` group using the `aws-cli` command [detach-group-policy][3].\n3. If the API call was made legitimately by the user:\n  * Determine if the group `{{@requestParameters.groupName}}` requires the `AdministratorAccess` policy to perform the intended function.\n  * Advise the user to find the [least privileged][4] policy that allows the group to operate as intended.\n\n[1]: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_job-functions.html#jf_administrator\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachGroupPolicy.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/iam/detach-group-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":6,"id":"crp-sct-hcp","updatedAt":1740656321407,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM AdministratorAccess policy was applied to a role","createdAt":1684397168691,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-4z1","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:AttachRolePolicy @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AdministratorAccess\" -@userIdentity.invokedBy:(member.org.stacksets.cloudformation.amazonaws.com OR sso.amazonaws.com OR cloudformation.amazonaws.com)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_admin_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_admin_policy_attached > 0"}],"message":"## Goal\nDetect when the `AdministratorAccess` policy is attached to an AWS IAM role.\n\n## Strategy\nThis rule lets you monitor CloudTrail to detect if an attacker has attached the AWS managed policy [`AdministratorAccess`][1] to an AWS IAM role via the [`AttachRolePolicy`][2] API call.\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the `AdministratorAccess` policy from the `{{@requestParameters.roleName}}` role using the `aws-cli` command [detach-role-policy][3].\n3. If the API call was made legitimately by the user:\n  * Determine if the role `{{@requestParameters.roleName}}` requires the AdministratorAccess policy to perform its intended function.\n  * Advise the user to find the [least privileged][4] policy that allows the role to operate as intended.\n\n[1]: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_job-functions.html#jf_administrator\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachRolePolicy.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/iam/detach-role-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":6,"id":"ikx-i5t-wlt","updatedAt":1740655373421,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM AdministratorAccess policy was applied to a user","createdAt":1684397074508,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-sd5","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:AttachUserPolicy @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AdministratorAccess\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_admin_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_admin_policy_attached > 0"}],"message":"## Goal\nDetect when the `AdministratorAccess` policy is attached to an AWS IAM user.\n\n## Strategy\nThis rule allows you to monitor CloudTrail and detect if an attacker has attached the AWS managed policy [`AdministratorAccess`][1] to an AWS IAM user using the [`AttachUserPolicy`][2] API call.\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the `AdministratorAccess` policy from the `{{@requestParameters.userName}}` user using the `aws-cli` command [detach-user-policy][3].\n3. If the API call was made legitimately by the user:\n  * Determine if the user `{{@requestParameters.userName}}` requires the AdministratorAccess policy to perform the intended function.\n  * Advise the user to find the [least privileged][4] policy that allows the user to operate as intended.\n\n[1]: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_job-functions.html#jf_administrator\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachUserPolicy.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/iam/detach-user-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":6,"id":"pe8-n1t-pux","updatedAt":1740656092329,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM AmazonSESFullAccess policy was applied to a group","createdAt":1734528601974,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-beg","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:AttachGroupPolicy @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AmazonSESFullAccess\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_sesfullaccess_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_sesfullaccess_policy_attached > 0"}],"message":"## Goal\nDetect when the `AmazonSESFullAccess` policy is attached to an AWS IAM group.\n\n## Strategy\nThis rule allows you to monitor CloudTrail and detect if an attacker has attached the AWS managed policy [`AmazonSESFullAccess`][1] to an AWS IAM group using the [`AttachGroupPolicy`][2] API call. An attacker with an objective of leveraging the AWS Simple Email Service (SES) may only attach a policy relating to SES to avoid detections relating to the AWS managed policy [`AdministratorAccess`].\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the `AmazonSESFullAccess` policy from the `{{@requestParameters.groupName}}` group using the `aws-cli` command [detach-group-policy][3].\n3. If the API call was made legitimately by the user:\n  * Determine if the group `{{@requestParameters.groupName}}` requires the `AmazonSESFullAccess` policy to perform the intended function.\n  * Advise the user to find the [least privileged][4] policy that allows the group to operate as intended.\n\n[1]: https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AmazonSESFullAccess.html\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachGroupPolicy.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/iam/detach-group-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":3,"id":"def-000-beg","updatedAt":1740655297270,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM AmazonSESFullAccess policy was applied to a role","createdAt":1734529288990,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-4or","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:AttachRolePolicy @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AmazonSESFullAccess\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_sesfullaccess_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_sesfullaccess_policy_attached > 0"}],"message":"## Goal\nDetect when the `AmazonSESFullAccess` policy is attached to an AWS IAM role.\n\n## Strategy\nThis rule allows you to monitor CloudTrail and detect if an attacker has attached the AWS managed policy [`AmazonSESFullAccess`][1] to an AWS IAM role using the [`AttachRolePolicy`][2] API call. An attacker with an objective of leveraging the AWS Simple Email Service (SES) may only attach a policy relating to SES to avoid detections relating to the AWS managed policy [`AdministratorAccess`].\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the `AmazonSESFullAccess` policy from the `{{@requestParameters.roleName}}` role using the `aws-cli` command [detach-role-policy][3].\n3. If the API call was made legitimately by the user:\n  * Determine if the role `{{@requestParameters.roleName}}` requires the `AmazonSESFullAccess` policy to perform the intended function.\n  * Advise the user to find the [least privileged][4] policy that allows the role to operate as intended.\n\n[1]: https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AmazonSESFullAccess.html\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachRolePolicy.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/iam/detach-role-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":3,"id":"def-000-4or","updatedAt":1740655261623,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM AmazonSESFullAccess policy was applied to a user","createdAt":1734529432920,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-q7d","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:AttachUserPolicy @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AmazonSESFullAccess\"","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_sesfullaccess_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"aws_sesfullaccess_policy_attached > 0"}],"message":"## Goal\nDetect when the `AmazonSESFullAccess` policy is attached to an AWS IAM user.\n\n## Strategy\nThis rule allows you to monitor CloudTrail and detect if an attacker has attached the AWS managed policy [`AmazonSESFullAccess`][1] to an AWS IAM user using the [`AttachUserPolicy`][2] API call. An attacker with an objective of leveraging the AWS Simple Email Service (SES) may only attach a policy relating to SES to avoid detections relating to the AWS managed policy [`AdministratorAccess`].\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have made a `{{@evt.name}}` API call.\n2. If the API call was not made by the user:\n  * Rotate user credentials.\n  * Determine what other API calls were made by the user.\n  * Remove the `AmazonSESFullAccess` policy from the `{{@requestParameters.userName}}` user using the `aws-cli` command [detach-user-policy][3].\n3. If the API call was made legitimately by the user:\n  * Determine if the user `{{@requestParameters.userName}}` requires the `AmazonSESFullAccess` policy to perform the intended function.\n  * Advise the user to find the [least privileged][4] policy that allows the user to operate as intended.\n\n[1]: https://docs.aws.amazon.com/aws-managed-policy/latest/reference/AmazonSESFullAccess.html\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachuserPolicy.html\n[3]: https://docs.aws.amazon.com/cli/latest/reference/iam/detach-user-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","tactic:TA0004-privilege-escalation","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":3,"id":"def-000-q7d","updatedAt":1740655373422,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM Identity Center SSO configuration updated","createdAt":1745935764818,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-t3z","queries":[{"query":"source:cloudtrail @evt.name:UpdateSsoConfiguration @eventSource:sso.amazonaws.com","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"aws_sso_update_configuration","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"low","notifications":[],"condition":"aws_sso_update_configuration > 0"}],"message":"## Goal\nDetects when the configuration for the current SSO instance is modified. This rule monitors for changes to AWS SSO settings that could impact authentication and access control.\n\n## Strategy\nThis rule monitors AWS CloudTrail logs for `UpdateSsoConfiguration` events originating from AWS IAM Identity Center. AWS SSO configuration updates can include changes to identity provider settings, authentication methods, and access control policies that govern how users authenticate and access AWS resources.\n\n## Triage & Response\n1. Review the `@userIdentity.arn` to identify the user or role that made the configuration change.\n2. Check if the change was made during a scheduled maintenance window or by an authorized administrator.\n3. Verify if the configuration change aligns with documented change management procedures.\n4. Examine the specific parameters modified in the SSO configuration to determine the scope of changes.","tags":["technique:T1556-modify-authentication-process","tactic:TA0006-credential-access","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1556-modify-authentication-process","tactic:TA0006-credential-access","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":2,"id":"def-000-t3z","updatedAt":1745935764818,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM Roles Anywhere User Profile Creation","createdAt":1753785036899,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-jtm","queries":[{"query":"source:cloudtrail @evt.name:CreateProfile @eventSource:rolesanywhere.amazonaws.com","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"user_profile_creation","dataSource":"logs"}],"options":{"evaluationWindow":900,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"low","notifications":[],"condition":"user_profile_creation > 0"}],"message":"## Goal\n\nDetect when an IAM Roles Anywhere profile is created.\n\n## Strategy\n\nThis rule monitors CloudTrail logs for `CreateProfile` API calls. An attacker may attempt to [create a profile][1], a list of the roles that the AWS IAM Roles Anywhere service is trusted to assume. Profiles are used to intersect permissions with IAM managed policies.\n\n## Triage & response\n\n1. Determine if the API call `{{@evt.name}}` should have been performed by the user `{{@userIdentity.arn}}`:\n   - Contact the user to confirm if they made the API call.\n2. If the API call was not made by the user:\n   - Rotate the user credentials.\n   - Determine what actions the user took and which new access keys the user created.\n   - Begin your organization''s incident response process and investigate.\n\n## References\n\n[1]: https://docs.aws.amazon.com/rolesanywhere/latest/APIReference/API_CreateProfile.html\n","tags":["scope:iam","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":2,"id":"def-000-jtm","updatedAt":1753785036899,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM Roles Anywhere trust anchor created","createdAt":1691540252104,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-bf8","queries":[{"query":"source:cloudtrail @evt.name:CreateTrustAnchor @eventSource:rolesanywhere.amazonaws.com","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"trust_anchor_creation","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"trust_anchor_creation > 0"}],"message":"## Goal\n\nDetect when an IAM Roles Anywhere trust anchor is created.\n\n## Strategy\n\nThis rule monitors CloudTrail logs for `CreateTrustAnchor` API calls. An attacker may attempt to establish persistence by creating an IAM Roles Anywhere trust anchor. The IAM Roles Anywhere service allows workloads that do not run in AWS to assume roles by presenting a client-side X.509 certificate signed by a trusted certificate authority, called a \"trust anchor\".\n\n## Triage & response\n\n1. Determine if the API call: `{{@evt.name}}` should have been performed by the user: `{{@userIdentity.arn}}`:\n   - Contact the user to confirm if they made the API call.\n2. If the API call was not made by the user:\n   - Rotate the user credentials.\n   - Determine what actions the user took and which new access keys the user created.\n   - Begin your organization''s incident response process and investigate.\n3. If the API call was made legitimately by the user:\n   - Confirm if an IAM Roles Anywhere trust anchor is the proper authentication mechanism for the resource.\n\n## Changelog\n\n- 4 June 2025 - Updated rule case to `Medium`.\n","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":6,"id":"0rf-c5k-kwn","updatedAt":1749248292663,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM User created with AdministratorAccess policy attached","createdAt":1694185546843,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-ilw","queries":[{"query":"source:cloudtrail @evt.name:CreateUser @eventSource:iam.amazonaws.com","groupByFields":["@requestParameters.userName"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"create_iam_user","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:AttachUserPolicy @eventSource:iam.amazonaws.com  @requestParameters.policyArn:\"arn:aws:iam::aws:policy/AdministratorAccess\"","groupByFields":["@requestParameters.userName"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"administratoraccess_policy_attached","dataSource":"logs"}],"options":{"evaluationWindow":600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"create_iam_user > 0 THEN administratoraccess_policy_attached > 0"}],"message":"## Goal\nDetect when an AWS IAM user is created and the managed AdministratorAccess policy is attached shortly after. \n\n## Strategy\nThis rule leverages CloudTrail and triggers if an [`CreateUser`][1] API call is followed by the AWS managed policy [`AdministratorAccess`][2] being attached for the requested IAM user within 10 minutes. This can be an indicator of an attacker trying to preserve access to the AWS environment and to ensure the level of privileges required to achieve their objectives.\n\n## Triage and response\n1. Determine if `{{@userIdentity.session_name}}` should have carried out this operation.\n2. If the API calls were not made by the user:\n  * Rotate user credentials.\n  * Remove the newly created IAM user `{{@requestParameters.userName}}`. \n  * Determine what other API calls were made by the user and the newly created user `{{@requestParameters.userName}}`.\n  * Begin your organization''s incident response process and investigate.\n3. If the API call was made legitimately by the user:\n  * It is recommended that IAM roles are used for human users and workloads so that they use temporary credentials.\n  * If an IAM user is required, advise the user to find the [least privileged][3] policy that allows the user to operate as intended.\n  * If not, see if other API calls were made by the user and determine if they warrant further investigation.\n\n[1]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_CreateUser.html\n[2]: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_job-functions.html#jf_administrator\n[3]: https://docs.aws.amazon.com/IAM/latest/UserGuide/best-practices.html#grant-least-privilege","tags":["technique:T1136-create-account","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["technique:T1136-create-account","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":4,"id":"eve-hgt-i3k","updatedAt":1740656163955,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM activity by S3 browser utility","createdAt":1686126305059,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-x1d","queries":[{"query":"source:cloudtrail @evt.name:CreateLoginProfile @http.useragent:*s3browser.com*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"s3_browser_create_loginprofile","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:PutUserPolicy @http.useragent:*s3browser.com*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"s3_browser_inline_policy_audit","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:CreateUser @http.useragent:*s3browser.com*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"s3_browser_create_user","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:CreateAccessKey @http.useragent:*s3browser.com*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"s3_browser_create_accesskey","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"LoginProfile created","status":"high","notifications":[],"condition":"s3_browser_create_loginprofile > 0"},{"name":"IAM user created","status":"high","notifications":[],"condition":"s3_browser_create_user > 0"},{"name":"Access key created","status":"high","notifications":[],"condition":"s3_browser_create_accesskey > 0"},{"name":"Inline policy added/updated","status":"medium","notifications":[],"condition":"s3_browser_inline_policy_audit > 0"}],"message":"## Goal\nDetect IAM activity associated with the S3 browser utility.\n\n## Strategy\nThis rule monitors AWS CloudTrail and detects IAM activity associated with the S3 browser utility. S3 browser is a freeware Windows client for Amazon S3 and Amazon CloudFront. This tool has been used by the threat group GUI-vil in order to persist or escalate privileges in a victim''s AWS account. Details about this threat group can be seen in the [Permiso blog post][1].\n\nThis rule monitors the following API calls:\n\n* CreateUser\n* CreateLoginProfile\n* CreateAccessKey\n* PutUserPolicy\n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` should be attempting to use the S3 browser utility.\n    * Investigate any other actions carried out by the potentially compromised identity `{{@userIdentity.arn}}` using the Cloud SIEM investigator.\n2. If the activity is determined to be malicious:\n    * Rotate the affected credentials.\n    * Remove any new IAM users, access keys, or LoginProfiles.\n    * Begin your organization''s incident response process and investigate.\n\n[1]: https://permiso.io/blog/s/unmasking-guivil-new-cloud-threat-actor/","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":3,"id":"pqa-pey-ag5","updatedAt":1740656204625,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM activity from EC2 instance","createdAt":1679558673068,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-pdi","queries":[{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:(CreateUser OR AttachUserPolicy) @userIdentity.session_name:i-*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"iam_user_api_call_from_ec2","dataSource":"logs"},{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:(CreateLoginProfile OR UpdateLoginProfile) @userIdentity.session_name:i-*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"iam_login_profile_from_ec2","dataSource":"logs"},{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:CreateAccessKey @userIdentity.session_name:i-*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"iam_create_access_key_from_ec2","dataSource":"logs"},{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:(AttachGroupPolicy OR CreateGroup) @userIdentity.session_name:i-*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"iam_group_api_call_from_ec2","dataSource":"logs"},{"query":"source:cloudtrail @eventSource:iam.amazonaws.com @evt.name:(AttachRolePolicy OR CreateRole) @userIdentity.session_name:i-*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"iam_role_api_call_from_ec2","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"a user has been created or user policy attached","status":"medium","notifications":[],"condition":"iam_user_api_call_from_ec2 > 0"},{"name":"a login profile has been created or updated","status":"medium","notifications":[],"condition":"iam_login_profile_from_ec2 > 0"},{"name":"a IAM access key has been created","status":"medium","notifications":[],"condition":"iam_create_access_key_from_ec2 > 0"},{"name":"a group has been created or group policy attached","status":"medium","notifications":[],"condition":"iam_group_api_call_from_ec2 > 0"},{"name":"a role has been created or role policy attached","status":"low","notifications":[],"condition":"iam_role_api_call_from_ec2 > 0"}],"message":"## Goal\nDetect when an AWS EC2 instance role makes API calls to AWS IAM.\n\n## Strategy\nThis rule lets you monitor CloudTrail to detect when an AWS EC2 instance role makes certain API calls to IAM. An attacker who has managed to retrieve temporary access keys assigned to a EC2 instance may try to retain access or escalate privileges by the making the following API calls:\n\n* CreateUser\n* AttachUserPolicy\n* CreateLoginProfile\n* UpdateLoginProfile\n* CreateAccessKey\n* CreateGroup\n* AttachGroupPolicy\n* CreateRole\n* AttachRolePolicy\n\n## Triage and response\n1.  Determine if `{{@userIdentity.session_name}}` should be attempting to make the identified API calls.\n   * Use the Cloud SIEM - Host Investigation dashboard to assess host activity.\n2. Contact the team that owns the service the host is part of, to confirm it should make these API calls.\n3. If this is abnormal behavior for the host:\n   * Revoke role temporary credentials.\n   * Investigate to see what API calls might have been made that were successful throughout the rest of the environment.","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":7,"id":"lwd-fyh-aym","updatedAt":1740656252545,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM group can assume a role with administrative privileges","createdAt":1695317720431,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-hlf","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given group can use `sts:AssumeRole` to assume a role with administrative privileges. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM group to the minimum required for the group to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resource specified in the IAM policy.\n","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":7,"id":"0ge-2h7-r9z","updatedAt":1724360329127,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM group can create a login profile for an IAM user with administrative privileges","createdAt":1695245923487,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-h1i","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given group can use `iam:CreateLoginProfile` to create a new login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM group in the account which does not have a login profile set. The identity which triggered this detection can create a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM group to the minimum necessary for the group to fulfill its function. To remediate the issue, either remove the `iam:CreateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"bs0-wqe-1tx","updatedAt":1700518799257,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM group can create access keys for an IAM user with administrative privileges","createdAt":1695317740304,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-md1","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given group can use `iam:CreateAccessKey` to create a new access keys for an IAM user with administrative privileges. By creating a new access key pair for another user, an adversary could use those credentials to operate as that user and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can create an access key pair for an IAM user with administrative privileges, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM group to the minimum required for the group to fulfill its function. To remediate the issue, either remove the `iam:CreateAccessKey` permission entirely, or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"rtv-pyk-kzx","updatedAt":1700518798420,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM group can update a login profile for an IAM user with administrative privileges","createdAt":1695245922193,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-t8i","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given group can use `iam:UpdateLoginProfile` to modify an existing login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who has a login profile set. The identity which triggered this detection can modify a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM group to the minimum necessary for the group to fulfill its function. To remediate the issue, either remove the `iam:UpdateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"ixl-xz2-grq","updatedAt":1700518814073,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM group can update the trust policy for a role with administrative privileges","createdAt":1695317729016,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-xj7","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given group can use `iam:UpdateAssumeRolePolicy` to modify an existing trust policy for an IAM role with administrative privileges. By modifying the role trust policy, an adversary could assume that role and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can update the trust policy for a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM group to the minimum required for the group to fulfill its function. To remediate the issue, either remove the `iam:UpdateAssumeRolePolicy` permission entirely, or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"n6j-hg3-op0","updatedAt":1700518799795,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM group has access to a large number of resources","createdAt":1689883162874,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-nv1","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule identifies when an IAM group has a policy attached, which permits them access to a significant number of resources in the account.\n\n## Rationale\nIAM policies should be scoped down to have the fewest permissions needed to perform their function. In the event the IAM group is compromised, if the associated policies are too broadly scoped, this would permit an adversary to access a significant number of resources in the account.\n\n## Remediation\nReview the policies attached to the IAM group and ensure the `Resource` policy element is scoped down to only what is needed.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:high_impact","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:high_impact","cloud_provider:aws"],"version":5,"id":"ptr-7xy-79v","updatedAt":1699268419273,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM group has administrative privileges","createdAt":1689171486786,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-lil","queries":[{"query":"resource_type:aws_iam_group","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_group","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nConfirm there are no IAM Groups with administrative privileges for your AWS account.\n\n## Rationale\nAn IAM group with administratative privileges can access all services and resources in an AWS account. Any groups with IAM users that should not have access can potentially, whether unknowingly or purposefully, cause security issues or data leaks.\n\n## Remediation\nDetermine the proper permissions needed for the group and modify the IAM policy to better match that need.","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"34n-rne-3d7","updatedAt":1700518821888,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM policy modified","createdAt":1689874654746,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"7b6-2a8-df9","queries":[{"query":"source:cloudtrail -@level:Error @evt.name:(DeleteGroupPolicy OR PutGroupPolicy OR AttachGroupPolicy OR DetachGroupPolicy) @eventSource:iam.amazonaws.com","groupByFields":["@userIdentity.accountId"],"hasOptionalGroupByFields":false,"distinctFields":["@userIdentity.arn"],"aggregation":"cardinality","name":"group_policy_modified","dataSource":"logs"},{"query":"source:cloudtrail -@level:Error @evt.name:(UpdateAssumeRolePolicy OR DeleteRolePolicy OR PutRolePolicy OR AttachRolePolicy OR DetachRolePolicy) @eventSource:iam.amazonaws.com","groupByFields":["@userIdentity.accountId"],"hasOptionalGroupByFields":false,"distinctFields":["@userIdentity.arn"],"aggregation":"cardinality","name":"role_policy_modified","dataSource":"logs"},{"query":"source:cloudtrail -@level:Error @evt.name:(DeleteUserPolicy OR PutUserPolicy OR AttachUserPolicy OR DetachUserPolicy) @eventSource:iam.amazonaws.com","groupByFields":["@userIdentity.accountId"],"hasOptionalGroupByFields":false,"distinctFields":["@userIdentity.arn"],"aggregation":"cardinality","name":"user_policy_modified","dataSource":"logs"},{"query":"source:cloudtrail -@level:Error @evt.name:(CreatePolicy OR DeletePolicy) @eventSource:iam.amazonaws.com","groupByFields":["@userIdentity.accountId"],"hasOptionalGroupByFields":false,"distinctFields":["@userIdentity.arn"],"aggregation":"cardinality","name":"account_policy_modified","dataSource":"logs"},{"query":"source:cloudtrail -@level:Error @evt.name:(SetDefaultPolicyVersion OR CreatePolicyVersion OR DeletePolicyVersion) @eventSource:iam.amazonaws.com","groupByFields":["@userIdentity.accountId"],"hasOptionalGroupByFields":false,"distinctFields":["@userIdentity.arn"],"aggregation":"cardinality","name":"policy_version_modified","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"group policy changed","status":"info","notifications":[],"condition":"group_policy_modified > 0"},{"name":"role policy changed","status":"info","notifications":[],"condition":"role_policy_modified > 0"},{"name":"user policy changed","status":"info","notifications":[],"condition":"user_policy_modified > 0"},{"name":"account policy changed","status":"info","notifications":[],"condition":"account_policy_modified > 0"},{"name":"policy version changed","status":"info","notifications":[],"condition":"policy_version_modified > 0"}],"message":"## Goal\nDetect a change to an AWS IAM Policy.\n\n## Strategy\nThis rule lets you monitor CloudTrail and detect when any event pertaining to an AWS IAM policy is detected with one of the following API calls:\n\n* [DeleteGroupPolicy][1]\n* [DeleteRolePolicy][2]\n* [DeleteUserPolicy][3]\n* [PutGroupPolicy][4]\n* [PutRolePolicy][5]\n* [PutUserPolicy][6]\n* [CreatePolicy][7]\n* [DeletePolicy][8]\n* [SetDefaultPolicyVersion][9]\n* [CreatePolicyVersion][10]\n* [DeletePolicyVersion][11]\n* [AttachRolePolicy][12]\n* [DetachRolePolicy][13]\n* [AttachUserPolicy][14]\n* [DetachUserPolicy][15]\n* [AttachGroupPolicy][16]\n* [DetachGroupPolicy][17]\n* [UpdateAssumeRolePolicy][18]\n\n## Triage and response\n1. Review the IAM Policy change and ensure it does not negatively impact your risk in relation to authentication or authorization controls.\n2. If risk is increased, contact the individual that used the arn: `{{@userIdentity.arn}}` and determine if the `{{@evt.name}}` API calls were made by them.\n\n## Changelog\n5 April 2022 - Updated rule and signal message.\n12 Jul 2023 - Updated query and evaluation window.\n\n[1]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeleteGroupPolicy.html\n[2]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeleteRolePolicy.html  \n[3]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeleteUserPolicy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_PutGroupPolicy.html\n[5]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_PutRolePolicy.html\n[6]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_PutUserPolicy.html\n[7]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_CreatePolicy.html\n[8]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeletePolicy.html\n[9]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_SetDefaultPolicyVersion.html\n[10]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_CreatePolicyVersion.html\n[11]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DeletePolicyVersion.html\n[12]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachRolePolicy.html\n[13]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DetachRolePolicy.html\n[14]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachUserPolicy.html\n[15]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DetachUserPolicy.html\n[16]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_AttachGroupPolicy.html\n[17]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_DetachGroupPolicy.html\n[18]: https://docs.aws.amazon.com/IAM/latest/APIReference/API_UpdateAssumeRolePolicy.html\n\n\n","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":20,"id":"z8s-u06-ctu","updatedAt":1740655421677,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS IAM policy with administrative privileges is not attached to any principal","createdAt":1689782539477,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-l6e","queries":[{"query":"resource_type:aws_iam_policy","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_policy","complianceFrameworks":[]}},"cases":[{"name":"","status":"info","notifications":[],"condition":"a > 0"}],"message":"## Description\nA privileged IAM policy exists but is not attached to any principal.\n\n## Rationale\nIf an IAM policy is not in use it may indicate that it is no longer needed. Highly privileged policies may accidentally be attached to principals, providing them full access to all services and resources in the AWS account. Unused policies should be removed to mitigate this risk.\n\n## Remediation\nDetermine if the policy is needed for a particular function and if not, remove it.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:Unused"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:Unused"],"version":5,"id":"edi-bdi-nsx","updatedAt":1699268411687,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can assume a role with administrative privileges","createdAt":1695317708832,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-38i","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given role can use `sts:AssumeRole` to assume a role with administrative privileges in the same account inside your AWS Organization. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum required for the role to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resource specified in the IAM policy.\n","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":6,"id":"sfe-phn-uye","updatedAt":1724360427726,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can assume a role with administrative privileges cross-account","createdAt":1724360329475,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-nor","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given role can use `sts:AssumeRole` to assume a role with administrative privileges in a different account inside your AWS Organization. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges in a different account of your AWS Organization, giving them access to the privileges of that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum required for the role to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resource specified in the IAM policy.\n","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":2,"id":"def-000-nor","updatedAt":1731431197519,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can assume multiple roles with administrative privileges cross-account","createdAt":1731706259617,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-b1r","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another, more privileged identity. This rule identifies when a given role can use `sts:AssumeRole` to assume multiple IAM roles with administrative privileges in different accounts in your AWS environment. By assuming these more privileged roles, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume multiple IAM roles with administrative privileges in different accounts in your AWS environment, giving them access to the privileges of that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum required for the role to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resources specified in the IAM policy.\n\n\n","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"version":1,"id":"def-000-b1r","updatedAt":1731706259617,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can create a login profile for an IAM user with administrative privileges","createdAt":1695073053743,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-q1n","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given role can use `iam:CreateLoginProfile` to create a new login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who does not have a login profile set. The identity which triggered this detection can create a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum necessary for the role to fulfill its function. To remediate the issue, either remove the `iam:CreateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"4m3-x2a-bc6","updatedAt":1700518816299,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can create access keys for an IAM user with administrative privileges","createdAt":1695317720114,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-7lz","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given role can use `iam:CreateAccessKey` to create a new access keys for an IAM user with administrative privileges. By creating a new access key pair for another user, an adversary could use those credentials to operate as that user and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can create an access key pair for an IAM user with administrative privileges, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum required for the role to fulfill its function. To remediate the issue, either remove the `iam:CreateAccessKey` permission entirely, or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"6pp-kvj-5ed","updatedAt":1700518817696,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can update a login profile for an IAM user with administrative privileges","createdAt":1695245922973,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-0ow","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given role can use `iam:UpdateLoginProfile` to modify an existing login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who has a login profile set. The identity which triggered this detection can modify a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum necessary for the role to fulfill its function. To remediate the issue, either remove the `iam:UpdateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"gth-gyt-cqk","updatedAt":1700518795962,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role can update the trust policy for a role with administrative privileges","createdAt":1695317710272,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-sdh","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given role can use `iam:UpdateAssumeRolePolicy` to modify an existing trust policy for an IAM role with administrative privileges. By modifying the role trust policy, an adversary could assume that role and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can update the trust policy for a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum required for the role to fulfill its function. To remediate the issue, either remove the `iam:UpdateAssumeRolePolicy` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"but-bcw-ozo","updatedAt":1700518794568,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role has a large permissions gap","createdAt":1689782525284,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-qaw","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\nTo mitigate the impact of credential exposure or compromise, IAM policies should be scoped down to the least level of privilege needed to perform their responsibilities. This rule identifies when a role''s policy''s permissions are more broad than what is regularly used. Datadog considers a permissions gap to be large when the number of unused permissions is greater than 40% of the total permissions count.\n\n## Rationale\nBy comparing what actions an IAM role performed recently with what the role''s policies permit, we can identify a permissions gap. This gap should be removed to mitigate the impact of a potential compromise.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum necessary for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.\n\nCloudTrail logs can be filtered in multiple ways that can impact rule detection. \n1. CloudTrail logs forwarded to Datadog using the Datadog Forwarder Lambda function can be filtered through the `ExcludeAtMatch` parameter as detailed in the [log filtering section][1] of the Datadog forwarder page. Check the Datadog Forwarder Lambda function settings for any unused permissions being excluded. If the unused permissions are part of the exclusion filters, remove the entries excluding the logs containing these permissions.\n2. Please check AWS for any configured event selectors. Individual [trails][2] can be configured to filter out events based on [Event Selectors][3]. Please ensure forwarded logs don''t have Event Selectors enabled.\n\n[1]: https://docs.datadoghq.com/logs/guide/forwarder/?tab=cloudformation#log-filtering-optional\n[2]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-concepts.html#cloudtrail-concepts-trails\n[3]: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/API_EventSelector.html\n","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:over_permissioned","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:over_permissioned","cloud_provider:aws"],"version":10,"id":"ykj-dfe-uje","updatedAt":1722011606345,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role has a trust relationship with a wildcard principal","createdAt":1695317718044,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-lut","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[],"defaultSecurityInbox":true}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule ensures that none of your IAM roles have a trust policy which includes a [wildcard](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_principal.html#principal-anonymous) as a `Principal`. It is possible to specify a wildcard principal which permits any principal, including those outside your AWS organization, the ability to assume the role. It is strongly discouraged to use the wildcard principal in a trust policy unless there is a [Condition](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_condition.html) element to restrict access.\n\n## Rationale\nWhen a role has a trust relationship with a [wildcard](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_principal.html#principal-anonymous) `Principal`, this means that any AWS account (including those outside your AWS organization) can assume that role. Roles with this level of access may be targeted by an adversary to compromise the entire AWS account.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum necessary for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.\n\nAny role with a trust relationship involving a wildcard should be audited to ensure their validity and compliance with any security requirements set in place by your organization. In addition, the use of a [Condition](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_condition.html) element is strongly encouraged. ","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":6,"id":"lw1-egr-3nj","updatedAt":1700518829738,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role has access to a large number of resources","createdAt":1689782489761,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-1im","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule identifies when an IAM role has a policy attached which permits them access to a significant number of resources in the account.\n\n## Rationale\nIAM policies should be scoped down to have the fewest permissions needed to perform their function. In the event the IAM role is compromised, if the associated policies are too broadly scoped, this would permit an adversary to access a significant number of resources in the account.\n\n## Remediation\nReview the policies attached to the IAM role and ensure the `Resource` policy element is scoped down to only what is needed.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:high_impact","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:high_impact","cloud_provider:aws"],"version":6,"id":"c6k-ryq-pvf","updatedAt":1700518828669,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role has administrative privileges","createdAt":1689782525291,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-0ta","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule ensures that none of your IAM roles have highly-privileged policies or administrative policies attached to them.\n\n## Rationale\nAn IAM role with highly privileged or administrative permissions can access all AWS services and resources in the account. A role with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. Roles with these level of access may also be targeted by an adversary to compromise the entire AWS account.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum necessary for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"psx-jkf-aoo","updatedAt":1700518783737,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role has administrative privileges and is inactive","createdAt":1689782525291,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-11s","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nIf an IAM role is highly privileged or has administrative privileges and is inactive, this may indicate the role is not regularly used and may be removed.\n\n## Rationale\nIAM roles should be scoped down to have the fewest privileges needed to perform their function. In the event a role has not been used for an extended period of time, this may indicate that the role is no longer needed and can be removed.\n\n## Remediation\nDetermine if the role is needed for a particular function and if not, remove it.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:Unused"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:Unused"],"version":6,"id":"4kh-utf-ukq","updatedAt":1700518783873,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role with administrative privileges has a trust relationship with a wildcard principal","createdAt":1691519643130,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-k6r","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[],"defaultSecurityInbox":true}},"cases":[{"name":"","status":"critical","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule ensures that none of your IAM roles have highly-privileged policies or administrative policies attached to them and a trust policy which includes a [wildcard](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_principal.html#principal-anonymous) as a `Principal`. It is possible to specify a wildcard principal which permits any principal, including those outside your AWS organization, the ability to assume the role. It is strongly discouraged to use the wildcard principal in a trust policy unless there is a [Condition](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_condition.html) element to restrict access.\n\n## Rationale\nAn IAM role with highly privileged or administrative permissions can access all AWS services and resources in the account. A role with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. Roles with this level of access may also be targeted by an adversary to compromise the entire AWS account. When a role has a trust relationship with a [wildcard](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_principal.html#principal-anonymous) `Principal`, this means that any AWS account (including those outside your AWS organization) can assume that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum required for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.\n\nAny role with a trust relationship involving a wildcard should be audited to ensure their validity and compliance with any security requirements set in place by your organization. In addition, the use of a [Condition](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_condition.html) element is strongly encouraged. ","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":6,"id":"soq-by1-bu9","updatedAt":1699268470280,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role with administrative privileges has an external cross-account trust relationship","createdAt":1689782489763,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-6xq","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"critical","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule ensures that none of your IAM roles have highly-privileged policies or administrative policies attached to them and a trust policy to an external AWS account.\n\n## Rationale\nAn IAM role with highly privileged or administrative permissions can access all AWS services and resources in the account. A role with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. Roles with these level of access may also be targeted by an adversary to compromise the entire AWS account. When a role has a trust relationship with an account outside of your AWS organization, if that account is compromised by an adversary, they will have a direct path to assume a highly privileged role in your AWS account.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM role to the minimum necessary for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.\n\nAny roles with trust relationships to AWS accounts outside of your AWS organization should be audited to ensure their validity and compliance with any security requirements set in place by your organization.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:cross_account_trust"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:cross_account_trust"],"version":9,"id":"ses-te7-ktu","updatedAt":1727478716265,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM role with external cross-account trust relationship does not use an external ID","createdAt":1689782489757,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-au9","queries":[{"query":"resource_type:aws_iam_role","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_role","complianceFrameworks":[]}},"cases":[{"name":"","status":"info","notifications":[],"condition":"a > 0"}],"message":"## Description\nTo reduce the risk of [confused deputy](https://docs.aws.amazon.com/IAM/latest/UserGuide/confused-deputy.html) attacks, external vendors should use an [external ID](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_create_for-user_externalid.html) when assuming a role in your AWS account.\n\n## Rationale\nThe use of external IDs mitigate the risk of confused deputy attacks.\n\n## Remediation\nEnsure all external identities use an external ID when assuming a role in your AWS account.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:cross_account_trust"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:cross_account_trust"],"version":4,"id":"irm-4nf-xvf","updatedAt":1699268426711,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can assume a role with administrative privileges","createdAt":1695073054512,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-j5k","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given user can use `sts:AssumeRole` to assume a role with administrative privileges in the same account inside your AWS Organization. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum required for the user to fulfill their function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":6,"id":"wvm-isp-dvv","updatedAt":1724360365387,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can assume a role with administrative privileges cross-account","createdAt":1724360329484,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-zz5","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given IAM user can use `sts:AssumeRole` to assume a role with administrative privileges in a different account inside your AWS Organization. By assuming this more privileged role, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume a role with administrative privileges in a different account of your AWS Organization, giving them access to the privileges of that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum required for the user to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resource specified in the IAM policy.\n","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":2,"id":"def-000-zz5","updatedAt":1731431200427,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can assume multiple roles with administrative privileges cross-account","createdAt":1731706210189,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-t92","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"critical","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another, more privileged identity. This rule identifies when a given user can use `sts:AssumeRole` to assume multiple IAM roles with administrative privileges in different accounts in your AWS environment. By assuming these more privileged roles, an adversary can leverage their permissions for further access.\n\n## Rationale\nThe identity which triggered this detection can assume multiple IAM roles with administrative privileges in different accounts in your AWS environment, giving them access to the privileges of that role.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum required for the user to fulfill its function. To remediate the issue, either remove the `sts:AssumeRole` permission entirely, or modify the resources specified in the IAM policy.\n","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"version":1,"id":"def-000-t92","updatedAt":1731706210189,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can create a login profile for an IAM user with administrative privileges","createdAt":1695073054036,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-68x","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given user can use `iam:CreateLoginProfile` to create a new login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who does not have a login profile set. The identity which triggered this detection can create a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum necessary for the user to fulfill their function. To remediate the issue, either remove the `iam:CreateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"dyv-jug-5gi","updatedAt":1700518791165,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can create access keys for an IAM user with administrative privileges","createdAt":1695073052838,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-0cb","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given user can use `iam:CreateAccessKey` to create a new access keys for an IAM user with administrative privileges. By creating a new access key pair for another user, an adversary could use those credentials to operate as that user and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can create an access key pair for an IAM user with administrative privileges, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum required for the user to fulfill their function. To remediate the issue, either remove the `sts:CreateAccessKey` permission entirely or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"jyg-xtc-el0","updatedAt":1700518815603,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can update a login profile for an IAM user with administrative privileges","createdAt":1695245924110,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-9dd","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given user can use `iam:UpdateLoginProfile` to modify an existing login profile for an IAM user with administrative privileges. By creating a new login profile for another user, an adversary could log in as that user and leverage their privileges.\n\n## Rationale\nIn this scenario, there exists at least one privileged IAM user in the account who has a login profile set. The identity which triggered this detection can modify a login profile for that IAM user, giving them access to the privileges of the compromised user. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum necessary for the user to fulfill their function. To remediate the issue, either remove the `iam:UpdateLoginProfile` permission entirely or modify the resource the IAM policy specifies.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"pro-ovb-pqk","updatedAt":1700518831693,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user can update the trust policy for a role with administrative privileges","createdAt":1695073054513,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-4f4","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIn AWS environments, some IAM permissions can lead to privilege escalation, where an identity can gain access to another more privileged identity. This rule identifies when a given user can use `iam:UpdateAssumeRolePolicy` to modify an existing trust policy for an IAM role with administrative privileges. By modifying the role trust policy, an adversary could assume that role and leverage their privileges.\n\n## Rationale\nThe identity which triggered this detection can update the trust policy for a role with administrative privileges, giving them access to the privileges of that role. \n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum required for the user to fulfill their function. To remediate the issue, either remove the `iam:UpdateAssumeRolePolicy` permission entirely, or modify the resource specified in the IAM policy.","tags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:privilege_escalation","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"rcg-pdp-1di","updatedAt":1700518783371,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user has a large permissions gap","createdAt":1689782538851,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-bqd","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nTo mitigate the impact of credential exposure or compromise, IAM policies should be scoped down to the least level of privilege needed to perform their responsibilities. This rule identifies when a user''s policy''s permissions are more broad than what is regularly used. Datadog considers a permissions gap to be large when the number of unused permissions is greater than 40% of the total permissions count.\n\n## Rationale\nBy comparing what actions an IAM user performed recently with what the user''s policies permit, we can identify a permissions gap. This gap should be removed to mitigate the impact of a potential compromise.\n\n## Remediation\nDatadog recommends reducing the permissions attached to an IAM user to the minimum necessary for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.\n\nCloudTrail logs can be filtered in multiple ways that can impact rule detection. \n1. CloudTrail logs forwarded to Datadog using the Datadog Forwarder Lambda function can be filtered through the `ExcludeAtMatch` parameter as detailed in the [log filtering section][1] of the Datadog forwarder page. Check the Datadog Forwarder Lambda function settings for any unused permissions being excluded. If the unused permissions are part of the exclusion filters, remove the entries excluding the logs containing these permissions.\n2. Please check AWS for any configured event selectors. Individual [trails][2] can be configured to filter out events based on [Event Selectors][3]. Please ensure forwarded logs don''t have Event Selectors enabled.\n\n[1]: https://docs.datadoghq.com/logs/guide/forwarder/?tab=cloudformation#log-filtering-optional\n[2]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-concepts.html#cloudtrail-concepts-trails\n[3]: https://docs.aws.amazon.com/awscloudtrail/latest/APIReference/API_EventSelector.html","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:over_permissioned","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:over_permissioned","cloud_provider:aws"],"version":10,"id":"0s0-y30-0mq","updatedAt":1722011605266,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user has access to a large number of resources","createdAt":1689782538850,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-njg","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule identifies when an IAM user has a policy attached which permits access to a significant number of resources in the account. \n\n\n## Rationale\nIAM policies should be scoped down to have the fewest permissions needed to perform their function. In the event the IAM user is compromised, if the associated policies are too broadly scoped, this would permit an adversary to access a significant number of resources in the account.\n\n## Remediation\nReview the policies attached to the IAM user and ensure the `Resource` policy element is scoped down to only what is needed.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:high_impact","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","security_theme:high_impact","cloud_provider:aws"],"version":6,"id":"iym-wtg-euv","updatedAt":1699268454762,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user has administrative privileges","createdAt":1689782489762,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-eui","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule ensures that none of your IAM users have highly privileged policies or administrative policies attached to them.\n\n## Rationale\nAn IAM user with highly privileged or administrative permissions can access all AWS services and resources in the account. A user with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. Users with these level of access may also be targeted by an adversary to compromise the entire AWS account.\n\n## Remediation\n\n### From the console\n\nFollow the [Removing a permissions policy from a user][4] docs to revoke policies from a user.\n\n### From the command line\n\n1. Run `list-users` to get [a list of current IAM users][1].\n   ```\n   aws iam list-users\n   ```\n\n2. Run the `list-user-policies` command find the [users attached policies][2].\n   ```\n    aws iam list-user-policies --user-name Name\n   ```\n\n3. Run the `detach-user-policy` command to [remove policies from the user][3].\n   ```\n    aws iam detach-user-policy \\\n    --user-name insert-username-here \\\n    --policy-arn insert-policy-arn-here\n   ```\n\n[1]: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/iam/list-users.html\n[2]: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/iam/list-user-policies.html#examples\n[3]: https://awscli.amazonaws.com/v2/documentation/api/latest/reference/iam/detach-user-policy.html\n[4]: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_users_change-permissions.html#users_change_permissions-remove-policy-console\n","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":5,"id":"lwc-wu5-t0u","updatedAt":1700518824820,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS IAM user has administrative privileges and is inactive","createdAt":1689782525301,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-rf2","queries":[{"query":"resource_type:aws_iam_user","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_user","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nIf an IAM user is highly privileged or has administrative privileges and is inactive, this may indicate the role is not regularly used and may be removed.\n\n## Rationale\nAn IAM user with highly privileged or administrative permissions can access all AWS services and resources in the account. A role with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. IAM users with this level of access may also be targeted by an adversary to compromise the entire AWS account. In the event a user has not be active for an extended period of time, this may indicate that the role is no longer needed and can be removed.\n\n## Remediation\nDetermine if the user is needed for a particular function and if not, remove it.","tags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:Unused"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","dd_rule_type:ciem","source:iam","cloud_provider:aws","security_theme:Unused"],"version":7,"id":"jqw-mpz-qke","updatedAt":1700518792021,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS Java_Ghost security group creation attempt","createdAt":1701763523796,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-60z","queries":[{"query":"source:cloudtrail @evt.name:CreateSecurityGroup (@requestParameters.groupName:\"Java_Ghost\" OR @requestParameters.groupDescription:\"We Are There But Not Visible\")","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"java_ghost_security_group","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"high","notifications":[],"condition":"java_ghost_security_group > 0"}],"message":"## Goal\nDetect when an attempt to create an AWS security group called \"Java_Ghost\" is observed.\n\n## Strategy\nMonitor CloudTrail and detect when an attempt to create an AWS security group called \"Java_Ghost\" has been observed. Datadog''s security research team has assessed with high confidence that an occurrence of this event likely means that identity `{{@userIdentity.arn}}` has been compromised. Recent [research][1] has indicated that this behaviour may act as a calling card for a specific attacker group.\n\n## Triage and response\n1. Determine other actions taken by the identity `{{@userIdentity.arn}}` by looking at past activity and the types of API calls occurring. \n2. Begin your company''s incident response process and an investigation.\n\n## Changelog\n* 25 April 2025 - updated rule query to include security group description `We Are There But Not Visible`.\n\n[1]: https://unit42.paloaltonetworks.com/javaghost-cloud-phishing/","tags":["scope:cloudtrail","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:cloudtrail","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":8,"id":"a79-ojc-jwt","updatedAt":1745935995022,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS KMS key deleted or scheduled for deletion","createdAt":1674195802421,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"432-8db-b8b","queries":[{"query":"source:(cloudtrail OR amazon-security-lake) @evt.name:(DisableKey OR ScheduleKeyDeletion)","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":3600,"keepAlive":3600},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Goal\nDetect when a KMS (Key Management Service) key is deleted or scheduled for deletion.\n\n## Strategy\nThis rule lets you monitor these CloudTrail API calls to detect if an attacker is deleting KMS keys:\n* [DisableKey][1]\n* [ScheduleKeyDeletion][2]\n\n## Triage and response\n1. Determine if `user ARN:` {{@userIdentity.arn}} in your organization should be making this call.\n2. If the user did not make the API call:\n    * Rotate the credentials.\n    * Use the `Cloud SIEM - User Investigation` OOTB dashboard to investigate other potential unauthorized API calls from this user.\n\n## Changelog\n* 16 March 2022 - Updated rule severity and markdown.\n* 16 November 2022 - Updated rule query.\n\n[1]: https://docs.aws.amazon.com/kms/latest/APIReference/API_DisableKey.html\n[2]: https://docs.aws.amazon.com/kms/latest/APIReference/API_ScheduleKeyDeletion.html \n","tags":["security:compliance","iaas:aws","technique:T1485-data-destruction","scope:kms","requirement:Monitoring","tactic:TA0040-impact","framework:cis-aws","control:4.7","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["security:compliance","iaas:aws","technique:T1485-data-destruction","scope:kms","requirement:Monitoring","tactic:TA0040-impact","framework:cis-aws","control:4.7","source:cloudtrail","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":17,"id":"iff-hhm-bd3","updatedAt":1740655663637,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Kinesis Firehose stream destination modified","createdAt":1688542821749,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"1y1-elh-nph","queries":[{"query":"source:cloudtrail @eventSource:firehose.amazonaws.com @evt.name:UpdateDestination -@http.useragent:(cloudformation.amazonaws.com OR APN\\/*)","groupByFields":["@requestParameters.deliveryStreamName"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"firehose_destination_modified","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":3600},"cases":[{"name":"firehose_destination_modified","status":"medium","notifications":[],"condition":"firehose_destination_modified > 0"}],"message":"## Goal\nDetects when an AWS Kinesis Firehose Destination is modified.\n\n## Strategy\nThe rule monitors AWS Kinesis Firehose logs `@eventSource:firehose.amazonaws.com` and detects when the `@evt.name` is `UpdateDestination`.  \n\n## Triage and response\n1. Determine if `{{@userIdentity.arn}}` is expected to perform the `{{@evt.name}}` API call on the account: `{{@userIdentity.accountId}}`.\n2. If the API call was not made by the user, rotate the user credentials and investigate what other APIs were successfully accessed.\n   * Rotate the credentials.\n   * Investigate if the same credentials made other unauthorized API calls.","tags":["iaas:aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","scope:firehose","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","source:cloudtrail","technique:T1562-impair-defenses","tactic:TA0005-defense-evasion","mitre_platform:iaas","scope:firehose","security:attack","mitre_platform:cloud"],"version":11,"id":"jwi-qgm-ncc","updatedAt":1740655481008,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Lambda function has administrative privileges","createdAt":1694623452589,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-4to","queries":[{"query":"resource_type:aws_lambda_function","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_lambda_function","complianceFrameworks":[]}},"cases":[{"name":"","status":"high","notifications":[],"condition":"a > 0"}],"message":"## Description\nThis rule ensures that none of your Lambda functions have IAM roles with highly-privileged policies or administrative policies attached to them.\n\n## Rationale\nAn IAM role with highly privileged or administrative permissions can access all AWS services and resources in the account. A role with these privileges could potentially, whether unknowingly or purposefully, cause security issues or data leaks. Roles with these levels of access may also be targeted by an adversary to compromise the entire AWS account.\n\n## Remediation\nDatadog recommends reducing the permissions attached to a Lambda Function to the minimum necessary for it to fulfill its function. You can use AWS Access Advisor to identify effective permissions used by your instances, and use AWS IAM Access Analyzer to generate an IAM policy based on past CloudTrail events.","tags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:iam","scored:true","security:compliance","security_theme:administrator_privileges","dd_rule_type:ciem","source:iam","cloud_provider:aws"],"version":7,"id":"x6l-p4h-liv","updatedAt":1700594942859,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"identity_risk"},{"name":"AWS Lambda function modified by IAM user","createdAt":1689005719909,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-b61","queries":[{"query":"source:cloudtrail @eventSource:lambda.amazonaws.com @evt.name:UpdateFunctionCode* @userIdentity.type:IAMUser -@userIdentity.invokedBy:(cloudformation.amazonaws.com OR \"AWS Internal\")","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":["@requestParameters.functionName"],"aggregation":"cardinality","name":"lambda_function_modified","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"info","notifications":[],"condition":"lambda_function_modified > 0"}],"message":"## Goal\nDetect when a IAM user modifies an AWS Lambda function. An attacker might modify a lambda function in order to maintain persistence or exfiltrate data being processed at runtime within an AWS environment.\n\n## Strategy\nThis rule lets you monitor the [`UpdateFunctionCode`][1] CloudTrail API call to detect when an AWS Lambda Function is modified. \n\n## Triage and response\n1. Determine whether the IAM user: `{{@userIdentity.arn}}` is expected to update the Lambda function within the `@requestParameters.functionName` attribute.\n2. If the action is legitimate, consider including the user in a suppression list. See [Best practices for creating detection rules with Datadog Cloud SIEM][2] for more information.\n3. If the action shouldn''t have happened:\n   * Contact the user: `{{@userIdentity.arn}}` and see if they made the API call.\n   * Use the Cloud SIEM - User Investigation dashboard to see if the user `{{@userIdentity.arn}}` has taken other actions.\n   * Use the Cloud SIEM - IP Investigation dashboard to see if there''s more traffic from the IP `{{@network.client.ip}}`.\n4. If the results of the triage indicate that an attacker has taken the action, begin your company''s incident response process as well as an investigation.\n\n[1]: https://docs.aws.amazon.com/lambda/latest/dg/API_UpdateFunctionCode.html\n[2]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":6,"id":"ktq-1ti-iff","updatedAt":1740654788729,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Lambda function resource-based policy modified by IAM user","createdAt":1689060423328,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-ser","queries":[{"query":"source:cloudtrail @eventSource:lambda.amazonaws.com @evt.name:AddPermission* @userIdentity.type:IAMUser -@userIdentity.invokedBy:(cloudformation.amazonaws.com OR \"AWS Internal\")","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":["@requestParameters.functionName"],"aggregation":"cardinality","name":"lambda_resource_based_policy_modified","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"low","notifications":[],"condition":"lambda_resource_based_policy_modified > 0"}],"message":"## Goal\nDetect when an AWS Lambda function resource-based policy is modified by an IAM user. An attacker might modify an AWS Lambda function''s resource-based policy in order to maintain persistence or allow its invocation from an external account.\n\n## Strategy\nThis rule lets you monitor the [`AddPermission`][1] CloudTrail API call to detect when an AWS Lambda Function''s resource-based policy is modified.\n\n## Triage and response\n1. Determine whether the IAM user: `{{@userIdentity.arn}}` is expected to update the Lambda function within the `@requestParameters.functionName` attribute.\n2. Investigate the `{{@responseElements.statement}}` attribute for policy modification details.\n3. If the action is legitimate, consider including the user in a suppression list. See [Best practices for creating detection rules with Datadog Cloud SIEM][2] for more information.\n3. If the action shouldn''t have happened:\n   * Contact the user: `{{@userIdentity.arn}}` and see if they made the API call.\n   * Use the Cloud SIEM - User Investigation dashboard to see if the user `{{@userIdentity.arn}}` has taken other actions.\n   * Use the Cloud SIEM - IP Investigation dashboard to see if there''s more traffic from the IP `{{@network.client.ip}}`.\n4. If the results of the triage indicate that an attacker has taken the action, begin your company''s incident response process as well as an investigation.\n\n[1]: https://docs.aws.amazon.com/lambda/latest/dg/API_AddPermission.html\n[2]: https://www.datadoghq.com/blog/writing-datadog-security-detection-rules/#fine-tune-security-signals-to-reduce-noise","tags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:iam","iaas:aws","technique:T1098-account-manipulation","source:cloudtrail","mitre_platform:iaas","security:attack","tactic:TA0003-persistence","mitre_platform:cloud"],"version":5,"id":"mjz-2eq-rtp","updatedAt":1740656016094,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS ListResources by long term access key","createdAt":1754680324387,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":true,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-8qc","queries":[{"query":"source:cloudtrail @evt.name:ListResources @eventSource:resource-explorer-2.amazonaws.com @userIdentity.accessKeyId:AKIA* -@threat_intel.results.category:corp_vpn","groupByFields":["@userIdentity.accessKeyId","@awsRegion"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"listresources_long_term_access_keys","dataSource":"logs"},{"query":"source:cloudtrail @evt.name:ListResources @eventSource:resource-explorer-2.amazonaws.com @userIdentity.accessKeyId:AKIA* -@threat_intel.results.category:corp_vpn @threat_intel.results.intention:(suspicious OR malicious)","groupByFields":["@userIdentity.accessKeyId","@awsRegion"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"listresources_long_term_access_keys_threat_intel","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"suspicious IP used","status":"high","notifications":[],"condition":"listresources_long_term_access_keys_threat_intel > 0"},{"name":"long term access key used","status":"medium","notifications":[],"condition":"listresources_long_term_access_keys > 0"}],"message":"## Goal\n\nDetects usage of long-term AWS access keys to execute `ListResources` operations in AWS Resource Explorer. Identifies potential unauthorized resource discovery and reconnaissance activity using compromised or misused long-term credentials.\n\n## Strategy\n\nThis rule monitors AWS CloudTrail logs for `ListResources` events generated by the `resource-explorer-2.amazonaws.com` service, with a specific focus on long-term access keys. The `ListResources` API enables enumeration of AWS resources across accounts and regions, providing attackers with valuable information about the target environment''s infrastructure. Long-term access keys present elevated security risks compared to temporary credentials due to their indefinite lifespan and higher likelihood of being compromised through credential theft, insider threats, or poor key management practices.\n\n## Triage & Response\n\n- Examine if the access key `{{@userIdentity.accessKeyId}}` in region `{{@awsRegion}}` has legitimate authorization to list AWS resources.\n- Review the user identity associated with the access key and verify if resource enumeration aligns with their job responsibilities.\n- Analyze the scope and frequency of `ListResources` calls to determine if the activity indicates systematic reconnaissance.\n- Investigate the source IP address and geographic location to identify potential unauthorized access patterns.\n- Check for correlated Resource Explorer API calls such as `CreateIndex` or `GetIndex` from the same access key.\n- Determine if the access key has been recently rotated or shows other signs of potential compromise.\n- Validate if the resource listing activity occurs during expected business hours and aligns with known operational procedures.\n","tags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":2,"id":"def-000-8qc","updatedAt":1754680324387,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS ListResources executed by new principal identity","createdAt":1754680280578,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":true,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-1sc","queries":[{"query":"source:cloudtrail @evt.name:ListResources @eventSource:resource-explorer-2.amazonaws.com -@threat_intel.results.category:corp_vpn","groupByFields":[],"hasOptionalGroupByFields":false,"distinctFields":[],"metric":"@userIdentity.principalId","metrics":["@userIdentity.principalId"],"aggregation":"new_value","name":"listresources_by_new_principal","dataSource":"logs"}],"options":{"evaluationWindow":0,"detectionMethod":"new_value","maxSignalDuration":86400,"keepAlive":3600,"newValueOptions":{"forgetAfter":28,"learningDuration":7,"learningThreshold":0,"learningMethod":"duration","instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30},"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"medium","notifications":[]}],"message":"## Goal\n\nDetects first-time execution of `ListResources` operations by previously unseen AWS principal identities. Identifies potential unauthorized resource discovery activity from new or compromised accounts.\n\n## Strategy\n\nThis rule analyzes AWS CloudTrail logs for `ListResources` events from the `resource-explorer-2.amazonaws.com` service, using a new value detection on `@userIdentity.principalId`. It establishes a baseline of principals who have previously executed `ListResources` operations and triggers an alert when a principal identity is observed performing this action for the first time. Since the `ListResources` API in AWS Resource Explorer enables broad visibility into resources across accounts and regions, its use by a new principal could signal account compromise, privilege escalation, or unauthorized access, in addition to legitimate administrative activity.\n\n## Triage & Response\n\n- Examine the principal identity `{{@userIdentity.principalId}}` to determine if it represents a legitimate user, role, or service account.\n- Review the account creation date and recent access patterns to identify if this is a newly provisioned legitimate account.\n- Investigate the authentication method and source location of the `ListResources` calls to detect potential unauthorized access.\n- Check for additional AWS API calls from the same principal to understand the full scope of their activity.\n- Validate if the principal has appropriate IAM permissions for Resource Explorer operations and if these permissions were recently granted.\n- Determine if the timing of the first `ListResources` execution correlates with known onboarding activities or role assignments.\n","tags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["iaas:aws","technique:T1580-cloud-infrastructure-discovery","source:cloudtrail","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":2,"id":"def-000-1sc","updatedAt":1754680280578,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"AWS Management Console authentication failures should be monitored","createdAt":1731018385180,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-4sx","queries":[{"query":"resource_type:aws_iam_account","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"aws_iam_account","complianceFrameworks":[{"control":"12.2.a","framework":"dora","is_default":true,"message":"","requirement":"Logging","version":"c-2024-1532"},{"control":"3.12.3","framework":"nist-800-171","is_default":true,"message":"","requirement":"Security-Assessment","version":"2"},{"control":"3.14.6","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"AU-6","framework":"nist-800-53","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"nist-800-53","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"nist-800-53","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"DE.CM-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-06","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.AE-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"DE.AE-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"ID.RA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-05","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"PR.PS-04","framework":"nist-csf","is_default":true,"message":"","requirement":"Platform-Security","version":"2.0"},{"control":"PR.AA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Identity-Management-Authentication-and-Access-Control","version":"2.0"},{"control":"RS.AN-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Incident-Analysis","version":"2.0"},{"control":"GV.SC-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Cybersecurity-Supply-Chain-Risk-Management","version":"2.0"},{"control":"DE.CM-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-6","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.AE-2","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"DE.AE-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"ID.RA-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"4.6","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"5.0.0"},{"control":"4.6","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"4.0.0"},{"control":"4.6","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"3.0.0"},{"control":"4.6","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"1.5.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nLOGIN := lower(\"$.eventName=ConsoleLogin\")\n\nAUTH := lower(\"$.errorMessage=Failedauthentication\")\n\naccount_to_trail := {cloudtrail_trail.account_id |\n\tsome cloudtrail_trail in input.resources.aws_cloudtrail_trail\n\tcloudtrail_trail.is_multi_region_trail\n\tcloudtrail_trail.trail_status.is_logging\n\tvalidate_event_selectors(cloudtrail_trail)\n\ttrail_log_group := regex.replace(cloudtrail_trail.cloud_watch_logs_log_group_arn, \"^.+:log-group:(.+):.+$\", \"$1\")\n\ttrail_log_group in trail_to_metric_filter\n}\n\nvalidate_event_selectors(cloudtrail_trail) if {\n\tsome trail in cloudtrail_trail.event_selectors\n\ttrail.include_management_events\n\tlower(trail.read_write_type) == \"all\"\n} else if {\n\tnot cloudtrail_trail.event_selectors\n}\n\ntrail_to_metric_filter := {metric_filter.log_group_name |\n\tsome metric_filter in input.resources.aws_metric_filter\n\tvalid_metric_filter(metric_filter)\n\tsome transformation in metric_filter.metric_transformations\n\ttransformation.metric_name in metric_filter_to_alarm\n}\n\nvalid_metric_filter(metric_filter) if {\n\tfilter_parsed := lower(regex.replace(metric_filter.filter_pattern, \"\\\\s|\\\"\", \"\"))\n\tcontains(filter_parsed, \"&&\")\n\tcontains(filter_parsed, LOGIN)\n\tcontains(filter_parsed, AUTH)\n}\n\nmetric_filter_to_alarm := {cloudwatch_alarm.metric_name |\n\tsome cloudwatch_alarm in input.resources.aws_cloudwatch_metric_alarm\n\tsome action in cloudwatch_alarm.alarm_actions\n\taction in alarm_to_sns_topic\n}\n\nalarm_to_sns_topic := {sns_topic.topic_arn |\n\tsome sns_topic in input.resources.aws_sns_topic\n\tsns_topic.subscriptions_confirmed > 0\n}\n\neval(iam_account) = \"pass\" if {\n\taccount_to_trail[iam_account.account_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_iam_account","aws_cloudtrail_trail","aws_cloudwatch_metric_alarm","aws_metric_filter","aws_sns_topic"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nReal-time monitoring of API calls can be achieved by directing CloudTrail logs to CloudWatch logs and establishing corresponding metric filters and alarms. It is recommended to set up a metric filter and alarm for failed console authentication attempts to decrease the lead time in detecting brute force attempts and identify source IPs for event correlation.\n\n## Remediation\n\nFor instructions on setting up CloudWatch metric filters and alarms for failed console authentication attempts, refer to the [AWS CloudWatch Alarms for CloudTrail User Guide][1].\n\n```plaintext\naws logs put-metric-filter --log-group-name <cloudtrail_log_group_name> \\\n--filter-name <console_signin_failure_metric> --metric-transformations \\\nmetricName=<console_signin_failure_metric>,metricNamespace=''CISBenchmark'',metricValue=1 \\\n--filter-pattern ''{ ($.eventName = ConsoleLogin) && ($.errorMessage = \"Failed authentication\") }''\n```\n\nYou can choose your own `metricName` and `metricNamespace` strings. Use the same `metricNamespace` for all Foundations Benchmark metrics to group them together.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudwatch-alarms-for-cloudtrail.html","tags":["scored:true","control:3.12.3","requirement:Monitoring","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","framework:nist-800-171","level:2","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:DE