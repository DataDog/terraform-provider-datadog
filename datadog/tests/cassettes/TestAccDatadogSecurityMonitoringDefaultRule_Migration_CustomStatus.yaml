rk":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"CC2.1","framework":"soc-2","is_default":true,"message":"","requirement":"Communication-and-Information","version":"2"},{"control":"7.1.2.1","framework":"cis-azure","is_default":true,"message":"","requirement":"Management-and-Governance-Services","version":"4.0.0"},{"control":"5.2.1","framework":"cis-azure","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"2.0.0"},{"control":"5.2.1","framework":"cis-azure","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"1.3.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nvalid_log_alert = {activity_log_alert.subscription_id |\n\tsome activity_log_alert in input.resources.azure_activity_log_alert\n\tsome alert_condition in activity_log_alert.condition.all_of\n\n\tlower(alert_condition.equals) == \"microsoft.authorization/policyassignments/write\"\n\tlower(alert_condition.field) == \"operationname\"\n\tnot alert_condition.contains_any\n\tlower(activity_log_alert.location) == \"global\"\n\n\tsome scope in activity_log_alert.scopes\n\n\tlower(split(scope, \"/\")[2]) == lower(activity_log_alert.subscription_id)\n\n\tactivity_log_alert.enabled\n}\n\neval(subscription) = \"pass\" if {\n\tvalid_log_alert[subscription.subscription_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_subscription","azure_activity_log_alert"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"\n## Description\n\nTo improve detection of unsolicited changes and gain insight into modifications made in \"Azure policy - assignments,\" it is recommended to create an activity log alert specifically for the Create Policy Assignment event. This alert will help monitor and track any occurrences of policy assignment creation, reducing the time it takes to identify and respond to any unauthorized changes.\n\n## Remediation\n\n### From the console\n\n1. Go to **Monitor** and select **Alerts**.\n2. Click **New Alert Rule**.\n3. Under **Scope**, click **Select Resource**.\n4. Under **Filter by Subscription**, select the appropriate subscription.\n5. Under **Filter by Resource Type**, select **Policy Assignment**.\n6. Select **All** for **Filter by Location**.\n7. Click the subscription resource from the entries populated under **Resource**. Verify that the selection preview shows **All Policy** assignment (policyAssignments) and the selected subscription name.\n8. Click **Done**.\n9. Under **Condition**, click **Add Condition**, then select the **Create Policy Assignment** signal.\n10. Click **Done**.\n11. Under **Action Group**, select **Add Action Groups** and complete the creation process or select the appropriate action group.\n12. Under **Alert Rule Details**, enter the **Alert Rule Name** and **Description**.\n13. Select the appropriate resource group to save the alert to.\n14. Select the **Enable alert rule upon creation** checkbox.\n15. Click **Create Alert Rule**.\n","tags":["scored:true","control:3.14.1","control:7.1.2.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","framework:iso-27001","requirement:Audit-and-Accountability","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","control:5.2.1","re