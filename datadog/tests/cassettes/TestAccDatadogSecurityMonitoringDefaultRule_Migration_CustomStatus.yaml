,"control:5.2.8","level:1","framework:nist-800-171","framework:iso-27001","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:soc-2","requirement:Logical-and-Physical-Access-Control","control:CC2.1","control:CC7.2","control:CC7.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["control:CC6.8","scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:7.1.2.6","control:A.12.4.1","control:5.2.6","requirement:Logging","control:12.2.a","control:5.2.8","level:1","framework:nist-800-171","framework:iso-27001","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:soc-2","requirement:Logical-and-Physical-Access-Control","control:CC2.1","control:CC7.2","control:CC7.1"],"version":21,"id":"def-000-vb1","updatedAt":1757371812730,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"''OS and Data'' disks should be encrypted with Customer Managed Key (CMK)","createdAt":1695681402727,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-q8r","queries":[{"query":"resource_type:azure_managed_disk","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"azure_managed_disk","complianceFrameworks":[{"control":"3.3.3","framework":"pci-dss","is_default":true,"message":"","requirement":"Protect-Stored-Account-Data","version":"4.0"},{"control":"3.13.8","framework":"nist-800-171","is_default":true,"message":"","requirement":"System-and-Communications-Protection","version":"2"},{"control":"SC-8","framework":"nist-800-53","is_default":true,"message":"","requirement":"System-and-Communications-Protection","version":"5"},{"control":"A.18.1.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Compliance","version":"2"},{"control":"A.8.24","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"SC-8","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Communications-Protection","version":"5"},{"control":"CC6.1","framework":"soc-2","is_default":true,"message":"","requirement":"Logical-and-Physical-Access-Control","version":"2"},{"control":"7.3","framework":"cis-azure","is_default":true,"message":"","requirement":"Virtual-Machines","version":"2.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(managed_disk) = \"skip\" if {\n\tlower(managed_disk.disk_state) != \"attached\"\n} else = \"pass\" if {\n\tlower(managed_disk.encryption.type) == \"encryptionatrestwithcustomerkey\"\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["azure_managed_disk"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nTo enhance data security, it is important to ensure that both OS disks (boot volumes) and data disks (non-boot volumes) of IaaS VMs are encrypted using Customer Managed Keys (CMK). CMKs can be achieved through either Azure Disk Encryption (ADE) or Server Side Encryption (SSE). \n\nEncrypting the OS disk and data disks with CMK ensures that the entire content can only be accessed with the corresponding key, preventing unauthorized access. While Azure-managed disks enable encryption at rest by default using Platform Managed Keys (PMKs), using CMK provides customers with the ability to have more control over the encryption and decryption processes, allowing for key rotation and increased security. \n\nOrganizations should evaluate their security requirements for the data stored on the disks. For high-risk data, the use of CMK is strongly recommended, as it offers additional layers of security. However, for low-risk data, PMK, which is enabled by default, provides sufficient data security.\n\n## Remediation\n\n### From Azure Portal\n\n**Note**: Disks must be detached from VMs to change encryption.\n\n1. Go to **Virtual machines**.\n2. For each virtual machine, go to **Settings**.\n3. Click on **Disks**.\n4. Click the ellipsis (...), then click **Detach** to detach the disk from the VM.\n5. Now search for **Disks** and locate the unattached disk.\n6. Click the disk then select **Encryption**.\n7. Change your encryption type, then select your encryption set.\n8. Click **Save**.\n9. Go back to the VM and re-attach the disk.\n","tags":["scored:true","requirement:Virtual-Machines","cloud_provider:azure","requirement:Compliance","scope:azure.compute","control:SC-8","framework:nist-800-171","level:2","framework:iso-27001","requirement:Technologi