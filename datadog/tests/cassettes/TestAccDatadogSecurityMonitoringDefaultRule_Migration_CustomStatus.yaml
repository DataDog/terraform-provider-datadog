  response:
    body: '{"name":"A user received an anomalous number of AccessDenied errors","createdAt":1688542798887,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"9el-i95-dnl","queries":[{"query":"source:cloudtrail @error.kind:AccessDenied -@userIdentity.arn:*DatadogIntegrationRole*","groupByFields":["@userIdentity.arn"],"hasOptionalGroupByFields":false,"distinctFields":["@evt.name"],"aggregation":"cardinality","name":"unique_events_denied","dataSource":"logs"}],"options":{"evaluationWindow":1800,"detectionMethod":"anomaly_detection","maxSignalDuration":1800,"keepAlive":1800,"anomalyDetectionOptions":{"bucketDuration":300,"learningDuration":24,"detectionTolerance":5,"instantaneousBaseline":false,"instantaneousBaselineTimeoutMinutes":30},"decreaseCriticalityBasedOnEnv":false},"cases":[{"name":"","status":"medium","customStatus":"high","notifications":[],"condition":"unique_events_denied \u003e 0.995"}],"message":"## Goal\n\nDetect when a user is assessing privileges in AWS through API bruteforcing technique.\n\n## Strategy\n\nThis rule lets you monitor CloudTrail to detect when the error message of `AccessDenied` is returned on an anomalous number of unique API calls.\n\n## Triage and response\n\n1. Determine if `{{@userIdentity.arn}}` should be attempting to use the identified API calls: `{{@evt.name}}`.\n   - Use the Cloud SIEM - User Investigation dashboard to assess user activity.\n2. Contact the user to see if they intended to make these API calls.\n3. If the user did not make the API calls:\n   - Rotate the credentials.\n   - Investigate to see what API calls might have been made that were successful throughout the rest of the environment.\n\n## Changelog\n\n- 17 March 2025 - Updated rule query to exclude `DatadogIntegrationRole`.\n","tags":["scope:amazon","iaas:aws","source:cloudtrail","technique:T1069-permission-groups-discovery","mitre_platform:iaas","tactic:TA0007-discovery","mitre_platform:c