ew + create**.\n14. Click **Create**.\n","tags":["control:CC6.8","scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:5.2.10","framework:iso-27001","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:soc-2","control:7.1.2.10","requirement:Logical-and-Physical-Access-Control","control:CC2.1","control:CC7.2","control:CC7.1"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["control:CC6.8","scored:true","control:3.14.1","scope:azure.activity_log","cloud_provider:azure","control:3.14.2","control:A.8.15","control:A.12.4.1","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:5.2.10","framework:iso-27001","requirement:Management-and-Governance-Services","requirement:Operations-Security","requirement:Technological-Controls","requirement:Communication-and-Information","source:azure.activity_log","security:compliance","framework:dora","framework:cis-azure","requirement:Systems-and-Information-Integrity","requirement:Logging-and-Monitoring","requirement:System-Operations","framework:soc-2","control:7.1.2.10","requirement:Logical-and-Physical-Access-Control","control:CC2.1","control:CC7.2","control:CC7.1"],"version":15,"id":"def-000-2sc","updatedAt":1757013160907,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name"