"a > 0"}],"message":"## Description\n\nThe read-only port should be disabled so unauthenticated users cannot retrieve potentially sensitive information about the cluster.\n\n## Remediation\n\nChoose a remediation method from below. For both steps, a restart of the Kubelet service is required.\n\n### Kubelet config file\n\n1. Add the json below to this file: `/etc/kubernetes/kubelet/kubelet-config.json`\n\n```json\n\"readOnlyPort\": 0\n```\n\n### Executable arguments\n\n1. Edit the Kubelet service file on each worker node and ensure the below parameters are part of the `KUBELET_ARGS` variable string.\n\n```bash\n--read-only-port=0\n```","tags":["scored:true","source:google_kubernetes_worker_node","cloud_provider:gcp","framework:ponse1744140387","framework_requirement_control:ponse1744134512/ponse1744134512/ponse1744134512","framework:handle-91378","control:ponse1744232698","scope:google_kubernetes_worker_node","framework_requirement:handle-91378/security-requirement","control:compliance-control","framework_requirement_control:new/requirement1/control1","framework_requirement:ponse1744140387/ponse1744140387","framework_requirement_control:handle-91378/compliance-requirement/compliance-control","requirement:security-requirement","framework_requirement_control:handle-91378/security-requirement/security-control","framework:cis-gke","level:1","framework:handle-1076","framework_requirement_control:ponse1744232698/ponse1744232698/ponse1744232698","framework_requirement_control:handle-1076/security-requirement/security-control","framework_requirement:handle-71695/security-requirement","framework_requirement_control:handle-71695/compliance-requirement/compliance-control","framework_requirement:ponse1744232698/ponse1744232698","framework_requirement:new/requirement1","requirement:ponse1744232698","control:control1","framework_requirement_control:ponse1744140387/ponse1744140387/ponse1744140387","framework:new","security:compliance","requirement:ponse1744134512","control:security-control","framework_requirement:ponse1744134512/ponse1744134512","framework_requirement:handle-91378/compliance-requirement","framework:ponse1744134512","requirement:Worker-Nodes","control:ponse1744140387","requirement:requirement1","framework_requirement:handle-71695/compliance-requirement","requirement:ponse1744140387","framework_requirement:handle-1076/security-requirement","framework:ponse1744232698","framework_requirement:handle-1076/compliance-requirement","framework_requirement_control:handle-71695/security-requirement/security-control","framework:handle-71695","requirement:compliance-requirement","control:3.2.4","control:ponse1744134512","framework_requirement_control:handle-1076/compliance-requirement/compliance-control"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.2.4","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"version":3183,"id":"def-000-be9","updatedAt":1756330349779,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE Cluster''s kubelet configuration file ownership should be assigned to root","createdAt":1734110890911,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-oom","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"3.1.4","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfile_owners_missing(file) if {\n\tnot dd_output.has_key(file, \"user\")\n}\n\ncompliant_config(file) if {\n\tfile.user == \"root\"\n\tfile.group == \"root\"\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubelet.config)\n} else = \"skip\" if {\n\tfile_owners_missing(k8s_node.components.kubelet.config)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components.kubelet, \"config\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nIf the kubelet refers to a configuration file with the `--config` argument, you should set its file ownership to maintain integrity. The file should be owned by `root:root`.\n\n## Remediation\n\nRun the following command to fix the kubelet configuration file''s permissions:\n\n```bash\nchown root:root /etc/kubernetes/kubelet/kubelet-config.json\n```\n**Note**: The path above is the default location.","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.1.4","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.1.4","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"version":6,"id":"def-000-oom","updatedAt":1756330731417,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE Cluster''s kubelet configuration file should have permissions set to 600 or more restrictive","createdAt":1734111125806,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-jrr","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"3.1.3","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ncompliant_config(file) if {\n\tmode := file.mode\n\tmode == bits.and(mode, 384) # 600\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubelet.config)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components.kubelet, \"config\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nIf the kubelet refers to a configuration file with the `--config` argument, ensure that the file has permissions set to `600` or to a more restrictive setting. If a file is specified, you should restrict its file permissions to maintain the integrity of the file. The file should be writable only by the administrators on the system.\n\n## Remediation\n\nRun the following command to fix the kubelet configuration file''s permissions:\n\n```bash\nchmod 600 /etc/kubernetes/kubelet/kubelet-config.json\n```\n**Note**: The path above is the default location.\n","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.1.3","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","level:1","control:3.1.3","scope:google_kubernetes_worker_node","requirement:Worker-Nodes"],"version":6,"id":"def-000-jrr","updatedAt":1756330861528,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A GKE''s Cluster''s Kubelet should use TLS authentication","createdAt":1729014399793,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-pql","queries":[{"query":"resource_type:gcp_gke_worker_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_gke_worker_node","complianceFrameworks":[{"control":"A.8.24","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"3.2.3","framework":"cis-gke","is_default":true,"message":"","requirement":"Worker-Nodes","version":"1.6.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\neval(k8s_node) = \"pass\" if {\n\tk8s_node.components.kubelet.config.content.authentication.x509.clientCAFile\n} else = \"pass\" if {\n\tk8s_node.components.kubelet[\"client-ca-file\"]\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubelet\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_gke_worker_node"]}}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nDisable anonymous requests to the Kubelet server. You should rely on authentication to authorize access and disallow anonymous requests to prevent unwanted actions in your cluster.\n\n## Remediation\n\nChoose a remediation method from below. For both steps, a restart of the Kubelet service is required.\n\n### Kubelet config file\n\n1. Add the json below to this file: `/etc/kubernetes/kubelet/kubelet-config.json`\n\n```json\n\"authentication\": { \"x509\": {\"clientCAFile\": \"<path/to/client-ca-file>\" }}\"\n```\n\n### Executable arguments\n\n1. Edit the kubelet service file on each worker node and ensure the below parameters are part of the `KUBELET_ARGS` variable string.\n\n```bash\n--client-ca-file=<path/to/client-ca-file>\n```","tags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","control:A.8.24","level:1","control:3.2.3","framework:iso-27001","scope:google_kubernetes_worker_node","requirement:Worker-Nodes","requirement:Technological-Controls"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scored:true","security:compliance","framework:cis-gke","source:google_kubernetes_worker_node","cloud_provider:gcp","control:A.8.24","level:1","control:3.2.3","framework:iso-27001","scope:google_kubernetes_worker_node","requirement:Worker-Nodes","requirement:Technological-Controls"],"version":12,"id":"def-000-pql","updatedAt":1756329999894,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A Kubernetes audit policy should exist","createdAt":1710364609417,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-00k-5j9","queries":[{"query":"resource_type:kubernetes_master_node","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"kubernetes_master_node","complianceFrameworks":[{"control":"4.20","framework":"essential-cloud-security-controls","is_default":true,"message":"","requirement":"Kubernetes","version":"2"},{"control":"3.2.1","framework":"cis-kubernetes","is_default":true,"message":"","requirement":"Logging","version":"1.9.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\ncompliant_config(config) if {\n\tconfig[\"audit-policy-file\"]\n}\n\neval(k8s_node) = \"pass\" if {\n\tcompliant_config(k8s_node.components.kubeApiserver)\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node, \"components\")\n} else = \"skip\" if {\n\tnot dd_output.has_key(k8s_node.components, \"kubeApiserver\")\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["kubernetes_master_node"]}}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nKubernetes should audit the details of requests made to the API server. \n\n## Remediation\n\n1. Refer to the [Kubernetes documentation](https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/) on how to create an audit policy file for your cluster. \n2. Assign the policy to the `--audit-policy-file` parameter. \n```\n--audit-policy-file=<path-to-audit-policy-file>\n```\n","tags":["scope:kubernetes","scored:true","requirement:Logging","security:compliance","requirement:Kubernetes","cloud_provider:kubernetes","control:3.2.1","source:kubernetes","control:4.20","framework:essential-cloud-security-controls","framework:cis-kubernetes"],"hasExtendedTitle":true,"type":"cloud_configuration","filters":[],"defaultTags":["scope:kubernetes","scored:true","requirement:Logging","security:compliance","requirement:Kubernetes","cloud_provider:kubernetes","control:3.2.1","source:kubernetes","control:4.20","framework:essential-cloud-security-controls","framework:cis-kubernetes"],"version":8,"id":"def-00k-5j9","updatedAt":1756329575133,"blocking":false,"complianceSignalOptions":{"defaultActivationStatus":false,"defaultGroupByFields":["@resource"],"userActivationStatus":null,"userGroupByFields":null},"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""},"findingType":"misconfiguration"},{"name":"A Kubernetes user attempted to perform a high number of actions that were denied","createdAt":1721120936114,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"bz1-7ay-vqj","queries":[{"query":"(source:kubernetes.audit OR (source:azure.containerservice @evt.category:(kube-audit OR kube-audit-admin))) @responseStatus.reason:Forbidden -@usr.id:(system\\:serviceaccount\\:*\\:datadog* OR system\\:kube-scheduler OR system\\:anonymous OR eks\\:authenticator OR eks\\:pod-identity-mutating-webhook OR system\\:serviceaccount\\:kube-system\\:root-ca-cert-publisher)","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":["@http.url_details.path"],"aggregation":"cardinality","name":"access_denied","dataSource":"logs"},{"query":"source:gcp.k8s.cluster service:k8s.io @data.protoPayload.status.code:7","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":["@data.protoPayload.resourceName"],"aggregation":"cardinality","name":"gke_access_denied","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"access_denied > 10 || gke_access_denied > 10"}],"message":"## Goal\nIdentify when a Kubernetes user attempts to perform a high number of actions that are denied in a short amount of time.\n\n## Strategy\nThis rule identifies responses of the API server where the reason for the error is set to `Forbidden`, indicating that an authenticated user attempted to perform an action that they are not explicitly authorized to perform.\n\nThe rule flags users who receive permission denied errors on several distinct API endpoints in a short amount of time.\n\n## Triage and response\n1. Determine if the user: `{{@usr.id}}` is expected to perform the denied actions. If yes, the alert may be due to a misconfigured application or a service account with insufficient privileges.\n2. Use the Cloud SIEM `User Investigation` dashboard to review any user actions that may have occurred after the potentially malicious action.\n\n## Changelog\n* 7 May 2024 - Updated detection query to include logs from Azure Kubernetes Service.\n* 15 July 2024 - Updated detection query to include logs from Google Kubernetes Engine.","tags":["source:kubernetes","mitre_platform:containers","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","technique:T1613-container-and-resource-discovery","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["source:kubernetes","mitre_platform:containers","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","technique:T1613-container-and-resource-discovery","mitre_platform:cloud"],"version":9,"id":"elb-nlu-hso","updatedAt":1740680446007,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A Kubernetes user was assigned cluster administrator permissions","createdAt":1721120937571,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"q2g-reo-fw1","queries":[{"query":"(source:kubernetes.audit OR (source:azure.containerservice @evt.category:(kube-audit OR kube-audit-admin))) @http.method:create @requestObject.kind:ClusterRoleBinding @requestObject.roleRef.name:cluster-admin -@usr.id:system\\:apiserver","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"cluster_admin_added","dataSource":"logs"},{"query":"source:gcp.k8s.cluster service:k8s.io @data.protoPayload.request.roleRef.name:cluster-admin @data.protoPayload.request.kind:ClusterRoleBinding @http.method:create","groupByFields":["@usr.id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"gke_clusterrole_binding_admin","dataSource":"logs"}],"options":{"evaluationWindow":300,"detectionMethod":"threshold","maxSignalDuration":7200,"keepAlive":3600,"decreaseCriticalityBasedOnEnv":true},"cases":[{"name":"","status":"medium","notifications":[],"condition":"cluster_admin_added > 0 || gke_clusterrole_binding_admin > 0"}],"message":"## Goal\n\nIdentify when a Kubernetes user is assigned cluster-level administrative permissions.\n\n## Strategy\n\nThis rule monitors when a `ClusterRoleBinding` object is created to bind a Kubernetes user to the `cluster-admin` [default cluster-wide role](https://kubernetes.io/docs/reference/access-authn-authz/rbac/#user-facing-roles). This effectively grants the referenced user with full administrator permissions over all the Kubernetes cluster.\n\n## Triage and response\n\n1. Determine if the Kubernetes user referenced in `@requestObject.subjects` is expected to have been granted administrator permissions on the cluster\n2. Determine if the actor (`@usr.id`) is authorized to assign administrator permissions\n3. Use the Cloud SIEM `User Investigation` dashboard to review any user actions that may have occurred after the potentially malicious action.\n\n## Changelog\n* 20 September 2022 - Updated tags.\n* 7 May 2024 - Updated detection query to include logs from Azure Kubernetes Service.\n* 15 July 2024 - Updated detection query to include logs from Google Kubernetes Engine.","tags":["tactic:TA0004-privilege-escalation","technique:T1098-account-manipulation","source:kubernetes","mitre_platform:containers","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["tactic:TA0004-privilege-escalation","technique:T1098-account-manipulation","source:kubernetes","mitre_platform:containers","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":11,"id":"8ds-sxh-n83","updatedAt":1740680485179,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A Microsoft Teams member was made owner of multiple teams","createdAt":1698803663258,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-poi","queries":[{"query":"source:microsoft-365 service:MicrosoftTeams @evt.name:MemberRoleChanged @Members.Role:2","groupByFields":["@Members.UPN"],"hasOptionalGroupByFields":false,"distinctFields":["@TeamName"],"aggregation":"cardinality","name":"user_role_modified_to_owner_role","dataSource":"logs"}],"options":{"evaluationWindow":3600,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":3600},"cases":[{"name":"","status":"medium","notifications":[],"condition":"user_role_modified_to_owner_role > 1"}],"message":"## Goal\nDetect when a user is made owner of multiple Microsoft Teams. This could indicate an adversary or insider threat attempting to escalate the privileges of the assigned user with regard to various teams chats, as most users tend to own few teams curated to specific topics.\n\n## Strategy\nMonitor Microsoft Teams audit logs to look for events with an `@evt.name` value of `MemberRoleChanged` and a `@Members.Role` value of `2` indicating the change to an Owner role. Generally, most users will own a few teams related to specific topics that correlate with that job role. However, if this activity is observed from an external user or a user whose job function does not correlate with the assigned team, this might be an indicator of malicious activity.\n\n## Triage and response\n1. Determine if the user `{{@usr.email}}` intended to make the assigned user `{{@Member.UPN}}` the owner of the teams within the`{{TeamName}}` attribute.\n2. If the `{{@usr.email}}` didn''t intend to assign the owner privileges to `{{@Member.UPN}}`:\n    * Investigate other activities performed by the user `{{@usr.email}}` using the Cloud SIEM - User Investigation dashboard.\n    * Investigate other activities performed by the source IP `{{@network.client.ip}}` using the Cloud SIEM - IP Investigation dashboard.\n    * Investigate the activities that might have been performed by the subject user `{{@Member.UPN}}` after they were assigned the owner privileges. \n    * Begin your organization''s incident response process and investigate.","tags":["tactic:TA0004-privilege-escalation","source:microsoft-365","scope:microsoft-teams","mitre_platform:saas","technique:T1078-valid-accounts","mitre_platform:office-suite","security:attack","mitre_platform:cloud"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["tactic:TA0004-privilege-escalation","source:microsoft-365","scope:microsoft-teams","mitre_platform:saas","technique:T1078-valid-accounts","mitre_platform:office-suite","security:attack","mitre_platform:cloud"],"version":7,"id":"mkz-dpq-zzm","updatedAt":1740681992675,"blocking":false,"metadata":{"entities":null,"sources":null},"creator":{"handle":"","name":""},"updater":{"handle":"","name":""}},{"name":"A log metric filter and alert should exist for SQL instance configuration changes","createdAt":1711045148158,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-48q","queries":[{"query":"resource_type:gcp_project","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"gcp_project","complianceFrameworks":[{"control":"12.2.a","framework":"dora","is_default":true,"message":"","requirement":"Logging","version":"c-2024-1532"},{"control":"164.312-b","framework":"hipaa","is_default":true,"message":"","requirement":"Audit-Controls","version":"1"},{"control":"3.4.2","framework":"nist-800-171","is_default":true,"message":"","requirement":"Configuration-Management","version":"2"},{"control":"3.14.1","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"3.14.2","framework":"nist-800-171","is_default":true,"message":"","requirement":"Systems-and-Information-Integrity","version":"2"},{"control":"AU-6","framework":"nist-800-53","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"nist-800-53","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"nist-800-53","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"DE.CM-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.CM-06","framework":"nist-csf","is_default":true,"message":"","requirement":"Continuous-Monitoring","version":"2.0"},{"control":"DE.AE-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"DE.AE-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Adverse-Event-Analysis","version":"2.0"},{"control":"ID.RA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"ID.RA-05","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"2.0"},{"control":"PR.PS-04","framework":"nist-csf","is_default":true,"message":"","requirement":"Platform-Security","version":"2.0"},{"control":"PR.AA-01","framework":"nist-csf","is_default":true,"message":"","requirement":"Identity-Management-Authentication-and-Access-Control","version":"2.0"},{"control":"RS.AN-03","framework":"nist-csf","is_default":true,"message":"","requirement":"Incident-Analysis","version":"2.0"},{"control":"GV.SC-02","framework":"nist-csf","is_default":true,"message":"","requirement":"Cybersecurity-Supply-Chain-Risk-Management","version":"2.0"},{"control":"DE.CM-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-6","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.CM-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Security-Continous-Monitoring","version":"1.1"},{"control":"DE.AE-2","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"DE.AE-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"ID.RA-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"30.1","framework":"gdpr","is_default":true,"message":"","requirement":"Records-of-Processing-Activities","version":"1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"2.11","framework":"cis-gcp","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"3.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfilter_method_name_constant := upper(\"protoPayload.methodName=\\\"cloudsql.instances.update\\\"\")\n\nvalid_log_metric := {logging_log_metric.project_id |\n\tsome logging_log_metric in input.resources.gcp_logging_log_metric\n\tsome monitoring_alert_policy in input.resources.gcp_monitoring_alert_policy\n\tmetric_and_alert_align(logging_log_metric, monitoring_alert_policy)\n\tvalid_log_metric_filter(logging_log_metric)\n\tvalid_alert_policy_conditions(monitoring_alert_policy)\n}\n\nmetric_and_alert_align(logging_log_metric, monitoring_alert_policy) if {\n\tlogging_log_metric.project_id == monitoring_alert_policy.project_id\n\tfilter := monitoring_alert_policy.conditions[_].condition_threshold.filter\n\talert_policy_name := regex.replace(filter, \"^.*metric\\\\.type\\\\s*=\\\\s*\\\"logging\\\\.googleapis\\\\.com\\\\/user\\\\/(.*?)\\\".*$\", \"$1\")\n\tlogging_log_metric.name == alert_policy_name\n}\n\nvalid_log_metric_filter(logging_log_metric) if {\n\tfilter_parsed := upper(regex.replace(logging_log_metric.filter, \"\\\\s\", \"\"))\n\tcontains(filter_parsed, filter_method_name_constant)\n}\n\nvalid_alert_policy_conditions(monitoring_alert_policy) if {\n\tmonitoring_alert_policy.enabled == true\n\tmonitoring_alert_policy.notification_channels[_]\n}\n\neval(project) = \"pass\" if {\n\tvalid_log_metric[project.project_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_project","gcp_monitoring_alert_policy","gcp_logging_log_metric"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\nIt is recommended that a metric filter and alarm be set up for SQL instance\nconfiguration changes.\n\n## Rationale\nMonitoring changes to SQL instance configuration changes may reduce the time needed to\ndetect and correct SQL server misconfigurations.\nBelow are a few configurable options that may impact the security posture of an\nSQL instance:\n   \u2022 Enable auto backups and high availability: Misconfiguration may adversely impact\n   business continuity, disaster recovery, and high availability\n   \u2022 Authorize networks: Misconfiguration may increase exposure to untrusted networks\n\n### Impact \nEnabling logging may result in your project being charged for the additional logs usage.\n\n## Remediation \n\n### From the console\n#### Create the prescribed log metric\n1. Go to Logging/Logs-based Metrics by visiting [https://console.cloud.google.com/logs/metrics][1] and clicking **CREATE METRIC**.\n2. Click the down arrow icon on the **Filter Bar** at the top right corner and select **Convert to Advanced Filter**.\n3. Clear any text and add:\n\n   ```\n   protoPayload.methodName=\"cloudsql.instances.update\"\n   ```\n\n4. Click **Submit Filter**. Display logs appear based on the filter text.\n5. In the **Metric Editor** menu on the right, fill out the name field. Set **Units** to `1` (default) and **Type** to `Counter`. \nThis ensures that the log metric counts the number of log entries matching the user''s advanced logs query.\n6. Click **Create Metric**.\n\n#### Create the prescribed alert policy\n1. Go to [https://console.cloud.google.com/logs/metrics][1].  Under the **User-defined Metrics** section, identify the newly created metric.\n2. Click the kebab icon in the rightmost column for the new metric and select **Create alert from Metric**.\n3. Fill out the alert policy configuration and click **Save**. Choose the alerting threshold and configuration that makes sense for the user''s organization. For example, a threshold of zero(0) for the most recent value ensures that a notification is triggered for every owner change in the project:\n\n```\n   Set `Aggregator` to `Count`\n   Set `Configuration`:\n   - Condition: above\n   - Threshold: 0\n   - For: most recent value\n   ```\n4. Configure the desired notifications channels in the section **Notifications**.\n5. Name the policy and click **Save**.\n\n\n### From the command line\n\n1. Create the prescribed log metric using the following command: \n   ```\n   gcloud logging metrics create\n   ```\n   [Reference for command usage][9]\n2. Create the prescribed alert policy using the following command:\n   ```\n   gcloud alpha monitoring policies create\n   ```\n   [Reference for command usage][10]\n\n\n\n## References\n1. [https://console.cloud.google.com/logs/metrics][1] \n2. [https://cloud.google.com/monitoring/custom-metrics/][2]\n3. [https://cloud.google.com/monitoring/alerts/][3]\n4. [https://cloud.google.com/logging/docs/reference/tools/gcloud-logging][4]\n5. [https://cloud.google.com/storage/docs/overview][5]\n6. [https://cloud.google.com/sql/docs/][6]\n7. [https://cloud.google.com/sql/docs/mysql/][7]\n8. [https://cloud.google.com/sql/docs/postgres/][8]\n9. [https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create][9]\n10. [https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create][10]\n\n\n[1]: https://cloud.google.com/logging/docs/logs-based-metrics/\n[2]: https://cloud.google.com/monitoring/custom-metrics/\n[3]: https://cloud.google.com/monitoring/alerts/\n[4]: https://cloud.google.com/logging/docs/reference/tools/gcloud-logging\n[5]: https://cloud.google.com/storage/docs/overview\n[6]: https://cloud.google.com/sql/docs/\n[7]: https://cloud.google.com/sql/docs/mysql/\n[8]: https://cloud.google.com/sql/docs/postgres/\n[9]: https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create\n[10]: https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create\n","tags":["scored:true","cloud_provider:gcp","control:3.14.1","control:3.14.2","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","framework:ci