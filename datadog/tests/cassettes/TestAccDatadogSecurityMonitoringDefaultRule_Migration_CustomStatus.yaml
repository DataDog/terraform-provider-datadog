"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"4.2","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"5.0.0"},{"control":"4.2","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"4.0.0"},{"control":"4.2","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"3.0.0"},{"control":"4.2","framework":"cis-aws","is_default":true,"message":"","requirement":"Monitoring","version":"1.5.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nCONSOLE_LOGIN := lower(\"$.eventName=ConsoleLogin\")\n\nMFA_USED := lower(\"$.additionalEventData.MFAUsed!=Yes\")\n\nIDENTITY := lower(\"$.userIdentity.type=IAMUser\")\n\nRESPONSE := lower(\"$.responseElements.ConsoleLogin=Success\")\n\naccount_to_trail := {cloudtrail_trail.account_id |\n\tsome cloudtrail_trail in input.resources.aws_cloudtrail_trail\n\tcloudtrail_trail.is_multi_region_trail\n\tcloudtrail_trail.trail_status.is_logging\n\tvalidate_event_selectors(cloudtrail_trail)\n\ttrail_log_group := regex.replace(cloudtrail_trail.cloud_watch_logs_log_group_arn, \"^.+:log-group:(.+):.+$\", \"$1\")\n\ttrail_log_group in trail_to_metric_filter\n}\n\nvalidate_event_selectors(cloudtrail_trail) if {\n\tsome trail in cloudtrail_trail.event_selectors\n\ttrail.include_management_events\n\tlower(trail.read_write_type) == \"all\"\n} else if {\n\tnot cloudtrail_trail.event_selectors\n}\n\ntrail_to_metric_filter := {metric_filter.log_group_name |\n\tsome metric_filter in input.resources.aws_metric_filter\n\tvalid_metric_filter(metric_filter)\n\tsome transformation in metric_filter.metric_transformations\n\ttransformation.metric_name in metric_filter_to_alarm\n}\n\nvalid_metric_filter(metric_filter) if {\n\tfilter_parsed := lower(regex.replace(metric_filter.filter_pattern, \"\\\\s|\\\"\", \"\"))\n\tcontains(filter_parsed, \"&&\")\n\tcontains(filter_parsed, CONSOLE_LOGIN)\n\tcontains(filter_parsed, MFA_USED)\n\tcontains(filter_parsed, IDENTITY)\n\tcontains(filter_parsed, RESPONSE)\n}\n\nmetric_filter_to_alarm := {cloudwatch_alarm.metric_name |\n\tsome cloudwatch_alarm in input.resources.aws_cloudwatch_metric_alarm\n\tsome action in cloudwatch_alarm.alarm_actions\n\taction in alarm_to_sns_topic\n}\n\nalarm_to_sns_topic := {sns_topic.topic_arn |\n\tsome sns_topic in input.resources.aws_sns_topic\n\tsns_topic.subscriptions_confirmed > 0\n}\n\neval(iam_account) = \"pass\" if {\n\taccount_to_trail[iam_account.account_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["aws_iam_account","aws_cloudtrail_trail","aws_cloudwatch_metric_alarm","aws_metric_filter","aws_sns_topic"]},"complexRule":true}},"cases":[{"name":"","status":"medium","notifications":[],"condition":"a > 0"}],"message":"## Description\n\nReal-time monitoring of API calls can be achieved by directing CloudTrail logs to CloudWatch logs and establishing corresponding metric filters and alarms. It is recommended to set up a metric filter and alarm for console logins not protected by multi-factor authentication (MFA) to increase visibility into potentially at-risk accounts.\n\n## Remediation\n\nFor instructions on setting up CloudWatch metric filters and alarms for logins without MFA, refer to the [AWS CloudWatch Alarms for CloudTrail User Guide][1].\n\n```plaintext\naws logs put-metric-filter \\\n    --log-group-name <cloudtrail_log_group_name> \\\n    --filter-name <no_mfa_console_signin_metric> \\\n    --metric-transformations metricName=<no_mfa_console_signin_metric>,metricNamespace=CISBenchmark,metricValue=1 \\\n    --filter-pattern ''{ ($.eventName = \"ConsoleLogin\") && ($.additionalEventData.MFAUsed != \"Yes\") && \\\n    ($.userIdentity.type = \"IAMUser\") && ($.responseElements.ConsoleLogin = \"Success\") }''\n```\n\n```plaintext\naws cloudwatch put-metric-alarm \\\n    --alarm-name <no_mfa_console_signin_alarm> \\\n    --metric-name <no_mfa_console_signin_metric> \\\n    --namespace \"CISBenchmark\" \\\n    --statistic \"Sum\" \\\n    --period 300 \\\n    --threshold 1 \\\n    --evaluation-periods 1 \\\n    --comparison-operator GreaterThanOrEqualToThreshold \\\n    --alarm-actions <sns_topic_arn>\n```\n\nYou can choose your own `metricName` and `metricNamespace` strings. Use the same `metricNamespace` for all Foundations Benchmark metrics to group them together.\n\n[1]: https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudwatch-alarms-for-cloudtrail.html","tags":["scored:true","control:3.12.3","requirement:Monitoring","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","requirement:article-21","control:DE.AE-03","control:DE.AE-2","framework:cis-aws","control:PR.AA-01","requirement:Access-Control","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","control:IA-2","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5","requirement:System-Operations","requirement:Adverse-Event-Analysis","requirement:Control-Activities","control:DE.CM-3","framework:nist-800-53","control:DE.CM-06","control:D