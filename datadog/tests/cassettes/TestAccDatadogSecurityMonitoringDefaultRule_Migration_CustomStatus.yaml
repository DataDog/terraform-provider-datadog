hnique.\n\n## Strategy\n\nThis rule lets you monitor CloudTrail to detect when the error message of `AccessDenied` is returned on an anomalous number of unique API calls.\n\n## Triage and response\n\n1. Determine if `{{@userIdentity.arn}}` should be attempting to use the identified API calls: `{{@evt.name}}`.\n   - Use the Cloud SIEM - User Investigation dashboard to assess user activity.\n2. Contact the user to see if they intended to make these API calls.\n3. If the user did not make the API calls:\n   - Rotate the credentials.\n   - Investigate to see what API calls might have been made that were successful throughout the rest of the environment.\n\n## Changelog\n\n- 17 March 2025 - Updated rule query to exclude `DatadogIntegrationRole`.\n","tags":["scope:amazon","iaas:aws","source:cloudtrail","technique:T1069-permission-groups-discovery","mitre_platform:iaas","tactic:TA0007-discovery","mitre_platform:cloud","security:attack"],"hasExtendedTitle":true,"type":"log_detection","filters":[],"defaultTags":["scope:amazon","iaas:aws","source:cloudtrail","technique:T1069-permission-groups-discovery","tactic:TA0007-discovery","mitre_platform:iaas","security:attack","mitre_platform:cloud"],"version":523,"id":"064-qyt-wod","updatedAt":1779110203298,"blocking":false,"metadata":{"entities":null,"sources":null},"updateAuthorId":1445416,"creator":{"handle":"","name":""},"updater":{"handle":"frog@datadoghq.com","name":"frog"}},{"name":"AKS Cluster should have public access limited","createdAt":1708038662836,"isDefault":true,"isPartner":false,"isEnabled":true,"isBeta":false,"isDeleted":false,"isDeprecated":false,"defaultRuleId":"def-000-zrw","queries":[{"query":"resource_type:azure_aks_cluster","groupByFields":["resource_type","resource_id"],"hasOptionalGroupByFields":false,"distinctFields":[],"aggregation":"count","name":"a"}],"options":{"evaluationWindow":7200,"detectionMethod":"threshold","maxSignalDuration":86400,"keepAlive":21600,"complianceRuleOptions":{"resourceType":"azure