"version":"1.1"},{"control":"DE.AE-2","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"DE.AE-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Anomalies-and-Events","version":"1.1"},{"control":"ID.RA-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-3","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.RA-5","framework":"nist-csf","is_default":true,"message":"","requirement":"Risk-Assessment","version":"1.1"},{"control":"ID.SC-4","framework":"nist-csf","is_default":true,"message":"","requirement":"Supply-Chain-Risk-Management","version":"1.1"},{"control":"PR.PT-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Protective-Technology","version":"1.1"},{"control":"PR.IP-7","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"PR.IP-8","framework":"nist-csf","is_default":true,"message":"","requirement":"Information-Protection","version":"1.1"},{"control":"RS.AN-1","framework":"nist-csf","is_default":true,"message":"","requirement":"Analysis","version":"1.1"},{"control":"30.1","framework":"gdpr","is_default":true,"message":"","requirement":"Records-of-Processing-Activities","version":"1"},{"control":"A.12.4.1","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.12.4.3","framework":"iso-27001","is_default":true,"message":"","requirement":"Operations-Security","version":"2"},{"control":"A.8.15","framework":"iso-27001","is_default":true,"message":"","requirement":"Technological-Controls","version":"2022"},{"control":"AU-6","framework":"fedramp-high","is_default":true,"message":"","requirement":"Audit-and-Accountability","version":"5"},{"control":"SI-5","framework":"fedramp-high","is_default":true,"message":"","requirement":"System-and-Information-Integrity","version":"5"},{"control":"CA-7","framework":"fedramp-high","is_default":true,"message":"","requirement":"Assessment-Authorization-and-Monitoring","version":"5"},{"control":"CC7.2","framework":"soc-2","is_default":true,"message":"","requirement":"System-Operations","version":"2"},{"control":"CC5.2","framework":"soc-2","is_default":true,"message":"","requirement":"Control-Activities","version":"2"},{"control":"2.8","framework":"cis-gcp","is_default":true,"message":"","requirement":"Logging-and-Monitoring","version":"3.0.0"}],"regoRule":{"policy":"package datadog\n\nimport data.datadog.output as dd_output\n\nimport future.keywords.contains\nimport future.keywords.if\nimport future.keywords.in\n\nfilter_resource_type := upper(\"resource.type=\\\"gce_route\\\"\")\n\nfilter_method_name_delete_beta := upper(\"protoPayload.methodName:\\\"beta.compute.routes.delete\\\"\")\n\nfilter_method_name_delete := upper(\"protoPayload.methodName:\\\"compute.routes.delete\\\"\")\n\nfilter_method_name_insert_beta := upper(\"protoPayload.methodName:\\\"beta.compute.routes.insert\\\"\")\n\nfilter_method_name_insert := upper(\"protoPayload.methodName:\\\"compute.routes.insert\\\"\")\n\nvalid_log_metric := {logging_log_metric.project_id |\n\tsome logging_log_metric in input.resources.gcp_logging_log_metric\n\tsome monitoring_alert_policy in input.resources.gcp_monitoring_alert_policy\n\tmetric_and_alert_align(logging_log_metric, monitoring_alert_policy)\n\tvalid_log_metric_filter(logging_log_metric)\n\tvalid_alert_policy_conditions(monitoring_alert_policy)\n}\n\nmetric_and_alert_align(logging_log_metric, monitoring_alert_policy) if {\n\tlogging_log_metric.project_id == monitoring_alert_policy.project_id\n\tfilter := monitoring_alert_policy.conditions[_].condition_threshold.filter\n\talert_policy_name := regex.replace(filter, \"^.*metric\\\\.type\\\\s*=\\\\s*\\\"logging\\\\.googleapis\\\\.com\\\\/user\\\\/(.*?)\\\".*$\", \"$1\")\n\tlogging_log_metric.name == alert_policy_name\n}\n\nvalid_filter(filter_parsed, filter_method_name_beta, filter_method_name) if {\n\tcontains(filter_parsed, filter_method_name_beta)\n} else if {\n\tcontains(filter_parsed, filter_method_name)\n}\n\nvalid_log_metric_filter(logging_log_metric) if {\n\tfilter_parsed := upper(regex.replace(logging_log_metric.filter, \"\\\\s\", \"\"))\n\tcontains(filter_parsed, \"AND\")\n\tcontains(filter_parsed, \"OR\")\n\tcontains(filter_parsed, filter_resource_type)\n\tvalid_filter(filter_parsed, filter_method_name_delete_beta, filter_method_name_delete)\n\tvalid_filter(filter_parsed, filter_method_name_insert_beta, filter_method_name_insert)\n}\n\nvalid_alert_policy_conditions(monitoring_alert_policy) if {\n\tmonitoring_alert_policy.enabled == true\n\tmonitoring_alert_policy.notification_channels[_]\n}\n\neval(project) = \"pass\" if {\n\tvalid_log_metric[project.project_id]\n} else = \"fail\"\n\n# This part remains unchanged for all rules\nresults contains result if {\n\tsome resource in input.resources[input.main_resource_type]\n\tresult := dd_output.format(resource, eval(resource))\n}\n","resourceTypes":["gcp_project","gcp_monitoring_alert_policy","gcp_logging_log_metric"]},"complexRule":true}},"cases":[{"name":"","status":"low","notifications":[],"condition":"a > 0"}],"message":"## Description\nIt is recommended that a metric filter and alarm be established for Virtual Private Cloud\n(VPC) network route changes.\n\n## Rationale\nGoogle Cloud Platform (GCP) routes define the paths taken by network traffic from a VM instance to another destination. The other destination can be inside the organization VPC network (such as another VM) or outside of it. Every route consists of a destination and a next hop. Traffic whose destination IP is within the destination range is sent to the next hop\nfor delivery.\nMonitoring changes to route tables helps to ensure that all VPC traffic flows through an expected path.\n\n### Impact\nEnabling of logging may result in your project being charged for the additional logs usage.\n\n## Remediation\n\n### From the console\n\n#### Create the prescribed Log Metric\n1. Go to [Logs-based Metrics][1] within **Logging** in the Google Cloud console and click **CREATE METRIC**.\n2. Click the down arrow symbol on the filter bar at the rightmost corner and select\n**Convert to Advanced Filter**.\n3. Clear any text and add:\n   ```\n   resource.type=\"gce_route\"\n   AND (protoPayload.methodName:\"compute.routes.delete\"\n   OR protoPayload.methodName:\"compute.routes.insert\")\n   ```\n4. Click **Submit Filter**. Display logs appear based on the entered filter text.\n5. In the `Metric Editor` menu on the right, fill out the name field. Set `Units` to `1`\n(default) and `Type` to `Counter`. This ensures that the log metric counts the number of\nlog entries matching the advanced logs query.\n6. Click **Create Metric**.\n\n#### Create the prescribed alert policy\n\n1. Identify the newly created metric under the section `User-defined Metrics` in the\n[Logs-based Metrics][1] page in the Google Cloud console.\n2. Click the 3-dot icon in the rightmost column for the new metric and select `Create\nalert from Metric`. A new page appears.\n3. Fill out the alert policy configuration and click **Save**. Choose the alerting threshold\nand configuration that makes sense for your organization. For example, a\nthreshold of zero(0) for the most recent value ensures that a notification is triggered\nfor every owner change in the project:\n   ```\n   Set `Aggregator` to `Count`\n   Set `Configuration`:\n   - Condition: above\n   - Threshold: 0\n   - For: most recent value\n   ```\n4. Configure the desired notification channels in the section **Notifications**.\n5. Name the `policy` and click **Save**.\n\n### From the command line\n\n#### Create the prescribed Log Metric\n\nUse the command `gcloud logging metrics create`. Read the [usage reference][2] in the Google Cloud documentation for more information.\n\n#### Create the prescribed alert policy\n\nUse the command `gcloud alpha monitoring policies create`. Read the [usage reference][3] in the Google Cloud documentation for more information.\n\n## References\n\n1. [https://cloud.google.com/logging/docs/logs-based-metrics/][4]\n2. [https://cloud.google.com/monitoring/custom-metrics/][5]\n3. [https://cloud.google.com/monitoring/alerts/][6]\n4. [https://cloud.google.com/logging/docs/reference/tools/gcloud-logging][7]\n5. [https://cloud.google.com/storage/docs/access-control/iam][8]\n\n[1]: https://console.cloud.google.com/logs/metrics\n[2]: https://cloud.google.com/sdk/gcloud/reference/beta/logging/metrics/create\n[3]: https://cloud.google.com/sdk/gcloud/reference/alpha/monitoring/policies/create\n[4]: https://cloud.google.com/logging/docs/logs-based-metrics/\n[5]: https://cloud.google.com/monitoring/custom-metrics/\n[6]: https://cloud.google.com/monitoring/alerts/\n[7]: https://cloud.google.com/logging/docs/reference/tools/gcloud-logging\n[8]: https://cloud.google.com/storage/docs/access-control/iam\n","tags":["scored:true","cloud_provider:gcp","control:3.4.1","control:PR.PT-1","requirement:Anomalies-and-Events","control:A.12.4.1","control:PR.IP-8","requirement:Protective-Technology","control:PR.IP-7","control:A.12.4.3","control:ID.SC-4","framework:cis-gcp","requirement:System-and-Information-Integrity","control:DE.AE-02","requirement:Logging","control:12.2.a","level:1","framework:nist-800-171","control:DE.AE-3","control:DE.AE-03","control:DE.AE-2","requirement:Audit-Controls","control:PR.AA-01","framework:hipaa","requirement:Cybersecurity-Supply-Chain-Risk-Management","requirement:Operations-Security","requirement:Technological-Controls","requirement:Assessment-Authorization-and-Monitoring","security:compliance","requirement:Configuration-Management","requirement:Security-Continous-Monitoring","control:CA-7","framework:dora","control:ID.RA-1","control:GV.SC-02","control:ID.RA-3","control:ID.RA-5"