name: tfgen Split

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

on:
  push:
    branches:
      - "datadog-api-spec/generated/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  split:
    name: Split generated data sources
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: master
    steps:
      - name: Checkout generated branch
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          path: generated
          persist-credentials: false

      - name: Checkout master
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: master
          fetch-depth: 0
          path: base
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version-file: generated/.generator-v2/go.mod
          cache: true
          cache-dependency-path: |
            generated/.generator-v2/go.sum
            generated/go.sum

      - name: Setup Terraform CLI
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1
        with:
          terraform_version: "1.13.1"
          terraform_wrapper: false

      - name: Build tfgen and split the incoming branch
        id: split
        working-directory: generated
        shell: bash
        run: |
          set -euo pipefail

          BASE_DIR="$GITHUB_WORKSPACE/base"
          GENERATED_DIR="$GITHUB_WORKSPACE/generated"
          GENERATION_REPORT="$GENERATED_DIR/.tfgen-run-report.json"
          PLAN_PATH="$RUNNER_TEMP/tfgen-split-plan.json"
          SPLIT_DIR="$RUNNER_TEMP/tfgen-split"

          make tfgen-build
          mkdir -p "$SPLIT_DIR"
          if [[ ! -f "$GENERATION_REPORT" ]]; then
            echo "::error::Incoming branch is missing .tfgen-run-report.json"
            exit 1
          fi

          if ! ./bin/tfgen split \
            --base-dir "$BASE_DIR" \
            --generated-dir "$GENERATED_DIR" \
            --generation-report "$GENERATION_REPORT" \
            --out "$SPLIT_DIR" \
            --report "$PLAN_PATH"; then
            {
              echo "## tfgen split failed"
              echo
              if jq -e '.errors | length > 0' "$PLAN_PATH" >/dev/null 2>&1; then
                jq -r '.errors[] | "- " + .' "$PLAN_PATH"
              else
                echo "- tfgen exited without a structured attribution error."
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          artifact_count="$(jq -r '.artifacts | length' "$PLAN_PATH")"
          pr_count="$(jq -r '[.artifacts[] | select(.status == "created" or .status == "updated" or .status == "retired")] | length' "$PLAN_PATH")"
          blocked_count="$(jq -r '[.artifacts[] | select(.status == "retire_blocked")] | length' "$PLAN_PATH")"
          max_prs=25
          if [[ "$pr_count" -gt "$max_prs" ]]; then
            {
              echo "## tfgen split blocked"
              echo
              echo "The batch would open $pr_count PRs, exceeding the safety cap of $max_prs."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "artifact_count=$artifact_count" >> "$GITHUB_OUTPUT"
          echo "pr_count=$pr_count" >> "$GITHUB_OUTPUT"
          echo "blocked_count=$blocked_count" >> "$GITHUB_OUTPUT"
          {
            echo "## tfgen split"
            echo
            echo "Routed $pr_count PR artifact(s) and $blocked_count blocked retirement(s) from \`$GITHUB_REF_NAME\`."
          } >> "$GITHUB_STEP_SUMMARY"

      # Deployment prerequisite: provision this policy with contents:write,
      # pull-requests:write, and issues:write.
      - name: Mint Octo token
        if: steps.split.outputs.artifact_count != '0'
        id: octo-sts
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/terraform-provider-datadog
          policy: self.generator.tfgen-split

      - name: Create per-artifact draft PRs
        if: steps.split.outputs.artifact_count != '0'
        working-directory: base
        shell: bash
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          # GitHub's bash wrapper enables errexit. Disable it here so a failed
          # artifact is recorded and siblings still run.
          set +e
          set -uo pipefail

          PLAN_PATH="$RUNNER_TEMP/tfgen-split-plan.json"
          SPLIT_DIR="$RUNNER_TEMP/tfgen-split"
          OAPI_REPOSITORY="DataDog/datadog-api-spec"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $auth_header"
          unset auth_header

          if ! git fetch --no-tags origin \
            "refs/heads/$BASE_BRANCH:refs/remotes/origin/$BASE_BRANCH"; then
            echo "::error::Could not refresh origin/$BASE_BRANCH"
            exit 1
          fi

          if [[ "$GITHUB_REF_NAME" =~ ^datadog-api-spec/generated/([0-9]+)$ ]]; then
            oapi_pr_number="${BASH_REMATCH[1]}"
          else
            echo "::error::Could not derive an OpenAPI PR number from '$GITHUB_REF_NAME'"
            exit 1
          fi

          oapi_pr_url="https://github.com/$OAPI_REPOSITORY/pull/$oapi_pr_number"

          aggregate_pr_json="[]"
          for attempt in 1 2 3 4 5 6; do
            if ! aggregate_pr_json="$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --base "$BASE_BRANCH" \
              --head "$GITHUB_REF_NAME" \
              --limit 2 \
              --json number,url 2>&1)"; then
              echo "::error::Could not look up the aggregate PR: $aggregate_pr_json"
              exit 1
            fi
            aggregate_pr_count="$(jq 'length' <<<"$aggregate_pr_json")"
            if [[ "$aggregate_pr_count" -eq 1 ]]; then
              break
            fi
            if [[ "$aggregate_pr_count" -gt 1 ]]; then
              echo "::error::Found multiple open aggregate PRs for '$GITHUB_REF_NAME'"
              exit 1
            fi
            sleep 10
          done
          if [[ "$(jq 'length' <<<"$aggregate_pr_json")" -ne 1 ]]; then
            echo "::error::No open aggregate PR found for '$GITHUB_REF_NAME'"
            exit 1
          fi
          aggregate_pr_number="$(jq -r '.[0].number' <<<"$aggregate_pr_json")"
          aggregate_pr_url="$(jq -r '.[0].url' <<<"$aggregate_pr_json")"

          {
            echo
            echo "## Per-artifact fan-out"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          failures=0
          successes=0
          created_count=0
          updated_count=0
          retired_count=0
          child_pr_entries=()
          failure_entries=()

          reset_to_base() {
            git reset --hard >/dev/null 2>&1 || true
            git clean -fdq >/dev/null 2>&1 || true
            git checkout --detach "origin/$BASE_BRANCH" >/dev/null 2>&1 || true
          }

          find_comment_id() {
            local pr_number="$1"
            local marker="$2"
            gh api "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments?per_page=100" \
              | jq -r --arg marker "$marker" \
                '[.[] | select(.body | contains($marker))][0].id // empty'
          }

          upsert_pr_comment() {
            local pr_number="$1"
            local marker="$2"
            local body_file="$3"
            local comment_id
            if ! comment_id="$(find_comment_id "$pr_number" "$marker")"; then
              return 1
            fi
            if [[ -n "$comment_id" ]]; then
              gh api \
                --method PATCH \
                "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
                --raw-field body="$(<"$body_file")" >/dev/null
            else
              gh pr comment "$pr_number" --body-file "$body_file" >/dev/null
            fi
          }

          record_failure() {
            local name="$1"
            local message="$2"
            echo "::error title=tfgen fan-out failed::$name: $message"
            echo "- Failed \`$name\`: $message" >> "$GITHUB_STEP_SUMMARY"
            failure_entries+=("- \`$name\`: $message")
            failures=$((failures + 1))
            reset_to_base
          }

          record_success() {
            local name="$1"
            local status="$2"
            local pr_url="$3"
            echo "- Created or reused draft PR for \`$name\`: $pr_url" >> "$GITHUB_STEP_SUMMARY"
            child_pr_entries+=("- \`datadog_$name\` ($status): $pr_url")
            successes=$((successes + 1))
            case "$status" in
              created) created_count=$((created_count + 1)) ;;
              updated) updated_count=$((updated_count + 1)) ;;
              retired) retired_count=$((retired_count + 1)) ;;
            esac
          }

          post_source_comment() {
            local pr_number="$1"
            local comment_file
            comment_file="$(mktemp)"
            {
              echo "<!-- tfgen-oapi-source -->"
              echo "### OpenAPI source"
              echo
              echo "Generated from [$OAPI_REPOSITORY#$oapi_pr_number]($oapi_pr_url)."
            } > "$comment_file"
            if ! upsert_pr_comment "$pr_number" "<!-- tfgen-oapi-source -->" "$comment_file"; then
              rm -f "$comment_file"
              return 1
            fi
            rm -f "$comment_file"
          }

          reset_to_base
          mapfile -t artifact_names < <(jq -r '.artifacts[] | select(.status != "retire_blocked") | .name' "$PLAN_PATH")

          for name in "${artifact_names[@]}"; do
            if [[ ! "$name" =~ ^[a-z][a-z0-9_]*$ ]]; then
              record_failure "$name" "invalid artifact name"
              continue
            fi

            status="$(jq -r --arg name "$name" \
              '.artifacts[] | select(.name == $name) | .status' "$PLAN_PATH")"
            case "$status" in
              created) verb="Add"; branch="generate/datadog_${name}_datasource" ;;
              updated) verb="Update"; branch="generate/datadog_${name}_datasource" ;;
              retired) verb="Retire"; branch="retire/datadog_${name}_datasource" ;;
              *)
                record_failure "$name" "unsupported artifact status '$status'"
                continue
                ;;
            esac

            source_body_marker="<!-- tfgen-source oapi_pr=$oapi_pr_number artifact=$name -->"
            if ! existing_pr_json="$(gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --base "$BASE_BRANCH" \
              --head "$branch" \
              --limit 2 \
              --json number,url,body 2>&1)"; then
              record_failure "$name" "could not look up an existing child PR: $existing_pr_json"
              continue
            fi
            existing_pr_count="$(jq 'length' <<<"$existing_pr_json")"
            if [[ "$existing_pr_count" -gt 1 ]]; then
              record_failure "$name" "multiple open PRs already use branch '$branch'"
              continue
            fi
            if [[ "$existing_pr_count" -eq 1 ]]; then
              if ! jq -e --arg marker "$source_body_marker" \
                '.[0].body | contains($marker)' <<<"$existing_pr_json" >/dev/null; then
                record_failure "$name" "branch '$branch' belongs to a different OpenAPI PR or artifact"
                continue
              fi
              pr_url="$(jq -r '.[0].url' <<<"$existing_pr_json")"
              pr_number="$(jq -r '.[0].number' <<<"$existing_pr_json")"
              if ! post_source_comment "$pr_number"; then
                record_failure "$name" "could not add the OpenAPI source comment to $pr_url"
                continue
              fi
              record_success "$name" "$status" "$pr_url"
              reset_to_base
              continue
            fi

            if ! remote_ref="$(git ls-remote --heads origin "refs/heads/$branch")"; then
              record_failure "$name" "could not check whether branch '$branch' exists"
              continue
            fi
            if [[ -n "$remote_ref" ]] || git show-ref --verify --quiet "refs/heads/$branch"; then
              record_failure "$name" "branch '$branch' already exists; refusing to overwrite it"
              continue
            fi

            if ! git checkout -b "$branch" "origin/$BASE_BRANCH" >/dev/null; then
              record_failure "$name" "could not create '$branch' from origin/$BASE_BRANCH"
              continue
            fi

            mapfile -t files < <(jq -r --arg name "$name" \
              '.artifacts[] | select(.name == $name) | .files[]' "$PLAN_PATH")
            mapfile -t removed_files < <(jq -r --arg name "$name" \
              '.artifacts[] | select(.name == $name) | .removed_files[]?' "$PLAN_PATH")
            if [[ "${#files[@]}" -eq 0 ]]; then
              record_failure "$name" "split report contains no files"
              continue
            fi

            copy_error=""
            for rel in "${files[@]}"; do
              case "$rel" in
                /* | .. | ../* | */../*)
                  copy_error="unsafe bundle path '$rel'"
                  break
                  ;;
              esac
              source_file="$SPLIT_DIR/$name/$rel"
              if [[ ! -f "$source_file" ]]; then
                copy_error="bundle file is missing: $rel"
                break
              fi
              mkdir -p "$(dirname "$rel")"
              if ! cp "$source_file" "$rel"; then
                copy_error="could not copy bundle file: $rel"
                break
              fi
            done
            if [[ -n "$copy_error" ]]; then
              record_failure "$name" "$copy_error"
              continue
            fi

            removal_error=""
            for rel in "${removed_files[@]}"; do
              case "$rel" in
                /* | .. | ../* | */../*)
                  removal_error="unsafe removal path '$rel'"
                  break
                  ;;
              esac
              if ! git rm --ignore-unmatch -- "$rel"; then
                removal_error="could not remove report-declared file: $rel"
                break
              fi
            done
            if [[ -n "$removal_error" ]]; then
              record_failure "$name" "$removal_error"
              continue
            fi

            if ! make docs; then
              record_failure "$name" "make docs failed"
              continue
            fi

            doc_rel="docs/data-sources/${name}.md"
            if [[ "$status" == "retired" ]]; then
              if [[ -e "$doc_rel" ]]; then
                record_failure "$name" "make docs still generated retired page '$doc_rel'"
                continue
              fi
              if ! git restore --source=HEAD --staged --worktree -- docs \
                || ! git clean -fdq -- docs; then
                record_failure "$name" "could not restore unrelated docs drift"
                continue
              fi
              for rel in "${removed_files[@]}"; do
                if [[ "$rel" == "$doc_rel" ]] && ! git rm --ignore-unmatch -- "$doc_rel"; then
                  record_failure "$name" "could not restore report-declared docs deletion"
                  continue 2
                fi
              done
            else
              if [[ ! -f "$doc_rel" ]]; then
                record_failure "$name" "make docs did not generate '$doc_rel'"
                continue
              fi
              doc_copy="$(mktemp)"
              if ! cp "$doc_rel" "$doc_copy" \
                || ! git restore --source=HEAD --staged --worktree -- docs \
                || ! git clean -fdq -- docs \
                || ! mkdir -p "$(dirname "$doc_rel")" \
                || ! cp "$doc_copy" "$doc_rel"; then
                rm -f "$doc_copy"
                record_failure "$name" "could not isolate '$doc_rel' from unrelated docs drift"
                continue
              fi
              rm -f "$doc_copy"
            fi

            if ! make build; then
              record_failure "$name" "make build failed"
              continue
            fi

            declare -A allowed=()
            for rel in "${files[@]}"; do
              allowed["$rel"]=1
            done
            for rel in "${removed_files[@]}"; do
              allowed["$rel"]=1
            done
            if [[ "$status" != "retired" ]]; then
              allowed["$doc_rel"]=1
            fi

            unexpected=()
            while IFS= read -r status_line; do
              [[ -z "$status_line" ]] && continue
              changed_path="${status_line:3}"
              if [[ -z "${allowed[$changed_path]+allowed}" ]]; then
                unexpected+=("$changed_path")
              fi
            done < <(git status --porcelain --untracked-files=all)
            if [[ "${#unexpected[@]}" -gt 0 ]]; then
              record_failure "$name" "unexpected changed files: ${unexpected[*]}"
              continue
            fi

            stage_paths=("${files[@]}" "${removed_files[@]}")
            if [[ "$status" != "retired" ]]; then
              stage_paths+=("$doc_rel")
            fi
            if ! git add -A -- "${stage_paths[@]}"; then
              record_failure "$name" "could not stage generated files"
              continue
            fi
            if ! git diff --cached --check; then
              record_failure "$name" "generated changes fail git diff --check"
              continue
            fi
            if git diff --cached --quiet; then
              record_failure "$name" "bundle produced no committable changes"
              continue
            fi

            title="[generated] $verb datadog_${name} data source"
            if ! git commit -m "$title (generated)"; then
              record_failure "$name" "git commit failed"
              continue
            fi
            if ! git push --set-upstream origin "$branch"; then
              record_failure "$name" "git push failed"
              continue
            fi

            pascal_name=""
            IFS="_" read -ra name_parts <<< "$name"
            for part in "${name_parts[@]}"; do
              pascal_name+="${part^}"
            done
            test_function="TestAccDatadog${pascal_name}DataSource"
            test_file="datadog/tests/data_source_datadog_${name}_test.go"
            example_warnings="$(jq -r --arg name "$name" \
              '.artifacts[] | select(.name == $name) | .diagnostics[]?
               | select(.severity == "warning" and (.message | startswith("generated example for")))
               | "> - " + .message' "$PLAN_PATH")"
            body_file="$(mktemp)"
            if [[ "$status" == "retired" ]]; then
              {
                cat <<'RETIRE_HEADER'
          > ℹ️ **This PR is part of a project that auto-generates Terraform provider data
          > sources to keep generated coverage aligned with the annotated OpenAPI spec.**
          > The retirement was selected deterministically by tfgen and still requires human review.
          RETIRE_HEADER
                printf '\n## Retire %s data source (generator-v2)\n\n' "$name"
                printf 'The annotation for `datadog_%s` is no longer present, and tfgen reported the artifact safe to retire.\n\n' "$name"
                echo "### Removed"
                for rel in "${removed_files[@]}"; do
                  printf -- '- `%s`\n' "$rel"
                done
                echo
                echo "### Updated registrations"
                for rel in "${files[@]}"; do
                  printf -- '- `%s`\n' "$rel"
                done
                cat <<'RETIRE_FOOT'

          ### Reviewer notes / risks
          - Confirm this data source was never adopted or published. `retire_blocked` artifacts are routed to a tracking issue instead of an automatic deletion PR.
          - Registry conflicts must be resolved by preserving this removal and unrelated registrations; additive “keep both” guidance does not apply to retirement.
          - If this generated data source replaced a hand-written implementation, restoring that implementation is out of scope and requires manual review.

          ---
          > 🚧 **This Terraform data source generation is still under development.** Reach out to
          > **#api-platform** with any questions.
          RETIRE_FOOT
              } > "$body_file"
            else
              {
                cat <<'BODY_HEADER'
          > ℹ️ **This PR is part of a project that auto-generates Terraform provider data
          > sources to increase coverage.** The code is generated **deterministically by tfgen from an
          > annotated OpenAPI spec, without the use of LLMs**, and **reviewed via AI, though human review
          > is still necessary**. If you use this data source, **review it thoroughly and test it** first.

          > ⚠️ **This PR contains auto-generated code and must be verified before merging.** Do not
          > merge until an acceptance test is recorded and replays green against the Frog org. A clean
          > build and a successful split report do **not** prove runtime correctness.
          BODY_HEADER
              if [[ -n "$example_warnings" ]]; then
                cat <<'EXAMPLE_WARN_HEADER'

          > 🚨 **Manual `Example Usage` required — do not merge as-is.** tfgen could not render a
          > complete example for this data source. The committed `data-source.tf` (listed below) is a
          > placeholder; replace it with a real, working example before merging:
          EXAMPLE_WARN_HEADER
                printf '%s\n' "$example_warnings"
              fi
              printf '\n## %s data source (generator-v2)\n\n' "$name"
              printf 'This data source was %s by tfgen and routed from an aggregate upstream generation run.\n' "$status"
              printf 'The split, documentation generation, and compile/format gate completed successfully.\n\n'
              echo "### Generated"
              for rel in "${files[@]}"; do
                printf -- '- `%s`\n' "$rel"
              done
              printf -- '- `%s` (generated via `make docs`)\n\n' "$doc_rel"
              cat <<BODY_TEST
          ### Test / cassette
          - Acceptance-test scaffold: \`$test_function\` in \`$test_file\`; complete its TODOs before recording.
          - Cassette: not recorded.

          ### Reviewer notes / risks
          - Automated risk scan skipped; a reviewer must inspect runtime behavior manually.
          - Generated acceptance tests are boilerplate and do not prove runtime correctness.

          ### How to test
          Add and complete the acceptance test, record it once against the Frog org, then replay it:

          \`\`\`bash
          eval "\$(dd-auth --domain frog.datadoghq.com --force-app-key --no-cache --output)"
          export DD_TEST_CLIENT_API_KEY="\$DD_API_KEY" DD_TEST_CLIENT_APP_KEY="\$DD_APP_KEY"

          RECORD=true TESTARGS='-run $test_function' make testacc
          RECORD=false TESTARGS='-run $test_function' make testacc
          \`\`\`

          > **Merge note:** auto-generated. If the merge queue reports a conflict in
          > \`datasources_generated.go\`, resolve by keeping both entries and re-queue
          > (append-only registrations).
          >
          > If this PR updates \`framework_provider.go\`, resolve conflicts manually:
          > preserve unrelated upstream edits while keeping this artifact's retired
          > hand-written constructor removed.

          ---
          > 🚧 **This Terraform data source generation is still under development.** Reach out to
          > **#api-platform** with any questions.
          BODY_TEST
              } > "$body_file"
            fi

            printf '\n%s\n' "$source_body_marker" >> "$body_file"

            if ! create_output="$(gh pr create \
              --draft \
              --base "$BASE_BRANCH" \
              --head "$branch" \
              --title "$title" \
              --body-file "$body_file" \
              --label "changelog/feature" 2>&1)"; then
              rm -f "$body_file"
              record_failure "$name" "draft PR creation failed: $create_output"
              continue
            fi
            rm -f "$body_file"

            if ! created_pr_json="$(gh pr view "$branch" \
              --repo "$GITHUB_REPOSITORY" \
              --json number,url 2>&1)"; then
              record_failure "$name" "draft PR was created but could not be read: $created_pr_json"
              continue
            fi
            pr_url="$(jq -r '.url' <<<"$created_pr_json")"
            pr_number="$(jq -r '.number' <<<"$created_pr_json")"
            if ! post_source_comment "$pr_number"; then
              record_failure "$name" "could not add the OpenAPI source comment to $pr_url"
              continue
            fi

            record_success "$name" "$status" "$pr_url"
            reset_to_base
          done

          blocked_count="$(jq -r '[.artifacts[] | select(.status == "retire_blocked")] | length' "$PLAN_PATH")"
          issue_url=""
          if [[ "$blocked_count" -gt 0 ]]; then
            issue_body="$(mktemp)"
            {
              echo "Reconcile found generated data sources whose automatic retirement was blocked."
              echo "A recorded cassette or missing tfgen marker means deletion could be a breaking change."
              echo "Each artifact requires a human deprecation or migration decision:"
              echo
              jq -r '.artifacts[]
                | select(.status == "retire_blocked")
                | "- [ ] `datadog_\(.name)`\n  - " +
                  (if (.diagnostics | length) == 0
                   then "No diagnostic supplied."
                   else ([.diagnostics[].message] | join("; "))
                   end)' "$PLAN_PATH"
              echo
              echo "Source branch: \`$GITHUB_REF_NAME\`"
              echo "Source SHA: \`$GITHUB_SHA\`"
              echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            } > "$issue_body"
            issue_title="Retire blocked generated data sources (${GITHUB_SHA:0:7})"
            if ! existing_issue_json="$(gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state all \
              --limit 100 \
              --json title,url \
              --jq "[.[] | select(.title == \"$issue_title\")]" 2>&1)"; then
              echo "::error title=tfgen blocked-retirement lookup failed::$existing_issue_json"
              echo "- Failed to look up an existing blocked-retirement issue: $existing_issue_json" >> "$GITHUB_STEP_SUMMARY"
              failure_entries+=("- Blocked retirement tracking issue lookup failed.")
              failures=$((failures + 1))
            elif [[ "$(jq 'length' <<<"$existing_issue_json")" -gt 1 ]]; then
              echo "::error title=tfgen blocked-retirement lookup failed::multiple issues have title '$issue_title'"
              echo "- Multiple blocked-retirement issues have title \`$issue_title\`." >> "$GITHUB_STEP_SUMMARY"
              failure_entries+=("- Multiple blocked-retirement issues matched \`$issue_title\`.")
              failures=$((failures + 1))
            elif [[ "$(jq 'length' <<<"$existing_issue_json")" -eq 1 ]]; then
              issue_url="$(jq -r '.[0].url' <<<"$existing_issue_json")"
              echo "- Reused retirement tracking issue: $issue_url" >> "$GITHUB_STEP_SUMMARY"
            elif issue_url="$(gh issue create --title "$issue_title" --body-file "$issue_body" 2>&1)"; then
              echo "- Created retirement tracking issue: $issue_url" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error title=tfgen blocked-retirement issue failed::$issue_url"
              echo "- Failed to create the blocked-retirement tracking issue: $issue_url" >> "$GITHUB_STEP_SUMMARY"
              failure_entries+=("- Blocked retirement tracking issue creation failed.")
              failures=$((failures + 1))
            fi
            rm -f "$issue_body"
          fi

          {
            echo
            echo "Created $successes draft PR(s): $created_count created, $updated_count updated, $retired_count retired."
            echo "Reported $blocked_count blocked retirement(s); $failures operation(s) failed."
          } >> "$GITHUB_STEP_SUMMARY"

          aggregate_comment_file="$(mktemp)"
          {
            echo "<!-- tfgen-split-summary -->"
            if [[ "$failures" -eq 0 ]]; then
              echo "## tfgen split completed"
              echo
              echo "Every generated artifact was routed successfully. Work continues in the child PRs below, so this aggregate transport PR will be closed."
            else
              echo "## tfgen split incomplete"
              echo
              echo "The aggregate PR remains open because one or more fan-out operations failed."
            fi
            echo
            echo "### OpenAPI source"
            echo "- [$OAPI_REPOSITORY#$oapi_pr_number]($oapi_pr_url)"
            echo
            echo "### Child PRs"
            if [[ "${#child_pr_entries[@]}" -gt 0 ]]; then
              printf '%s\n' "${child_pr_entries[@]}"
            else
              echo "- None."
            fi
            if [[ -n "$issue_url" ]]; then
              echo
              echo "### Blocked retirements"
              echo "- Tracking issue: $issue_url"
            fi
            if [[ "${#failure_entries[@]}" -gt 0 ]]; then
              echo
              echo "### Failures"
              printf '%s\n' "${failure_entries[@]}"
            fi
            echo
            echo "Pipeline run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > "$aggregate_comment_file"

          if ! upsert_pr_comment \
            "$aggregate_pr_number" \
            "<!-- tfgen-split-summary -->" \
            "$aggregate_comment_file"; then
            echo "::error::Could not update aggregate PR #$aggregate_pr_number"
            echo "- Failed to update aggregate PR $aggregate_pr_url." >> "$GITHUB_STEP_SUMMARY"
            failures=$((failures + 1))
          fi
          rm -f "$aggregate_comment_file"

          if [[ "$failures" -eq 0 ]]; then
            if close_output="$(gh pr close \
              "$aggregate_pr_number" \
              --repo "$GITHUB_REPOSITORY" 2>&1)"; then
              echo "- Closed aggregate PR: $aggregate_pr_url" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::error::Could not close aggregate PR #$aggregate_pr_number: $close_output"
              echo "- Failed to close aggregate PR $aggregate_pr_url." >> "$GITHUB_STEP_SUMMARY"
              failures=$((failures + 1))
            fi
          fi

          if [[ "$failures" -gt 0 ]]; then
            exit 1
          fi
