name: Run Tests

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
      - v3
  schedule:
    - cron: "0 1 * * *"
  push:
    branches:
      - mq-working-branch-master-**
      - mq-working-branch-v3-**

concurrency:
  group: ${{ github.head_ref || github.run_id }}-test
  cancel-in-progress: true

jobs:
  # Detects whether a PR changes anything other than CHANGELOG.md, so the
  # acceptance-test matrices can be skipped on changelog-only PRs (e.g. the
  # automated release PR). Only runs for pull_request events; on schedule/push
  # it is skipped and its empty `code` output leaves the matrices running.
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Detect non-changelog changes
        id: filter
        run: |
          files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"
          echo "$files"
          # An empty diff (net-zero change, e.g. a commit reverting an earlier
          # one) means no code changed, so skip. Guarding this before the grep
          # avoids echo's blank line being counted as a non-changelog file.
          if [ -z "$files" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
          elif echo "$files" | grep -qvE '^CHANGELOG\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  pre-commit:
    runs-on: ubuntu-latest
    if: (github.event.action != 'closed' && github.event.pull_request.merged != true) || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@65d7f2d534ac1bc67fcd62888c5f4f3d2cb2b236
        with:
          python-version: '3.11'
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: set PY
        run: echo "PY=$(python -c 'import platform;print(platform.python_version())')" >> $GITHUB_ENV
      - uses: actions/cache@f4b3439a656ba812b8cb417d2d49f9c810103092
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  linter-checks:
    runs-on: ubuntu-latest
    steps:
      # if we don't do this, `gofmt` will want to rewrite all Go files due to bad line endings,
      # because Git will convert all line endings to CRLF when cloning on windows
      - name: Set Git to use Linux-style line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.23"
          cache: true
      - name: golangci-lint
        if: github.event_name == 'pull_request'
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4
          args: --new-from-rev=origin/master --timeout=10m
      - name: Vet
        run: make vet
      - name: License Check
        run: make license-check
      - name: Setup terraform CLI
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1
        with:
          terraform_version: "1.13.1"
          terraform_wrapper: false
      - name: Check Docs Are Up To Date
        if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'datadog-api-spec/generated/')
        run: make check-docs
      - name: Run make fmtcheck
        run: make fmtcheck

  # Unit tests don't touch the API, use no cassettes, and need no terraform binary,
  # so they run once here rather than being sharded across the version matrix. They
  # are also excluded from the sharded jobs' -run filter, so this is the only place
  # they execute in CI.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.23"
          cache: true
      - name: Unit tests
        run: make test

  test:
    needs: changes
    # Skip on changelog-only PRs. !cancelled() drops the implicit success()
    # gate on `changes` so schedule/push runs (where `changes` is skipped and
    # `code` is empty) still execute the matrix.
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        terraform_version:
          - "1.1.5"
          - "1.13.1"
        shard: [0, 1, 2, 3]
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.23"
          cache: true
      - name: Setup terraform CLI
        uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1
        with:
          terraform_version: ${{ matrix.terraform_version }}
          terraform_wrapper: false
      - name: Set TF_ACC_TERRAFORM_PATH env var
        run: echo "TF_ACC_TERRAFORM_PATH=$(which terraform)" >> $GITHUB_ENV
      - name: Build shard test args
        id: shard
        run: |
          SHARD_REGEX=$(python3 scripts/shard_tests.py --shard ${{ matrix.shard }} --total 4 --escape-for-make)
          echo "test_args=-run '${SHARD_REGEX}'" >> "$GITHUB_OUTPUT"
      - name: Test
        run: make testacc
        env:
          RECORD: false
          TESTARGS: ${{ steps.shard.outputs.test_args }}
          DD_TERRAFORM_DATABRICKS_INTEGRATION_ENABLED: "true"

  test-tofu:
    needs: changes
    # See the `test` job: skip on changelog-only PRs, still run on schedule/push.
    if: ${{ !cancelled() && needs.changes.outputs.code != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        tofu_version:
          - "1.10.5"
          - "1.11.2"
        shard: [0, 1, 2, 3]

    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.23"
          cache: true
      - uses: opentofu/setup-opentofu@592200bd4b9bbf4772ace78f887668b1aee8f716 # v1.0.5
        with:
          tofu_version: ${{ matrix.tofu_version }}
          tofu_wrapper: false
      - name: Set Terraform env vars
        run: |
          echo "TF_ACC_TERRAFORM_PATH=$(which tofu)" >> $GITHUB_ENV
          echo "TF_ACC_PROVIDER_HOST=registry.opentofu.org" >> $GITHUB_ENV
      - name: Build shard test args
        id: shard
        run: |
          SHARD_REGEX=$(python3 scripts/shard_tests.py --shard ${{ matrix.shard }} --total 4 --escape-for-make)
          echo "test_args=-run '${SHARD_REGEX}'" >> "$GITHUB_OUTPUT"
      - name: Test
        run: make testacc
        env:
          RECORD: false
          TESTARGS: ${{ steps.shard.outputs.test_args }}
          DD_TERRAFORM_DATABRICKS_INTEGRATION_ENABLED: "true"

  # Final job for branch protection rules - depends on all other jobs
  all-checks:
    runs-on: ubuntu-latest
    needs: [changes, linter-checks, unit-tests, test, test-tofu]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ needs.changes.result }} ${{ needs.linter-checks.result }} ${{ needs.unit-tests.result }} ${{ needs.test.result }} ${{ needs.test-tofu.result }}"
          for result in $results; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed or were cancelled"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped!"
