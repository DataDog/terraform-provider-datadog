name: PR Integration Tests

permissions:
  contents: read

# Triggers after PR Test Selection completes. Because that workflow runs on
# pull_request, GitHub's fork-approval gate already fired before we get here.
# No environment gate is needed: approval is implicit in Workflow A completing.
on: # yamllint disable-line rule:truthy
  workflow_run:
    workflows: ["PR Test Selection"]
    types: [completed]

concurrency:
  group: ${{ github.event.workflow_run.head_sha }}-pr-integration
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.13.1"

jobs:
  pr-tests-selection:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_run: ${{ steps.read.outputs.should_run }}
      test_args: ${{ steps.read.outputs.test_args }}
    steps:
      - name: Download test selection
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: test-selection
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Read test selection
        id: read
        run: |
          should_run=$(jq -r '.should_run' test-selection.json)
          test_args=$(jq -r '.test_args' test-selection.json)
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "test_args=${test_args}" >> "$GITHUB_OUTPUT"

  integration-tests:
    needs: pr-tests-selection
    if: needs.pr-tests-selection.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required to mint Datadog credentials via dd-sts
    steps:
      - name: Checkout PR code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Mint Datadog credentials
        id: dd-sts
        uses: DataDog/dd-sts-action@7d2d231c02fd54a3da912e582ff87cb995d1fd30 # v1.0.4
        with:
          policy: terraform-provider-datadog
      - name: Install Go
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe
        with:
          go-version: "1.23"
          cache: true
      # No GHA cache: the Terraform binary is small (~30MB, a few seconds to
      # download) and a shared cache would let untrusted fork PR code poison a
      # binary that a later trusted, credentialed run could restore and execute.
      - name: Install terraform
        run: |
          mkdir -p ~/.cache/terraform
          wget https://releases.hashicorp.com/terraform/${{ env.TERRAFORM_VERSION }}/terraform_${{ env.TERRAFORM_VERSION }}_linux_amd64.zip -O ~/.cache/terraform/terraform-${{ env.TERRAFORM_VERSION }}
          unzip -o -d ~/.cache/terraform ~/.cache/terraform/terraform-${{ env.TERRAFORM_VERSION }}
      - name: Sweep stale test resources
        run: make sweep
        env:
          DD_TEST_CLIENT_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          DD_TEST_CLIENT_APP_KEY: ${{ steps.dd-sts.outputs.app_key }}
      - name: Run selected integration tests
        run: make testacc
        env:
          RECORD: "none"
          CI: "true"
          DD_TEST_CLIENT_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          DD_TEST_CLIENT_APP_KEY: ${{ steps.dd-sts.outputs.app_key }}
          DD_HTTP_CLIENT_RETRY_ENABLED: "true"
          TF_ACC_TERRAFORM_PATH: "/home/runner/.cache/terraform/terraform"
          TF_ACC_TEMP_DIR: "/tmp"
          TESTARGS: ${{ needs.pr-tests-selection.outputs.test_args }}
