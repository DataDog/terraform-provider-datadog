openapi: 3.0.0
info:
  title: Datadog API V2 Collection
  version: '1.0'
  description: Collection of all Datadog Public endpoints.
  contact:
    name: Datadog Support
    url: https://www.datadoghq.com/support/
    email: support@datadoghq.com
servers:
- url: https://{subdomain}.{site}
  variables:
    subdomain:
      default: api
      description: The subdomain where the API is deployed.
    site:
      default: datadoghq.com
      description: The regional site for Datadog customers.
      enum:
      - datadoghq.com
      - us3.datadoghq.com
      - us5.datadoghq.com
      - ap1.datadoghq.com
      - ap2.datadoghq.com
      - datadoghq.eu
      - ddog-gov.com
      - us2.ddog-gov.com
- url: '{protocol}://{name}'
  variables:
    protocol:
      default: https
      description: The protocol for accessing the API.
    name:
      default: api.datadoghq.com
      description: Full site DNS name.
- url: https://{subdomain}.{site}
  variables:
    subdomain:
      default: api
      description: The subdomain where the API is deployed.
    site:
      default: datadoghq.com
      description: Any Datadog deployment.
security:
- apiKeyAuth: []
  appKeyAuth: []
tags:
- name: Action Connection
  description: 'Action connections extend your installed integrations and allow you to take action in
    your third-party systems

    (e.g. AWS, GitLab, and Statuspage) with Datadog’s Workflow Automation and App Builder products.


    Datadog’s Integrations automatically provide authentication for Slack, Microsoft Teams, PagerDuty,
    Opsgenie,

    JIRA, GitHub, and Statuspage. You do not need additional connections in order to access these tools
    within

    Workflow Automation and App Builder.


    We offer granular access control for editing and resolving connections.'
  externalDocs:
    description: Find out more at
    url: https://docs.datadoghq.com/service_management/workflows/connections/
paths:
  /api/v2/actions/connections/{connection_id}:
    get:
      operationId: GetActionConnection
      tags:
      - Action Connection
      summary: Get an existing Action Connection
      description: Get an existing Action Connection. This API requires a [registered application key](https://docs.datadoghq.com/api/latest/action-connection/#register-a-new-app-key).
      parameters:
      - $ref: '#/components/parameters/ConnectionId'
      responses:
        '200':
          description: Successfully get Action Connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActionConnectionResponse'
              examples:
                default:
                  value:
                    data:
                      id: 00000000-0000-0000-0000-000000000002
                      type: action_connection
                      attributes:
                        name: My AWS Connection
                        integration:
                          type: AWS
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONAPIErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONAPIErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONAPIErrorResponse'
        '429':
          description: Too Many Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONAPIErrorResponse'
      x-menu-order: 1
      x-undo:
        type: safe
components:
  parameters:
    ConnectionId:
      name: connection_id
      in: path
      required: true
      description: The ID of the action connection
      schema:
        type: string
  schemas:
    AWSAssumeRole:
      type: object
      description: The definition of `AWSAssumeRole` object.
      required:
      - type
      - account_id
      - role
      properties:
        account_id:
          type: string
          description: AWS account the connection is created for
          pattern: ^\d{12}$
          example: '111222333444'
        external_id:
          type: string
          description: External ID used to scope which connection can be used to assume the role
          readOnly: true
          example: 33a1011635c44b38a064cf14e82e1d8f
        principal_id:
          type: string
          description: AWS account that will assume the role
          readOnly: true
          example: '123456789012'
        role:
          type: string
          description: Role to assume
          example: my-role
        type:
          $ref: '#/components/schemas/AWSAssumeRoleType'
    AWSAssumeRoleType:
      type: string
      description: The definition of `AWSAssumeRoleType` object.
      example: AWSAssumeRole
      enum:
      - AWSAssumeRole
      x-enum-varnames:
      - AWSASSUMEROLE
    AWSCredentials:
      description: The definition of `AWSCredentials` object.
      oneOf:
      - $ref: '#/components/schemas/AWSAssumeRole'
    AWSIntegration:
      type: object
      description: The definition of `AWSIntegration` object.
      required:
      - type
      - credentials
      properties:
        credentials:
