openapi: 3.0.0
info:
  title: Datadog API V2 Collection
  version: '1.0'
  description: Collection of all Datadog Public endpoints.
  contact:
    name: Datadog Support
    url: https://www.datadoghq.com/support/
    email: support@datadoghq.com
servers:
- url: https://{subdomain}.{site}
  variables:
    subdomain:
      default: api
      description: The subdomain where the API is deployed.
    site:
      default: datadoghq.com
      description: The regional site for Datadog customers.
      enum:
      - datadoghq.com
      - us3.datadoghq.com
      - us5.datadoghq.com
      - ap1.datadoghq.com
      - ap2.datadoghq.com
      - datadoghq.eu
      - ddog-gov.com
      - us2.ddog-gov.com
- url: '{protocol}://{name}'
  variables:
    protocol:
      default: https
      description: The protocol for accessing the API.
    name:
      default: api.datadoghq.com
      description: Full site DNS name.
- url: https://{subdomain}.{site}
  variables:
    subdomain:
      default: api
      description: The subdomain where the API is deployed.
    site:
      default: datadoghq.com
      description: Any Datadog deployment.
security:
- apiKeyAuth: []
  appKeyAuth: []
tags:
- name: Cloud Cost Management
  description: The Cloud Cost Management API allows you to set up, edit, and delete Cloud Cost Management
    accounts for AWS, Azure, and Google Cloud. You can query your cost data by using the [Metrics endpoint](https://docs.datadoghq.com/api/latest/metrics/#query-timeseries-data-across-multiple-products)
    and the `cloud_cost` data source. For more information, see the [Cloud Cost Management documentation](https://docs.datadoghq.com/cloud_cost_management/).
paths:
  /api/v2/cost/aws_cur_config/{cloud_account_id}:
    get:
      operationId: GetCostAWSCURConfig
      tags:
      - Cloud Cost Management
      summary: Get cost AWS CUR config
      description: Get a specific AWS CUR config.
      parameters:
      - name: cloud_account_id
        in: path
        required: true
        description: The unique identifier of the cloud account
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AwsCurConfigResponse'
              examples:
                default:
                  value:
                    data:
                      attributes:
                        account_filters:
                          excluded_accounts:
                          - '123456789124'
                          - '123456789125'
                          include_new_accounts: true
                        account_id: '123456789123'
                        bucket_name: dd-cost-bucket
                        bucket_region: us-east-1
                        created_at: '2023-01-01T12:00:00.000000'
                        error_messages: []
                        months: 36
                        report_name: dd-report-name
                        report_prefix: dd-report-prefix
                        status: active
                        status_updated_at: '2023-01-01T12:00:00.000000'
                        updated_at: '2023-01-01T12:00:00.000000'
                      id: '123456789123'
                      type: aws_cur_config
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
      security:
      - apiKeyAuth: []
        appKeyAuth: []
      - AuthZ:
        - cloud_cost_management_read
      x-menu-order: 5
      x-undo:
        type: safe
components:
  responses:
    TooManyRequestsResponse:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
  schemas:
    APIErrorResponse:
      type: object
      description: API error response.
      required:
      - errors
      properties:
        errors:
          type: array
          description: A list of errors.
          example:
          - Bad Request
          items:
            type: string
            description: A list of items.
            example: Bad Request
    AwsCurConfigResponse:
      type: object
      description: The definition of `AwsCurConfigResponse` object.
      example:
        data:
          attributes:
            account_filters:
              excluded_accounts:
              - '123456789124'
              - '123456789125'
              include_new_accounts: true
            account_id: '123456789123'
            bucket_name: dd-cost-bucket
            bucket_region: us-east-1
            created_at: '2023-01-01T12:00:00.000000'
            error_messages: []
            months: 36
            report_name: dd-report-name
            report_prefix: dd-report-prefix
            status: active
            status_updated_at: '2023-01-01T12:00:00.000000'
            updated_at: '2023-01-01T12:00:00.000000'
          id: '123456789123'
          type: aws_cur_config
      properties:
        data:
          $ref: '#/components/schemas/AwsCurConfigResponseData'
    AwsCurConfigResponseData:
      type: object
      description: The definition of `AwsCurConfigResponseData` object.
      required:
      - type
      properties:
        attributes:
          $ref: '#/components/schemas/AwsCurConfigResponseDataAttributes'
        id:
          type: string
          description: The `AwsCurConfigResponseData` `id`.
        type:
          $ref: '#/components/schemas/AwsCurConfigResponseDataType'
    AwsCurConfigResponseDataAttributes:
      type: object
      description: The definition of `AwsCurConfigResponseDataAttributes` object.
      properties:
        account_filters:
          $ref: '#/components/schemas/AwsCurConfigResponseDataAttributesAccountFilters'
        account_id:
          type: string
          description: The `attributes` `account_id`.
        bucket_name:
          type: string
          description: The `attributes` `bucket_name`.
        bucket_region:
          type: string
          description: The `attributes` `bucket_region`.
        created_at:
          type: string
          description: The `attributes` `created_at`.
        error_messages:
          type: array
          description: The `attributes` `error_messages`.
          nullable: true
          items:
            type: string
            description: An error message string.
        months:
          type: integer
          description: The `attributes` `months`.
          format: int64
        report_name:
          type: string
          description: The `attributes` `report_name`.
        report_prefix:
          type: string
          description: The `attributes` `report_prefix`.
        status:
          type: string
          description: The `attributes` `status`.
        status_updated_at:
          type: string
          description: The `attributes` `status_updated_at`.
        updated_at:
          type: string
          description: The `attributes` `updated_at`.
    AwsCurConfigResponseDataAttributesAccountFilters:
      type: object
      description: The definition of `AwsCurConfigResponseDataAttributesAccountFilters` object.
      properties:
        excluded_accounts:
          type: array
          description: The `account_filters` `excluded_accounts`.
          items:
            type: string
            description: An AWS account ID to exclude.
        include_new_accounts:
          type: boolean
          description: The `account_filters` `include_new_accounts`.
          nullable: true
        included_accounts:
          type: array
          description: The `account_filters` `included_accounts`.
          items:
            type: string
            description: An AWS account ID to include.
    AwsCurConfigResponseDataType:
      type: string
      description: AWS CUR config resource type.
      default: aws_cur_config
      example: aws_cur_config
      enum:
      - aws_cur_config
      x-ignore-duplicate-object: true
      x-enum-varnames:
      - AWS_CUR_CONFIG
  securitySchemes:
    AuthZ:
      type: oauth2
      description: This API uses OAuth 2 with the implicit grant flow.
      flows:
        authorizationCode:
          authorizationUrl: /oauth2/v1/authorize
          tokenUrl: /oauth2/v1/token
          scopes: {}
    apiKeyAuth:
      type: apiKey
      description: Your Datadog API Key.
      name: DD-API-KEY
      in: header
      x-env-name: DD_API_KEY
    appKeyAuth:
      type: apiKey
      description: Your Datadog APP Key.
      name: DD-APPLICATION-KEY
      in: header
      x-env-name: DD_APP_KEY
