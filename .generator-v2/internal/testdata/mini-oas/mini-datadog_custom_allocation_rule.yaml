          description: The `items` `value`.
          example: ''
    ArbitraryRuleResponseDataAttributesStrategyBasedOnCostsItems:
      type: object
      description: The definition of `ArbitraryRuleResponseDataAttributesStrategyBasedOnCostsItems` object.
      required:
      - condition
