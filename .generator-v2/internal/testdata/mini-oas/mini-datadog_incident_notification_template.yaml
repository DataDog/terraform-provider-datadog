openapi: 3.0.0
info:
  title: Datadog API V2 Collection
  version: '1.0'
  description: Collection of all Datadog Public endpoints.
  contact:
    name: Datadog Support
    url: https://www.datadoghq.com/support/
    email: support@datadoghq.com
servers:
- url: https://{subdomain}.{site}
  variables:
    subdomain:
      default: api
      description: The subdomain where the API is deployed.
    site:
      default: datadoghq.com
      description: The regional site for Datadog customers.
      enum:
      - datadoghq.com
      - us3.datadoghq.com
      - us5.datadoghq.com
      - ap1.datadoghq.com
      - ap2.datadoghq.com
      - datadoghq.eu
      - ddog-gov.com
      - us2.ddog-gov.com
- url: '{protocol}://{name}'
  variables:
    protocol:
      default: https
      description: The protocol for accessing the API.
    name:
      default: api.datadoghq.com
      description: Full site DNS name.
- url: https://{subdomain}.{site}
  variables:
    subdomain:
      default: api
      description: The subdomain where the API is deployed.
    site:
      default: datadoghq.com
      description: Any Datadog deployment.
security:
- apiKeyAuth: []
  appKeyAuth: []
tags:
- name: Incidents
  description: Manage incident response, as well as associated attachments, metadata, and todos. See the
    [Incident Management page](https://docs.datadoghq.com/service_management/incident_management/) for
    more information.
paths:
  /api/v2/incidents/config/notification-templates/{id}:
    get:
      operationId: GetIncidentNotificationTemplate
      tags:
      - Incidents
      summary: Get incident notification template
      description: Retrieves a specific notification template by its ID.
      parameters:
      - $ref: '#/components/parameters/IncidentNotificationTemplateIDPathParameter'
      - $ref: '#/components/parameters/IncidentNotificationTemplateIncludeQueryParameter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentNotificationTemplate'
              examples:
                default:
                  value:
                    data:
                      id: 00000000-0000-0000-0000-000000000001
                      type: notification_templates
                      attributes:
                        name: Incident Alert Template
                        subject: '{{incident.severity}} Incident: {{incident.title}}'
                        content: 'An incident has been declared.


                          Title: {{incident.title}}'
                        category: alert
                        created: '2024-01-01T00:00:00+00:00'
                        modified: '2024-01-01T00:00:00+00:00'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
      security:
      - apiKeyAuth: []
        appKeyAuth: []
      - AuthZ:
        - incident_read
        - incident_write
      x-permission:
        operator: OR
        permissions:
        - incident_settings_read
        - incident_write
        - incident_read
      x-menu-order: 26
      x-undo:
        type: safe
      x-unstable: '**Note**: This endpoint is in Preview.

        If you have any feedback, contact [Datadog support](https://docs.datadoghq.com/help/).'
  /api/v2/incidents/config/notification-templates:
    get:
      operationId: ListIncidentNotificationTemplates
      tags:
      - Incidents
      summary: List incident notification templates
      description: Lists all notification templates. Optionally filter by incident type.
      parameters:
      - $ref: '#/components/parameters/IncidentNotificationTemplateIncidentTypeFilterQueryParameter'
      - $ref: '#/components/parameters/IncidentNotificationTemplateIncludeQueryParameter'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentNotificationTemplateArray'
              examples:
                default:
                  value:
                    data:
                    - id: 00000000-0000-0000-0000-000000000001
                      type: notification_templates
                      attributes:
                        name: Incident Alert Template
                        subject: '{{incident.severity}} Incident: {{incident.title}}'
                        content: 'An incident has been declared.


                          Title: {{incident.title}}'
                        category: alert
                        created: '2024-01-01T00:00:00+00:00'
                        modified: '2024-01-01T00:00:00+00:00'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
        '429':
          $ref: '#/components/responses/TooManyRequestsResponse'
      security:
      - apiKeyAuth: []
        appKeyAuth: []
      - AuthZ: []
      x-permission:
        operator: AND
        permissions:
        - incident_notification_settings_read
      x-menu-order: 24
      x-undo:
        type: safe
      x-unstable: '**Note**: This endpoint is in Preview.

        If you have any feedback, contact [Datadog support](https://docs.datadoghq.com/help/).'
components:
  parameters:
    IncidentNotificationTemplateIDPathParameter:
      name: id
      in: path
      required: true
      description: The ID of the notification template.
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000001
    IncidentNotificationTemplateIncidentTypeFilterQueryParameter:
      name: filter[incident-type]
      in: query
      required: false
      description: Optional incident type ID filter.
      schema:
        type: string
        format: uuid
        example: 00000000-0000-0000-0000-000000000001
      explode: false
    IncidentNotificationTemplateIncludeQueryParameter:
      name: include
      in: query
      required: false
      description: 'Comma-separated list of relationships to include. Supported values: `created_by_user`,
        `last_modified_by_user`, `incident_type`'
      schema:
        type: string
        example: created_by_user,incident_type
      explode: false
  responses:
    BadRequestResponse:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    ForbiddenResponse:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    NotFoundResponse:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    TooManyRequestsResponse:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
    UnauthorizedResponse:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/APIErrorResponse'
  schemas:
    APIErrorResponse:
      type: object
      description: API error response.
      required:
      - errors
      properties:
        errors:
          type: array
          description: A list of errors.
          example:
          - Bad Request
          items:
            type: string
            description: A list of items.
            example: Bad Request
    GoogleMeetConfigurationReference:
      type: object
      description: A reference to a Google Meet Configuration resource.
      nullable: true
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/GoogleMeetConfigurationReferenceData'
    GoogleMeetConfigurationReferenceData:
      type: object
      description: The Google Meet configuration relationship data object.
      nullable: true
      required:
      - id
      - type
      properties:
        type:
          type: string
          description: The type of the Google Meet configuration.
          example: google_meet_configurations
        id:
          type: string
          description: The unique identifier of the Google Meet configuration.
          example: 00000000-0000-0000-0000-000000000000
      x-merge-override:
        required: false
    IncidentNotificationTemplate:
      type: object
      description: Response with a notification template.
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/IncidentNotificationTemplateResponseData'
        included:
          type: array
          description: Related objects that are included in the response.
          items:
            $ref: '#/components/schemas/IncidentNotificationTemplateIncludedItems'
    IncidentNotificationTemplateArray:
      type: object
      description: Response with notification templates.
      required:
      - data
      properties:
        data:
          type: array
          description: The `NotificationTemplateArray` `data`.
          items:
            $ref: '#/components/schemas/IncidentNotificationTemplateResponseData'
        included:
          type: array
          description: Related objects that are included in the response.
          items:
            $ref: '#/components/schemas/IncidentNotificationTemplateIncludedItems'
        meta:
          $ref: '#/components/schemas/IncidentNotificationTemplateArrayMeta'
    IncidentNotificationTemplateArrayMeta:
      type: object
      description: Response metadata.
      properties:
        page:
          $ref: '#/components/schemas/IncidentNotificationTemplateArrayMetaPage'
    IncidentNotificationTemplateArrayMetaPage:
      type: object
      description: Pagination metadata.
      properties:
        total_count:
          type: integer
          description: Total number of notification templates.
          format: int64
          example: 42
        total_filtered_count:
          type: integer
          description: Total number of notification templates matching the filter.
          format: int64
          example: 15
    IncidentNotificationTemplateAttributes:
      type: object
      description: The notification template's attributes.
      required:
      - name
      - subject
      - content
      - category
      - created
      - modified
      properties:
        category:
          type: string
          description: The category of the notification template.
          example: alert
        content:
          type: string
          description: The content body of the notification template.
          example: 'An incident has been declared.


            Title: {{incident.title}}

            Severity: {{incident.severity}}

            Affected Services: {{incident.services}}

            Status: {{incident.state}}


            Please join the incident channel for updates.'
        created:
          type: string
          description: Timestamp when the notification template was created.
          format: date-time
          readOnly: true
          example: '2025-01-15T10:30:00Z'
        modified:
          type: string
          description: Timestamp when the notification template was last modified.
          format: date-time
          readOnly: true
          example: '2025-01-15T14:45:00Z'
        name:
          type: string
          description: The name of the notification template.
          example: Incident Alert Template
        subject:
          type: string
          description: The subject line of the notification template.
          example: '{{incident.severity}} Incident: {{incident.title}}'
    IncidentNotificationTemplateIncludedItems:
      description: Objects related to a notification template.
      oneOf:
      - $ref: '#/components/schemas/User'
      - $ref: '#/components/schemas/IncidentTypeObject'
    IncidentNotificationTemplateRelationships:
      type: object
      description: The notification template's resource relationships.
      properties:
        created_by_user:
          $ref: '#/components/schemas/RelationshipToUser'
        last_modified_by_user:
          $ref: '#/components/schemas/RelationshipToUser'
        incident_type:
          $ref: '#/components/schemas/RelationshipToIncidentType'
    IncidentNotificationTemplateResponseData:
      type: object
      description: Notification template data from a response.
      required:
      - id
      - type
      properties:
        id:
          type: string
          description: The unique identifier of the notification template.
          format: uuid
          example: 00000000-0000-0000-0000-000000000001
        type:
          $ref: '#/components/schemas/IncidentNotificationTemplateType'
        attributes:
          $ref: '#/components/schemas/IncidentNotificationTemplateAttributes'
        relationships:
          $ref: '#/components/schemas/IncidentNotificationTemplateRelationships'
      x-ignore-duplicate-object: true
    IncidentNotificationTemplateType:
      type: string
      description: Notification templates resource type.
      example: notification_templates
      enum:
      - notification_templates
      x-enum-varnames:
      - NOTIFICATION_TEMPLATES
    IncidentTypeAttributes:
      type: object
      description: Incident type's attributes.
      required:
      - name
      properties:
        createdAt:
          type: string
          description: Timestamp when the incident type was created.
          format: date-time
          readOnly: true
        createdBy:
          type: string
          description: A unique identifier that represents the user that created the incident type.
          readOnly: true
          example: 00000000-0000-0000-0000-000000000000
        description:
          type: string
          description: Text that describes the incident type.
          example: Any incidents that harm (or have the potential to) the confidentiality, integrity,
            or availability of our data.
        is_default:
          type: boolean
          description: If true, this incident type will be used as the default incident type if a type
            is not specified during the creation of incident resources.
          default: false
          example: false
        lastModifiedBy:
          type: string
          description: A unique identifier that represents the user that last modified the incident type.
          readOnly: true
          example: 00000000-0000-0000-0000-000000000000
        modifiedAt:
          type: string
          description: Timestamp when the incident type was last modified.
          format: date-time
          readOnly: true
        name:
          type: string
          description: The name of the incident type.
          example: Security Incident
        prefix:
          type: string
          description: The string that will be prepended to the incident title across the Datadog app.
          readOnly: true
          example: IR
    IncidentTypeObject:
      type: object
      description: Incident type response data.
      required:
      - id
      - type
      properties:
        id:
          type: string
          description: The incident type's ID.
          example: 00000000-0000-0000-0000-000000000000
        type:
          $ref: '#/components/schemas/IncidentTypeType'
        attributes:
          $ref: '#/components/schemas/IncidentTypeAttributes'
        relationships:
          $ref: '#/components/schemas/IncidentTypeRelationships'
    IncidentTypeRelationships:
      type: object
      description: The incident type's resource relationships.
      properties:
        created_by_user:
          $ref: '#/components/schemas/RelationshipToUser'
        last_modified_by_user:
          $ref: '#/components/schemas/RelationshipToUser'
        microsoft_teams_configuration:
          $ref: '#/components/schemas/MicrosoftTeamsConfigurationReference'
        zoom_configuration:
          $ref: '#/components/schemas/ZoomConfigurationReference'
        google_meet_configuration:
          $ref: '#/components/schemas/GoogleMeetConfigurationReference'
      additionalProperties: {}
    IncidentTypeType:
      type: string
      description: Incident type resource type.
      default: incident_types
      example: incident_types
      enum:
      - incident_types
      x-enum-varnames:
      - INCIDENT_TYPES
    MicrosoftTeamsConfigurationReference:
      type: object
      description: A reference to a Microsoft Teams Configuration resource.
      nullable: true
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/MicrosoftTeamsConfigurationReferenceData'
    MicrosoftTeamsConfigurationReferenceData:
      type: object
      description: The Microsoft Teams configuration relationship data object.
      nullable: true
      required:
      - id
      - type
      properties:
        type:
          type: string
          description: The type of the Microsoft Teams configuration.
          example: microsoft_teams_configurations
        id:
          type: string
          description: The unique identifier of the Microsoft Teams configuration.
          example: 00000000-0000-0000-0000-000000000000
      x-merge-override:
        required: false
    OrganizationsType:
      type: string
      description: Organizations resource type.
      default: orgs
      example: orgs
      enum:
      - orgs
      x-enum-varnames:
      - ORGS
    RelationshipToIncidentType:
      type: object
      description: Relationship to an incident type.
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/RelationshipToIncidentTypeData'
    RelationshipToIncidentTypeData:
      type: object
      description: Relationship to incident type object.
      required:
      - id
      - type
      properties:
        id:
          type: string
          description: The incident type's ID.
          example: 00000000-0000-0000-0000-000000000000
        type:
          $ref: '#/components/schemas/IncidentTypeType'
    RelationshipToOrganization:
      type: object
      description: Relationship to an organization.
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/RelationshipToOrganizationData'
    RelationshipToOrganizationData:
      type: object
      description: Relationship to organization object.
      required:
      - id
      - type
      properties:
        type:
          $ref: '#/components/schemas/OrganizationsType'
        id:
          type: string
          description: ID of the organization.
          example: 00000000-0000-beef-0000-000000000000
    RelationshipToOrganizations:
      type: object
      description: Relationship to organizations.
      required:
      - data
      properties:
        data:
          type: array
          description: Relationships to organization objects.
          example: []
          items:
            $ref: '#/components/schemas/RelationshipToOrganizationData'
    RelationshipToRoleData:
      type: object
      description: Relationship to role object.
      properties:
        type:
          $ref: '#/components/schemas/RolesType'
        id:
          type: string
          description: The unique identifier of the role.
          example: 3653d3c6-0c75-11ea-ad28-fb5701eabc7d
      x-merge-override:
        required: false
    RelationshipToRoles:
      type: object
      description: Relationship to roles.
      properties:
        data:
          type: array
          description: An array containing type and the unique identifier of a role.
          items:
            $ref: '#/components/schemas/RelationshipToRoleData'
      x-merge-override:
        required: false
    RelationshipToUser:
      type: object
      description: Relationship to user.
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/RelationshipToUserData'
    RelationshipToUserData:
      type: object
      description: Relationship to user object.
      required:
      - id
      - type
      properties:
        type:
          $ref: '#/components/schemas/UsersType'
        id:
          type: string
          description: A unique identifier that represents the user.
          example: 00000000-0000-0000-2345-000000000000
      x-merge-override:
        required: false
    RelationshipToUsers:
      type: object
      description: Relationship to users.
      required:
      - data
      properties:
        data:
          type: array
          description: Relationships to user objects.
          example: []
          items:
            $ref: '#/components/schemas/RelationshipToUserData'
    RolesType:
      type: string
      description: Roles type.
      default: roles
      example: roles
      enum:
      - roles
      x-ignore-duplicate-object: true
      x-enum-varnames:
      - ROLES
    User:
      type: object
      description: User object returned by the API.
      properties:
        type:
          $ref: '#/components/schemas/UsersType'
        id:
          type: string
          description: ID of the user.
        attributes:
          $ref: '#/components/schemas/UserAttributes'
        relationships:
          $ref: '#/components/schemas/UserResponseRelationships'
      x-merge-override:
        required: false
    UserAttributes:
      type: object
      description: Attributes of user object returned by the API.
      properties:
        mfa_enabled:
          type: boolean
          description: Whether multi-factor authentication (MFA) is enabled for the user's account.
          readOnly: true
        name:
          type: string
          description: The full display name of the user as shown in the Datadog UI.
          nullable: true
        handle:
          type: string
          description: The unique handle (username) of the user, typically matching their email prefix.
        created_at:
          type: string
          description: The ISO 8601 timestamp of when the user account was created.
          format: date-time
        modified_at:
          type: string
          description: The ISO 8601 timestamp of when the user account was last modified.
          format: date-time
        email:
          type: string
          description: The email address of the user, used for login and notifications.
        icon:
          type: string
          description: URL of the user's profile icon, typically a Gravatar URL derived from the email
            address.
        title:
          type: string
          description: The job title of the user (for example, "Senior Engineer" or "Product Manager").
          nullable: true
        verified:
          type: boolean
          description: Whether the user's email address has been verified.
        disabled:
          type: boolean
          description: Whether the user account is deactivated. Disabled users cannot log in.
        status:
          type: string
          description: The current status of the user account (for example, `Active`, `Pending`, or `Disabled`).
        service_account:
          type: boolean
          description: 'Whether this is a service account rather than a human user.

            Service accounts are used for programmatic API access.'
        last_login_time:
          type: string
          description: The ISO 8601 timestamp of the user's most recent login, or null if the user has
            never logged in.
          format: date-time
          nullable: true
          readOnly: true
        uuid:
          type: string
          description: The globally unique identifier (UUID) of the user.
          readOnly: true
    UserResponseRelationships:
      type: object
      description: Relationships of the user object returned by the API.
      properties:
        roles:
          $ref: '#/components/schemas/RelationshipToRoles'
        org:
          $ref: '#/components/schemas/RelationshipToOrganization'
        other_users:
          $ref: '#/components/schemas/RelationshipToUsers'
        other_orgs:
          $ref: '#/components/schemas/RelationshipToOrganizations'
      x-merge-override:
        properties: false
    UsersType:
      type: string
      description: Users resource type.
      default: users
      example: users
      enum:
      - users
      x-ignore-duplicate-object: true
      x-enum-varnames:
      - USERS
    ZoomConfigurationReference:
      type: object
      description: A reference to a Zoom configuration resource.
      nullable: true
      required:
      - data
      properties:
        data:
          $ref: '#/components/schemas/ZoomConfigurationReferenceData'
    ZoomConfigurationReferenceData:
      type: object
      description: The Zoom configuration relationship data object.
      nullable: true
      required:
      - id
      - type
      properties:
        type:
          type: string
          description: The type of the Zoom configuration.
          example: zoom_configurations
        id:
          type: string
          description: The unique identifier of the Zoom configuration.
          example: 00000000-0000-0000-0000-000000000000
      x-merge-override:
        required: false
  securitySchemes:
    AuthZ:
      type: oauth2
      description: This API uses OAuth 2 with the implicit grant flow.
      flows:
        authorizationCode:
          authorizationUrl: /oauth2/v1/authorize
          tokenUrl: /oauth2/v1/token
          scopes: {}
    apiKeyAuth:
      type: apiKey
      description: Your Datadog API Key.
      name: DD-API-KEY
      in: header
      x-env-name: DD_API_KEY
    appKeyAuth:
      type: apiKey
      description: Your Datadog APP Key.
      name: DD-APPLICATION-KEY
      in: header
      x-env-name: DD_APP_KEY
